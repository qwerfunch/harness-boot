name: self-check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: self-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: unittest + self_check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements-dev.txt is the SSoT — local devs + CI install the
          # same set. A mismatch was what hid the v0.8.4 schema-path bug
          # locally (jsonschema missing → 12 tests skipped silently).
          python -m pip install -r requirements-dev.txt

      - name: Unit tests
        run: python -m unittest discover tests/unit --verbose

      - name: self_check (SSoT + validate + sync + check + commands)
        run: bash scripts/self_check.sh
