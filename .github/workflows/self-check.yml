name: self-check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: self-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: parity + self_check (node-${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # No `cache: npm` — package-lock.json is the SSoT and we want
          # CI to surface lockfile drift, not silently use a stale cache.

      - name: Install runtime dependencies
        # dist/ is committed so npm install only pulls runtime deps
        # (commander, yaml, ajv, smol-toml). The prepare hook is a
        # no-op when dist/cli/harness.js already exists.
        run: npm install --no-audit --no-fund

      - name: Typecheck (no emit)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Parity tests (vitest)
        run: npm run test:parity

      - name: self_check (SSoT + validate + sync + check + commands)
        run: bash self_check.sh
