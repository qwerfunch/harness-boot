    # -- NEW-33 : ambient_files[] -----------------------------------------
    # 플러그인이 파일 시스템 (.harness/, .claude/) 에 암묵적으로 기대하는 트리.
    # meta 어댑터 §3.1 self-bootstrap 의 entity template 와 일치.
  ambient_files:
    - path: ".harness/spec.yaml"
      kind: "ssot"                       # Single Source of Truth
      owner: "user"
      created_by: "F-001_init"
      required: true
      source_ref: "§5.1 + §2.2"
    - path: ".harness/state.yaml"
      kind: "state"
      owner: "plugin"
      created_by: "F-003_sync"
      required: true
      source_ref: "§5.5 (L934-1035)"
    - path: ".harness/events.log"
      kind: "append_only_log"
      owner: "plugin"
      created_by: "F-003_sync"
      required: true
      rotation: "size:10MB"
      source_ref: "§5.6 + §7.3.6"
    - path: ".harness/hashes/"
      kind: "hash_cache"
      owner: "plugin"
      created_by: "F-010_canonical_hash"
      required: false
      source_ref: "부록 D (L3307-3470)"
    - path: ".harness/includes/"
      kind: "expanded_cache"
      owner: "plugin"
      created_by: "F-009_include_expander"
      required: false
      source_ref: "§5.1 + §13.11"
    - path: "CLAUDE.md"
      kind: "shim"
      owner: "plugin"
      created_by: "F-015_claude_md_shim"
      required: true
      lifecycle: "regenerated-on-plugin-upgrade"
      source_ref: "§6.5 + §11.3"
    - path: ".claude/agents/*.md"
      kind: "agent_definitions"
      owner: "plugin"
      created_by: "F-012_agents"
      required: true
      source_ref: "§6.3 (L1221-1336)"
    - path: ".claude/skills/*/SKILL.md"
      kind: "skill_definitions"
      owner: "plugin"
      created_by: "F-013_skills"
      required: false
      source_ref: "§6.4 (L1337-1351)"
    - path: ".claude/hooks/*.json"
      kind: "hook_definitions"
      owner: "plugin"
      created_by: "F-014_hooks"
      required: false
      source_ref: "§5.7 (L1095-1147)"

    # -- NEW-35 : host_binding[] ------------------------------------------
    # self 는 Claude Code 호스트 의존. meta 어댑터 §4.7 예시 준수.
  host_binding:
    - host: "claude-code"
      version_range: ">=0.7.0"            # plugins/ subcommand 등장 시점
      activation_events:
        - "onCommand:/harness:init"
        - "onCommand:/harness:spec"
        - "onCommand:/harness:sync"
        - "onCommand:/harness:work"
        - "onCommand:/harness:check"
        - "onCommand:/harness:events"
        - "onCommand:/harness:metrics"
        - "onCommand:/harness:status"
        - "onFileSystem:./.harness/spec.yaml"
      surface:
        type: "cli-plugin"
        registry: "claude-code-plugin-registry"
      best_effort_forks:
        - host: "claude-code"
          version_range: "<0.7.0"
          note: "flag `--plugin` 미지원 — CLAUDE.md shim 만 작동 (F-015)"
        - host: "cursor"
          version_range: "*"
          note: "slash-command 규약 다름 — 수동 설치로 F-004/F-006 만 사용 가능"

    # -- NEW-29 : agent_permissions (12 agents × 8 tool 매트릭스 압축) ----
    # 소스: §6.3.1 (L1260-1336). 전체는 conversion-notes-v2.md §4.1.1 참고.
  drift_catalog:
    - kind: "spec_feature_code_missing"
      detect_by: "F-006_check"
      severity: "high"
      action: "user_decision (add|remove_from_spec)"
    - kind: "spec_feature_code_present_but_stale"
      detect_by: "F-006_check"
      severity: "medium"
      action: "prompt_resolve"
    - kind: "entity_yaml_code_schema_mismatch"
      detect_by: "F-006_check"
      severity: "high"
      action: "block_until_resolved"
    - kind: "include_file_missing"
      detect_by: "F-009_include_expander"
      severity: "high"
      action: "abort_expansion"
    - kind: "include_depth_violation"
      detect_by: "F-009_include_expander"
      severity: "high"
      action: "abort_expansion"
    - kind: "hash_tree_mismatch"
      detect_by: "F-010_canonical_hash"
      severity: "medium"
      action: "regenerate_cache"
    - kind: "state_log_desync"
      detect_by: "F-003_sync"
      severity: "low"
      action: "auto_recover_from_log"
    - kind: "edit_wins_override"
      detect_by: "F-018_edit_wins"
      severity: "info"
      action: "record_and_preserve"

    # -- NEW-32 : versioning_axes -----------------------------------------
    # 소스: §11 (L2514-2690) + §12 migration. 3 축 독립.
  versioning_axes:
    - axis: "spec_schema"
      current: "2.3.8"
      policy: "semver_strict"
      migration_source_ref: "§12"
    - axis: "plugin_release"
      current: "0.1.1"
      policy: "semver_with_pre"
      coupling_with_spec: "minor_of_plugin_tracks_minor_of_spec"
    - axis: "project_state"
      current: "per-user .harness/state.yaml"
      policy: "append_only_events_log"
      coupling_with_spec: "state.yaml 의 spec_hash 와 spec.yaml 의 hash 가 일치 시 sync"

    # -- NEW-34 : preamble_contract ---------------------------------------
    # 소스: §2.3 + §7.6 (L2193-2241). 3-line stdout 계약.
  contribution_points:
    - kind: "command"
      ref: "extensions.command_map[*]"
      source_ref: "§7.2 (L1415-1443)"
    - kind: "activationEvent"
      values:
        - "onCommand:/harness:*"
        - "onFileSystem:./.harness/spec.yaml"
      source_ref: "§7.2.3 + §7.3.1"
    - kind: "configuration"
      id: "harness-boot.defaults"
      scope: ".harness/spec.yaml"
      note: "host 구성보다는 SSoT(spec.yaml) 내부에 저장 — self 특화"
      source_ref: "§5.4 HarnessConfig (L809-933)"

  # --- 🆕 v2 변경 이력 (P-24 MAY — 부록 C 를 구조화) ---------------------
  preamble_contract:
    required: true
    format: "3-line"
    line_1: "▶ {command} · {decision}"
    line_2: "⚙ gate={gate_id}/{gate_name} · state_hash={short_hash}"
    line_3: "→ {next_action_or_result}"
    encoding: "utf-8"
    stderr_allowed: false
    source_ref: "§7.6 (L2193-2241)"

    # -- NEW-36 : contribution_points[] -----------------------------------
    # Claude Code 호스트가 수용하는 확장 포인트 유형. self 는 self-bootstrap
    # 성격상 editor-extension 처럼 풍부하진 않지만 command/keybinding/activation
    # 수준은 노출한다.
  gate_chain:
    - id: 0
      name: "spec_exists"
      description: "spec.yaml 존재 및 version/project 최소 키 채움"
      prerequisite: []
      blocking: true
      source_ref: "§9 + §7.3.1"
    - id: 1
      name: "schema_valid"
      description: "v2.3.7 스키마에 대해 구조 검증 통과"
      prerequisite: [0]
      blocking: true
      source_ref: "§9 + §5.1"
    - id: 2
      name: "domain_selected"
      description: "domain 값이 확정 (web-service/worker/library/cli-plugin)"
      prerequisite: [1]
      blocking: true
      source_ref: "§5.2"
    - id: 3
      name: "features_coherent"
      description: "features[] 간 의존성 DAG + F-000 skeleton 1회"
      prerequisite: [2]
      blocking: true
      source_ref: "§7.3.5 (L1882-1979)"
    - id: 4
      name: "skeleton_builds"
      description: "Walking Skeleton 컴파일/타입체크 통과"
      prerequisite: [3]
      blocking: true
      source_ref: "§7.3.3 + §2.3"
    - id: 5
      name: "runtime_smoke"
      description: "엔트리포인트 1회 실행 후 preamble 1회 이상 출력"
      prerequisite: [4]
      blocking: true
      source_ref: "§7.3.3 + §7.6"

