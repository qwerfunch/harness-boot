      gate: 0                             # Gate 0 (spec existence check) 전 실행 가능
      requires_state: false
    - id: "harness.spec"
      command: "/harness:spec"
      handler: "F-002_spec"
      source_ref: "§7.3.2 (L1498-1577)"
      preamble_required: true
      gate: 0
      requires_state: true
    - id: "harness.sync"
      command: "/harness:sync"
      handler: "F-003_sync"
      source_ref: "§7.3.3 (L1578-1815)"
      preamble_required: true
      gate: 5                             # Walking Skeleton Gate 5 까지 구동
      requires_state: true
    - id: "harness.work"
      command: "/harness:work"
      handler: "F-004_work"
      source_ref: "§7.3.4 (L1816-1881)"
      preamble_required: true
      gate: 5
      requires_state: true
    - id: "harness.check"
      command: "/harness:check"
      handler: "F-006_check"
      source_ref: "§7.3.5 (L1882-1979)"
      preamble_required: true
      gate: 3                             # 정합성 검사
      requires_state: true
    - id: "harness.events"
      command: "/harness:events"
      handler: "F-007_events"
      source_ref: "§7.3.6 (L1980-2006)"
