  - id: "F-048"
    name: "drift × Iron Law gating — complete() blocks on error-severity drift"
    type: "feature"
    description: "Closes GAP 1 from the 4-mechanism cohesion analysis (plan/wondrous-hopping-canyon §Part 10): work.py:complete() previously did not invoke check.py:run_check(), so a feature could be completed while drift accumulated. This integration rejects complete() when a severity='error' wire-integrity finding (Code/Stale/AnchorIntegration) is present; --hotfix-reason still bypasses for emergencies. Severity-based, so it operates independently of prototype/product mode — drift is a system-integrity signal that mode does not weaken. First binding into the upcoming severity-ranking refinement thread."
    modules:
      - "scripts/work.py"
      - "scripts/check.py"
      - "tests/unit/work/test_drift_iron_law_gate.py"
    test_strategy: "contract"
    tdd_focus:
      - "drift 0 → complete 통과 (기존 동작 유지)"
      - "error-severity drift 1+ → complete 거부, kinds 메시지 노출"
      - "warn-severity drift 만 있을 때 → 통과 (binary blocking)"
      - "hotfix_reason override → drift 무시하고 진행 (escape hatch)"
      - "다른 feature 의 complete 에 미치는 영향 0 (per-feature 격리 유지)"
    acceptance_criteria:
      - "AC-1: scripts/work.py:complete() 가 gate_5 pass 검증 직후, mode resolution 전에 run_check(harness_dir) 를 호출."
      - "AC-2: drift_report.findings 중 severity=='error' 이면서 kind ∈ {Code, Stale, AnchorIntegration} (= _BLOCKING_DRIFT_KINDS, 진짜 wire 무결성 위반) 인 finding 1+ 시 res.action='queried' + 거부 메시지 ('cannot complete — N blocking drift(s) (kinds...). Run python3 scripts/check.py ... or use --hotfix-reason') 반환."
      - "AC-3: severity=='warn' 만 있거나 schema-validation 류 (Anchor/Generated/Doc/Spec 등) error 만 있으면 통과 — 기존 Iron Law 흐름 (mode 별 declared evidence) 진행. F-051 에서 multi-tier severity 로 일반화 예정."
      - "AC-4: hotfix_reason 제공 시 drift 검증 스킵 (기존 emergency override 와 같은 escape hatch). hotfix evidence 1 개로 product mode 도 통과."
      - "AC-5: check.py 실행 실패 (예: malformed spec, IO 에러) 시 silent fallback — drift 검증 best-effort, complete 흐름은 막지 않음 (hotfix 도 영향 없게)."
      - "AC-6: tests/unit/work/test_drift_iron_law_gate.py 신설 — 5 케이스 (drift 없음 → pass, error drift → 거부, warn-only → pass, hotfix override → pass, malformed spec → graceful)."
      - "AC-7: bash scripts/self_check.sh 5/5 PASS · 회귀 0 (1084 unit + 26 integration)."
      - "AC-8: F-048 양쪽 spec.yaml mirror + work.py 4-verb cycle 완주 (Phase 2 dogfood)."

