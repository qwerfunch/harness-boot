version: 2.3.9
project:
  name: harness-boot
  mode: prototype
  summary: Claude Code harness plugin — drives a project from Walking Skeleton
    through ongoing evolution with spec.yaml as the single source of truth.
  description: |
    A "harness" tool that runs as a plugin inside Anthropic Claude Code.
    Given a single spec.yaml, it (1) generates a buildable Walking
    Skeleton and drives it through the runtime smoke gate (Gate 5), then
    (2) automates the ongoing cycle of adding features, refactoring, and
    re-rolling the spec. The key idea is to separate "author's prose
    (the human design narrative)" from "engineer's contract (the YAML
    plus code)" at the schema level so the LLM is forced to *transform*
    rather than copy.
  vision: |
    Instead of asking the user to edit spec.yaml by hand every time, the
    four commands /harness:init → /harness:spec → /harness:sync →
    /harness:work carry an idea all the way to deployable code in a
    single forward flow. When the plugin upgrades, a user project only
    needs to refresh the CLAUDE.md shim, and every decision must remain
    auditable via the persistent log (events.log) and the state file
    (state.yaml). The end goal: the combination of Claude Code and
    harness-boot lifts a single developer to team-level productivity.
  stakeholders:
    - role: project_initiator
      concerns:
        - Design intent is reproducible from a single command (verified by
          /harness:check).
        - Decision history persists in events.log so the 'why' stays recoverable
          later.
        - Plugin upgrades never break an existing project (the CLAUDE.md shim
          model).
    - role: ai_implementer
      concerns:
        - Every command boot emits the 3-line preamble (the transparency
          contract).
        - The per-agent tool permission matrix is honored — no edits outside
          scope.
        - Gates 0-5 pass in order; a runtime smoke failure halts work.
    - role: future_user
      concerns:
        - "Surface stays small: 4 core commands (init / spec / sync / work) + 4
          diagnostic (status / check / events / metrics)."
        - Editing spec.yaml is supported by IDE schema completion and validation
          (v2.3.7).
        - $include splits long narrative into separate md files so YAML stays
          manageable.
    - role: plugin_developer
      concerns:
        - The commands/ ↔ docs/ relationship is fixed by §11.2 and does not
          drift.
        - The scope of template changes that propagate into user projects is
          clear (§11.3).
        - Appendix D canonical-hashing implementation passes language-specific
          test vectors.
    - role: downstream_tooling
      concerns:
        - state.yaml's schema follows semver so external parsers don't break.
        - events.log is append-only JSONL — pipes straight into streaming
          pipelines.
        - architecture.yaml's layer/component model is compatible with
          architecture-linter tools.
domain:
  overview: |
    The core entity is the Harness (one harness-boot instance per
    project), and underneath it sit Spec (the product spec, the SSoT),
    Domain and Architecture (derived views of Spec), HarnessConfig (the
    runtime contract), State (feature / mode state), Event (persistent
    log), Feature (the unit of development), Hook (validation scripts),
    Protocol (inter-agent contracts), Agent (a Claude sub-agent), Skill
    (a procedure bundle), Command (the /harness:xxx surface), Include
    (a reference to external md), Drift (twelve kinds of mismatch),
    Gate (the 0-5 quality gates), and Preamble (the 3-line output
    contract). Every entity has a concrete shape on disk under
    `.harness/` or `.claude/`, and those directories are created by
    `/harness:init` itself. spec.yaml is the only file the user
    edits as "author's prose"; everything else is either derived or
    machine-maintained (the two edit-wins exceptions are domain.md and
    architecture.yaml).
  entities:
    - name: Harness
      description: 한 사용자 프로젝트에 설치된 harness-boot 인스턴스. `.harness/` + `.claude/` 2 디렉터리의 합.
      invariants:
        - 동일 레포에 2개 이상 존재 금지(단일 루트 가정)
        - harness.yaml 이 존재해야 하며, harness.version 은 2.3.x semver 준수
        - install_mode ∈ {user_scope, project_scope}; user_scope 에서는 사용자 repo 에
          커밋되지 않음
      sensitive: false
    - name: Spec
      description: spec.yaml 본체. 사용자가 사고의 글로 작성·편집하는 SSoT.
      invariants:
        - schema version 은 2.3.7 고정(이 문서 기준)
        - structured 필드(🔒) 는 spec.yaml 본문에만, free-text 필드(🗒) 는 $include 경유 허용
        - project.name · features[].id · business_rules[].id 는 하네스 내 유일
        - prototype_mode=true 인 경우 Gate 3(coverage) 이 완화됨(`src/examples/`,
          `src/scripts/` 제외)
      sensitive: false
    - name: ExpandedSpec
      description: $include 를 전부 풀어 얻는 단일 YAML. 해시·검증·AI 입력은 이것을 사용.
      invariants:
        - $include 노드는 expand 후 상위 키에 완전 치환
        - expand 는 include 깊이 1 만 허용(§13.11, MUST)
        - expand 실패 시 Fail-Fast — 파생 파일 생성 중단
      sensitive: false
    - name: Domain
      description: domain.md — spec.yaml 의 domain 블록을 렌더한 가독성 뷰. 사람이 읽기 좋다.
      invariants:
        - 자동 재생성 가능하나, 사용자가 직접 수정한 경우 edit-wins 로 보존(§10.4)
        - renderer 는 spec.yaml.domain 만 원천으로 허용(추가 정보 주입 금지)
      sensitive: false
    - name: Architecture
      description: architecture.yaml — 파생 아키텍처 선언(layer/component/edge 모델).
      invariants:
        - Spec.features[].modules 를 layer/component 로 정규화
        - edit-wins 대상(domain.md 와 동일)
        - architecture-linter 같은 외부 도구가 이 파일만 보고 동작
      sensitive: false
    - name: HarnessConfig
      description: harness.yaml — 하네스 구성 계약. 런타임·언어·검증 정책·include_sources 트래킹.
      invariants:
        - tech_stack.language 가 비었으면 /harness:sync 차단
        - include_sources[] 는 마지막 expand 시점의 include 노드를 mirror(§5.4)
        - version 은 반드시 Spec.version 과 같은 major.minor 라인
      sensitive: false
    - name: State
      description: state.yaml — 피처·모드·현재 인보케이션 상태. 기계 유지.
      invariants:
        - features[].status ∈ {planned, in_progress, blocked, done, archived}
        - active_feature_id 는 항상 features[] 중 하나를 가리키거나 null
        - gates[name].last_result ∈ {pass, fail, skipped}
      sensitive: false
    - name: Event
      description: events.log 의 한 레코드. append-only JSONL.
      invariants:
        - ts 는 RFC3339 UTC, actor ∈ {user, command, agent, hook}
        - kind 는 소문자 snake_case, payload 는 JSON object
        - 기존 레코드 수정·삭제 금지(감사성), 회전은 events.log.YYYYMM 로 분할
      sensitive: true
      sensitive_reason: 프로젝트 파일 경로·사용자 코멘트가 섞여 저장 대상 고려 필요
    - name: Feature
      description: Spec.features[] 의 한 항목. 개발 단위이자 Gate 묶음 대상.
      invariants:
        - id 는 F-XXX 형식, type ∈ {skeleton, feature, refactor, research}
        - type='skeleton' 은 features[0] 에만 허용(Walking Skeleton 유일성)
        - test_strategy ∈ {tdd, contract, property, smoke} 중 하나 이상
      sensitive: false
    - name: Command
      description: /harness:xxx 명령. commands/ 디렉터리의 md + claude code slash command 엔트리.
      invariants:
        - 핵심 4개(init/spec/sync/work) + 진단 4개(status/check/events/metrics) 가 고정 표면
        - 모든 명령은 실행 직후 3줄 preamble 을 stdout 에 출력(§7.6)
        - destructive 명령은 --yes 플래그 없이 실행 금지(init 예외)
      sensitive: false
    - name: Mode
      description: /harness:spec 실행 모드. A(addition)·B(baseline)·R(refine)·E(explain) 4종.
      invariants:
        - spec.yaml 부재 시 자동 B
        - 부재 아닌 상태에서 /harness:spec 은 입력 성격에 따라 A/R/E 자동 분기
        - E 는 읽기 전용이며 파일 수정 금지
      sensitive: false
    - name: Agent
      description: "`.claude/agents/` 의 한 에이전트 정의(md + frontmatter). sub-agent 의
        scope/tool 을 선언."
      invariants:
        - 모든 에이전트는 Tool 권한 매트릭스(§6.3.1) 에 키로 존재
        - 에이전트 정의 frontmatter 의 tools 는 매트릭스 상한 이하
        - Context/Process/Forbidden 3 블록이 md 본문 필수
      sensitive: false
    - name: Skill
      description: "`.claude/skills/` 의 절차 번들. SKILL.md + 보조 파일."
      invariants:
        - SKILL.md frontmatter 의 description 이 trigger 정확도 메트릭 근거
        - skill 내부 script/ 는 실행 권한 명시(Tool 권한 매트릭스 우회 금지)
      sensitive: false
    - name: Hook
      description: "`.harness/hooks/` 의 bash 스크립트. pre-commit·post-sync 등 훅 진입점."
      invariants:
        - exit code 0 = 성공; 0 이 아니면 hook-fail 이벤트 적재
        - "fail-open 원칙: 훅 자체 버그가 사용자 작업을 차단하지 않음"
        - 훅 내부에서 spec.yaml 수정 금지(SSoT 침범 방지)
      sensitive: false
    - name: Protocol
      description: "`.harness/protocols/` 의 에이전트 간 규약 md. 페이로드 스키마·버전."
      invariants:
        - protocol_id 는 파일명과 동일, version 은 semver
        - protocol breaking change 는 parallel-protocol 으로만 허용(drift 방지)
      sensitive: false
    - name: Include
      description: spec.yaml 의 $include 노드. 외부 md 를 해당 위치에 삽입.
      invariants:
        - $include 는 🗒 free-text 필드에만 허용(MUST)
        - depth=1 제한(중첩 include 금지)
        - 대상 파일은 .harness/chapters/ 하위 md 만
      sensitive: false
    - name: Drift
      description: SSoT 와 파생/구현 간 불일치. 8종 분류.
      invariants:
        - kind ∈ {Spec, Code, Doc, Derived, Generated, Evidence, Anchor, Include}
        - /harness:check 는 8종 전부 탐지 & 리포트
        - Spec-drift 해결은 항상 사용자 개입 필요(자동 수정 금지)
      sensitive: false
    - name: Gate
      description: 0~5 단계 품질 관문. 0=tests · 1=compile · 2=style · 3=coverage · 4=commit
        · 5=runtime smoke.
      invariants:
        - 순서대로 통과해야 함(skip 없음)
        - Gate 5 실패 시 feature status=blocked, events.log 적재
        - prototype_mode=true 에서만 Gate 3 완화(examples/scripts 제외)
      sensitive: false
    - name: Preamble
      description: 명령 부팅 시 stdout 3줄 출력 계약(§7.6).
      invariants:
        - 정확히 3줄, 각 행 80자 이내
        - 1행=mode, 2행=scope, 3행=next — 고정 필드명
        - anti-rationalization 2행(v2.3.1) 은 preamble 직후 별도 출력
      sensitive: false
    - name: HashTree
      description: 부록 D 해시 조합 결과. 전체/스코프/include 3층.
      invariants:
        - Canonical YAML → Canonical JSON → SHA-256 순서 고정
        - include expanded vs. raw 두 해시를 함께 기록
        - 테스트 벡터(§D.7) 는 구현 적합성 필수 통과
      sensitive: false
  business_rules:
    - id: BR-001
      statement: Author's prose and engineer's contract are separated at the schema
        level (🔒 vs 🗒).
      rationale: Forces the LLM to deliberately *transform* natural language rather
        than copy it into a YAML structure.
    - id: BR-002
      statement: spec.yaml is the single product-spec SSoT; every other file is
        derived, executed, or logged.
      rationale: Drift detection is built on a single-source assumption — duplication
        breaks it.
    - id: BR-003
      statement: features[0] must be type='skeleton', and the Walking Skeleton has to
        pass through gate_5 (runtime smoke).
      rationale: Prevents planning paperware — something has to boot first, then we
        extend on top of it.
    - id: BR-004
      statement: Every /harness:xxx command emits a 3-line preamble to stdout
        immediately on invocation.
      rationale: Transparency — the user reads context and next step at a glance.
        Introduced in v2.3.1.
    - id: BR-005
      statement: domain.md and architecture.yaml are derived but preserved by
        edit-wins when the user has edited them.
      rationale: Stops the renderer from overwriting the user's added insight; SSoT
        divergence is reported as drift instead.
    - id: BR-006
      statement: Hooks are fail-open — a bug in a hook never blocks the user's work.
      rationale: Hook failures must not hold the development flow hostage; the failure
        itself is recorded into events.log as a hook-fail.
    - id: BR-007
      statement: Canonical hashing follows Canonical YAML → Canonical JSON → SHA-256,
        and both the include-expanded and raw hashes are recorded.
      rationale: Cross-language reproducibility (§D.7) plus separate tracking of
        include expansion (§D.4).
    - id: BR-008
      statement: $include is allowed only in 🗒 free-text fields, and only to depth 1.
      rationale: Nested includes break hash reproducibility, token predictability, and
        IDE jump usability (§13.11).
    - id: BR-009
      statement: v1 compatibility is delivered only through the CLAUDE.md shim model —
        existing .harness/ content is never overwritten.
      rationale: Preserves user-owned files; upgrades stay tied to an explicit user
        action (§12).
    - id: BR-010
      statement: "Features touching `sensitive: true` entities are forced into the TDD
        strategy at gate_0."
      rationale: Catches regressions on sensitive-data paths at the contract level.
    - id: BR-011
      statement: An agent cannot declare tools beyond the upper bound of the tool
        permission matrix (§6.3.1) in its frontmatter.
      rationale: Stops out-of-scope file edits and silent network calls from sneaking in.
    - id: BR-012
      statement: Commands honor the CQS principle — the diagnostic family (status /
        check / events / metrics) never mutates files.
      rationale: Unintended mutation during diagnosis would render the report
        meaningless (§7.3.8, refined in v2.3.3).
    - id: BR-013
      statement: events.log is append-only JSONL; existing records cannot be modified
        or deleted.
      rationale: Auditability — losing the 'why this happened' trail later collapses
        the harness's core value.
    - id: BR-014
      statement: The two anti-rationalization lines are always emitted right after the
        preamble (introduced in v2.3.1).
      rationale: Forces step compliance so the LLM can't plausibly rationalize its own
        skips.
    - id: BR-015
      statement: Autonomous loops (drive and any future autonomy mechanism) escalate
        rather than bypass Iron Law (BR-004) and anti-rationalization (BR-014).
        They cannot self-issue --hotfix-reason; cannot call git commit/push/tag,
        gh release, or marketplace operations; must escalate on severity=error
        drift; must escalate after the configured retry threshold; must record
        every halt reason to _workspace/drive/run.yaml; and obey the BR-014
        preamble themselves. A single active goal and a single active feature
        are allowed at any time — sequential only.
      rationale: Iron Law's value comes from its non-negotiability. An autonomous loop
        that quietly bypasses it inverts the harness from a guard into an attack
        surface. Discipline is preserved by making the loop yield, not by
        relaxing the law.
  vocabulary:
    - term: Walking Skeleton
      meaning: The first feature (F-001) must be a minimal end-to-end implementation
        that crosses the entire stack and passes through gate_5.
    - term: Transparency-by-Preamble
      meaning: Every command emits a 3-line summary (mode / scope / next). The
        transparency-first principle from v2.3.1.
    - term: Edit-wins
      meaning: Even derived files are preserved when the user has edited them (limited
        to domain.md and architecture.yaml).
    - term: Fail-open hook
      meaning: A hook failure never blocks the user's work; the failure is only logged.
    - term: $include
      meaning: v2.3.7 syntax for pulling an external md file into a 🗒 field of
        spec.yaml. Fixed at depth 1.
    - term: Canonical hashing
      meaning: Canonical YAML → Canonical JSON → SHA-256 pipeline (Appendix D).
    - term: Mode A/B/R/E
      meaning: Auto-routing for /harness:spec — Addition / Baseline / Refine / Explain.
    - term: Gate 0-5
      meaning: "Quality gates in order: tests → compile → style → coverage → commit →
        runtime smoke."
    - term: CQS
      meaning: Command-Query Separation — the principle of separating state-mutating
        commands from read-only queries.
    - term: SSoT
      meaning: "Single Source of Truth. In harness-boot it is a single file: spec.yaml."
features:
  - id: F-001
    name: Skeleton — /harness:init 으로 Walking Skeleton 부팅
    type: skeleton
    status: done
    archived_at: 2026-04-23T00:00:00Z
    archive_reason: v0.1 era walking-skeleton — superseded by F-025 self-dogfood +
      F-036 brownfield seed (F-047)
    release_target: v0.1
    modules:
      - init_command
      - install_target_detector
      - scaffold_renderer
      - claude_md_shim
      - preamble_emitter
    test_strategy: tdd
    tdd_focus:
      - 빈 디렉터리에서 init 시 9개 파일이 정확히 생성됨
      - 이미 .harness/ 존재 시 --yes 없이 중단
    v0_1_smoke_notes:
      - CC 2.1.x 에서 $CLAUDE_PLUGIN_ROOT 미설정 확정 — $PATH bin 역산으로 경로 해석 (NEW-37)
      - .claude/ 빈 디렉터리 · CLAUDE.md 의 phantom @import 모두 silently ignore
      - directory-type marketplace 의 installPath 가 실제로 생성되지 않음 (NEW-44)
  - id: F-002
    name: /harness:spec — Mode A/B/R/E 자동 분기
    type: feature
    status: partial
    release_target: v0.2
    modules:
      - spec_command
      - mode_classifier
      - baseline_generator
      - addition_merger
      - refine_editor
      - explain_renderer
    test_strategy: tdd
    tdd_focus:
      - spec.yaml 부재 시 B, 존재 시 A/R/E 자동 선택
      - E 는 어떤 경우에도 파일을 수정하지 않음(CQS 검사)
  - id: F-003
    name: /harness:sync — Phase 0(파생) + Phase 1(빌드) 2단계
    type: feature
    status: done
    archived_at: 2026-04-23T00:00:00Z
    archive_reason: v0.2 era /harness:sync — derived files generation, foundation
      stable (F-047)
    release_target: v0.2
    depends_on:
      - F-009
      - F-010
    modules:
      - sync_command
      - include_expander
      - domain_renderer
      - architecture_renderer
      - gate_runner
      - delta_selector
      - plugin_root_resolver
    test_strategy: tdd
    tdd_focus:
      - edit-wins 보존(domain.md 사용자 수정이 덮이지 않음)
      - delta 빌드가 영향 피처만 선별
      - include expand 실패 시 즉시 중단
      - plugin_root_resolver 가 directory-type marketplace 에서도 source.path
        fallback 으로 정상 동작 (NEW-44 회귀)
  - id: F-004
    name: /harness:work — 피처 개발 사이클
    type: feature
    status: done
    release_target: v0.3
    modules:
      - work_command
      - feature_selector
      - tdd_driver
      - gate_runner
      - state_transitioner
    test_strategy: tdd
  - id: F-005
    name: /harness:status (read-only) — v2.3.3 순수 조회
    type: feature
    status: done
    archived_at: 2026-04-23T00:00:00Z
    archive_reason: v0.3 era /harness:status — CQS read-only, foundation stable (F-047)
    release_target: v0.3
    modules:
      - status_command
      - state_reader
      - drift_summarizer
    test_strategy: contract
  - id: F-006
    name: /harness:check — 8종 드리프트 탐지
    type: feature
    status: partial
    release_target: v0.3
    modules:
      - check_command
      - drift_detector
      - anchor_resolver
      - include_integrity_checker
    test_strategy: property
  - id: F-007
    name: /harness:events — 이벤트 로그 조회 (tail/filter)
    type: feature
    status: done
    archived_at: 2026-04-23T00:00:00Z
    archive_reason: v0.3 era /harness:events — JSON Lines append, foundation stable (F-047)
    release_target: v0.3
    modules:
      - events_command
      - log_tailer
      - event_filter
    test_strategy: contract
  - id: F-008
    name: /harness:metrics — 집계 지표
    type: feature
    archived_at: 2026-04-23T00:00:00Z
    archive_reason: v0.3.9 era /harness:metrics — read-only metrics, foundation stable (F-047)
    modules:
      - metrics_command
      - aggregator
      - metric_formatter
    test_strategy: contract
  - id: F-009
    name: $include 전개 엔진
    type: feature
    status: done
    archived_at: 2026-04-23T00:00:00Z
    archive_reason: v0.2 era include_expander — depth=1 $include enforcement,
      foundation stable (F-047)
    release_target: v0.2
    modules:
      - include_expander
      - chapters_resolver
      - depth_guard
      - field_type_guard
