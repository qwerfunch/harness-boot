  # --- 🆕 v2 확장 네임스페이스 (NEW-28~36 전 갭 구조화) -------------------
  # 근거: v2.3.7 본문 §5.1 에 `metadata.*` 가 화이트리스트 형태로 정의되지 않아
  #      metadata.conversion 이 이미 확장 네임스페이스로 동작 중 (de-facto precedent).
  #      metadata.extensions.* 는 이를 따라 안전하게 추가 가능하며, P-14(안전한 덮어쓰기)
  #      및 P-17(확장 네임스페이스 MUST) 를 준수한다.
  extensions:
    # -- NEW-28 : command_map[] -------------------------------------------
    # self 는 Claude Code 플러그인이므로 command_map 은 필수적 매핑이다.
    # meta 어댑터 §4.2 (editor_commands 매핑 힌트) + §3.1 self-bootstrap 적용.
    agent_permissions:
      matrix_source: "§6.3.1 (L1260-1336)"
      schema: "agent_id × tool_kind → allow|deny|prompt"
      agents:
        - id: "spec-author"
          allow: ["Read", "Write", "Edit", "Grep"]
          deny: ["Bash", "WebFetch"]
          prompt: ["Glob"]
          rationale: "스펙 작성은 파일 조작만, 네트워크/쉘 차단"
        - id: "skeleton-builder"
          allow: ["Read", "Write", "Edit", "Bash", "Glob"]
          deny: ["WebFetch"]
          prompt: []
          rationale: "Walking Skeleton 생성 — 빌드 실행 필요 but 네트워크 차단"
        - id: "feature-worker"
          allow: ["Read", "Write", "Edit", "Grep", "Glob", "Bash"]
          deny: []
          prompt: ["WebFetch"]
          rationale: "피처 구현 — 참조 문서 조회는 사용자 승인 후"
        - id: "gate-auditor"
          allow: ["Read", "Bash", "Grep", "Glob"]
          deny: ["Write", "Edit", "WebFetch"]
          prompt: []
          rationale: "Gate 통과 여부만 판정 — 변경 권한 없음"
        - id: "drift-detector"
          allow: ["Read", "Grep", "Glob"]
          deny: ["Write", "Edit", "Bash", "WebFetch"]
          prompt: []
          rationale: "drift 탐지 read-only"
        - id: "hash-calculator"
          allow: ["Read", "Bash"]
          deny: ["Write", "Edit", "WebFetch", "Grep", "Glob"]
          prompt: []
          rationale: "canonical hashing — bash stat 만 사용"
        - id: "include-expander"
          allow: ["Read"]
          deny: ["Write", "Edit", "Bash", "WebFetch"]
          prompt: []
          rationale: "깊이 1 include 전개 — read-only"
        - id: "preamble-printer"
          allow: []
          deny: ["Read", "Write", "Edit", "Bash", "WebFetch", "Grep", "Glob"]
          prompt: []
          rationale: "stdout 3-line preamble 만 — 도구 사용 안 함"
        - id: "migration-agent"
          allow: ["Read", "Write", "Edit", "Bash"]
          deny: ["WebFetch"]
          prompt: []
          rationale: "v1→v2 마이그레이션 — 파일 조작 전권"
        - id: "event-logger"
          allow: ["Read", "Write"]
          deny: ["Edit", "Bash", "WebFetch", "Grep", "Glob"]
          prompt: []
          rationale: "append-only 로그 기록만"
        - id: "metrics-reporter"
          allow: ["Read"]
          deny: ["Write", "Edit", "Bash", "WebFetch"]
          prompt: []
          rationale: "events.log 읽기 read-only"
        - id: "status-reporter"
          allow: ["Read"]
          deny: ["Write", "Edit", "Bash", "WebFetch"]
          prompt: []
          rationale: "state.yaml 읽기 read-only"

    # -- NEW-30 : gate_chain (Gate 0~5 정식화) ----------------------------
    # 소스: §2.3 + §7.3.3 (L1578-1815) + §9.
  changelog:
    - version: "2.0.0"
      date: "2025-08-xx"
      note: "초기 공개 스키마 (design doc 초안)"
    - version: "2.3.0"
      date: "2026-01-xx"
      note: "Hook 섹션 분리, Command schema 확정"
    - version: "2.3.1"
      date: "2026-02-xx"
      note: "preamble_contract 필수화 (BR-004)"
    - version: "2.3.5"
      date: "2026-03-xx"
      note: "canonical hashing (부록 D) 정식화"
    - version: "2.3.7"
      date: "2026-04-xx"
      note: "include_depth=1 명시, migration (§12) 절 추가"
    - version: "2.3.8-rfc"
      date: "pending"
      note: "metadata.extensions.* 네임스페이스 공식화 + NEW-28~36 일부 승격 후보 (OQ-1/OQ-10)"
  changelog_source_ref: "부록 C 전체 (L3256-3306)"
  command_map:
    - id: "harness.init"
      command: "/harness:init"
      handler: "F-001_init"
      source_ref: "§7.3.1 (L1444-1497)"
