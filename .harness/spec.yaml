  - id: "F-056"
    name: "README Five Strengths terminology refinement — Context heading + intermediate-language framing"
    type: "feature"
    description: |
      Following user validation of the five-strengths labels (Translate ·
      Evolve · Focus · Collaborate · Unify), three corrections land:

      (1) ① Translate → Context. The label shifts from a verb (act of
      translation) to a noun (the context AIs rely on). The body adds an
      "intermediate language" framing — natural words become a structured
      spec that every agent can act on. KO mirror: 변환 → 컨텍스트, 본문에
      "중간언어(명세)로 정리" 어휘.

      (2) ③ EN sub-text (the agents) → (the rules). The agent itself is
      the subject of ④ Collaborate's (the experts); ③ Focus is about
      Iron-Law-enforced rules and agent lanes, which "the rules" captures
      directly. KO mirror (제어) unchanged.

      (3) Status line stale: v0.11.3 → v0.11.5 in both README mirrors.

      ② Evolve · ④ Collaborate · ⑤ Unify are kept verbatim — Evolve maps
      to the harness's living-spec metaphor, and Unify is the 5-stage
      culmination point (not just a 2-command consolidation).

      Tiny scope — README.md / README.ko.md only. No behavior change.
    modules:
      - "README.md"
      - "README.ko.md"
    test_strategy: "contract"
    tdd_focus:
      - "① heading reads Context / 컨텍스트 in both mirrors"
      - "Body wording carries 'intermediate language' / '중간언어(명세)'"
      - "③ EN sub-text reads (the rules)"
      - "Status line reads v0.11.5 in both mirrors"
    acceptance_criteria:
      - "AC-1: README.md contains zero 'Translate' occurrences in the Five Strengths region; >=1 'Context' occurrence."
      - "AC-2: README.ko.md contains zero '변환' in the Five Strengths region (L20-31); >=1 '컨텍스트'."
      - "AC-3: 'intermediate language' appears in README.md and '중간언어' in README.ko.md within row 1 of the strengths table."
      - "AC-4: README.md diagram sub-text reads '(the rules)' on the ③ Focus column; no '(the agents)' remains."
      - "AC-5: Both README mirrors show 'v0.11.5' in their Status line; no 'v0.11.3' remains in that line."
      - "AC-6: bash scripts/self_check.sh 5/5 PASS."
      - "AC-7: 1117 unit + integration tests PASS, regression 0."

  - id: "F-057"
    name: "README hero diagram ① sub-text refinement — input → mechanism (conversion / 변환)"
    type: "feature"
    description: |
      Follow-up to F-056. After the ① heading shift to Context (noun /
      result), the user noticed the diagram sub-text on column ① still
      named the *input* side (`(your words)` / `(자연어)`) while the
      other four columns named either an output, mechanism, actor, or
      result tied to their heading. ① alone broke the pattern.

      This patch swaps ① sub-text to a mechanism-side label that closes
      the heading↔sub-text pair the way the other four do:

        - ① Context (the result) ← (conversion / 변환)  (the act)
        - ② Evolve (the act)     ← (the docs / 문서)     (the target)
        - ③ Focus  (the act)     ← (the rules / 제어)    (the how)
        - ④ Collaborate (the act) ← (the experts / 전문가) (the who)
        - ⑤ Unify (the act)      ← (two commands / 명령 통합) (the form)

      Five sub-texts now each form a closed pair with their heading,
      even though they sit on different axes (no forced uniformity that
      would tip into tautology like "(collaboration-method)").

      Tiny scope — README.md:21 and README.ko.md:21 only.
    modules:
      - "README.md"
      - "README.ko.md"
    test_strategy: "contract"
    tdd_focus:
      - "① diagram sub-text reads (conversion) in EN and (변환) in KO"
      - "Other four sub-texts unchanged"
      - "Heading row unchanged (Context · Evolve · Focus · Collaborate · Unify)"
    acceptance_criteria:
      - "AC-1: README.md:21 diagram sub-text line contains '(conversion)' on the ① column; '(your words)' is removed."
      - "AC-2: README.ko.md:21 diagram sub-text line contains '(변환)' on the ① column; '(자연어)' is removed."
      - "AC-3: Other four sub-texts unchanged: '(the docs)' · '(the rules)' · '(the experts)' · '(two commands)' on EN; '(문서)' · '(제어)' · '(전문가)' · '(명령 통합)' on KO."
      - "AC-4: Five Strengths table (rows 1-5) and heading row unchanged; only the diagram sub-text line edits."
      - "AC-5: bash scripts/self_check.sh 5/5 PASS."
      - "AC-6: 1117 unit + integration tests PASS, regression 0."

  - id: "F-058"
    name: "README first-impression polish — Quick start plan.md sample, portfolio Preview column, conversation example rewrite"
    type: "feature"
    description: |
      Three first-impression issues surfaced while reviewing the README:

      (1) Quick start showed only the natural-language entry point
      (`/harness-boot:init "a simple to-do app"`). The plan.md entry
      (`/harness-boot:init plan.md` — useful when the user already has a
      planning doc, design notes, or a sketch) was hidden behind the
      spec-conversion skill description, so first-time readers missed
      that the harness accepts both shapes. Quick start now lists both
      explicitly.

      (2) The "Built with harness-boot" portfolio table had no slot for
      a preview image, even though the row immediately below recommends
      "image or GIF (1-3 seconds, <=800px, <=5 MB)". When the cosmic-
      suika preview is ready it has nowhere to land. Added a Preview
      column to the table, with a placeholder cell on the cosmic-suika
      row that the maintainer can swap to an `<img>` tag once the asset
      is committed.

      (3) "A short conversation" demonstrated the Iron-Law guardrail
      (insufficient evidence -> 4-option escalation) but skipped the
      happy path that most first readers need to see. Replaced with a
      compact happy-path walkthrough: activate -> run gates -> Iron Law
      satisfied -> mark done -> retro auto-written -> next feature.
      Less jargon (no "prototype mode" / "--hotfix-reason" up-front),
      same 5-block structure, clearer mental model for newcomers. KO
      mirror updated in lockstep.

      No release tag attached at this time (per user instruction —
      further README revisions may follow).
    modules:
      - "README.md"
      - "README.ko.md"
    test_strategy: "contract"
    tdd_focus:
      - "Quick start lists both /harness-boot:init forms (idea + plan.md)"
      - "Built with harness-boot table carries a Preview column"
      - "A short conversation reads as a happy path with no <4-option escalation>"
      - "KO mirror tracks EN structurally"
    acceptance_criteria:
      - "AC-1: README.md Quick start section mentions both '/harness-boot:init \"...\"' (one-line idea) and '/harness-boot:init plan.md' (existing planning doc) on separate lines."
      - "AC-2: README.ko.md '빠른 시작' has the same two-form structure with KO commentary."
      - "AC-3: README.md 'Built with harness-boot' table header includes a 'Preview' column; cosmic-suika row has a Preview cell (placeholder or <img>); 'Yours next' row has a placeholder dash."
      - "AC-4: README.ko.md '만들어진 결과물' table mirrors the column shape ('미리보기' or '프리뷰')."
      - "AC-5: README.md 'A short conversation' contains 'gate_5' PASS narrative and 'Iron Law satisfied' style framing, and no 'prototype mode' / 'hotfix-reason' branching."
      - "AC-6: README.ko.md '대화 예시' mirrors the happy-path rewrite."
      - "AC-7: bash scripts/self_check.sh 5/5 PASS."
      - "AC-8: 1117 unit + integration tests PASS, regression 0."

  - id: "F-059"
    name: "README ① heading verb consistency + conversation example jargon balance"
    type: "feature"
    description: |
      Two follow-ups after F-056/F-057/F-058:

      (1) Diagram main↔sub-text swap on column ①. After F-056 lifted ①
      to a noun (Context) and F-057 moved the sub-text to a mechanism
      noun (conversion / 변환), columns ②~⑤ remain verbs (Evolve · Focus
      · Collaborate · Unify) — leaving ① alone as a noun. The user asked
      to swap: main becomes the verb (Convert / 변환), sub-text becomes
      the noun (the context / 컨텍스트). All five mains are verbs again,
      five sub-texts each form a closed pair with their heading on a
      different axis (result / target / how / who / form). The table row
      1 heading and body update in lockstep — body verb form 'convert
      into' (EN) / '변환합니다' (KO).

      (2) "A short conversation" balances system terms with friendly
      glosses. The user accepted system jargon (gate_0 · gate_5 · Iron
      Law · evidence) — they line up with actual work.py output and the
      glossary — but asked for a friendlier surface. Each gate line now
      reads `gate_X (gloss) STATUS — detail`, e.g.
      `gate_0 (tests) PASS — 19 unit tests`. The Iron Law line spells
      out the satisfying conditions inline:
      `Iron Law satisfied (gate_5 + evidence)`. Behavior described in
      the example matches the live runtime (no fictional outputs).

      Tiny scope — README.md / README.ko.md only.
    modules:
      - "README.md"
      - "README.ko.md"
    test_strategy: "contract"
    tdd_focus:
      - "All five diagram main labels read as verbs"
      - "① diagram main = Convert / 변환; sub-text = (the context) / (컨텍스트)"
      - "Table row 1 heading = Convert / 변환; body uses verb form (convert into / 변환합니다)"
      - "Conversation example pairs each system term with a parenthetical gloss"
    acceptance_criteria:
      - "AC-1: README.md diagram main line reads '① Convert'; sub-text line reads '(the context)'."
      - "AC-2: README.ko.md diagram main reads '① 변환'; sub-text reads '(컨텍스트)'."
      - "AC-3: README.md table row 1 heading reads '**Convert**'; README.ko.md reads '**변환**'."
      - "AC-4: 'convert into' appears in README.md table row 1 body; '변환합니다' appears in README.ko.md table row 1 body."
      - "AC-5: 'A short conversation' carries system terms (gate_0 / gate_5 / Iron Law) and parenthetical glosses ((tests) / (smoke run) / (type/lint/coverage)) in EN, with KO equivalents (테스트 / 스모크 실행 / 타입·스타일·커버리지) in the mirror."
      - "AC-6: bash scripts/self_check.sh 5/5 PASS."
      - "AC-7: 1117 unit + integration tests PASS, regression 0."

  - id: "F-060"
    name: "README KO conversation — status values to English (PASS / SKIPPED) for legibility + runtime parity"
    type: "feature"
    description: |
      Follow-up to F-059. The KO conversation example used Korean
      status verbs (통과 / 건너뜀) which read as natural-language prose
      rather than category values, and the actual work.py output is
      English (PASS / FAIL / SKIPPED) — README ↔ runtime mismatch.

      User direction: "PASS FAIL은 영어가 좋을 것 같다 + 사용자가 알아보기
      어렵지 않을까 (해당 출력 표시 방식이)." → Two readability fixes:

      (1) status values become English literals in the KO mirror:
            통과   → PASS
            건너뜀 → SKIPPED
          (FAIL would also stay as-is — it just doesn't appear in the
          happy-path example.)

      (2) layout / column alignment stays the same — monospace code
          fence already aligns columns. Adding English status keywords
          alone is enough to surface them as category values at a
          glance.

      Other prose stays Korean (Iron Law 충족 / F-3 끝낼까요? / 단위 19 개
      / 근거 자동 기록 / 도구 미감지). Only the bare status tokens
      become English — matching what work.py actually prints.

      EN README has no changes (already uses PASS / SKIPPED).
      Tiny scope — README.ko.md only.
    modules:
      - "README.ko.md"
    test_strategy: "contract"
    tdd_focus:
      - "KO conversation example uses PASS / SKIPPED instead of 통과 / 건너뜀"
      - "Surrounding prose remains Korean (Iron Law 충족 etc.)"
      - "EN README untouched"
    acceptance_criteria:
      - "AC-1: README.ko.md contains 'PASS' and 'SKIPPED' inside the conversation example block."
      - "AC-2: README.ko.md '통과' and '건너뜀' do NOT appear inside the conversation example block (other sections may still use them)."
      - "AC-3: README.ko.md surrounding prose still uses Korean for non-status tokens (e.g. 'Iron Law 충족', '단위 19 개', '도구 미감지')."
      - "AC-4: README.md is unchanged in this feature (already uses PASS / SKIPPED)."
      - "AC-5: bash scripts/self_check.sh 5/5 PASS."
      - "AC-6: 1117 unit + integration tests PASS, regression 0."

  - id: "F-061"
    name: "User-facing message swap — friendly main + system identifier in parens (display layer)"
    type: "feature"
    description: |
      User direction: "내부 동작은 그대로 두고 사용자에게 보여지는 텍스트
      출력에서는 사용자 친화적으로." Specifically: swap the format from
      `gate_0 (tests) PASS` to `tests (gate_0) PASS`, and `F-3 (Login)`
      to `Login (F-3)` — friendly term as the main label, system
      identifier as the parenthetical reference.

      Display layer only. Internal layer untouched:
        - state.yaml keys (`gate_5:`, etc.) unchanged
        - CLI args (`--gate gate_0 pass`, `--run-gate gate_0`) unchanged
        - function names, code constants, gate_X identifiers unchanged
        - 1117 unit + integration tests unchanged (no message string
          assertions exist)

      Changed surface:
        (1) `scripts/work.py` adds a `GATE_FRIENDLY` dict mapping
            gate_0..gate_5 + gate_perf to friendly names (tests / type
            check / lint / coverage / commit check / smoke run /
            performance). The run-gate response message at L1032 and the
            complete-rejection message at L698 are reformatted as
            `friendly (gate_X) STATUS — reason`.
        (2) `scripts/gate/runner.py` reason strings stay as-is — they
            are already natural language ("no linter detected ..."), and
            the friendly prefix is added at the work.py composition
            layer.
        (3) README.md and README.ko.md conversation example block — the
            five gate result lines and the F-3/F-4 references swap to
            the friendly-main format. The diagram sub-text stays as-is
            (it carries semantic glosses, not identifiers, so the
            swap pattern doesn't apply).
        (4) README.ko.md L136 broken line ("ㅎf- ...", left from a
            mid-edit interrupt) is restored to the proper friendly form
            as part of the swap.

      Behavior is unchanged. Tests remain 1117 green.
    modules:
      - "scripts/work.py"
      - "scripts/gate/runner.py"
      - "README.md"
      - "README.ko.md"
    test_strategy: "contract"
    tdd_focus:
      - "GATE_FRIENDLY dict maps all 7 gate ids (gate_0..gate_5, gate_perf)"
      - "run_and_record_gate result message uses friendly-main format"
      - "complete-rejection message uses friendly-main format"
      - "README conversation examples (EN + KO) use friendly-main format"
      - "Internal layer untouched (state.yaml keys, CLI args, function names)"
    acceptance_criteria:
      - "AC-1: scripts/work.py defines GATE_FRIENDLY with 7 entries (gate_0=tests, gate_1=type check, gate_2=lint, gate_3=coverage, gate_4=commit check, gate_5=smoke run, gate_perf=performance)."
      - "AC-2: run_and_record_gate result message reads 'friendly (gate_X) STATUS' (e.g. 'tests (gate_0) PASS')."
      - "AC-3: complete-rejection message at L698 reads similar 'smoke run (gate_5) is not PASS yet' shape."
      - "AC-4: README.md conversation example uses 'tests (gate_0) PASS', 'smoke run (gate_5) PASS', 'Login (F-3)' style."
      - "AC-5: README.ko.md conversation example uses '테스트 (gate_0) PASS', '스모크 실행 (gate_5) PASS', '로그인 기능 (F-3)' style; the broken L136 line is restored."
      - "AC-6: state.yaml gate keys (gate_0/gate_5/...) unchanged, CLI args (--gate gate_0) unchanged."
      - "AC-7: bash scripts/self_check.sh 5/5 PASS."
      - "AC-8: 1117 unit + integration tests PASS, regression 0."

  - id: "F-062"
    name: "cosmic-suika portfolio preview — placeholder → actual PNG image"
    type: "feature"
    description: |
      User added the actual cosmic-suika preview screenshot at
      `docs/assets/cosmic-suika.png` (494 KB, well under the 1 MB
      PNG budget from `docs/assets/README.md`). Now the README
      portfolio table can swap its placeholder cell to a real image.

      Three changes:
      (1) `README.md` portfolio Preview cell: `_(image landing soon)_`
          → HTML `<a><img></a>` snippet pointing at the PNG, linked to
          the live demo, sized at width=240 to fit the 5-column table.
      (2) `README.ko.md` Preview cell mirrors with `(이미지 곧 추가)`
          → same HTML.
      (3) `docs/assets/README.md` guide: drop the "(현재는 placeholder)"
          wording on the cosmic-suika row, and add PNG to the
          recommended-format list (was GIF / screenshot; PNG screenshot
          is now the realized form for this entry).

      No behavior change. No version bump (will land in next release).
    modules:
      - "README.md"
      - "README.ko.md"
      - "docs/assets/README.md"
    test_strategy: "contract"
    tdd_focus:
      - "README portfolio Preview cell renders an actual <img> with width=240"
      - "Image links to the live demo URL"
      - "docs/assets/README.md no longer marks cosmic-suika as placeholder"
    acceptance_criteria:
      - "AC-1: README.md Preview cell on the cosmic-suika row contains '<img src=\"docs/assets/cosmic-suika.png\"' with width=240."
      - "AC-2: README.ko.md Preview cell mirrors AC-1."
      - "AC-3: README.md Preview cell wraps the <img> in an <a> linking to https://qwerfunch.github.io/cosmic-suika-pages/."
      - "AC-4: docs/assets/README.md no longer says '(현재는 placeholder)' on the cosmic-suika row."
      - "AC-5: bash scripts/self_check.sh 5/5 PASS."
      - "AC-6: 1119 unit + integration tests PASS, regression 0."

  - id: "F-063"
    name: "README.ko cosmic-suika description — 머지 → 수박"
    type: "feature"
    description: |
      Tiny KO copy fix. The cosmic-suika row in the KO portfolio table
      currently reads "우주 테마 머지 게임" but the genre is more
      commonly known in Korean as "수박 게임" (after the Suika Game
      reference). User direction: KO → "우주 테마 수박 게임", EN row
      unchanged ("Space-themed merge game" stays as the global term).

      Single-line edit, one file.
    modules:
      - "README.ko.md"
    test_strategy: "contract"
    tdd_focus:
      - "KO row reads '우주 테마 수박 게임'"
      - "EN row unchanged"
    acceptance_criteria:
      - "AC-1: README.ko.md cosmic-suika row contains '우주 테마 수박 게임'."
      - "AC-2: README.ko.md does not contain '우주 테마 머지 게임' anywhere."
      - "AC-3: README.md cosmic-suika row still says 'Space-themed merge game'."
      - "AC-4: bash scripts/self_check.sh 5/5 PASS."

constraints:
  tech_stack:
    language: "typescript"            # §3 시스템 경계에 언급 없음 — 메타적 공백(NEW 갭 후보)
    runtime: "node-20+"
    cli_framework: "claude-code-plugin"   # Anthropic Claude Code plugin API
    yaml_lib: "js-yaml or yaml"
    hash: "sha-256 via node:crypto"
    test_runner: "vitest"                  # 추측 — 원본에 미명시
  architectural:
    - "SSoT = spec.yaml (BR-002)"
    - "사고의 글 vs 실행의 글 스키마 분리(BR-001)"
    - "Walking Skeleton 필수 + Gate 5 까지 통과(BR-003)"
    - "Transparency-by-Preamble: 모든 명령이 3줄 출력(BR-004)"
    - "CQS: 진단 명령은 read-only(BR-012)"
    - "Fail-open hooks(BR-006)"
    - "Canonical Hashing 3층 Merkle(BR-007)"
    - "$include 깊이 1 고정(BR-008)"
  compliance: []                           # library/worker 와 달리 외부 컴플라이언스 대상 없음 — 메타 도메인 특성
  prototype_mode: false                    # P-9: 이미 성숙한 아키텍처 문서. prototype-level 아님

deliverable:
  type: "cli-plugin"                       # ⚠ v2.3.7 스키마에 이 type 이 존재하는지 불확실 — NEW 갭 후보
                                           # 현재 스펙 스키마는 {web-service, library, worker, game} 중심
                                           # harness-boot 은 "Claude Code 용 플러그인" 이라는 고유 배포 형태
                                           # → unrepresentable.md NEW-28 후보로 기록
  platform: "claude-code"                  # plugin host
  entry_points:
    - name: "harness:init"
      kind: "slash-command"
      command: "/harness:init"
      health_check:
        kind: "post-invocation-probe"
        expects: "9 files scaffolded + Gate 5 pass"
    - name: "harness:spec"
      kind: "slash-command"
      command: "/harness:spec"
    - name: "harness:sync"
      kind: "slash-command"
      command: "/harness:sync"
    - name: "harness:work"
      kind: "slash-command"
      command: "/harness:work"
    - name: "harness:status"
      kind: "slash-command"
      command: "/harness:status"
    - name: "harness:check"
      kind: "slash-command"
      command: "/harness:check"
    - name: "harness:events"
      kind: "slash-command"
      command: "/harness:events"
    - name: "harness:metrics"
