      - rotate splits older-than-current-month events into events.log.YYYYMM
        buckets, preserves current month + unparseable in events.log
      - rotate is idempotent — running twice produces identical disk state
      - rotate appends to existing rotated files, never overwrites pre-existing
        history
      - parseYyyymmFromTs returns null on unparseable input, never throws
      - JSDoc class/function-level English comments throughout
