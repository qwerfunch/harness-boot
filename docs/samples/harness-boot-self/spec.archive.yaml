  - id: F-079
    description: |
      Third and final step in the F-077 → F-078 → F-079 thread. F-077
      surfaced description-vs-AC quantitative mismatches as stderr hints
      at activate time; F-078 promoted the mismatch into a blocking drift
      kind so complete() rejects under-covered transitions. F-079 closes
