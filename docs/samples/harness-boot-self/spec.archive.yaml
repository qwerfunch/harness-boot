  - id: F-107
    description: |
      Twenty-fourth cycle of the v1.0 migration thread. Closes the
      Python ↔ TS cohabitation phase: TypeScript becomes the only
      surface users, slash commands, and self-check exercise. The
      Python implementation stays under `legacy/scripts/` as a code
      archive but is no longer wired into anything visible.

      What changes:

        - `dist/` is committed (no longer gitignored) so plugin
          install works without `npm run build`.
        - `commands/init.md` + `commands/work.md`: every Python
          bash block flips to `node "$PLUGIN_ROOT/bin/harness.js"
          <subcommand>`.
        - `hooks/pre-commit-phase2.sh`: install path + heredoc
          guidance now points at the `harness` CLI.
        - `self_check.sh`: 5 steps now run through
          `node bin/harness.js {validate,sync,check}` instead of
          `python3 legacy/scripts/...`.
        - `README.md` + `README.ko.md`: Python requirement removed,
          Node.js 20+ becomes the only listed runtime.
        - `CLAUDE.md`: §3 / §6 / §7 reflect TS-only operation.
        - `tests/` Python suites stay as a quarantine surface; the
          operational verification is `npm run test:parity` which
          is what CI keys off going forward.
        - `package.json` scripts: `prepare` script triggers a build
          when `dist/` is missing so a fresh clone has a usable CLI
          before any explicit build step.

      Out of scope:

        - Deletion of `legacy/scripts/` (kept until external
          dogfood signals zero regressions on TS-only).
        - Deletion of `tests/{unit,integration}` (kept as parallel
          parity safety net during the quarantine phase).
        - v1.0 release tag (user decision, not part of this cycle).
