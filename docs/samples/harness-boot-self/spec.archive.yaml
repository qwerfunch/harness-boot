      Behaviour preservation:

        - Full Python regression suite still passes (every test now
          imports from `legacy/scripts/...`).
        - All TS parity tests still pass.
        - `self_check.sh` 5/5 still passes (calls Python via the
          relocated path).
        - Slash commands still work — they call `python3
          "$PLUGIN_ROOT/legacy/scripts/work.py"` instead of the old
