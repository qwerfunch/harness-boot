  - id: F-086
    description: >
      Third cycle of the v1.0 migration thread. Ports

      `scripts/core/state.py` (the State class plus Iron Law math

      helpers) to TypeScript with semantic-equivalence parity.


      Why this module: state.yaml is the canonical mutable state of a

      harness install. Every work.py verb (activate, recordGate,

      addEvidence, complete) reads and writes it. Iron Law's "declared

      evidence count" check is implemented here and is the gate

      complete() relies on. A drift in state mutations or in the Iron

      Law math silently corrupts feature progress tracking.


      Public API ported (camelCase TS, semantic 1:1 with Python):

        - `State` class with `load(harnessDir)` / `save()` /
          `featureIds()` / `getFeature(fid)` / `ensureFeature(fid)` /
          `setStatus(fid, status)` / `recordGateResult(fid, gate, result, opts)` /
          `addEvidence(fid, kind, summary, opts)` /
          `addSkippedAgent(fid, agent, reason, opts)` /
          `getSkippedAgents(fid)` / `setActive(fid)` /
          `removeFeature(fid)` / `featuresInProgress()` /
          `setLastCommand(command)` / `featureCounts()` / `snapshot()`
        - `isDeclaredEvidence(ev)` — kind-based discriminator for Iron
          Law (automatic kinds vs declared kinds)
        - `countDeclaredEvidence(feature, options)` — trailing-window
          count for Iron Law gate
        - Constants: `FEATURE_STATUSES`, `GATE_RESULTS`,
          `AUTOMATIC_EVIDENCE_KINDS`, `IRON_LAW_WINDOW_DAYS`
        - Types: `GateResult`, `FeatureStatus`, `Feature`, `Session`,
          `StateData`

      Behaviour preservation focus:

        - YAML output: Python PyYAML uses block style with
          `sort_keys=False` + `allow_unicode=True` +
          `default_flow_style=False`. The TS port targets
          **semantic-equivalence parity** rather than byte-equal
          output: round-trip (parse → mutate → dump → parse) yields
          the same logical data, and both runtimes parse each other's
          output without surprise.
        - Timestamps: ISO 8601 `YYYY-MM-DDTHH:MM:SSZ`, identical
          format to Python's `_now()`.
        - Iron Law math: trailing-window inclusion rule — entries with
          unparseable or missing `ts` are treated as recent
          (conservative; matches Python).
        - Validation enums: same FEATURE_STATUSES + GATE_RESULTS sets
          throw on invalid values.

      Why semantic-equivalence (not byte-equal) for YAML output:

        - PyYAML and `yaml` (eemeli/yaml) have different quoting rules
          for ambiguous strings, slightly different scalar styling,
          different empty-string representations.
        - state.yaml is a data file, not a wire-format contract.
          What matters is that the data round-trips; byte equality
          would force us to reimplement PyYAML in TS, which is
          out of scope.
        - Cross-runtime read/write compatibility is the production
          requirement: Python writes → TS reads → TS writes → Python
          reads must all preserve data.

      Parity test scope:

        - Round-trip: load Python-generated state.yaml in TS, verify
          data shape matches Python's `yaml.safe_load`. Mutate in TS,
          save, reload — verify new shape matches Python's mutation
          output.
        - Iron Law math: identical inputs produce identical counts
          across runtimes (this is byte-equal — pure logic).
        - Mutation API: every Python method has a TS twin with the
          same observable effect on data shape.
        - Validation: invalid statuses / gate results throw in both
          runtimes.
    acceptance_criteria:
      - "AC-1: src/core/state.ts exports the State class with all 17 methods
        from Python state.py, plus FEATURE_STATUSES / GATE_RESULTS /
        AUTOMATIC_EVIDENCE_KINDS / IRON_LAW_WINDOW_DAYS / isDeclaredEvidence /
        countDeclaredEvidence."
      - "AC-2: tests/parity/fixtures/state/ contains at least 6 fixture pairs
        covering empty state, active feature only, multi-feature with gates and
        evidence, Iron Law evidence counting (declared vs automatic mix),
        unicode summary, and skipped_agents trail."
      - "AC-3: tests/parity/state.test.ts verifies State.load → identical data
        shape (Python yaml.safe_load vs TS load.data)."
      - "AC-4: countDeclaredEvidence parity — identical counts across runtimes
        for the same fixture."
      - "AC-5: Mutation parity — for each public method, applying it on a
        fixture produces a state shape that Python recognizes as equivalent
        (parse + assertion)."
      - "AC-6: Save round-trip — TS writes state.yaml, Python yaml.safe_load
        reads it without error and produces the same logical data."
      - "AC-7: F-086 mirrored on both spec.yaml copies. bash
        scripts/self_check.sh 5/5 PASS · 1192+ Python tests still pass · npm run
        test:parity green for canonicalHash + eventLog + state."
      - "AC-8: F-086 completed via the work.py 4-verb cycle on the existing
        `feat/F-084-ts-migration-foundation` branch."
  - id: F-087
    description: |
      Fourth cycle of the v1.0 migration thread. Ports
      `scripts/core/plugin_root.py` (the 4-strategy plugin root chain
      from `commands/init.md §2`) to TypeScript with byte-equal
      strategy ordering and identical fallback semantics.

      Why this module: every TS-side script that has to find plugin
      assets (templates, agents, ceremonies, schemas) calls this
      resolver. A drift in strategy ordering or fallback decisions
      silently changes which plugin source the runtime picks, breaking
      live `/harness-boot:*` invocations across users.

      Public API ported (camelCase TS, semantic 1:1 with Python):

        - `resolve(pluginName?)` — runs the 4-strategy chain, returns a
          `Resolution` (root path · winning strategy · attempt log) or
          throws `PluginRootError`.
        - `PluginRootError` — class extending `Error`.
        - `Resolution` — `{ root, strategy, attempts[] }` interface.
        - Internal helpers exposed for parity tests:
          `_strategyPathBin`, `_strategyRegistry`, `_strategyMarketplaceSource`.

      Strategy chain (first hit wins):

        A. `$PATH` scan for `/plugins/<dir>/bin` segment + plugin.json
           name match.
        B. `~/.claude/plugins/installed_plugins.json` `installPath` (must
           exist on disk).
        C. `~/.claude/settings.json` `extraKnownMarketplaces.<mp>.source.path`
           combined with marketplace.json plugin source.
        D. (Failure) — throw `PluginRootError` with the attempt trace.

      Behaviour preservation focus:

        - Strategy ordering identical — A wins over B wins over C.
        - PATH parsing uses `path.delimiter` (matches Python's
          `os.pathsep`). Trailing slashes on PATH entries are
          tolerated; only entries that contain `/plugins/` and end in
          `/bin` count.
        - `~` expansion — `os.homedir()` is the TS equivalent of
          `os.path.expanduser`. Both expand only at the leading
          position; later-segment `~` is a literal directory name.
        - Failure mode — same error message format ("플러그인
          '<name>' 루트 해석 실패 — attempts: A path-bin: miss, B
          registry: miss, C mp-source: miss"). Korean preserved
          verbatim from the Python source so cross-runtime log
          tooling matches strings exactly.
        - Attempts trace — `attempts: ["A path-bin: hit|miss", ...]`
          identical wording.

      Parity test scope:

        - Per-strategy hit / miss / name-mismatch coverage with
          temporary HOME directories.
        - Chain ordering — A wins when both A and B are populated.
        - Attempt trace — when A and B miss but C hits, attempts has
          three entries with the right strings.
        - PluginRootError fires the exact message format on full miss.
        - PATH separator handling on POSIX (the only target platform
          for now; Windows path-delimiter semantics are deferred to a
          later cycle when slash-command Windows support is in scope).
    acceptance_criteria:
      - "AC-1: src/core/pluginRoot.ts exports `resolve`, `PluginRootError`,
        `Resolution`, plus `_strategyPathBin` / `_strategyRegistry` /
        `_strategyMarketplaceSource` for tests."
      - "AC-2: Strategy chain order matches Python: A:path-bin → B:registry →
        C:marketplace-source."
      - "AC-3: Each strategy's hit / miss / name-mismatch behaviour matches the
        Python helper byte-for-byte."
      - "AC-4: Resolution.attempts trace uses identical wording (`A path-bin:
        hit|miss`, `B registry: hit|miss`, `C mp-source: hit|miss`)."
      - "AC-5: PluginRootError message matches Python verbatim — `플러그인 '<name>'
        루트 해석 실패 — attempts: ...` (Korean preserved as-is)."
      - "AC-6: tests/parity/pluginRoot.test.ts covers all three strategies +
        chain ordering + error message; uses fresh tmp HOME dirs to avoid host
        pollution."
      - "AC-7: F-087 mirrored on both spec.yaml copies. bash
        scripts/self_check.sh 5/5 PASS · 1192+ Python tests still pass · npm run
        test:parity green for canonicalHash + eventLog + state + pluginRoot."
      - "AC-8: F-087 completed via the work.py 4-verb cycle on the existing
        `feat/F-084-ts-migration-foundation` branch (umbrella PR #46 strategy)."
