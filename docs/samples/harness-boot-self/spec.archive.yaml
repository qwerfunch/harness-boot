      - "AC-4: `bash self_check.sh` returns 5/5 OK and `npm test` is fully
        green."
      - "AC-5: F-141 mirrored on both spec.yaml copies; diff -q clean."
      - "AC-6: F-141 completed via the harness CLI cycle on
        `chore/v0.15.0-release-prep`."
      - "AC-7: After PR merges to develop, develop fast-forwards into main; main
