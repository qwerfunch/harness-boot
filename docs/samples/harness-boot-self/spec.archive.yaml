  - id: F-162
    description: |
      Fourth and final slice of the init UX overhaul. When the
      project root carries a plan / requirements / architecture
      markdown file, the init flow detects it and seeds a draft
      spec.yaml from its first paragraph plus metadata pointing
      at the source path. The slash command's `spec-conversion`
      skill then fills the full spec.yaml in a follow-up turn.

      CLI side (deterministic, this PR):

      - `src/init/codebase/mdDetect.ts:detectPlanDocCandidate(root)`
        returns the single non-README markdown file or null when 0
        or 2+ are present. Skips README · CHANGELOG · LICENSE ·
        CONTRIBUTING by name to keep the auto-detect safe.
      - `src/init/scenarioPlanDoc.ts:seedSpecFromPlanDoc({mdPath,
        ...})` reads the file (redact pass on the way in), takes
        the first H1 as project.name when present, the first
        paragraph as project.summary, and the first 500 chars as
        project.description. Stamps
        `metadata.source.origin: plan_doc` + `metadata.source.plan_doc_path`
        + `metadata.draft: true` + `metadata.content_hash`.
      - `harness init --scenario plan_doc --plan <path>` CLI: boot
        skeleton + seed from the path. When `--plan` is omitted,
        auto-detect via `detectPlanDocCandidate` and error out if
        the result is ambiguous (0 or 2+ candidates).

      Slash-command side (LLM hook, next session's work):

      - After CLI return, the slash command invokes the
        `spec-conversion` skill with the md path. The skill turns
        the prose into a full v2.3.8 spec.yaml (features[],
        acceptance_criteria, entities, …) and writes it back
        through the harness CLI so `metadata.content_hash` and
        `draft` stay coherent. Token usage records via
        `tokenLog.recordLlmCall`.
    acceptance_criteria:
      - id: AC-1
        text: |
          `detectPlanDocCandidate(root)` returns the path of the
          only non-README/non-CHANGELOG/non-LICENSE/non-CONTRIBUTING
          markdown file in the project root, or `null` when 0 or
          2+ such files exist. Tests cover all three branches.
      - id: AC-2
        text: |
          `harness init --scenario plan_doc --plan <path>` writes
          a spec.yaml with `metadata.source.origin: plan_doc`,
          `metadata.source.plan_doc_path` pointing at the relative
          path, `metadata.draft: true`, and the first H1 +
          paragraph copied into project.name + project.summary.
          Any secret-shaped strings in the md body are redacted
          before they land in spec.yaml.
      - id: AC-3
        text: |
          `harness init --scenario plan_doc` without `--plan` runs
          auto-detect. On 0 or 2+ candidates, the CLI exits with
          a clear error and a hint to pass `--plan` explicitly.
          On exactly one candidate, it proceeds.
      - id: AC-4
        text: |
          End-to-end on `tests/perf/fixtures/plan-md/PLAN.md`:
          spec validates · `metadata.source.plan_doc_path` is
          `PLAN.md` · `project.name` reads "Pomodoro Timer for
          Solo Musicians" · `project.summary` reads the first
          paragraph. Existing F-158/F-159/F-160/F-161 parity tests
          stay green.
  - id: F-163
    description: |
      Closes the F-161 "[pending: LLM hook stub]" placeholders in
      `.harness/conventions.md`. The CLI itself doesn't call any
      model — the slash command's codebase-archaeologist samples
      source files, runs a single LLM turn per section, and pipes
      the result back to the CLI through a new `harness conventions
      fill` command. The CLI replaces the placeholder in place and
      records an `llm_call` event so the bench's
      `init_tokens_total` baseline reflects real cost.

      Why CLI side only handles the replacement: keeps deterministic
      surface clean for parity tests + lets the slash command iterate
      on prompt shape without breaking the bundle build.

      New CLI surface:

      ```bash
      harness conventions fill \
        --section <comments|tests> \
        --text "<body text from the LLM turn>" \
        --tokens-in <n> --tokens-out <n> \
        [--model <id>] \
        --harness-dir <dir>
      ```

      Idempotent: if the placeholder has already been replaced (the
      sigil line no longer matches), `fill` errors with a clear
      message instead of duplicating content. The bench picks up
      `init_tokens_total` automatically from the appended events.
    acceptance_criteria:
      - id: AC-1
        text: |
          `src/init/codebase/conventionsFill.ts:fillConventionsSection
          (path, section, text)` finds the `[pending: LLM hook stub]`
          placeholder for `comments` or `tests` and replaces it with
          the supplied text. Preserves all other content byte-for-byte.
      - id: AC-2
        text: |
          `harness conventions fill --section <comments|tests>
          --text "..."` invokes the helper and on success appends an
          `llm_call` event to `<harness-dir>/events.log` via
          `tokenLog.recordLlmCall`. Without `--tokens-in/--tokens-out`
          the event records 0 (still allowed — slash command must
          supply real counts).
      - id: AC-3
        text: |
          Idempotent — calling `fill` on a section that no longer
          carries the placeholder returns exit 4 with a clear error
          ("section already filled"). No duplicate content.
      - id: AC-4
        text: |
          Unit tests cover both replacement branches, the idempotency
          guard, the events.log token append, and a parity test
          rendering of the new conventions body. Existing
          F-160/F-161/F-162 parity tests stay green.
  - id: F-164
    description: |-
      logcat-on ISSUES-LOG return (2026-05-13). The Phase 0 sync sequence
      runs render (step 4) before bulk archive migration (step 7). Render
      writes timestamp updates to `domain.md` and `harness.yaml`; when the
      user project tracks those derived files, the immediate `git status
      --porcelain` check in step 7 sees them as dirty and refuses to
      archive — `archive_migrate_skip_reason: "dirty_tree"`. Sync ends up
      blocking itself.

      Fix: `workingTreeDirty` accepts a whitelist of paths sync just
      wrote, and a porcelain line matching that whitelist no longer
      counts as dirty. Real user in-flight edits (anywhere else in the
      tree) still block the archive — the safety intent is preserved.
    acceptance_criteria:
      - "AC-1: `workingTreeDirty(projectRoot, ignorePaths)` filters out any
        porcelain entry whose path is in `ignorePaths` (relative to
        `projectRoot`)."
      - "AC-2: Sync passes the four derived paths it just wrote
        (`.harness/domain.md`, `.harness/architecture.yaml`,
        `.harness/harness.yaml`, `.harness/events.log`) as the whitelist."
      - "AC-3: When ONLY whitelisted files are dirty, bulk archive runs and
        emits `bulk_archive_migrated` (not `dirty_tree`)."
      - "AC-4: When any non-whitelisted file is dirty, bulk archive still skips
        with `dirty_tree` (safety intent preserved)."
      - "AC-5: Test covers both branches with a temp git repo."
  - id: F-165
    description: |-
      logcat-on ISSUES-LOG return (2026-05-13). When the feature-author
      or spec-conversion skill emits YAML directly via the Write tool,
      multi-line free-text fields (`description:`, `statement:`) are
      sometimes written as plain scalars. If a wrapped continuation
      line starts with `{` or contains `: `, the YAML parser reads it
      as a nested mapping and `harness sync` / `harness validate` abort
      with PARSE error. logcat-on accumulated ~10 such blocks before
      detection (out of ~1292 statements).

      Fix: both skills are updated to mandate `|-` block scalar (or
      double-quoted scalar) for any multi-line free-text field, and
      the spec validator emits a soft warning when a `description:`
      key in `features[]` looks like a folded plain scalar with risky
      continuation content.
    acceptance_criteria:
      - "AC-1: `skills/feature-author/SKILL.md` documents the block-scalar rule
        for `description:` (and any future multi-line field) with a one-line
        example."
      - "AC-2: `skills/feature-author/templates/feature-entry.yaml` uses `|-`
        for `description:`."
      - "AC-3: `skills/spec-conversion/SKILL.md` documents the same rule for
        `description:` and `statement:` (in `risks[]`)."
      - "AC-4: Round-trip test fills the updated template with risky multi-line
        content (`{`, `: `, backticks) and asserts yaml.parse round-trips
        byte-identically — proves block-scalar usage emits parser-clean YAML."
      - "AC-5: Skill documentation explains why the validator cannot
        retroactively catch this (PARSE failure happens before validation) and
        points to the round-trip test as the regression net."
  - id: F-166
    description: |-
      logcat-on ISSUES-LOG return (2026-05-13). Feature `name:` values
      have grown to 200-300 characters in some projects — they overflow
      the dashboard `working on: "..."` line, get truncated in `git log
      --oneline`, and bloat spec.yaml's readable surface. The fix is a
      soft validator warning (non-blocking — backward compat) that
      nudges authors toward a `digest:` / `description:` body for the
      long-form content.
    acceptance_criteria:
      - "AC-1: Spec validator emits warning code `feature.name_too_long` when
        `len(name) > 80` (utf-8 code points)."
      - "AC-2: Warnings are non-blocking — `validateSpec` still returns success."
      - "AC-3: Warning message suggests moving overflow to `digest:` or
        `description:`."
      - "AC-4: Unit test covers boundary 80/81 chars."
  - id: F-167
    description: |-
      Tier 1 — distinguishes "machine self-evaluation" from "human
      verification" inside the Iron Law evidence ledger. Today every
      `evidence[]` entry counts the same toward the threshold, so a
      feature that only ran auto gates (5 entries of `gate_auto_run`,
      0 declared human checks) can satisfy BR-004. F-122 was exactly
      that case.

      Adds `author: "human" | "llm"` to every evidence entry — derived
      automatically from `kind`: gate_auto_run / gate_run → `llm`;
      anything else (test · manual_check · user_feedback · trivial ·
      hotfix · perf_regression · perf_resolved · …) → `human`. Surface
      the split in the dashboard and `harness metrics`. Optional opt-in
      `harness.yaml.iron_law.require_human_evidence: true` makes
      complete() refuse when human evidence count is zero (default
      false — backward compat).
    acceptance_criteria:
      - "AC-1: events.log evidence_added events carry `author` field; value
        derived from kind (gate_auto_run/gate_run → llm, all other kinds →
        human)."
      - "AC-2: state.yaml features[].evidence[] entries carry the same `author`
        field, updated on every transition."
      - "AC-3: dashboard renders evidence count as `N entries (X human, Y llm)`
        when both > 0; falls back to plain `N entries` when single-source."
      - "AC-4: `harness metrics` JSON output adds `evidence_by_author: {human,
        llm}` per feature aggregate."
      - "AC-5: When `harness.yaml.iron_law.require_human_evidence: true`,
        complete() rejects with reason `no_human_evidence` if the feature has
        zero human-authored evidence (latest 7 days window — same as the
        existing declared check). Default unset keeps existing semantics."
  - id: F-168
    description: |-
      Tier 1 — 14th drift kind `AcceptanceTrace`. Maps every
      `acceptance_criteria[]` entry to at least one concrete test
      function. Distinct from the existing `Coverage` detector
      (description-vs-fingerprint): Coverage only checks "does the
      AC's keywords appear somewhere"; AcceptanceTrace checks "does a
      specific test reference this exact AC-N".

      Two mapping mechanisms are accepted (either is enough):

        1. Explicit — spec.yaml adds
           `features[].acceptance_criteria[].test_refs: ["name", ...]`
           array. Each ref resolves to a test function in any tracked
           test file.
        2. Implicit — a test function's name or docstring contains
           the literal substring `AC-N` (where N matches the feature
           id's AC number). The agents/software-engineer.md style guide
           already recommends this pattern.

      Drift severity: `warn` by default; `error` when
      `harness.yaml.detectors.acceptance_trace.strict: true`.
    acceptance_criteria:
      - "AC-1: spec.schema.json adds optional `acceptance_criteria[].test_refs:
        array<string>` (when AC is an object; the existing string-array shape
        stays supported)."
      - "AC-2: src/check.ts adds `AcceptanceTrace` to the DriftKind enum;
        runCheck() now iterates over each feature's AC entries and scans the
        configured test directories for matching functions (name or docstring
        contains `AC-N` literal)."
      - "AC-3: When a feature has any AC with neither explicit test_refs nor
        implicit AC-N reference, a drift entry is emitted; severity follows the
        strict flag."
      - "AC-4: CLAUDE.md drift_kinds_count sigil updates 13 → 14;
        BLOCKING_DRIFT_KINDS unchanged (AcceptanceTrace is advisory by default —
        adding it to blocking is a separate cycle once external adopters
        validate the noise level)."
      - "AC-5: Test scans cover both string-array and object-array AC shapes;
        positive and negative cases asserted."
  - id: F-169
    description: |-
      Tier 1 — 15th drift kind `ContentDrift`. Validates the
      `<!-- harness:fact key=X value=V source=Y -->` sigil regions
      against the cited code SSoT, auto-rejecting stale facts.

      Sigil format (already in use throughout CLAUDE.md):

        <!-- harness:fact key=drift_kinds_count value=14 \
             source=src/check.ts:runCheck -->
        14 kinds <!-- /harness:fact -->

      Detector parses every sigil pair, resolves the `source` to a
      concrete measurement (initial scope: count-of-enum-members in a
      named symbol), compares against the declared `value`, and emits
      drift on mismatch. The marketplace.json version drift that
      slipped into PR #72 is exactly the class this catches.

      self_check.sh gains a 6th step that runs the same check on every
      commit. BLOCKING_DRIFT_KINDS adds ContentDrift (errors here mean
      the doc lies to future Claude sessions — block the merge).
    acceptance_criteria:
      - "AC-1: src/check.ts adds `ContentDrift` to the DriftKind enum; a new
        module parses `<!-- harness:fact ... -->` sigils from a configurable
        list of doc files (default: `CLAUDE.md` only)."
      - "AC-2: Sigil parser supports three source kinds in v1: (a)
        `path:enumName` (count enum members), (b) `path:CONST_NAME` (literal
        scalar value), (c) `path:fieldName` (top-level JSON field, for
        `.claude-plugin/plugin.json:version` etc.)."
      - "AC-3: Mismatched value → drift entry with severity `error`; path
        identifies the file + line of the sigil; message names the sigil key,
        claimed value, and actual value."
      - "AC-4: self_check.sh adds step 6 that runs `harness check` and fails the
        script if any ContentDrift error surfaces."
      - "AC-5: ContentDrift joins BLOCKING_DRIFT_KINDS (the existing list of 4
        wire-integrity kinds becomes 5); CLAUDE.md sigil
        `blocking_drift_kinds_count` updates 4 → 5 in the same commit."
      - "AC-6: Test covers all three source kinds with both matching and
        mismatched fixtures."
  - id: F-170
    description: |-
      Empirical reproduction of F-167/F-168/F-169 caught a small UX
      bug in the F-168 AcceptanceTrace detector: when an explicit
      `acceptance_criteria[].test_refs` ref was missing, the drift
      message still used the implicit-shape phrasing instead of
      naming the missing ref. The detector itself caught the drift
      correctly; only the message hid which ref was at fault.

      Fix splits the helper into `acTraceFailure(...)` returning a
      shape-specific message — explicit failures cite the missing
      ref by name (`F-N AC-N: test_ref backtick-X-backtick not found
      in any tests/ file`), implicit failures keep the existing
      prompt.
    acceptance_criteria:
      - "AC-1: explicit test_refs missing → message contains the verbatim ref
        name."
      - "AC-2: implicit failure → message unchanged from F-168 (no ref name,
        asks user to add a test or switch to explicit mapping)."
      - "AC-3: invalid test_refs entry (non-string / empty) → message cites the
        offending value."
