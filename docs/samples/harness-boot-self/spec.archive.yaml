  - id: F-131
    description: |
      Forty-eighth cycle. Closes the most weighty logcat-on
      ISSUES-LOG entry (blocker, "spec.yaml context bloat"): a
      project that has accumulated 200+ done features now spends
      ~30k tokens of every Claude conversation just on the
      `acceptance_criteria` and `description` bodies of features
      that have already shipped, because `@.harness/spec.yaml` is a
      whole-file import.

      Lite shape: a new read-only CLI subcommand
      `harness export-spec --active-only` that emits a compacted
      copy of the spec.yaml to stdout (or `--output <path>`). For
      every feature whose state.yaml status is `done` (or
      `archived`), the export replaces:

        - `acceptance_criteria: [...]` with a single placeholder
          string `"(N criteria — see spec.yaml history)"`.
        - `description: |` with its first non-blank line, hard-
          truncated at 120 chars + `…` if longer.

      Active features (planned, in_progress, blocked) are emitted
      verbatim. The schema and field names are preserved so the
      output still parses through the existing spec validator.

      Out of scope: changing the default behaviour of any other
      command, modifying spec.yaml in place, automatic CLAUDE.md
      template rewrite, archived-feature off-loading to a separate
      file. Those are larger backward-compat decisions queued for
      follow-up cycles. This cycle adds only a new opt-in command.

      Files touched (expected): `src/spec/exportSpec.ts` (new
      module — compaction logic); `src/cli/harness.ts` (register
      the new subcommand); `tests/parity/exportSpec.test.ts` (new
      test file with active-only behaviour, passthrough,
      placeholder shape); `CHANGELOG.md` Added line.
    acceptance_criteria:
      - "AC-1: `harness export-spec --active-only --harness-dir <dir>` reads
        `<dir>/spec.yaml` plus `<dir>/state.yaml`, emits a yaml document on
        stdout whose top-level shape matches the input (same keys, same order)."
      - "AC-2: For every feature whose state.yaml `status` is `done` or
        `archived`, the emitted entry's `acceptance_criteria` is a
        single-element array `[\"(N criteria — see spec.yaml history)\"]` where
        N is the original count, and `description` is the first non-blank line
        truncated at 120 chars (with `…` suffix if truncation occurred)."
      - "AC-3: Active features (status in {planned, in_progress, blocked}, or
        absent from state.yaml entirely) are emitted with `acceptance_criteria`
        and `description` byte-identical to the input."
      - "AC-4: Without `--active-only`, the command emits the spec.yaml content
        effectively unchanged (idempotent passthrough — round-trip via
        `yaml.parse` then `yaml.stringify` equality is sufficient; comments may
        not be preserved)."
      - "AC-5: `--output <path>` writes the result to the file instead of
        stdout. The file is overwritten if it already exists. Without
        `--output`, output goes to stdout."
      - "AC-6: The command never mutates `<dir>/spec.yaml` or `<dir>/state.yaml`
        (CQS, BR-012). A unit test verifies mtime invariance."
      - "AC-7: The compacted output, when re-fed to `harness validate`,
        validates clean against `docs/schemas/spec.schema.json`."
      - "AC-8: F-131 mirrored on both spec.yaml copies; `diff -q` clean."
      - "AC-9: F-131 completed via the harness CLI cycle on
        `feat/v0.14.4-spec-compact-export`. self_check 5/5 PASS, npm test all
        green."
  - id: F-143
    description: |
      Closes the spec.yaml bloat axis end-to-end. Three additive
      behaviors land in one cycle:

      1. **Auto-digest on complete (F-145 sub)** — `moveToArchive()`
         backfills the live entry's `digest` field from the first
         ~120 chars of `description` before relocating the body to
         spec.archive.yaml. Existing user-authored digests are
         respected. Effect: dashboards · kickoff templates · external
         `@import` readers retain a meaningful one-line label for
         done features even after the body moves out.

      2. **Auto-archive resolved open_questions (F-147 sub)** —
         `harness sync` adds an 8th step that relocates entries from
         `spec.open_questions[]` whose `answered_at` (or
         `resolved_at` / `closed_at`) timestamp is older than 30
         days into `spec.archive.yaml.open_questions[]`. Idempotent
         per id. Skipped on dirty tree or opt-out
         (`harness.yaml: archive.open_questions: false`).

      3. **Retroactive catch-up of harness-boot self spec** — first
         `harness sync` on a clean tree relocates 128 accumulated
         done feature bodies from `.harness/spec.yaml` (and the
         lockstep mirror under `docs/samples/harness-boot-self/`)
         into `spec.archive.yaml`. Closes the gap left by F-137,
         which never auto-fired on this self repo because every
         interactive sync hit the dirty-tree guard.

      Net effect: `.harness/spec.yaml` shrinks 7028 → 2512 lines
      (64% reduction); future done-feature transitions auto-archive
      with a meaningful digest left behind; resolved open questions
      drift out of the live spec on their own.
    acceptance_criteria:
      - "AC-1: `moveToArchive()` writes `digest` (≤120 chars, ellipsis suffix
        when truncated) when the live entry has no digest, leaves it untouched
        when one exists; covered by `tests/parity/archive.test.ts >
        moveToArchive — F-145 auto-digest`."
      - "AC-2: `harness sync` runs `autoArchiveOpenQuestions()` after bulk
        archive migration; entries with `*_at` older than 30 days move to
        `spec.archive.yaml.open_questions[]` (per-id upsert); honours
        `--no-open-questions-archive` and `harness.yaml: archive.open_questions:
        false`; covered by `tests/parity/archive.test.ts >
        autoArchiveOpenQuestions — F-147`."
      - "AC-3: `harness sync` on a clean tree against this self repo emits
        `[info] sync: auto-archived 128 done feature bodies` and shrinks
        `.harness/spec.yaml` from 7028 to ~2500 lines while keeping
        `self_check.sh` 5/5 OK and `npm test` 720/720 (10 new tests)."
  - id: F-148
    description: |
      Closes the v0.15.2 follow-up gap surfaced by the A/B "작업 결과물"
