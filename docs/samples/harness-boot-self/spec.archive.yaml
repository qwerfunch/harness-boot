  - id: F-081
    description: |
      External-dogfood feedback batch (2026-04-29). A new user reported
      two install-time bugs on macOS system Python 3.9 that block the
      first-run experience:

      1. `/harness-boot:work` (dashboard mode) crashes with
         `ModuleNotFoundError` when neither `tomllib` (Python 3.11+)
         nor `tomli` (backport) is installed. The two-step try/except
         in `scripts/scan/style_fingerprint.py:14-17` only catches the
         first ImportError; the second one (tomli also missing)
         propagates and aborts module load. work.py imports the scan
         package, so even the read-only dashboard becomes unreachable.
         Same crash shape exists in `scripts/scan/manifest.py:18-20`
         and `scripts/scan/seed_spec.py:23-25`.

      2. `scripts/sync.py --soft` exits 1 instead of 0 when pyyaml is
         missing. The module-level `import yaml` runs before argparse
         sees `--soft`, breaking F-076's "soft mode always exits 0"
         contract. `/harness-boot:init §5.5` invokes `sync.py --soft`,
         so a fresh init treats the missing optional dep as a hard
         failure.

      Both bugs share a common root: the plugin assumes pyyaml/tomli
      are installed (they are listed in requirements-dev.txt) but does
      not bundle or runtime-verify them. F-081 ships the inner
      defensive layer — graceful degradation so the plugin never
      crashes on a missing optional dep. F-082 ships the outer layer
      (init preflight + offer-to-install).

      Together they make the first-run experience smooth regardless of
      the user's Python environment.
    acceptance_criteria:
      - "AC-1: scripts/sync.py top-of-module replaces the bare ImportError exit
        with a try/except that sets `_YAML_AVAILABLE = False` and `yaml = None`.
