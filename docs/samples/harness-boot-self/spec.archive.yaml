version: "2.3"
schema_version: "2.3"
features:
  - id: F-132
    description: |
      Forty-ninth cycle. First of the root-cause cycles (after the
      logcat-on return batch's Lite compaction in F-131): turns the
      "compress in place" workaround into a proper separation.

      Root-cause reading (from the maintainer's plan): spec.yaml
      is forced to carry both the *currently living definition* and
      the *full history* in one file because BR-002 says spec is
      SSoT. The compression of F-131 was a band-aid — given enough
      time the compacted form bloats again. The real fix is to
      move the done body out of the live file entirely. spec.yaml
      then stays slim by construction, not by repeated squeezing.

      Mechanism (no new commands):

        - `harness work F-N --complete` already runs inside the
          `complete()` lifecycle in `src/work.ts`. At the end of a
          successful transition we add one step: read the feature's
          `description` and `acceptance_criteria`, append them to
          `.harness/spec.archive.yaml` under the same id, and remove
          those two keys from the live spec.yaml entry. The meta
          (id, name, status, type, area, digest, ...) stays in
          place so dashboards, gates, drift checks all keep
          working.
        - silent fail on archive write — the transition already
          succeeded, the archive move is best-effort. A warn line
          on stderr is enough; the next sync run will retry.
        - idempotent — if `.harness/spec.archive.yaml` already has
          the id, overwrite (the body is the only thing that
          changes; the move is a one-way ratchet).

      Scope discipline:

        - Only the **new** feature transitioning in this cycle
          (F-132 itself) actually moves to archive in this cycle.
          The 130 existing done entries stay in spec.yaml as full
          bodies — a separate **bulk-migration follow-up cycle**
          will sweep them. Keeps the diff in this PR auditable.
        - No CLI surface change. No new subcommand. `export-spec`
          from F-131 is unaffected (it can still produce a
          compact view from the live spec). Once archive lands,
          `export-spec --active-only` will become near-no-op
          because the bodies are already gone — that pruning is
          part of the later Lazy-Read cycle, not this one.

      Files touched (expected): `src/spec/archive.ts` (new
      internal module: `extractArchivePayload`, `moveToArchive`,
      idempotent append-or-overwrite); `src/work.ts` (one call
      site at the end of `complete()` after `state.setStatus`);
      `src/spec/validate.ts` or `docs/schemas/spec.archive.schema.json`
      (new minimal schema for the archive file); `.gitignore`
      (un-ignore `.harness/spec.archive.yaml` if needed — it must
      be tracked for self-bootstrap); `tests/parity/spec/archive.test.ts`
      (new); `tests/parity/work.test.ts` (assert complete() moves
      body); `CHANGELOG.md`.

      Self-bootstrap smoke: F-132 itself completing via the harness
      CLI cycle will exercise the new code — F-132's own
      description + AC end up in `.harness/spec.archive.yaml`,
      leaving only the meta in `.harness/spec.yaml`. That's the
      dogfood proof.
    acceptance_criteria:
      - "AC-1: `src/spec/archive.ts` exposes `moveToArchive(harnessDir, fid)`
        that reads the live spec.yaml, extracts the named feature's
        `description` and `acceptance_criteria`, appends them to
        `<harnessDir>/spec.archive.yaml` under the same id (overwriting prior
        body for that id), and rewrites the live spec.yaml with those two keys
        removed from that feature entry only."
      - "AC-2: `complete()` in `src/work.ts` calls `moveToArchive(harnessDir,
        fid)` after the successful `state.setStatus(fid, 'done')` save. If the
        archive write throws, complete() still returns success (the transition
        is already committed); a stderr warning is emitted with the error
        message. A unit test pins the silent-fail contract."
      - "AC-3: idempotency — calling `moveToArchive` twice on the same id leaves
        the live spec.yaml byte-identical (no body to move the second time) and
        the archive entry unchanged."
      - "AC-4: meta preservation — every key on the feature entry **other than**
        `description` and `acceptance_criteria` is preserved verbatim (id, name,
        type, ui_surface, performance_budget, area, supersedes, ...). A unit
        test pins this."
      - "AC-5: archive file shape — `<harnessDir>/spec.archive.yaml` has a
        top-level `version`, `schema_version`, and `features: [{id, description,
        acceptance_criteria}]`. When the file does not exist, it is created.
        When it exists, it is read, mutated, and re-written. The order of
        entries in `features[]` follows insertion order."
      - "AC-6: `harness validate` continues to accept the live spec.yaml after a
        feature's body has been moved out — `description` and
        `acceptance_criteria` are not required on a feature entry by the schema,
        so the meta-only shape stays valid."
      - "AC-7: F-132 self-bootstrap proof — after `harness work F-132
        --complete`, `.harness/spec.yaml` contains the F-132 entry with `id`,
        `name`, `type`, etc. but **no** `description` or `acceptance_criteria`
        keys, and `.harness/spec.archive.yaml` contains the F-132 entry with its
        `description` and `acceptance_criteria` bodies."
      - "AC-8: F-132 mirrored on both spec.yaml copies; `diff -q
        .harness/spec.yaml docs/samples/harness-boot-self/spec.yaml` clean. Same
        lockstep applied to the new `spec.archive.yaml` (both `.harness/` and
        `docs/samples/harness-boot-self/`)."
      - "AC-9: F-132 completed via the harness CLI cycle on
        `feat/v0.14.4-spec-archive-separation`. self_check 5/5 PASS, npm test
        all green."
  - id: F-133
    description: >
      Trivial cleanup of F-132's deployment friction. F-132 added an

      automatic archive move inside `complete()` so that the body of a

      done feature relocates from `.harness/spec.yaml` to

      `.harness/spec.archive.yaml`. That created a new class of files

      that show up in the *post-complete* commit (the user's record

      commit after the lifecycle transition), which the F-034 pre-commit

      hook does not yet whitelist — so the very first attempt to commit

      F-132's own archive output got rejected.


      This cycle closes the gap with three small changes:

        - `hooks/pre-commit-phase2.sh` whitelist gains the four
          lifecycle artifacts that `complete()` now produces /
          mutates: `.harness/spec.yaml` (body removed), `.harness/spec.archive.yaml`
          (body appended), and the two docs/samples lockstep mirrors.
          Active feature flow is unaffected; the whitelist only
          matters when active_feature_id is null (i.e. immediately
          after a successful complete).
        - `self_check.sh` step 1 extended to diff
          `.harness/spec.archive.yaml` against the docs/samples mirror
          so SSoT discipline applies to the archive too (already
          drafted in F-132's commit but split out).
        - the previously-blocked F-132 lifecycle artifacts
          (spec.yaml mutation + spec.archive.yaml + mirrors) ride
          along in this same commit so the dogfood proof closes
          cleanly.

      This is intentionally a kind=trivial cycle — wire-up only,

      no semantic change beyond what F-132 already shipped.
    acceptance_criteria:
      - "AC-1: hooks/pre-commit-phase2.sh whitelist permits .harness/spec.yaml,
        .harness/spec.archive.yaml, docs/samples/harness-boot-self/spec.yaml,
        docs/samples/harness-boot-self/spec.archive.yaml when staged alone
        (active_feature_id may be null)."
      - "AC-2: self_check.sh step 1 diffs .harness/spec.archive.yaml against
        docs/samples/harness-boot-self/spec.archive.yaml when either copy
        exists."
      - "AC-3: F-132's auto-archive output (.harness/spec.archive.yaml +
        lockstep mirror, plus the body-stripped .harness/spec.yaml + mirror) is
        committed in this same commit, completing the F-132 dogfood proof."
      - "AC-4: bash self_check.sh returns 5/5 OK after this cycle."
      - "AC-5: F-133 mirrored on both spec.yaml copies; diff -q clean."
      - "AC-6: F-133 completed via the harness CLI cycle on
        feat/v0.14.4-spec-archive-separation."
  - id: F-134
    description: |
      Closes the recursive lifecycle gap left open by F-133. After
      F-132 introduced auto-archive on `complete()`, the post-complete
      record commit always carries three categories of artifact:

        1. `.harness/state.yaml` — the status transition. Already on
           the whitelist since the original F-034 hook.
        2. `.harness/spec.archive.yaml` — the moved body. F-133 added
           this and its docs/samples mirror to the whitelist.
        3. `.harness/spec.yaml` — the *live* spec mutated to drop the
           moved feature's body. **Still not whitelisted** because
           F-133 ran out of cycle commit budget and the cycle that
           would whitelist spec.yaml was itself blocked by the
           same gap.

      F-134 is the trivial cycle that adds entry 3 to the whitelist —
      `.harness/spec.yaml` and the docs/samples mirror — so that the
      record commit after every future `harness work F-N --complete`
      passes through branch 4 of the F-034 hook even when
      active_feature_id has just been cleared. Active-feature flow
      stays untouched (branch 6); the whitelist only applies when
      no feature is active, which is precisely the post-complete
      moment.

      F-133's previously-blocked `spec.yaml` mutation rides along in
      this same commit, completing the dogfood proof for the whole
      F-132 → F-133 → F-134 chain. After this cycle lands, future
      complete() lifecycles produce only whitelist-friendly diffs.
    acceptance_criteria:
      - "AC-1: hooks/pre-commit-phase2.sh whitelist permits .harness/spec.yaml
        and docs/samples/harness-boot-self/spec.yaml when staged alone
        (active_feature_id may be null)."
      - "AC-2: The branch-4 header comment block is updated to enumerate all six
        whitelist patterns (state.yaml, _workspace/*, CHANGELOG.md,
        spec.archive.yaml + mirror, spec.yaml + mirror)."
      - "AC-3: Working-tree hook synced to .git/hooks/pre-commit so this cycle's
        record commit can rely on the new whitelist immediately."
      - "AC-4: F-133's pending spec.yaml mutation is committed in this same
        change."
      - "AC-5: bash self_check.sh returns 5/5 OK."
      - "AC-6: F-134 mirrored on both spec.yaml copies; diff -q clean."
  - id: F-135
    description: |
      Promotes two cross-cutting writing conventions from the
      maintainer's local memory to the plugin level so every harness
      user gets the same effect, not just sessions where the
      maintainer's memory happens to be loaded.

      Why this exists (user feedback 2026-05-11):

        - "Plans and answers don't put the answer up front — I have
          to scan to find it. Make this more efficient."
        - "Sometimes the Korean comes out awkward (translation
          tone). When responding in any user language — not just
          Korean but Japanese, Chinese, Spanish, French, etc. —
          write it in that language's native voice from the start,
          not as a word-by-word translation."
        - "Bake these rules into harness-boot itself so plugin users
          inherit them automatically. Do this before the bulk
          migration cycle."

      Mechanism (no new CLI surface):

        1. New single-source-of-truth file
           `docs/communication-rules.md` — bilingual (en + ko) with
           explicit per-language guidance for ja/zh/es/de/fr/pt as
           reference patterns.
        2. `docs/templates/starter/CLAUDE.md.template` gains a
           short "## 12. Response writing rules" section that
           inlines the rule headlines + links to the full file.
           Every fresh `/harness-boot:init` writes this into the
           user's CLAUDE.md so the rules sit in the always-loaded
           system context.
        3. Every `agents/*.md` file gets one line in its Context
           section: "Follow `docs/communication-rules.md`." Subagent
           invocations inherit the rules without per-call boilerplate.
        4. `CHANGELOG.md` Added entry — calls out that existing
           users who keep their own CLAUDE.md need to copy the new
           section once (plugin update auto-applies the agents/*
           change but cannot rewrite a user-owned CLAUDE.md).

      Scope discipline (kept narrow on purpose):

        - No code surface change. Pure docs cycle.
        - Rules cover the *output style*, not the *answer content*.
          The plugin still leaves the LLM free to choose what to
          say; only how to say it is constrained.
        - Existing maintainer memory (`feedback_plain_explanation.md`,
          `feedback_korean_native_writing.md`) becomes redundant
          with this cycle and can be tidied up afterwards. Out of
          scope here — left to the maintainer.
    acceptance_criteria:
      - "AC-1: `docs/communication-rules.md` exists, contains both English and
        Korean sections side-by-side, and names at least four reference
        languages (ja, zh, es, plus one more) with one-line native-tone notes
        each."
      - "AC-2: The two rule families are present and named: (a) answer-first /
        scannable format, (b) user-language native tone (any natural language,
        not just Korean). Each family lists 4–6 concrete rules."
      - "AC-3: `docs/templates/starter/CLAUDE.md.template` gains a section
        titled '## 12. 응답 작성 가이드 / Response Writing Guide' (or equivalent
        numbered section) that inlines the rule headlines and links to
        `docs/communication-rules.md`."
      - "AC-4: Every file matching `agents/*.md` (excluding `agents/README.md`
        if present) contains exactly one new line linking to
        `docs/communication-rules.md` inside the Context section. A grep test
        pins the count."
      - "AC-5: `CHANGELOG.md` [Unreleased] gains an Added line that names F-135,
        mentions both rule families, and explicitly calls out the existing-user
        CLAUDE.md migration step."
      - "AC-6: `tests/parity/communicationRules.test.ts` (new) verifies presence
        of (a) `docs/communication-rules.md` with required headings, (b) the new
        section in `docs/templates/starter/CLAUDE.md.template`, (c) the agent
        link line in each `agents/*.md` file."
      - "AC-7: F-135 mirrored on both spec.yaml copies; `diff -q` clean."
      - "AC-8: F-135 completed via the harness CLI cycle on
        `feat/v0.14.4-communication-rules`. self_check 5/5 PASS, npm test all
        green."
  - id: F-136
    description: |
      Three corrections on top of F-135 from a user review:

        1. Drop the side-by-side English/Korean duplication in
           docs/communication-rules.md. One English template that
           generalises to every natural language is enough.
        2. Stop listing handled F-N IDs in every response. Surface
           them only on demand, and even then in a one-line summary.
        3. CHANGELOG, commit messages, and PR bodies should follow
           the same brevity rules — lead with the change, keep
           paragraphs short.

      Wiring (no new CLI surface):
        - docs/communication-rules.md rewritten as single English template.
        - Two new Family 1 rules: (a) progress-ID surface discipline,
          (b) brevity for write surfaces (CHANGELOG / commit / PR).
        - CLAUDE.md.template reminder rewritten English-only.
        - Test file updated for the new shape.
    acceptance_criteria:
      - "AC-1: docs/communication-rules.md is English-only (no side-by-side ko
        duplication). Family 2 references at least four user languages
        (ko/ja/zh/es)."
      - "AC-2: Family 1 carries a rule explicitly named 'progress-ID surface
        discipline' or equivalent: don't list handled F-N IDs in routine
        responses."
      - "AC-3: Family 1 carries a rule explicitly named 'brevity for write
        surfaces' or equivalent that names CHANGELOG / commit / PR explicitly."
      - "AC-4: CLAUDE.md.template reminder section is single-language English
        referencing the three new rules."
      - "AC-5: tests/parity/communicationRules.test.ts updated (no ### 한국어
        check; adds new rule checks)."
      - "AC-6: F-136 mirrored on both spec.yaml copies; diff -q clean."
      - "AC-7: F-136 completed via harness CLI cycle. self_check 5/5 + npm test
        green."
  - id: F-137
    description: |
      Closes the recursive gap left by F-132~F-134: archive auto-move
      runs only on the next `complete()`, so existing done feature
      bodies in `.harness/spec.yaml` stay untouched until each is
      completed again (which never happens). Existing harness-boot
      users who run `/plugin update` see no immediate slimming.

      Fix: `harness sync` detects done feature bodies still living in
      spec.yaml and relocates them to spec.archive.yaml in one pass.
      Sync is the natural home — it already runs on `init`, on
      `harness work` activate (auto-fire), and on explicit user call,
      so the migration kicks in during normal flow without a new
      command.

      Behaviour:
        - Reads state.yaml for done/archived feature ids.
        - Walks spec.yaml; for each matching id with description or
          acceptance_criteria still present, calls the existing
          `moveToArchive(harnessDir, fid)`.
        - Writes one events.log entry: `bulk_archive_migrated` with
          count + ts.
        - Idempotent: second sync finds nothing to move.
        - Skip + warn (one stderr line) when working tree is dirty;
          retries on the next sync.
        - Opt-out: `harness.yaml` `archive.auto_migrate: false` or
          `harness sync --no-archive-migrate` per call.

      Side cycle (1 line in same PR): adds a Family 1 rule to
      `docs/communication-rules.md` covering plan-mode file
      management — when the user starts a different task in plan
      mode, overwrite the plan file rather than appending. Keeps
      future plans from carrying stale headers.
    acceptance_criteria:
      - "AC-1: New `bulkMigrate(harnessDir)` in `src/spec/archive.ts` walks
        state.yaml's done/archived ids, calls existing `moveToArchive()` for
        each id whose spec.yaml entry still carries description or
        acceptance_criteria, and returns the count of features moved."
      - "AC-2: `src/sync.ts` calls `bulkMigrate` near the end of the derive
        pipeline. Calls `runDirtyTreeCheck()`-equivalent first; when the working
        tree is dirty, skips the migration and emits one stderr warning. Honours
        `harness.yaml` `archive.auto_migrate: false` and the
        `--no-archive-migrate` CLI flag."
      - "AC-3: When at least one feature is migrated, sync writes one
        `bulk_archive_migrated` entry to events.log with `count` and `ts`
        fields."
      - "AC-4: Idempotent. A second sync call (clean tree, default options)
        leaves spec.yaml byte-identical and writes no new events."
      - "AC-5: `tests/parity/archive.test.ts` covers: bulk happy path (N done
        bodies moved), idempotent re-run, dirty-tree skip + warn, opt-out flag,
        opt-out config."
      - "AC-6: `docs/communication-rules.md` Family 1 gains one new rule:
        plan-mode file management — when the user pivots to a different task,
        the plan file is overwritten, not appended to."
      - "AC-7: F-137 mirrored on both spec.yaml copies; diff -q clean."
      - "AC-8: F-137 completed via the harness CLI cycle on
        `feat/v0.14.4-bulk-archive-migration`. self_check 5/5 + npm test green."
  - id: F-138
    description: |
      Today drive runs planned features blindly in order. The user
      wants drive to **rethink the plan after each feature** based on
      what it just learned (retro, evidence, gate trends) and adjust
      the pending features. Toward the end of a goal the actual
      remaining work may diverge from the original sketch — that is
      the point.

      Lite scope (Cycle A1 of a multi-cycle plan):
        - **Deterministic replan** only — blocked features moved to
          the end, superseded features auto-deferred, sibling-area
          features prioritised after a successful complete.
        - **File-drop manifest** for LLM-required replan: when the
          deterministic pass detects a non-trivial change candidate
          (e.g. evidence suggests scope shift), drive writes a
          replan request file under
          `.harness/_workspace/replan/<goal-id>-after-<fid>.md`
          with structured context. The orchestrator (next Claude
          turn) reads the file and applies the mutation.
        - **No automatic LLM call** in this cycle — that lives in
          Cycle A2 once the orchestrator-handoff path is proven.

      Mechanism:
        - New module `src/drive/replan.ts` exposes
          `replanAfterCompletion(harnessDir, completedFid, goalId)`.
        - `src/drive/loop.ts` calls the hook at the start of an
          iteration whose previous step's active feature has just
          transitioned to `done`.
        - Each call emits one `replan_evaluated` event (deltas +
          file-drop path when applicable). Re-call on the same fid
          is idempotent (no duplicate event, no re-mutation).
        - Opt-out: `harness.yaml` `drive.replan.enabled: false`
          skips entirely; opt-out emits one `replan_disabled` event
          the first time and is then silent.
    acceptance_criteria:
      - "AC-1: `src/drive/replan.ts` exposes `replanAfterCompletion(harnessDir,
        completedFid, goalId)` returning `{evaluated: boolean, deltas:
        {deferred: string[], reordered: string[]}, manifest_path:
        string|null}`."
      - "AC-2: Deterministic replan moves any pending feature whose state.yaml
        status is `blocked` to the end of the goal's `feature_progress`
        ordering, and applies `superseded_by` chains to defer superseded ids."
      - "AC-3: When the deterministic pass detects an LLM-worthy condition
        (active goal has ≥ 1 retro mentioning 'replan' / 'pivot' / 'rethink'
        keywords, or evidence indicates a scope shift), drive writes a file-drop
        manifest at `.harness/_workspace/replan/<goal-id>-after-<fid>.md` with
        structured context. Returns `manifest_path` set."
      - "AC-4: One `replan_evaluated` event written to events.log per call (with
        deltas + manifest_path). Re-calling with the same `completedFid` is a
        silent no-op (no duplicate event, no re-mutation)."
      - "AC-5: `src/drive/loop.ts` invokes the hook at the start of an iteration
        when `state.getFeature(checkpoint.execute.active_feature).status ===
        'done'`."
      - "AC-6: Opt-out: `harness.yaml` `drive.replan.enabled: false` skips.
        Single `replan_disabled` event emitted the first time then silent."
      - "AC-7: 5+ vitest cases in `tests/parity/driveReplan.test.ts` covering:
        blocked deferral, supersedes deferral, manifest write trigger,
        idempotent re-call, opt-out."
      - "AC-8: F-138 mirrored on both spec.yaml copies; diff -q clean."
      - "AC-9: F-138 completed via the harness CLI cycle on
        `feat/v0.14.4-drive-replan`. self_check 5/5 + npm test green."
  - id: F-139
    description: |
      Cycle B of the drive-adaptivity plan. After every N feature
      completions inside a goal, drive runs a user-defined "real
      test" command — anything from `npm run e2e` to a curl smoke
      script — to confirm the accumulating system still behaves.
      Per-feature gate_5 already covers the unit-level smoke; this
      catches the cross-feature regressions that only show up when
      the parts come together.

      Mechanism:
        - User defines the command in `harness.yaml`:
            drive:
              real_test:
                command: "npm run e2e"
                every_n_features: 3   # default
        - When unset, the hook silently does nothing — drive's
          behaviour is unchanged for projects that don't opt in.
        - The trigger fires at the same moment as the F-138 replan
          hook (start of any iteration whose previous active feature
          has just transitioned to done) and only when the
          done-feature counter for the active goal hits the
          configured N.
        - On exit code 0 → write `real_test_passed` event, continue.
        - On non-zero exit → write `real_test_failed` event with
          stderr tail, halt the loop with reason `real_test_failed`
          so the user (or orchestrator) can decide.
    acceptance_criteria:
      - "AC-1: New module `src/drive/realTest.ts` exposes
        `runRealTestIfDue(harnessDir, goalId, completedFid)` returning `{ran:
        boolean, passed: boolean|null, command: string|null, exit_code:
        number|null, skip_reason?: string}`."
      - "AC-2: When `harness.yaml drive.real_test.command` is unset or empty,
        the hook returns `{ran: false, passed: null, command: null, exit_code:
        null, skip_reason: 'unconfigured'}` without invoking anything."
      - "AC-3: When configured, the hook counts done features in the active goal
        (state.yaml `feature_progress` values === 'done'); fires only when
        `count % every_n_features === 0` (default N=3); skip with `skip_reason:
        'not_due'` otherwise."
      - "AC-4: On exit 0, writes one `real_test_passed` event with the command +
        count; returns `{ran: true, passed: true}`."
      - "AC-5: On non-zero exit, writes one `real_test_failed` event including
        the command, exit_code, and the last 10 lines of stderr; returns `{ran:
        true, passed: false}`."
      - "AC-6: `src/drive/loop.ts` invokes `runRealTestIfDue` after the F-138
        replan hook at the same trigger point. On `passed === false`, the loop
        emits a halt with `reason: 'real_test_failed'`."
      - "AC-7: 5+ vitest cases in `tests/parity/driveRealTest.test.ts` covering:
        unconfigured skip, not-due skip, due + pass, due + fail, custom
        every_n_features."
      - "AC-8: F-139 mirrored on both spec.yaml copies; diff -q clean."
      - "AC-9: F-139 completed via the harness CLI cycle on
        `feat/v0.14.4-drive-real-test`. self_check 5/5 + npm test green."
  - id: F-140
    description: |
      Cycle C of the drive-adaptivity plan. Today a single
      `real_test_failed` halts drive immediately. Real-world e2e
      flakiness (network, race, rate limit) means a transient fail
      can resolve on a retry — yielding to the user every time
      defeats the "auto-progress unless big decision" intent.

      Mechanism:
        - Track per-goal `real_test_retry_count` on the drive
          checkpoint. Default cap: 1 retry.
        - On `real_test_failed`, if retry_count < cap → write
          `real_test_retry_scheduled` event, increment count, and
          return `proceed: true` so the next iteration re-runs the
          command. Reset count to 0 on a subsequent pass.
        - On `real_test_failed` with retry_count >= cap → emit the
          existing halt with reason `real_test_failed`. The user
          (or orchestrator) inspects.
        - Opt-out: `harness.yaml drive.real_test.transient_retry: false`
          disables; cap configurable via
          `drive.real_test.max_transient_retries` (default 1).
    acceptance_criteria:
      - "AC-1: `src/drive/checkpoint.ts` `ExecutePhaseCheckpoint` gains
        `real_test_retry_count: number` (default 0); `loadCheckpoint`
        defensively fills 0 when missing on legacy checkpoints."
      - "AC-2: New helper `bumpRealTestRetry(ck)` in `src/drive/loop.ts` (or
        realTest.ts) returns `{retried: boolean, count: number}`; honours config
        cap (default 1) and the opt-out toggle."
      - "AC-3: When the loop's real-test branch sees `passed === false`, it
        calls `bumpRealTestRetry`; if `retried: true`, writes
        `real_test_retry_scheduled` event and returns `proceed: true` (loop
