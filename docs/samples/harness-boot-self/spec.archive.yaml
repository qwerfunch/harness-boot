      - "AC-5: README.md + README.ko.md — Python requirement and pytest
        invocation removed."
      - "AC-6: CLAUDE.md repo layout + reference table reflect TS-only surfaces."
      - "AC-7: TS parity + npm run build + node bin/harness.js status all PASS."
      - "AC-8: F-107 completed via the harness CLI cycle on the umbrella branch."
  - id: F-108
    description: |
      Twenty-fifth cycle of the v1.0 migration thread. Comprehensive
      audit after the F-107 TS-only cutover. Goal: confirm the
      migration is correct end-to-end and that the three canonical
      entry points (idea-only init, plan.md init, brownfield init)
      all drive a feature lifecycle to completion through the TS
      CLI alone.

      Audit dimensions:

        - Code: walk every src/*.ts file, flag stale Python refs in
          comments, dead imports, half-ported helpers, missing
          exports.
        - Parity: pick three tricky modules (canonicalHash, check,
          work) and diff TS output vs the legacy Python on the same
          fixture. Flag any non-cosmetic divergence.
        - Docs: line-by-line walk README.md, README.ko.md,
          CLAUDE.md, commands/{init,work}.md, hooks/*.sh,
