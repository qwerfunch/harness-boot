  - id: F-072
    description: |
      v0.11.1 / F-048 added a drift × Iron Law gate to complete(): every
      non-hotfix --complete now calls scripts/check.run_check(), which
      runs all 11 drift detectors. complete() then keeps only findings
      whose kind is in _BLOCKING_DRIFT_KINDS = {Code, Stale,
      AnchorIntegration}. The other 8 detectors (Generated, Derived,
      Spec, Include, Evidence, Anchor, Adr, Doc, Protocol) are
      computed and discarded.

      The discarded detectors are the cheap ones — but Stale itself is
      the most expensive of the entire set (rglob over src/ × N_modules
      regex match), so dropping the others does not buy much. The real
      win is structural: complete() is the single hot path users hit
      most, and v0.11.1 unconditionally added the most expensive
      sibling-walk detector to it. As features and src/ grow, the
      complete-path latency follows.

      Add scripts/check.run_blocking_check(harness_dir) that runs only
      the three blocking detectors (Code + Stale + AnchorIntegration)
      and returns a CheckReport with the same shape. Replace the
      run_check call inside scripts/work.py:complete() with
      run_blocking_check. The user-facing `python3 scripts/check.py`
      command keeps the full 11-detector flow — diagnostic completeness
      is preserved; only the auto-invoked complete-path is narrowed.

      Measured baseline (this repo, 71 features): scripts/check.py
      end-to-end ~289ms. Target: complete-path drift overhead
      reduction ≥ 30%, meaning the new run_blocking_check should run
      in ≤ ~200ms on the same baseline. Numbers go in the retro and
      F-072 evidence.

      Behaviour preservation: F-048's existing test contract
      (tests/unit/work/test_drift_iron_law_gate.py — 5 cases) passes
      verbatim because _BLOCKING_DRIFT_KINDS is the only thing
      complete() ever inspected. The narrowing is invisible to the
      gate semantics.
    acceptance_criteria:
      - "AC-1: scripts/check.py exposes run_blocking_check(harness_dir,
        project_root=None) → CheckReport. Implementation calls only check_code,
        check_stale, check_anchor_integration; spec_yaml=None ⇒ empty findings
        (mirror of run_check's None-safety)."
      - "AC-2: scripts/work.py:complete() drift block (line ~830-850) replaces
        `from check import run_check` + `run_check(harness_dir)` with `from
        check import run_blocking_check` + `run_blocking_check(harness_dir)`.
        _BLOCKING_DRIFT_KINDS filter remains as defense-in-depth."
      - "AC-3: tests/unit/test_check.py adds StrictRunBlockingCheckTests —
        verifies (a) run_blocking_check exists, (b) returned CheckReport.checked
        == ['Code', 'Stale', 'AnchorIntegration'] in that order, (c)
        non-blocking detector functions are not invoked (unittest.mock.patch
        with call_count assertions), (d) blocking detectors are invoked exactly
        once each."
      - "AC-4: tests/unit/work/test_drift_iron_law_gate.py (F-048's 7 cases) all
        pass after retargeting the `unittest.mock.patch` target from
        `check.run_check` to `check.run_blocking_check` (= the call site
        complete() now uses). F-048's gate semantics (severity × kinds) are
        unchanged — only the mock site moved one function over."
      - "AC-5: bash scripts/self_check.sh 5/5 PASS · regression 0 across the
        existing 1119+ unit + 26 integration tests."
      - "AC-6: complete-path drift overhead measured before/after via `time
        python3 scripts/work.py F-072 --complete --harness-dir .harness` (or
        equivalent timing harness on a non-mutating proxy). The retro/F-072.md
        What Shipped section records both numbers; the post number must be ≥ 30%
        lower than the pre number."
      - "AC-7: F-072 mirrored on both spec.yaml copies
        (docs/samples/harness-boot-self + .harness)."
      - "AC-8: F-072 completed via the work.py 4-verb cycle (activate → run-gate
        gate_0/1/2/3/5 → declared evidence → complete) — Phase 2 dogfood."
  - id: F-075
    description: |
      Field-discovered gap: a downstream user reported running
      `/harness-boot:init` followed by the `spec-conversion` skill, then
      iterating through several feature cycles without ever seeing
      `domain.md` or `architecture.yaml` materialize. Inspecting the
      project showed `harness.yaml.generation.generated_from.spec_hash`
      remained the empty string and `events.log` carried no `sync_done`
      entry — the sync step had silently never executed.

      Root cause: three entry points (init markdown · spec-conversion
      skill · work.py per-feature cycle) all leave sync as a separate
      manual concern. None of them wires `python3 scripts/sync.py` into
      their finalize path. The user can run N feature cycles to
      completion without the derived views ever being generated, which
      also leaves the CLAUDE.md `@import` lines pointing at non-existent
      files.

      Decision: rather than touch the markdown-driven init/skill flows
      (brittle to test, fragile across future plugin updates), add a
      lazy autowire to `scripts/work.py::activate()` — the innermost
      Python boundary every cycle must cross. When `spec.yaml` exists
      but `harness.yaml.generation.generated_from.spec_hash` is empty
      or missing, `activate()` fires `sync.run(harness_dir)` once. The
      sync orchestrator is already idempotent under canonical hashing,
      so subsequent activations are no-ops on the sync side. Failures
      are fail-open: a stderr warning is emitted and activate proceeds,
      matching `_autowire_kickoff` and `_autowire_fog_clear`.

      The init markdown and spec-conversion finalize remain candidates
      for future work (F-074+) — wiring two upstream entry points only
      makes sense once the inner guard is in place. This feature ships
      the inner guard.
    acceptance_criteria:
      - "AC-1: scripts/work.py adds `_autowire_initial_sync(harness_dir: Path)
        -> None`. Reads `harness_dir / 'harness.yaml'`, returns early when
        `spec_hash` already populated. Otherwise imports `scripts.sync` and
        calls `sync.run(harness_dir)`. Wraps the body in try/except so any
        exception emits a stderr warning and returns silently — activate must
        never raise here."
      - "AC-2: `activate()` calls `_autowire_initial_sync(harness_dir)` before
        `_autowire_fog_clear` and `_autowire_kickoff` so first-time activate
        generates derived views before kickoff bullets reference them."
      - "AC-3: tests/unit/work/test_work_autowire.py adds
        `InitialSyncAutowireTests` covering the four contract cases above (fresh
        harness fires, already-synced no-ops, fail-open, missing files no-op).
        Existing tests in this module remain unmodified and continue to pass."
      - "AC-4: All comments and docstrings added in this cycle are in English
        (matches the F-049 → F-053 native-English consolidation thread already
        in flight)."
      - "AC-5: F-075 mirrored on both spec.yaml copies
        (docs/samples/harness-boot-self + .harness). bash scripts/self_check.sh
        5/5 PASS."
      - "AC-6: F-075 completed via the work.py 4-verb cycle (activate → run-gate
        gate_0/1/2/3/5 → declared evidence → complete) — Phase 2 dogfood."
  - id: F-076
    description: >
      Follow-up to F-075. F-075 closed the inner Python guard in

      `scripts/work.py:activate()` so the first feature cycle would always

      catch the missing-sync state, but the upstream entry points still

      had no idea about sync. This feature wires the two upstream surfaces

      (`commands/init.md` and `skills/spec-conversion/SKILL.md`) so the

      derived views are materialized as soon as a populated `spec.yaml`

      exists — eliminating the stutter where the very first work cycle

      had to fire sync before kickoff bullets could reference

      `domain.md`.


      Mechanism: a new public helper
      `scripts/sync.try_initial_sync(harness_dir)`

      wraps `sync.run()` with fail-open semantics — never raises, returns

      a `{"ok": bool, "reason": str, "skipped": bool}` status dict. The

      existing `_autowire_initial_sync` in `scripts/work.py` is refactored

      to delegate to this helper (single source of truth). A new

      `--soft` CLI flag (`python3 scripts/sync.py --harness-dir DIR --soft`)

      exits 0 regardless of validation failure and prints the status,

      so markdown bash blocks can call it without `|| true` workarounds.


      Init.md adds a §5.5 "Initial sync (best-effort)" stage between the

      `harness_initialized` event write and the final user-facing report.

      Stub specs from menu options 1 / 2 will fail schema validation

      and the `--soft` mode will print "skip — schema not ready"; that

      is fine because F-075's autowire still catches them on first work

      cycle. Option 3 (brownfield / free-text) and `spec-conversion`

      output rich specs that succeed, so most users see derived views

      immediately after install.


      `skills/spec-conversion/SKILL.md` adds Stage 5 "Sync derived views"

      after Stage 4 (검증). Stage 5 calls `try_initial_sync` and lists

      `domain.md` + `architecture.yaml` in the §7 산출물 enumeration.

      The contributor convention from F-049 → F-053 is respected: the

      Stage 5 prose is in Korean to match the rest of the SKILL while

      docstrings / comments / commit copy stay English.
    acceptance_criteria:
      - "AC-1: scripts/sync.py exposes `try_initial_sync(harness_dir: Path) ->
        dict`. Reads harness.yaml.spec_hash; returns `{ok: True, skipped: True,
        reason: 'already synced'}` when populated. Otherwise calls
        `run(harness_dir)`. Catches all exceptions and returns `{ok: False,
        reason: '<ClassName>: <msg>'}` instead of raising. spec.yaml absent →
        `{ok: False, reason: 'spec.yaml missing', skipped: True}` (no run
        attempt)."
      - "AC-2: scripts/sync.py CLI gains `--soft` flag. Flow: argparse →
        try_initial_sync → print one human-readable line `sync (initial):
        <ok|skip|fail> — <reason>` → exit 0 unconditionally. Existing flags
        (`--dry-run`, `--force`, `--json`) continue to operate against `run()`."
      - "AC-3: scripts/work.py:_autowire_initial_sync rewritten to delegate to
        `sync.try_initial_sync`. The `[warn] initial sync auto-wire failed: ...`
        stderr contract from F-075 is preserved (existing 5
        InitialSyncAutowireTests pass without modification)."
      - "AC-4: commands/init.md adds §5.5 (between §5 Initial event log and §6
        Final report) titled 'Initial sync (best-effort)'. Body explains the
        call invokes `python3 \"$PLUGIN_ROOT/scripts/sync.py\" --harness-dir
        \"$(pwd)/.harness\" --soft` and that stub specs are expected to skip
        silently."
      - "AC-5: skills/spec-conversion/SKILL.md adds Stage 5 'Sync derived views'
        after Stage 4 (검증) with the same `--soft` invocation. §7 산출물 enumerates
        `domain.md` + `architecture.yaml` as derived outputs (소산출 — Stage 5 가
        만들어내는 결과)."
      - "AC-6: tests/unit/test_sync.py adds `TryInitialSyncTests` covering: (a)
        skipped=True when spec_hash present, (b) ok=True after first run when
        spec is valid, (c) ok=False without raise when spec is schema-invalid,
        (d) ok=False reason='spec.yaml missing' when spec absent. Plus
        `SoftCliTests` checking sync.main(['--soft', '--harness-dir', tmp])
        returns 0 even on schema failure."
      - "AC-7: tests/unit/work/test_work_autowire.py contains a contract test
        `InitMdSyncWiredTest` and `SkillMdSyncWiredTest` that read
        commands/init.md / skills/spec-conversion/SKILL.md as text and assert
        the `--soft` invocation appears at least once."
      - "AC-8: F-076 mirrored on both spec.yaml copies. bash
        scripts/self_check.sh 5/5 PASS · regression 0 across full unit suite."
      - "AC-9: F-076 completed via the work.py 4-verb cycle (activate → run-gate
        gate_0 + gate_5 → declared evidence → complete) — Phase 2 dogfood."
      - "AC-10: All new docstrings, comments, and CHANGELOG entry text added in
        this cycle are in English (continues the F-049 → F-053 native-English
        consolidation thread; SKILL.md Korean prose is the documented
        exception)."
  - id: F-077
    description: >
      Field-discovered structural gap: Iron Law passes when gate_5 = pass

      and declared evidence count meets the mode threshold, but the rule

      is purely procedural — it does not verify that the evidence content

      actually matches the spec's quantitative targets. A downstream

      project illustrated the failure mode: features whose description

      promised "13 ChainTemplate", "74 propagation rule", or "35 Heuristic

      tools" reached `done` with implementations covering 38%, 13%, and

      3% of those targets respectively. The carry-forward bullets that

      noted the gap were buried in retro Deferred sections; nothing

      surfaced the mismatch at the activation boundary where the developer

      could course-correct cheaply.


      F-077 ships the smallest leverage point: a static lint that runs

      at activate time, parses numeric claims from the feature

      description and from the AC text, and prints a stderr hint when

      description-side numbers exceed AC-side numbers. No blocking; the

      hint is informational. Subsequent features (F-078 Coverage drift,

      F-079 dashboard gauge) build on the same fingerprint.


      Persist the parse result as `_workspace/coverage/F-N.yaml` so

      downstream features can read the same data without re-parsing

      prose. The fingerprint is a YAML record with two lists:

      `description_claims` and `ac_claims`, each `{metric, value, span}`.


      Pattern catalog (regex-based, conservative):
        * `(\d+)\s*(개|rule|rules|template|templates|tool|tools|item|items|hop|hops|step|steps|category|categories|agent|agents)`
        * `≥\s*(\d+)` / `>=\s*(\d+)` / `>=\s*(\d+)`
        * `(\d+)\s*[/／]\s*(\d+)` (numerator vs denominator — both captured)

      The lint never raises and never blocks activate; it is fail-open

      like the existing autowires. Output goes to stderr only.
    acceptance_criteria:
      - "AC-1: scripts/spec/quant_claims.py exposes
        `extract_numeric_claims(text: str) -> list[Claim]` and
        `diff_claims(description: str, ac_texts: list[str]) -> list[Mismatch]`.
        Claim is a NamedTuple of `(metric: str, value: int, span:
        tuple[int,int])`. Mismatch is `(metric: str, description_value: int,
        ac_value: int)`."
      - "AC-2: extract_numeric_claims handles the three canonical pattern
        families (count + counter noun · ≥/>= prefix · X/Y fraction) and returns
        claims with normalized lowercased metric tokens."
      - "AC-3: diff_claims returns one entry per metric where description_value
        > ac_value. Metrics absent from either side are silently skipped (no
        false-positive 'AC missing'). Diff is order-stable by metric token."
      - "AC-4: scripts/work.py adds `_autowire_quant_lint(harness_dir, fid)`
        that loads spec, finds the feature, calls diff_claims on description vs
