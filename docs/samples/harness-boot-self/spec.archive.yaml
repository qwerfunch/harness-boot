  - id: F-120
    description: |
      Thirty-seventh cycle. Post-v0.14.0 E2E sample-project
      verification surfaced that `harness work F-N --gate gate_5
      pass --note "..."` exits with `error: --gate takes two values`
      against a fresh project. Root cause: the commander option spec
      was authored as `.option('--gate <name> <result>', ...)` —
      commander does not support multi-placeholder option specs, so
      it captures only the first arg (`gate_5`) and leaves `pass`
      as a stray positional that fails the action's
      `Array.isArray(gateArgs) && length === 2` check.

      Fix: switch the option spec to `--gate <values...>` (commander's
      variadic syntax). Commander then collects every following
      space-separated arg until the next dashed option into an array,
      so both `--gate gate_5 pass` and `--gate gate_5 pass --note x`
      yield `options.gate === ['gate_5', 'pass']`. The action body's
      length-2 check is preserved as the cardinality guard.

      User-facing impact: `commands/work.md` Typical Scenario block
      starts working again. `--run-gate` (auto-detect) was the
      documented workaround during v0.14.0; both forms are valid
      after this patch.

      Patch-only — no schema, behaviour, or BR changes.
    acceptance_criteria:
      - "AC-1: `src/cli/harness.ts` changes the `--gate` option spec from
        `<name> <result>` to `<values...>` (commander variadic)."
      - "AC-2: `harness work F-N --gate gate_0 pass --note '...'` records gate_0
        as pass with the note (regression test in tests/parity/cli.test.ts)."
      - "AC-3: `harness work F-N --gate` with the wrong number of values still
        exits 3 with the existing error message (the action's length-2 guard
        remains the cardinality check)."
      - "AC-4: `.harness/_workspace/issues-log.md` entry for the bug grows a
        `Resolution:` line citing F-120 + this commit, mirroring the I-001/I-008
        return convention."
      - "AC-5: F-120 mirrored on both spec.yaml copies."
      - "AC-6: F-120 completed via the harness CLI cycle on
        `fix/v0.14.1-gate-option-parsing`. Patch release v0.14.1."
  - id: F-121
    description: |
      Thirty-eighth cycle. External dogfood project (Rust workspace,
      logcat-on) accumulated three entries on its
      `.harness/_workspace/issues-log.md`. Returned as one patch in
      the same shape as the cosmic-suika v0.10.7 batch return
      (I-003/I-004/I-006/I-007).

      L-001 (annoying, /harness-boot:init): the starter
      `docs/templates/starter/spec.yaml.template` declared
      `name / description / vision / stakeholders` under `project:`
      but not `summary`, while `docs/schemas/spec.schema.json`
      requires `["name", "summary"]`. The first
      `harness sync --soft` after init therefore ran through
      `tryInitialSync()` -> `run()` -> `SpecValidationError` ->
      caught and rendered as "sync (initial): fail —
      SpecValidationError: project: must have required property
      'summary'". Exit code 0 (fail-open intact) but the message
      scared users on a brand-new skeleton. Fix: add the one missing
      line to the template.

      L-003 (blocker, /harness-boot:drive): `src/gate/runner.ts`
      `detectGate0Command()` only probed pyproject / package.json /
      tests/ / Makefile, while `detectGate1Command` /
      `detectGate2Command` / `detectGate3Command` already had
      symmetric `Cargo.toml` / `go.mod` branches. So every Rust (or
      Go) project hit "no test command detected" and fell into L-002
      below. Fix: append the same Cargo.toml -> `cargo test
      --workspace` and go.mod -> `go test ./...` probes to gate_0,
      mirroring the existing pattern in gate_1/2/3.

      L-002 (blocker, /harness-boot:drive): `bumpRetryCounter()` in
      `src/drive/loop.ts` only incremented the per-gate fail counter
      when `result === 'fail'`. `intentPlanner.suggest()` is pure (no
      memory of prior recommendations), so on a stuck gate
      (`skipped` from L-003 above) drive recommended the same
      `run_gate` action every iteration, never tripped halt #3
      (retry_threshold), and burned all 50 iterations until halt #7
      (iteration_cap) fired. Users couldn't tell from the halt
      message that the loop had been stuck on the same point. Fix:
      track the last 3 (gate, result) tuples per (feature, gate) on
      the checkpoint; when the same non-pass result repeats N=2
      times in a row, fire a new halt #10 `gate_no_progress` with
      an actionable message ("set harness.yaml.gate_commands.gate_X
      or fix project detection").

      Patch-only — no schema / behaviour / BR changes besides the
      additive halt enum + checkpoint field (both backward-compatible
      via defensive defaults).
    acceptance_criteria:
      - 'AC-1: `docs/templates/starter/spec.yaml.template` adds `summary: ""` to
        the `project:` block; both spec.yaml mirrors already carry `summary` (or
        grow it in this commit).'
      - "AC-2: `tests/parity/validate.test.ts` (or a new starter-template test)
        loads the template and AJV-validates against
        `docs/schemas/spec.schema.json` -> pass."
      - "AC-3: `src/gate/runner.ts` `detectGate0Command()` returns
