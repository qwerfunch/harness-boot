      - "AC-6: `npm test` returns 622/622 PASS."
      - "AC-7: F-128 mirrored on both spec.yaml copies; `diff -q` clean."
      - "AC-8: F-128 completed via the harness CLI cycle on
        `chore/v0.14.3-release-prep`."
      - "AC-9: After PR merges to develop, develop fast-forwards into main; main
