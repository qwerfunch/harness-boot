      - "AC-4: self_check.sh 5/5 OK and npm test 720/720 still pass; lockstep
        mirror under docs/samples/ stays diff-clean."
  - id: F-156
    description: |
      Cuts the single largest per-call input cost in the plugin —
      `commands/work.md` was 28 KB / ~8 K tokens, paid on every
      `/harness-boot:work` invocation. ~60% of the file (Kickoff ·
      Q&A · Design Review · Retro ceremony auto-wire + Orchestration
      conflict / skip / payload / parallel detail) was rarely-needed
