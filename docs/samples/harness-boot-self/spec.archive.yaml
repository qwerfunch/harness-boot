      so the gauge is always one keystroke away.

      `scripts/ui/dashboard.render()` gains an optional `harness_dir`
      kwarg. When provided, the active-block renderer reads
      `_workspace/coverage/F-N.yaml` and appends one line:

          coverage: 38% (5/13 chaintemplate, 14/74 rule)

      Coverage is computed as the arithmetic mean of `ac_value /
      description_value` across recorded mismatches. A feature without
      any mismatches (or without a fingerprint file) shows no coverage
      line — the assumption is that no quantitative claims means no
      coverage gauge to compute.

      A new dashboard section "Coverage debt" surfaces aggregate stats:
      the count of features with at least one mismatch and the count
      whose coverage percentage falls below the configured threshold
      (default 0.80, same as F-078). When the under-threshold count
      exceeds 5 a red alert line is rendered above the section so the
      user sees backpressure even when looking at a different active
      feature.

      `scripts/ui/intent_planner.suggest()` gains a coverage-aware
      recommendation. When the active feature's coverage falls below
      the threshold, the intent_planner surfaces "review carry-forward
      debt before completing" as the top suggestion — pre-empting the
      complete() rejection from F-078 by giving the user a chance to
      either increase coverage or document explicit carry-forward in
      the retro.

      `scripts/work.py` propagates harness_dir to dashboard.render so
      the existing call site picks up the new kwarg without further
      wiring.
