      agent owns the routing, so the LLM does not consult on a
      routine call.

      Splits to two sidecars: `commands/_work-ceremonies.md` and
      `commands/_work-orchestration.md`. The primary `commands/work.md`
      keeps the per-call essentials — Preamble · subcommand specs ·
      Iron Law · failure modes · 6-row routing contract · free-text
      intent routing — plus short link blocks.

      `self_check.sh` step 5 extended to skip underscore-prefixed
      filenames so sidecars do not need the Preamble /
      anti-rationalization / harness CLI markers — they are
      reference docs, not self-contained slash commands.

      Net: 28 KB → ~19 KB on the primary file (-32%); per-call LLM
      input shrinks by ~9 KB / ~2.5 K tokens. Each sidecar stays
      ~5-7 KB and is read only on demand. Source code change 0,
      parity-test movement 0.
    acceptance_criteria:
      - "AC-1: `commands/work.md` 28 KB → 18-20 KB; ceremony + orchestration
        detail 은 `commands/_work-ceremonies.md` +
        `commands/_work-orchestration.md` 로 이동."
      - "AC-2: `self_check.sh` step 5 가 underscore-prefixed sidecar 파일을 skip;
        primary `commands/work.md` 는 Preamble · NO skip · NO shortcut · harness
        CLI 위임 4 표식 모두 보유."
      - "AC-3: `npm test` 720/720 + `bash self_check.sh` 5/5 OK — 코드/spec 변경 0,
        parity tests 그대로 통과."
      - "AC-4: 사이드카 헤더에 'sidecar of commands/work.md' 표기 + 'LLMs invoking
        /harness-boot:work do not need this file in their input window' 운영 지침
        명시."
  - id: F-157
    description: |
      Closes the long-running plan-file accumulation problem
      surfaced when users iterate on the same axis across multiple
      prompts (debugging, follow-up verification, deepening
      analysis). The previous rule (Family 1 §8 in
      `docs/communication-rules.md`) said "overwrite on task pivot"
      but left the *continuation* path silent on cleanup, so LLMs
      kept appending sections until the plan file became hundreds
      of lines and the user could no longer find the answer.

      Three changes, doc-only:

      1. Rewrite Family 1 §8 from a one-paragraph rule into a
         4-step discipline — (a) read existing plan, (b) classify
         continuation vs pivot (default to pivot when ambiguous),
         (c) apply the matching action (continuation: archive only
         outdated sections; pivot: archive the entire prior plan),
         (d) write the new plan with a header reference to the
         archive location.
      2. Define the plan header standard (current-task title plus
         one-line archive reference when applicable), the length
         guideline (50-150 lines healthy / 200+ red flag), and the
         `<!-- preserve -->` sentinel for long-running master
         plans.
      3. Add a 7th Family 1 bullet to
         `docs/templates/starter/CLAUDE.md.template` §7 so every
         user project that installs the plugin inherits the rule
         without needing to read the source `communication-rules`
         file.

      Safety: cleanup is always `mv` to
      `~/.claude/plans/archive/<project-slug>/`, never delete —
      prior plans recoverable. On filesystem error, cleanup
      skipped with a stderr warning; plan itself proceeds normally.

      No code change, no parity-test movement. Token cost: +0 on
      every `/harness-boot:work` call (`communication-rules.md`
      is not auto-loaded); +~35 tokens at session start from the
      added template bullet — negligible against the answer-finding
      cost the previous accumulation imposed.
    acceptance_criteria:
      - "AC-1: `docs/communication-rules.md` Family 1 §8 expanded from one
