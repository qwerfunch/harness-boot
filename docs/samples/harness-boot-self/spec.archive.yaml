      Out of scope (deliberately preserved):

        - tests/parity/fixtures/{canonical_hash, event_log, state}/
          generate_fixtures.py (3 files) — fixture *generators*, not
          tests. Used only when a TS parity fixture needs regeneration
          after a schema change. TS tests reference them by comment
          only; runtime never invokes Python.
        - tests/fixtures/brownfield-repos/python-fastapi/src/app/models.py
          — Python file that *is the fixture itself* (simulates a
          brownfield Python project for fog-clear scenario tests).
          Evicting it would break the fixture's purpose.

      Mechanism: `git rm --cached -r tests/unit tests/integration
      tests/scale`. Working tree preserved (the maintainer keeps the
      files locally). `.gitignore` gains the three directories so
      future `git add .` from the repo root will not re-stage them.
      `CLAUDE.md` L30 (Scaling preparedness) and L66
      (tests/unit · tests/integration line) updated to reflect the
      new state.

      Patch-only — no code, schema, or BR changes. The TS parity
      suite (~620 tests) keeps running unchanged.
    acceptance_criteria:
      - "AC-1: `git ls-files tests/unit | wc -l` returns 0 (was 69)."
      - "AC-2: `git ls-files tests/integration | wc -l` returns 0 (was 5)."
      - "AC-3: `git ls-files tests/scale | wc -l` returns 0 (was 2)."
      - "AC-4: Working-tree copies of all three directories preserved (the
