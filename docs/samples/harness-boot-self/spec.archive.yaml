      - "AC-4: SKILL.md instructs the LLM to (a) detect shape, (b) read
        project.mode, (c) emit a complete F-N entry, (d) print lockstep paste
        instructions, (e) print the orchestrator routing chain."
      - "AC-5: tests/parity/skill-feature-author.test.ts covers 8 golden cases
        (4 shapes × prototype/product) and asserts exact AC count + adapter
