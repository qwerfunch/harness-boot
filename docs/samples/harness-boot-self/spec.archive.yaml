          shared schema, throw `SpecValidationError` with the same
          path + reason fields the Python version raises.
        - `SpecValidationError` — class extending Error, carries
          `message`, `path`, `reason`.

      Behaviour preservation focus:

        - Same error path format — list-of-keys, dotted on `.message`.
        - Same exit codes when used as a CLI (the Node CLI shim is
          out of scope for this cycle; it lands with the bin/harness
          wrapper later).
        - Schema resolution: same fallback to `docs/schemas/spec.schema.json`
          relative to the package root. The TS port uses
          `node:url.fileURLToPath` to anchor the lookup off the
          source file, mirroring Python's `Path(__file__).parents[2]`.
        - Empty-spec / non-mapping top-level guards reject the same
          inputs.

      Parity test scope:

