  - id: F-158
    description: |
      Lock in a measurable safety net before the larger init UX
      overhaul (3-scenario auto-routing). This PR ships only the
      regression-gate infrastructure: a `--skeleton-only` route
      that keeps the existing init behavior byte-identical (zero
      LLM calls, < 500 ms wall time), a `harness init` CLI command
      that backs the slash command for bench-friendly invocation,
      and a perf bench scaffold under `tests/perf/` that measures
      wall time, spec-field coverage, and (stub) token usage across
      four fixtures (empty / plan-md / npm / Python).

      Baseline values land in `tests/perf/init-baseline.json` so
      later PRs (scenario 1 / 2 / 3) can be regression-gated: wall
      time +20 % or tokens +30 % fails CI. Token measurement is
      stubbed (always 0) in this PR since the skeleton-only path
      makes no LLM calls — full token plumbing follows when
      scenario 1 (idea ticky-taka) lands.

      Net narrative the bench enforces: init alone may get slower
      when scenarios 1/2/3 ship, but the first-cycle wall time
      (init → first `harness work F-N --complete`) must drop, since
      the user no longer hand-writes spec.yaml. The bench therefore
      records both `init_wall_time_ms` and `first_cycle_wall_time_ms`
      and treats the second as the primary user-value metric.
    acceptance_criteria:
      - id: AC-1
        text: |
          `node bin/harness init --skeleton-only` produces the same
          `.harness/` file set as the existing slash-command init
          (spec.yaml · harness.yaml · state.yaml · events.log all
          present), with wall time < 500 ms and zero LLM calls
          (events.log carries no `llm_call` entries).
      - id: AC-2
        text: |
          `tests/perf/init-bench.test.ts` (vitest) runs against four
          fixtures under `tests/perf/fixtures/` (empty · plan-md ·
          npm · python) and records four metrics per fixture:
          `init_wall_time_ms`, `init_tokens_total` (stub 0 here),
          `spec_field_coverage_pct`, and `first_cycle_wall_time_ms`
          (stub — same as init time since no work cycle in skeleton).
      - id: AC-3
        text: |
          `tests/perf/init-baseline.json` holds the committed baseline
          for the four fixtures. Bench compares against it and fails
          when `init_wall_time_ms` exceeds baseline × 1.20 or
          `init_tokens_total` exceeds baseline × 1.30.
      - id: AC-4
        text: |
          `spec_field_coverage_pct` never decreases from baseline
          (monotonic non-decrease rule). Bench fails on regression.
  - id: F-159
    description: |
      First user-facing slice of the init UX overhaul (after the
      F-158 safety net): when a user runs `/harness-boot:init`
      against an empty directory (or with a free-text idea
      keyword), the init flow boots a `harness:researcher` agent
      that asks four questions in a single LLM turn — vision /
      features / mode / quality-focus. The four answers feed into
      `harness:product-planner`, which writes a draft spec.yaml.

      Three CLI pieces back the slash command:

      1. `src/init/scenarioIdea.ts` — pure transform: given the
         four answers, produce a v2.3.8 spec.yaml string. No LLM
         call; that lives in the slash command. Determinism keeps
         the parity test trivial.
      2. `src/init/draftLabel.ts` — stamps
         `metadata.source.origin: idea` + `metadata.source.confidence`
         + `metadata.draft: true` + `metadata.content_hash` so the
         work-cycle auto-promotion hook can detect user edits.
      3. `src/init/tokenLog.ts` — infrastructure-only helper that
         appends `llm_call` events to `events.log`. Scenario 1
         doesn't call any LLMs from the CLI side (the slash
         command does that and records its own tokens), but the
         helper lands here so the bench can light up the
         `init_tokens_total` metric once scenarios 2/3 land.

      Two work-cycle hooks ship alongside:

      - `src/work.ts` reads `metadata.content_hash` on activate; if
        it disagrees with the current spec.yaml hash and
        `metadata.draft` is `true`, it flips draft to `false` and
        appends a `spec_promoted` event. This is the ownership
        contract — the moment a user touches the file, it becomes
        a constitution.
      - The `harness work --current` dashboard surfaces
        `draft: true` so the user knows the spec is auto-generated.

      The slash command's four-question contract goes into
      `commands/init.md` (scenario-1 branch). The CLI surface
      (`harness init --scenario idea --vision <text> --features
      <a,b,c> --mode <prototype|product> --quality-focus
      <design,perf,a11y,security>`) is what the slash command
      shells out to once the answers are collected — pure
      determinism on this side.
    acceptance_criteria:
      - id: AC-1
        text: |
          `node bin/harness init --scenario idea --vision "X" --features
          "a,b,c" --mode prototype --quality-focus design,perf
          --plugin-root <root>` writes a spec.yaml that validates
          against `docs/schemas/spec.schema.json`, carries
          `metadata.source.origin: idea` + `metadata.draft: true` +
          a `metadata.content_hash` matching the file's SHA-256.
      - id: AC-2
        text: |
          `metadata.quality_focus` lists exactly the values passed,
          and the spec contains a `features[]` entry per supplied
          feature name (acceptance_criteria empty — work-cycle
          fog-clear fills those later).
      - id: AC-3
        text: |
          On `harness work F-N` activate, if the spec.yaml has been
          edited (content_hash mismatch) and `draft: true`, the
          hook flips `metadata.draft` to `false` and appends a
          `spec_promoted` event. Idempotent — second activate
          after promotion is a no-op.
      - id: AC-4
        text: |
          Unit tests cover both the transform (`scenarioIdea.test.ts`,
          ≥ 6 tests) and the draft label + content_hash
          (`draftLabel.test.ts`, ≥ 5 tests including hash stability
          on no-op rewrites). Existing `tests/parity/initSkeleton.test.ts`
          continues to pass — no regression on F-158.
  - id: F-160
    description: |
      Third slice of the init UX overhaul: when the project already
      has code, the init flow runs deterministic Layer-0 signal
      collectors over 12 sources and writes a one-page
      `.harness/conventions.md` plus a partially-filled
      `.harness/spec.yaml`. No LLM call from the CLI binary — the
      slash command will fill the Comments and Tests sections in
      PR 3b (LLM hooks + secret guard + CLAUDE.md merge).

      Layer-0 sources implemented in this PR (deterministic):

      1. Manifest (reuse `src/scan/manifest.ts`).
      2. Build / deploy YAML / TOML (Dockerfile · docker-compose ·
         GitHub Actions · GitLab CI · CircleCI · Netlify · Vercel ·
         Fly · serverless).
      3. Style configs (`.editorconfig` · `.prettierrc` ·
         `biome.json` · `pyproject [tool.ruff/black]` ·
         `.eslintrc*` · `tsconfig.json` · `.rustfmt.toml`).
      4. Dependency category dictionary — maps deps to
         frameworks / ORM / API / styling / test / state.
      5. Directory pattern (src+tests · co-located · Next-app ·
         Next-pages · monorepo).
      6. AI-tool traces (`.cursorrules` · `CLAUDE.md` · `AGENTS.md`
         · `.continuerules` · `.aider.conf.yml`).
      7. CI stages (lint · typecheck · test · coverage · deploy).
      8. License + CHANGELOG presence.
      9. i18n folders + react-intl-style deps.
      10. Quality-enforce traces (`.husky/` · `.lefthook/` ·
          `.pre-commit-config.yaml` · `lint-staged.config.*`).

      The Comments and Tests sections of `conventions.md` ship as
      `[pending: LLM hook stub]` placeholders for PR 3b.

      Mini-map principle (StarCraft fog-of-war): Layer-0 is the
      coarse outline. Layer-1 fog-clear (per-feature, on
      `harness work F-N activate`) zooms in. Layer-2 (deep
      analysis) is on-demand. This PR ships Layer-0 only.
    acceptance_criteria:
      - id: AC-1
        text: |
          `src/init/codebase/signals.ts:collectSignals(projectRoot)`
          walks the 10 deterministic source families above and
          returns a `Signals` record. No file outside `projectRoot`
          is read; `node_modules` / `.git` / `dist` etc. are
          skipped (reuse `IGNORED_DIRS` from `src/scan/structure.ts`).
      - id: AC-2
        text: |
          `src/init/codebase/conventionsWriter.ts:writeConventions
          (signals, targetPath)` produces a 7-section markdown file
          (Stack · Style · Rules · Comments · Tests · Imports ·
          Directory). Each fact line carries
          `<!-- harness:fact key=K value=V source=PATH -->`. The
          Comments and Tests sections render
          `[pending: LLM hook stub]` placeholders. A
          `<!-- harness:user-edit-begin --> ... <!-- harness:user-edit-end -->`
          guard ends the file.
      - id: AC-3
        text: |
          `node bin/harness init --scenario existing_code
          --plugin-root <root> --harness-dir <target>` boots the
          skeleton, then overwrites `spec.yaml` with a partially-filled
          draft (project.name + constraints.tech_stack from the
          manifest) and writes `conventions.md`. The CLI prints a
          one-paragraph summary listing the detected stack and the
          number of facts written.
      - id: AC-4
        text: |
          Unit tests cover signals against two fixtures (npm
          fixture + Python fixture, both already shipped under
          `tests/perf/fixtures/`) and the conventions writer
          renders byte-stable output (golden file). Existing
          F-158 / F-159 parity tests stay green — no regression.
  - id: F-161
    description: |
      Closes the scenario-3 split. Three guards make brownfield
      init safe to ship:

      1. Secret redaction over every fact that lands in
         conventions.md / spec.yaml / report. Regex covers
         api/secret/token/bearer/password keys plus blanket refusal
