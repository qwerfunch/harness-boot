        precedence preserved (regression case)."
      - "AC-4: `src/drive/types.ts` `HaltReason` adds `'gate_no_progress'`;
        `src/drive/halt.ts` `HALT_REASON_INDEX` adds `{n: 10, tag: 'gate no
        progress'}` and `nextStepFor()` adds the matching hint."
      - "AC-5: `src/drive/checkpoint.ts` `ExecutePhaseCheckpoint` adds
        `recent_gate_results: Record<string, Record<string,
        Array<'pass'|'fail'|'skipped'>>>`; `defaultCheckpoint()` initializes it
        to `{}`. `loadCheckpoint()` defensively fills it when missing (backward
        compat)."
      - "AC-6: `src/drive/loop.ts` after gate execution pushes the result onto
        the per-(feature, gate) array (capped at 3 entries) and, when the last 2
        entries are identical AND non-pass, emits halt #10 `gate_no_progress`
        with an actionable message. Retry_threshold (#3) keeps priority on
        consecutive `fail` (test guards the order)."
      - "AC-7: `tests/parity/driveLoopAndPlan.test.ts` or
        `driveHaltAndRetro.test.ts` covers: (a) two iterations with
        `gate_0=skipped` -> halt `gate_no_progress`, iteration count low; (b)
        `pass` between two `skipped` resets; (c) two `fail` still hit
        `retry_threshold` first."
      - "AC-8: F-121 mirrored on both spec.yaml copies; logcat-on ISSUES-LOG
        entries grow a `Resolution:` line citing F-121 + the merge commit, per
        the F-027 return convention."
      - "AC-9: F-121 completed via the harness CLI cycle on
        `feat/v0.14.2-logcat-on-issues-log-batch`. Patch release v0.14.2."
  - id: F-122
    description: |
      Thirty-ninth cycle. Discovered during the v0.14.2 work-vs-drive
      verification cycle: `tests/parity/driveLoopAndPlan.test.ts`
      hardcoded `seedCheckpoint()` to `started_at = '2026-05-04T10:00:00Z'`
      with the default `max_seconds = 7200` (2h). The six halt-detection
      cases that did not inject `now:` (#5 blocked, #3 retry_threshold,
      #10 gate_no_progress x2, retry-vs-stagnation priority, goal
      completion) used real time — so 24h after F-119 was authored
      (2026-05-04 -> 2026-05-05) every CI run produced
      `wall_clock` halt #6 first, masking the expected halts.

      Production code (src/drive/loop.ts wall_clock check at line
      303-323) is correct — the test fixture failed to isolate time.
      Fix is one-line: change seedCheckpoint default `started_at` to
      `new Date().toISOString()` so the fixture always represents a
      "drive that just started" with `elapsed = 0`. Cases that need
      to assert wall_clock behaviour (line 137-141) explicitly
      override both `started_at` and `now:` and remain unaffected.

      Add a regression-guard test that asserts `seedCheckpoint`
      default is dynamic so the next person who tries to hardcode
      a date is caught at test time rather than 24h later.

      Patch-only — no production code changes, no schema changes,
      no behaviour changes for users.
    acceptance_criteria:
      - "AC-1: `tests/parity/driveLoopAndPlan.test.ts` `seedCheckpoint()`
        default `started_at` becomes `new Date().toISOString()` (dynamic)
        instead of the hardcoded ISO literal."
      - "AC-2: The six previously failing halt-detection cases (halt #5, #3, #10
        x2, retry-vs-stagnation priority, goal completion) all pass without any
        `now:` injection — the dynamic default already keeps `elapsed` near 0."
      - "AC-3: A new regression-guard `it()` block asserts that after
        `seedCheckpoint()` runs, `Date.now() -
        Date.parse(ck.execute.started_at)` is < 60_000 ms — catches anyone who
        tries to revert the fix."
      - "AC-4: `npm test` passes 622+/622+ (was 615/621 with 6 fails before this
        patch). The wall_clock self-test (`halt #6 — wall-clock cap reached`)
        keeps passing because it overrides both `started_at` and `now:`
        explicitly."
      - "AC-5: F-122 mirrored on both spec.yaml copies."
      - "AC-6: F-122 completed via the harness CLI cycle on
        `fix/v0.14.3-driveloop-test-time-isolation`. Patch release v0.14.3."
  - id: F-123
    description: |
      Fortieth cycle. Self-audit caught two distinct
      maintenance debts that had accumulated since v0.11.1:

      Debt 1 — `CLAUDE.md` (the project context loaded into every
      new session) reports `Current release: v0.11.1` while
      `.claude-plugin/plugin.json` is at v0.14.3 and the latest tag
      is v0.14.2. Three minor versions of recent activity (v0.12.x,
      v0.13.x — including the Python -> TS full migration —
      v0.14.x) are missing from the repo's primary onboarding
      document. Net effect: every fresh chat begins reasoning on
      a stale snapshot. Two factual errors compound the staleness:
      §2 still prints "Drift detection 12 kinds" (the Coverage
      detector at `src/check.ts:1099` brings the count to 13), and
      the F-048 wire-integrity blocking set is documented as 3
      kinds (`Code · Stale · AnchorIntegration`) when
      `BLOCKING_DRIFT_KINDS` in `src/work.ts:75` enumerates 4
      (`Code · Stale · AnchorIntegration · Coverage`).

      Debt 2 — `harness check` against the live `.harness/`
      reports `[Spec] spec.yaml: spec change detected — sync
      required (expected=8eefd348..., actual=f36bc6b3...)`.
      Root cause: a prior cycle modified `.harness/spec.yaml`
      without running `harness sync`, so
      `.harness/harness.yaml.spec_hash` froze at the pre-edit
      digest. Both mirrors stayed in lockstep with each other
      (`diff -q` clean), so `self_check.sh` step 1 passes; only
      step 4 (`harness check`) catches it. Fix: run
      `harness sync` to recompute the canonical spec hash and
      regenerate any stale derived artefacts.

      Both debts are recorded as one feature because they share
      the same audit surface (project-level metadata
      consistency) and the same fix pattern (read current state,
      rewrite the stale file). No code-behaviour changes; this
      is a pure maintenance sweep.

      Patch-only — no schema, behaviour, or BR changes.
    acceptance_criteria:
      - "AC-1: `CLAUDE.md` §1 'Current release' line names the tag matching
        `.claude-plugin/plugin.json` (v0.14.x family); the dev pointer is the
        in-flight version when the patch lands."
      - "AC-2: `CLAUDE.md` §2 'Drift detection' line reports `13 kinds` and
        includes `Coverage` in the enumerated list."
      - "AC-3: `CLAUDE.md` §2 'Drift × Iron Law gating' line reports the 4-kind
        blocking set (`Code · Stale · AnchorIntegration · Coverage`)."
      - "AC-4: `CLAUDE.md` §3 plugin manifest comment matches the current
        `.claude-plugin/plugin.json` version."
      - "AC-5: `CLAUDE.md` §4 'Tags' range covers v0.14.x and 'main HEAD'
        matches `git rev-parse main`."
      - "AC-6: `CLAUDE.md` §5 'Recent commit context' grows v0.12.x, v0.13.x
        (TS-migration cluster), and v0.14.x summary blocks. v0.11.x stays for
        continuity."
      - "AC-7: After `harness sync`, `harness check` reports zero `Spec` drift
        findings — `harness.yaml.spec_hash` matches the live hash of
        `.harness/spec.yaml`."
      - "AC-8: F-123 mirrored on both spec.yaml copies (`.harness/spec.yaml` and
        `docs/samples/harness-boot-self/spec.yaml`); `diff -q` clean."
      - "AC-9: F-123 completed via the harness CLI cycle on
        `feat/v0.14.3-claude-md-refresh`. Targets patch release v0.14.3."
  - id: F-124
    description: |
      Forty-first cycle. Direct follow-up to F-123. The F-123 refresh
      brought the document back in sync, but it confirmed the deeper
      problem: CLAUDE.md mixes three classes of information at the same
      hardcode level, so the file is structurally guaranteed to drift.

      Information classes (canonical labels for the project going
      forward):

        L1 stable narrative — vision, BR catalogue, working rules,
            glossary references. Changes in months/years. Hardcode is
            correct.
        L2 semi-static — counts and enumerations derived from code
            (drift kind count, gate enum, Iron Law floor, ceremony 4
            count). Changes only when the underlying code changes.
            Hardcode is acceptable but should be marked with a sigil
            so the value can be auto-validated.
        L3 volatile — release version, main HEAD hash, tag range,
            recent-commit cluster summaries, in-flight branches,
            in-progress F-IDs. Changes every release / merge / PR.
            Hardcode is the bug. Belongs to its native SSoT
            (plugin.json, CHANGELOG.md, git, .harness/state.yaml).

      Step A (this feature) rewrites CLAUDE.md so every L3 datum is
      replaced by a one-line pointer. §5 'Recent commit context' is
      already 100% redundant with CHANGELOG.md (Keep a Changelog
      1.1.0 format) — the section collapses to a single pointer.
      L2 facts gain a `<!-- harness:fact key=... source=... -->`
      sigil so a future detector (Step B / F-127) can validate them
      against runCheck output. L1 narrative is preserved verbatim.

      Why now: F-123 already paid the staleness cost once (three
      minor versions of drift). Without Step A, the next release
      restarts the same trap. A new memory ritual
      (`feedback_claude_md_release_ritual.md`) accompanies this
      patch so the rule survives across chat sessions.

      Step B (`Content` drift detector — F-127) is queued, not
      bundled. Step A first lets the structure settle so the
      detector has a stable target.

      Patch-only — no code, schema, or BR changes.
    acceptance_criteria:
      - "AC-1: `CLAUDE.md` §1 'Current release' line is a pointer (e.g. 'see
        `.claude-plugin/plugin.json` for the canonical version; CHANGELOG.md for
        recent history') with no `vX.Y.Z` literal."
      - "AC-2: `CLAUDE.md` §2 'Drift detection' line wraps the count (`13`)
        inside a sigil `<!-- harness:fact key=drift_count value=13
        source=src/check.ts:runCheck --> ... <!-- /harness:fact -->`."
      - "AC-3: `CLAUDE.md` §2 'Drift × Iron Law gating' line wraps the
        blocking-set enumeration (4-kind) inside the same sigil pattern
        (`key=blocking_drift_kinds_count`)."
      - "AC-4: `CLAUDE.md` §3 plugin manifest comment carries no version literal
        — points to `.claude-plugin/plugin.json` instead."
      - "AC-5: `CLAUDE.md` §4 'Tags' and 'main HEAD' replaced by pointers (`see
        git tag --sort=-version:refname` / `see git rev-parse main`); no SHA, no
        version range hardcoded."
      - "AC-6: `CLAUDE.md` §5 'Recent commit context' collapses to a single
        pointer block referencing `CHANGELOG.md` (Keep a Changelog 1.1.0) and
        `git log --oneline`. No release-cluster prose, no commit SHAs."
      - "AC-7: `CLAUDE.md` §8 'Known limitations' Closed-since list collapses to
        a CHANGELOG pointer. Open list stays as narrative (decision intent is
        L1, not L3)."
      - "AC-8: `CLAUDE.md` §9 'In progress' becomes a pointer to
        `.harness/state.yaml.features[].status==in_progress`. Queued / Available
        sections stay as narrative."
      - "AC-9: `wc -l CLAUDE.md` is < 200 (down from 258 after F-123)."
      - 'AC-10: `grep -nE "v0\.[0-9]+\.[0-9]+" CLAUDE.md` returns matches only
        inside `<!-- harness:fact ... -->` sigil blocks (Step B will enforce;
        Step A is grep-clean by inspection).'
      - "AC-11: `bash self_check.sh` step 5 (commands/*.md preamble) keeps
        passing — the new sigil syntax does not collide with the existing
        user-edit-begin/end sigil."
      - "AC-12: A user memory entry `feedback_claude_md_release_ritual.md`
        documents the L1/L2/L3 rule, with `Why:` and `How to apply:` lines per
        the memory schema. Filed alongside this commit so the discipline
        survives across sessions."
      - "AC-13: F-124 mirrored on both spec.yaml copies; `diff -q` clean."
      - "AC-14: F-124 completed via the harness CLI cycle on
        `feat/v0.14.3-claude-md-refresh` (bundled with F-123 in the same PR —
        both touch the same file with the same intent of staleness elimination).
        Patch release v0.14.3."
  - id: F-125
    description: |
      Forty-second cycle. After the v0.13.0 Python -> TypeScript
      cutover (F-107), the Python operational surface moved to
      `legacy/scripts/` with `legacy/` declared gitignored and the
      directory documented as "kept until external dogfood signals
      zero regressions" (CLAUDE.md L119). Two release lines later
      (v0.13.x, v0.14.x) the TS port has shipped clean, no
      regression has surfaced through cosmic-suika or logcat-on
      dogfood, and the Python suite has been quarantined since
      v0.13.0 cutover.

      Despite the gitignore rule, 72 files under `legacy/scripts/`
      remain `git ls-files`-tracked because they were committed
      before the gitignore entry landed. The repo therefore carries
      ~1.5 MB of Python history (source + `__pycache__`) that has
      no operational role and produces noise in PR diffs, blame
      output, and editor file pickers.

      This patch evicts the 72 tracked files from the index via
      `git rm --cached -r legacy/scripts/` while leaving the
      working-tree copy intact (the maintainer's local archive
      reference remains available; future `git pull` will not
      restore the directory). Three CLAUDE.md call-sites that
      describe `legacy/` as part-tracked, part-untracked are
      updated to reflect the new state — `legacy/` is now
      uniformly untracked.

      No code or schema changes; the runtime is already TS-only
      and unaware of `legacy/`. Self-check, spec validation, and
      drift detectors do not reference legacy paths.

      Patch-only — no behaviour, no schema, no BR changes.
    acceptance_criteria:
      - "AC-1: `git ls-files legacy/` returns zero entries after the patch (was
        72)."
      - "AC-2: `legacy/scripts/` working-tree copy is preserved on the
        maintainer's machine — file count unchanged before and after the patch
        (verified by `find legacy -type f | wc -l`)."
      - "AC-3: `.gitignore` already contains `legacy/` (no edit needed);
        verified by `grep '^legacy/' .gitignore`."
      - "AC-4: `CLAUDE.md` §3 layout block is updated — the `legacy/scripts/`
        line removed (the directory is now uniformly untracked, just like
        `design/` and `translations-ko/`)."
      - "AC-5: `CLAUDE.md` §3 'Untracked' summary line stays accurate (it
        already lists `legacy/`); no edit required."
      - "AC-6: `CLAUDE.md` §7 'Working rules' line about `legacy/` is updated —
        the rule changes from 'keep the existing tracked files; do not add new
        ones' to 'fully untracked; do not re-add'."
      - "AC-7: `CLAUDE.md` §2 capability-inventory mention of `legacy/` (Python
        files in legacy/ are read-only history) updated to reflect that it is
        local-only history, not a tracked archive."
      - "AC-8: `bash self_check.sh` returns 5/5 OK (no step references
        `legacy/`, so no change expected)."
      - "AC-9: `npm test` returns 622/622 PASS (no test references `legacy/`, so
        no change expected)."
      - "AC-10: F-125 mirrored on both spec.yaml copies; `diff -q` clean."
      - "AC-11: F-125 completed via the harness CLI cycle on
        `feat/v0.14.4-legacy-git-eviction`. Targets the next patch release in
        the v0.14.x family."
  - id: F-126
    description: |
      Forty-third cycle. Direct follow-up to F-125. After legacy/scripts/
      was evicted, the quarantined Python tests under tests/unit/ (69
      files), tests/integration/ (5 files), and tests/scale/ (2 files)
      remain as the last operational Python footprint on the repo. The
      v0.13.0 Python -> TypeScript cutover (F-107) replaced them with
      ~620 vitest parity tests under tests/parity/, and no
      Python-vs-TypeScript regression has surfaced through cosmic-suika
      or logcat-on dogfood across two release lines (v0.13.x, v0.14.x).
      The Python suites have not been runtime-invoked since cutover and
      were preserved only as a parity reference.

      User intent (literal): "파이선 테스트도 제외되어야함, ts로 모두
      바뀌었기 때문" — TS migration is complete, so the parity
      reference is no longer load-bearing.

      Scope:

        - tests/unit/ (69 files) — quarantined unit tests, evict.
        - tests/integration/ (5 files) — quarantined integration tests,
          evict.
        - tests/scale/ (2 files: __init__.py + test_scale.py) — F-031
          measurement scripts. Although the scaling utility (F-030)
          remains TS-port-pending, the Python measurement was a
          *one-time benchmark* (100 / 1k / 3k / 10k features). Evict;
