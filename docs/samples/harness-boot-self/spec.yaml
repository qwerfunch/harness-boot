# --- 🆕 v2 top-level open_questions[] (§13 L3015-3255 의 11 항목 구조화) ----
# v1 에서는 자연어로만 §13 에 나열되어 ★★ 였던 섹션을 구조화하여 ★★★+ 로 끌어올림.
# edit-wins 원칙 (BR-010) 에 따라 값이 결정되면 이 배열에서 삭제하고 해당 섹션에
# 정식 필드로 승격한다.
open_questions:
  - id: "OQ-1"
    title: "v2.3.7 에 metadata.extensions.* 네임스페이스 공식 승격 여부"
    source_ref: "§13.1 + §5.1 de-facto precedent (metadata.conversion)"
    status: "open"
    related_gaps: ["NEW-28", "NEW-29", "NEW-30", "NEW-31", "NEW-32", "NEW-33", "NEW-34", "NEW-35", "NEW-36"]
    proposed_resolution: "v2.3.8-rfc 에서 additionalProperties 허용 + metadata.extensions 하위 화이트리스트 명시"
  - id: "OQ-2"
    title: "project.domain 에 'cli-plugin' 값 공식 수용 여부"
    source_ref: "§13.2 + §5.2 (현재 열거: web-service/worker/library)"
    status: "open"
    related_gaps: ["NEW-28"]
    proposed_resolution: "v2.3.8-rfc 에서 'cli-plugin' / 'editor-extension' / 'build-tool-plugin' 추가 + host_binding 필수화"
  - id: "OQ-3"
    title: "include_depth 정책 확장 — 깊이 2 이상 허용할지 혹은 간접 expand 허용할지"
    source_ref: "§13.3 + §13.11 (L3212-3230)"
    status: "open"
    related_gaps: ["G-11"]
    proposed_resolution: "현재 depth=1 유지. 2 이상은 cycle detection 부담 커서 v3 연기"
  - id: "OQ-4"
    title: "events.log 의 partitioning 정책 (size vs time)"
    source_ref: "§13.4 + §5.6"
    status: "open"
    related_gaps: []
    proposed_resolution: "기본 size:10MB rotation. time-based 는 user override 로 지원"
  - id: "OQ-5"
    title: "plugin 업그레이드 시 .harness/state.yaml schema 마이그레이션 자동화 수준"
    source_ref: "§13.5 + §12"
    status: "open"
    related_gaps: ["NEW-32"]
    proposed_resolution: "migration-agent 가 edit-wins 으로 사용자 확인 후 수행"
  - id: "OQ-6"
    title: "Hook 정의의 JSON vs YAML 선택"
    source_ref: "§13.6 + §5.7"
    status: "open"
    related_gaps: ["NEW-36"]
    proposed_resolution: "Claude Code host 규격 따름 (.claude/hooks/*.json)"
  - id: "OQ-7"
    title: "Agent 권한 매트릭스를 사용자가 override 허용할지"
    source_ref: "§13.7 + §6.3.1"
    status: "open"
    related_gaps: ["NEW-29"]
    proposed_resolution: "기본 deny 원칙 준수, allowlist override 만 허용 (prompt 단계 도입)"
  - id: "OQ-8"
    title: "meta 어댑터의 host_subtype 을 JetBrains / Chrome-extension 까지 확장"
    source_ref: "§13.8 (self 언급) + meta.md OQ-8"
    status: "open"
    related_gaps: ["NEW-35", "NEW-36"]
    proposed_resolution: "meta 어댑터 v0.3 에서 검증 샘플 추가 후 서브타입 분화"
  - id: "OQ-9"
    title: "canonical hash 의 encoding normalization (BOM · CRLF · unicode NFC)"
    source_ref: "§13.9 + 부록 D (L3307-3470)"
    status: "open"
    related_gaps: []
    proposed_resolution: "현재 NFC + LF + no-BOM 강제. BOM 있으면 strip 후 hashing"
  - id: "OQ-10"
    title: "plugin registry 에의 배포 규약 (namespace / visibility / signing)"
    source_ref: "§13.10 + §11"
    status: "open"
    related_gaps: ["NEW-35"]
    proposed_resolution: "Anthropic plugin registry 공식화 대기 — 확정 시 host_binding.registry 필드 값 표준화"
  - id: "OQ-11"
    title: "$include 로 로드되는 md 의 인코딩 검증 (BR-008 과 함께)"
    source_ref: "§13.11 (L3212-3230)"
    status: "open"
    related_gaps: ["G-11"]
    proposed_resolution: "UTF-8 + LF 강제. 위반 시 Gate 1 실패"

