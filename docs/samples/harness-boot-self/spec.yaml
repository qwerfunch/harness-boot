        - **inbox** (`scripts/ceremonies/inbox.py`, 115 LOC) —
          Q&A file-drop scanner.

      Behaviour preservation:

        - Shape detection identical (baseline-empty-vague →
          ui_surface.present → performance_budget → sensitive_or_auth
          → pure_domain_logic → feature_completion).
        - agent ordering preserved (audio-designer inserted before
          a11y-auditor when has_audio=true).
        - Idempotency: existing template files are not overwritten
          unless `force=true`.
        - events.log JSON line format matches Python (single-line,
          ensure_ascii=False, Python-style separators).
        - Retro analyze() event-key contract: `feature` (not
          `feature_id`), `feature_done` (not `feature_completed`).

    acceptance_criteria:
      - "AC-1: src/ceremonies/{kickoff,retro,designReview,inbox}.ts ported with full public API."
      - "AC-2: detectShapes returns the same shape list as Python for a matrix of feature inputs."
      - "AC-3: agentsForShapes injects audio-designer before a11y-auditor when has_audio=true."
      - "AC-4: Generated kickoff.md / retro.md / design-review/F-N.md byte-equal Python for canonical fixtures."
      - "AC-5: Idempotency — running generateKickoff twice on the same feature does not re-write the file or emit a duplicate event."
      - "AC-6: F-097 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-7: F-097 completed via the work.py cycle on the umbrella branch."

  - id: "F-098"
    name: "TS migration — port metrics.ts (events.log aggregation, read-only)"
    type: "feature"
    description: |
      Fifteenth cycle of the v1.0 migration thread. Ports
      `scripts/metrics.py` (402 LOC) — read-only event log
      aggregation. CQS: events.log not modified; mtime invariant.

      Public API ported:

        - `parsePeriod(text)` — `'7d'` / `'24h'` / `'30m'` →
          milliseconds.
        - `aggregate(events, options)` — counts, lead time, gate
          stats, drift incidents.
        - `compute(harnessDir, options)` — period/since filtering +
          aggregation.
        - `MetricsReport` interface matching the Python dict shape.

      Behaviour preservation:

        - Same period unit map (s/m/h/d/w).
        - Same lead-time pairing rule: most recent feature_activated
          → first feature_done per feature.
        - Same gate stats keys (pass/fail/skipped/other/pass_rate).
        - Same JSON dict shape from `aggregate()` (window, total_events,
          event_types, features, lead_time_sec, gate_stats,
          drift_incidents).

    acceptance_criteria:
      - "AC-1: src/metrics.ts exports `parsePeriod`, `aggregate`, `compute`, `formatHuman`, `MetricsReport`."
      - "AC-2: parsePeriod accepts s/m/h/d/w units (case-insensitive)."
      - "AC-3: aggregate produces identical lead time stats for canonical fixtures."
      - "AC-4: gate stats pass_rate excludes skipped from the denominator."
      - "AC-5: F-098 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-6: F-098 completed via the work.py cycle on the umbrella branch."

  - id: "F-099"
    name: "TS migration — port ui/intentPlanner.ts (next-action suggestions)"
    type: "feature"
    description: |
      Sixteenth cycle of the v1.0 migration thread. Ports
      `scripts/ui/intent_planner.py` (337 LOC) — the deterministic
      "next actions" recommender used by the dashboard. Pure logic
      (no I/O), no LLM call.

      Public API ported:

        - `suggest(stateData, spec?, options?)` — returns up to 3
          ordered Suggestions.
        - `Suggestion` interface with `label / action / featureId? / gate?`.
        - `Action` literal type — exhaustive union of routing
          identifiers.

      Behaviour preservation:

        - Same priority order (blocked → fail → next gate → evidence →
          complete).
        - Same Korean labels — preserved verbatim for dashboard parity.
        - Same idle path (resume → start → init).
        - F-079 coverage carry-forward suggestion prepended when
          coverage < default threshold (0.80).

    acceptance_criteria:
      - "AC-1: src/ui/intentPlanner.ts exports `suggest`, `Suggestion`, `Action` types."
      - "AC-2: Active-feature priority order matches Python (blocked → fail → next-gate → evidence → complete)."
      - "AC-3: Idle path returns resume/start/init based on state."
      - "AC-4: Coverage < 0.80 prepends review_carry_forward suggestion."
      - "AC-5: F-099 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-6: F-099 completed via the work.py cycle on the umbrella branch."

  - id: "F-100"
    name: "TS migration — port check.ts (drift detection, 13 detectors)"
    type: "feature"
    description: |
      Seventeenth cycle of the v1.0 migration thread. Most complex
      single port. Mirrors `scripts/check.py` (1054 LOC) — drift
      detection across 13 kinds, with a fast-path `runBlockingCheck`
      used by complete()'s F-048 wire-integrity gate.

      Public API ported:

        - `DriftFinding` interface (`kind / path / message / severity`).
        - `CheckReport` interface (`findings / checked / clean`).
        - 13 `check*` detector functions (one per drift kind).
        - `runCheck(harnessDir, projectRoot?)` — full 13-detector
          report.
        - `runBlockingCheck(harnessDir, projectRoot?)` — fast path
          (Code · Stale · AnchorIntegration · Coverage only).
        - `formatHuman(report)` — text report.

      Drift kinds covered:

        Generated, Derived, Spec, Include, Evidence, Code, Doc,
        Anchor (+ Adr supersedes consistency), Protocol, Stale,
        AnchorIntegration, Coverage.

      Behaviour preservation:

        - Detector ordering identical to Python in runCheck.
        - Severity assignment identical (error vs warn).
        - F-078 Coverage threshold reads from
          `harness.yaml.coverage.threshold`, default 0.80.
        - Anchor cycle detection (DFS WHITE/GRAY/BLACK) preserved.
        - Bidirectional supersedes consistency check.
        - Stale + AnchorIntegration heuristics: basename match or
          `/<stem>` / `'<stem>` / `"<stem>` path-token match.

    acceptance_criteria:
      - "AC-1: src/check.ts exports `runCheck`, `runBlockingCheck`, `formatHuman`, plus the 13 detector functions."
      - "AC-2: DriftFinding + CheckReport interfaces match Python shape (kind/path/message/severity)."
      - "AC-3: runCheck on a clean harness dir returns clean=true with all 13 categories in `checked[]`."
      - "AC-4: Drift detection on canonical fixtures (missing Derived hash, broken depends_on, etc.) emits findings with the right kind + severity."
      - "AC-5: runBlockingCheck only emits Code · Stale · AnchorIntegration · Coverage findings."
      - "AC-6: Coverage threshold reads from harness.yaml override; defaults to 0.80."
      - "AC-7: F-100 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-8: F-100 completed via the work.py cycle on the umbrella branch."

  - id: "F-101"
    name: "TS migration — port scan/{structure,manifest,areaResolver}.ts"
    type: "feature"
    description: |
      Eighteenth cycle of the v1.0 migration thread. Ports three of
      the five scan modules (work.py auto-wire deps).

      Modules ported:

        - **scan/structure** (`scripts/scan/structure.py`, 130 LOC) —
          F-036 directory shape + entity-candidate file detection.
        - **scan/manifest** (`scripts/scan/manifest.py`, 222 LOC) —
          F-036 tech_stack + project name extraction across
          package.json / pyproject.toml / Cargo.toml / go.mod.
        - **scan/areaResolver** (`scripts/scan/area_resolver.py`,
          150 LOC) — F-037 feature.modules → AreaRecord cluster
          resolver.

      Behaviour preservation:

        - Ignored dirs list identical to Python (.git, node_modules,
          dist, etc.).
        - Detection priority: package.json > pyproject.toml >
          Cargo.toml > go.mod.
        - TOML parsing via @iarna/toml (graceful no-op when the dep
          is missing — mirrors Python's tomli optional-import
          pattern).
        - AreaRecord cluster key uses first 2 path segments.
        - Slug regex matches Python: `[^a-zA-Z0-9]+` → `-`.

    acceptance_criteria:
      - "AC-1: src/scan/{structure,manifest,areaResolver}.ts ported with full public API."
      - "AC-2: scanStructure returns identical shape to Python for canonical fixtures (top_dirs, adr_dir, entity_candidate_files, readme_path)."
      - "AC-3: extractTechStack picks the right runtime from each manifest."
      - "AC-4: resolveAreas clusters modules with the same first-two path segments."
      - "AC-5: F-101 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-6: F-101 completed via the work.py cycle on the umbrella branch."

  - id: "F-102"
    name: "TS migration — port work.ts (lifecycle orchestrator, biggest single file)"
    type: "feature"
    description: |
      Nineteenth cycle of the v1.0 migration thread. Largest single
      port — 1570 LOC Python scripts/work.py to TypeScript.

      Public API ported (camelCase TS, semantic 1:1 with Python):

        - `WorkResult` interface with all fields.
        - `activate(harnessDir, fid, options?)` — planned →
          in_progress with kickoff/design-review auto-wire.
        - `recordGate(harnessDir, fid, gateName, result, options?)` —
          state mutation + events.log + design-review re-evaluation.
        - `addEvidence(harnessDir, fid, kind, summary)` — state +
          events.log.
        - `block(harnessDir, fid, reason, options?)` — status →
          blocked.
        - `complete(harnessDir, fid, options?)` — Iron Law (gate_5
          pass + declared evidence ≥ N) + working-tree-clean guard
          + F-048 drift × Iron Law gating + retro auto-wire.
        - `archive(harnessDir, fid, options?)` — done → archived
          with superseded_by validation.
        - `current(harnessDir)` — read-only active feature query.
        - `runAndRecordGate(harnessDir, fid, gateName, options?)` —
          gate runner integration with auto-evidence on pass.
        - `deactivate(harnessDir)`, `removeFeature(harnessDir, fid)`.

      Auto-wire helpers ported:

        - `_autowireKickoff` — fires generateKickoff with shape
          detection.
        - `_autowireRetro` — fires generateRetro after complete.
        - `_autowireDesignReview` — 4-condition AND check.

      Auto-wire helpers stubbed (deps not yet ported):

        - `_autowireQuantLint` — needs spec/quant_claims (deferred).
        - `_autowireFogClear` — needs scan/chapter_writer +
          scan/style_fingerprint (deferred).
        - `_autowireInitialSync` — wires sync.tryInitialSync (already
          ported in F-096).

      Behaviour preservation:

        - Iron Law thresholds: prototype=1, product=3, hotfix=1.
        - Working-tree-clean guard with whitelist
          (.harness/state.yaml, .harness/_workspace/*, CHANGELOG.md).
        - F-048 blocking drift kinds: Code · Stale ·
          AnchorIntegration · Coverage. hotfix override.
        - Product mode strict: any failed gate blocks complete()
          unless --hotfix-reason.
        - Idempotency: already-done complete() returns queried;
          already-archived archive() returns queried.

    acceptance_criteria:
      - "AC-1: src/work.ts exports `activate`, `recordGate`, `addEvidence`, `block`, `complete`, `archive`, `current`, `runAndRecordGate`, `deactivate`, `removeFeature`, `WorkResult` interface."
      - "AC-2: activate transitions planned → in_progress, fires kickoff + design-review auto-wires."
      - "AC-3: complete enforces Iron Law (gate_5 + declared evidence) + working-tree-clean + F-048 drift gating."
      - "AC-4: hotfix override collapses required to 1 and records hotfix evidence."
      - "AC-5: runAndRecordGate calls gate runner + records result + adds evidence on pass."
      - "AC-6: events.log lines byte-equal Python (Python-style separators)."
      - "AC-7: F-102 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-8: F-102 completed via the work.py cycle on the umbrella branch."

  - id: "F-103"
    name: "TS migration — port ui/dashboard.ts (no-args dashboard renderer)"
    type: "feature"
    description: |
      Twentieth cycle of the v1.0 migration thread. Ports
      `scripts/ui/dashboard.py` (492 LOC) — the pure renderer used
      by `/harness-boot:work` no-args dashboard.

      Public API ported:

        - `render(stateData, spec, suggestions, options?)` — returns
          a single multi-line string.
        - `loadCoverage(harnessDir, fid)` — F-079 fingerprint reader.

      Behaviour preservation:

        - i18n labels honor resolved lang (en / ko).
        - Sections in fixed order: header → active feature →
          others-in-progress → on-hold → pending → next candidates
          (spec-only) → coverage debt → suggestions.
        - Coverage line ratio formatting identical: "coverage: NN%
          (a/d metric, ...)".
        - Truncation limits read from dashboardConfig env overrides.
        - Empty-state hint when no features tracked.
        - Trailing newline behaviour matches Python.

    acceptance_criteria:
      - "AC-1: src/ui/dashboard.ts exports `render`, `loadCoverage`."
      - "AC-2: Renders sections in canonical order with Korean labels by default."
      - "AC-3: Coverage debt section emits alert when below-threshold > 5."
      - "AC-4: Truncation honors HARNESS_DASHBOARD_MAX_* env overrides."
      - "AC-5: F-103 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-6: F-103 completed via the work.py cycle on the umbrella branch."

  - id: "F-104"
    name: "TS migration — bin/harness CLI shim (commander-based entry point)"
    type: "feature"
    description: |
      Twenty-first cycle of the v1.0 migration thread. Adds the
      single-binary CLI entry point that wraps every ported module
      into one `harness <subcommand>` interface. This is the v1.0
      release path entry point — slash commands will eventually
      shell out to `npx harness <verb>` instead of
      `python3 scripts/<file>.py`.

      Subcommands ported:

        - `harness work [F-N] [...flags]` — dashboard / activate /
          gate / evidence / block / complete / archive / current /
          deactivate / remove (full work.py CLI surface).
        - `harness sync [...flags]` — sync orchestrator with
          `--soft` fail-open mode.
        - `harness check [...flags]` — drift detection report.
        - `harness status [...flags]` — read-only state summary.
        - `harness events [...flags]` — events.log filter.
        - `harness metrics [...flags]` — events.log aggregator.
        - `harness validate <spec.yaml>` — spec validator.

      Behaviour preservation:

        - `--harness-dir` default `./.harness` matches Python CLIs.
        - Exit codes mirror Python: 0 success · 2 IO error ·
          3 invalid input · 5 schema error · 6 drift detected.
        - JSON / human output shape identical for every subcommand.
        - Auto-evidence on gate_run pass preserved.

    acceptance_criteria:
      - "AC-1: bin/harness shebang + commander wiring exports every subcommand."
      - "AC-2: package.json `bin` field maps `harness` → `bin/harness.js`."
      - "AC-3: `npx harness work F-001` activates a feature, `--complete` enforces Iron Law, `--run-gate gate_0` invokes gate runner."
      - "AC-4: `npx harness sync` produces same SyncResult JSON as Python sync.py --json."
      - "AC-5: `npx harness check --json` produces drift findings with same structure as Python."
      - "AC-6: F-104 mirrored on both spec.yaml copies. self_check 5/5 PASS."
      - "AC-7: F-104 completed via the work.py cycle on the umbrella branch."

  - id: "F-105"
    name: "TS migration audit — build + bin + parity verification (pre-v1.0 gate)"
    type: "feature"
    description: |
      Twenty-second cycle of the v1.0 migration thread. Pre-v1.0
      verification cycle — not a new port but an audit of everything
      shipped in F-084 → F-104.

      Audit findings + fixes:

        1. **Build emission** — `tsc -p tsconfig.json` choked on
           `cli.test.ts` because Node 22's `process.exit` types
           accept `string | number | null` while my mock declared
           only `number | null`. Widened the mock signature.
        2. **Dist layout** — single `tsconfig.json` set `rootDir: '.'`
           which made `dist/` mirror the full repo (`dist/src/...`,
           `dist/tests/...`). Split into `tsconfig.build.json` with
           `rootDir: 'src'` so `dist/cli/harness.js` resolves
           directly off the bin shim. `npm run build` now wipes
           `dist/` first for clean output.
        3. **CLI self-invocation** — src/cli/harness.ts had a
           `process.argv[1].endsWith('harness.js')` branch that
           triggered alongside bin/harness.js's `main(...)` call,
           producing duplicate output. Removed.
        4. **Parity verification** — TS vs Python output checked
           on the live `.harness/`:
           - `status --json` — substantive parity (cosmetic key-
             order difference because Python's `frozenset`
             iteration is non-deterministic; TS array ordering is
             actually stricter).
           - `events --json` — byte-equal.
           - `check --json` — clean=true on both, identical 13
             checked categories.
           - `metrics --json` — total_events, features.done, and
             gate_stats keys all match.
           - `sync --soft` — idempotent skip on second call.
           - `validate` — canonical sample spec accepts on both.
        5. **Regression** — Python 1192 + TS 467 + self_check 5/5
           all green after build fixes.

      Out of scope for this cycle (deferred):

        - Auto-wire restoration (quant_lint, fog_clear) — needs
          spec/quantClaims + scan/{chapterWriter, seedSpec,
          styleFingerprint} ports.
        - Slash command wrapper migration to `npx harness`.
        - Python entry-point deprecation.

    acceptance_criteria:
      - "AC-1: `npm run build` produces `dist/` with `cli/harness.js` resolvable from `bin/harness.js`."
      - "AC-2: `node bin/harness.js status --harness-dir .harness` prints status without duplicating output."
      - "AC-3: `harness check --json` and `python3 scripts/check.py --json` agree on `clean` and `checked[]`."
      - "AC-4: `harness sync --soft` exits 0 and reports `already synced` on a populated harness."
      - "AC-5: `harness validate docs/samples/harness-boot-self/spec.yaml` succeeds."
      - "AC-6: Python 1192 + TS 467 parity + self_check 5/5 all PASS."
      - "AC-7: F-105 mirrored on both spec.yaml copies."
      - "AC-8: F-105 completed via the work.py cycle on the umbrella branch."

constraints:
  tech_stack:
    language: "typescript"            # §3 시스템 경계에 언급 없음 — 메타적 공백(NEW 갭 후보)
    runtime: "node-20+"
    cli_framework: "claude-code-plugin"   # Anthropic Claude Code plugin API
    yaml_lib: "js-yaml or yaml"
    hash: "sha-256 via node:crypto"
    test_runner: "vitest"                  # 추측 — 원본에 미명시
  architectural:
    - "SSoT = spec.yaml (BR-002)"
    - "사고의 글 vs 실행의 글 스키마 분리(BR-001)"
    - "Walking Skeleton 필수 + Gate 5 까지 통과(BR-003)"
    - "Transparency-by-Preamble: 모든 명령이 3줄 출력(BR-004)"
    - "CQS: 진단 명령은 read-only(BR-012)"
    - "Fail-open hooks(BR-006)"
    - "Canonical Hashing 3층 Merkle(BR-007)"
    - "$include 깊이 1 고정(BR-008)"
  compliance: []                           # library/worker 와 달리 외부 컴플라이언스 대상 없음 — 메타 도메인 특성
  prototype_mode: false                    # P-9: 이미 성숙한 아키텍처 문서. prototype-level 아님

deliverable:
  type: "cli-plugin"                       # ⚠ v2.3.7 스키마에 이 type 이 존재하는지 불확실 — NEW 갭 후보
                                           # 현재 스펙 스키마는 {web-service, library, worker, game} 중심
                                           # harness-boot 은 "Claude Code 용 플러그인" 이라는 고유 배포 형태
                                           # → unrepresentable.md NEW-28 후보로 기록
  platform: "claude-code"                  # plugin host
  entry_points:
    - name: "harness:init"
      kind: "slash-command"
      command: "/harness:init"
      health_check:
        kind: "post-invocation-probe"
        expects: "9 files scaffolded + Gate 5 pass"
    - name: "harness:spec"
      kind: "slash-command"
      command: "/harness:spec"
    - name: "harness:sync"
      kind: "slash-command"
      command: "/harness:sync"
    - name: "harness:work"
      kind: "slash-command"
      command: "/harness:work"
    - name: "harness:status"
      kind: "slash-command"
      command: "/harness:status"
    - name: "harness:check"
      kind: "slash-command"
      command: "/harness:check"
    - name: "harness:events"
      kind: "slash-command"
      command: "/harness:events"
    - name: "harness:metrics"
      kind: "slash-command"
      command: "/harness:metrics"

# --- 🆕 v2 top-level open_questions[] (§13 L3015-3255 의 11 항목 구조화) ----
# v1 에서는 자연어로만 §13 에 나열되어 ★★ 였던 섹션을 구조화하여 ★★★+ 로 끌어올림.
# edit-wins 원칙 (BR-010) 에 따라 값이 결정되면 이 배열에서 삭제하고 해당 섹션에
# 정식 필드로 승격한다.
open_questions:
  - id: "OQ-1"
    title: "v2.3.7 에 metadata.extensions.* 네임스페이스 공식 승격 여부"
    source_ref: "§13.1 + §5.1 de-facto precedent (metadata.conversion)"
    status: "open"
    related_gaps: ["NEW-28", "NEW-29", "NEW-30", "NEW-31", "NEW-32", "NEW-33", "NEW-34", "NEW-35", "NEW-36"]
    proposed_resolution: "v2.3.8-rfc 에서 additionalProperties 허용 + metadata.extensions 하위 화이트리스트 명시"
  - id: "OQ-2"
    title: "project.domain 에 'cli-plugin' 값 공식 수용 여부"
    source_ref: "§13.2 + §5.2 (현재 열거: web-service/worker/library)"
    status: "open"
    related_gaps: ["NEW-28"]
    proposed_resolution: "v2.3.8-rfc 에서 'cli-plugin' / 'editor-extension' / 'build-tool-plugin' 추가 + host_binding 필수화"
  - id: "OQ-3"
    title: "include_depth 정책 확장 — 깊이 2 이상 허용할지 혹은 간접 expand 허용할지"
    source_ref: "§13.3 + §13.11 (L3212-3230)"
    status: "open"
    related_gaps: ["G-11"]
    proposed_resolution: "현재 depth=1 유지. 2 이상은 cycle detection 부담 커서 v3 연기"
  - id: "OQ-4"
    title: "events.log 의 partitioning 정책 (size vs time)"
    source_ref: "§13.4 + §5.6"
    status: "open"
    related_gaps: []
    proposed_resolution: "기본 size:10MB rotation. time-based 는 user override 로 지원"
  - id: "OQ-5"
    title: "plugin 업그레이드 시 .harness/state.yaml schema 마이그레이션 자동화 수준"
    source_ref: "§13.5 + §12"
    status: "open"
    related_gaps: ["NEW-32"]
    proposed_resolution: "migration-agent 가 edit-wins 으로 사용자 확인 후 수행"
  - id: "OQ-6"
    title: "Hook 정의의 JSON vs YAML 선택"
    source_ref: "§13.6 + §5.7"
    status: "open"
    related_gaps: ["NEW-36"]
    proposed_resolution: "Claude Code host 규격 따름 (.claude/hooks/*.json)"
  - id: "OQ-7"
    title: "Agent 권한 매트릭스를 사용자가 override 허용할지"
    source_ref: "§13.7 + §6.3.1"
    status: "open"
    related_gaps: ["NEW-29"]
    proposed_resolution: "기본 deny 원칙 준수, allowlist override 만 허용 (prompt 단계 도입)"
  - id: "OQ-8"
    title: "meta 어댑터의 host_subtype 을 JetBrains / Chrome-extension 까지 확장"
    source_ref: "§13.8 (self 언급) + meta.md OQ-8"
    status: "open"
    related_gaps: ["NEW-35", "NEW-36"]
    proposed_resolution: "meta 어댑터 v0.3 에서 검증 샘플 추가 후 서브타입 분화"
  - id: "OQ-9"
    title: "canonical hash 의 encoding normalization (BOM · CRLF · unicode NFC)"
    source_ref: "§13.9 + 부록 D (L3307-3470)"
    status: "open"
    related_gaps: []
    proposed_resolution: "현재 NFC + LF + no-BOM 강제. BOM 있으면 strip 후 hashing"
  - id: "OQ-10"
    title: "plugin registry 에의 배포 규약 (namespace / visibility / signing)"
    source_ref: "§13.10 + §11"
    status: "open"
    related_gaps: ["NEW-35"]
    proposed_resolution: "Anthropic plugin registry 공식화 대기 — 확정 시 host_binding.registry 필드 값 표준화"
  - id: "OQ-11"
    title: "$include 로 로드되는 md 의 인코딩 검증 (BR-008 과 함께)"
    source_ref: "§13.11 (L3212-3230)"
    status: "open"
    related_gaps: ["G-11"]
    proposed_resolution: "UTF-8 + LF 강제. 위반 시 Gate 1 실패"

