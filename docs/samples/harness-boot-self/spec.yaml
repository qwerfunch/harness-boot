    sample_index: 6                       # url-shortener(1) retro-jumper(2) price-crawler(3) vapt(4) tzcalc(5) self(6)
    re_conversion_round: 2                # 2회차 (v0.3 → v0.4, meta 어댑터 none → 0.2)
