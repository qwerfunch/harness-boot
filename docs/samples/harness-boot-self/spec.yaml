  - id: "F-075"
    name: "Initial sync auto-wire — work.py activate fires sync.run when never synced"
    type: "feature"
    description: |
      Field-discovered gap: a downstream user reported running
      `/harness-boot:init` followed by the `spec-conversion` skill, then
      iterating through several feature cycles without ever seeing
      `domain.md` or `architecture.yaml` materialize. Inspecting the
      project showed `harness.yaml.generation.generated_from.spec_hash`
      remained the empty string and `events.log` carried no `sync_done`
      entry — the sync step had silently never executed.

      Root cause: three entry points (init markdown · spec-conversion
      skill · work.py per-feature cycle) all leave sync as a separate
      manual concern. None of them wires `python3 scripts/sync.py` into
      their finalize path. The user can run N feature cycles to
      completion without the derived views ever being generated, which
      also leaves the CLAUDE.md `@import` lines pointing at non-existent
      files.

      Decision: rather than touch the markdown-driven init/skill flows
      (brittle to test, fragile across future plugin updates), add a
      lazy autowire to `scripts/work.py::activate()` — the innermost
      Python boundary every cycle must cross. When `spec.yaml` exists
      but `harness.yaml.generation.generated_from.spec_hash` is empty
      or missing, `activate()` fires `sync.run(harness_dir)` once. The
      sync orchestrator is already idempotent under canonical hashing,
      so subsequent activations are no-ops on the sync side. Failures
      are fail-open: a stderr warning is emitted and activate proceeds,
      matching `_autowire_kickoff` and `_autowire_fog_clear`.

      The init markdown and spec-conversion finalize remain candidates
      for future work (F-074+) — wiring two upstream entry points only
      makes sense once the inner guard is in place. This feature ships
      the inner guard.
    modules:
      - "scripts/work.py"
      - "tests/unit/work/test_work_autowire.py"
    test_strategy: "tdd"
    tdd_focus:
      - "_autowire_initial_sync exists and runs before _autowire_fog_clear / _autowire_kickoff inside activate()"
      - "fresh harness (spec.yaml present, harness.yaml.generated_from.spec_hash empty) triggers a sync that populates spec_hash and renders domain.md + architecture.yaml"
      - "already-synced harness (spec_hash non-empty) is a no-op — sync.run is not invoked again"
      - "sync.run failure is fail-open — activate completes, stderr carries the warning, state.yaml still transitions"
      - "missing spec.yaml or missing harness.yaml is a silent no-op (symmetry with sibling autowires)"
    acceptance_criteria:
      - "AC-1: scripts/work.py adds `_autowire_initial_sync(harness_dir: Path) -> None`. Reads `harness_dir / 'harness.yaml'`, returns early when `spec_hash` already populated. Otherwise imports `scripts.sync` and calls `sync.run(harness_dir)`. Wraps the body in try/except so any exception emits a stderr warning and returns silently — activate must never raise here."
      - "AC-2: `activate()` calls `_autowire_initial_sync(harness_dir)` before `_autowire_fog_clear` and `_autowire_kickoff` so first-time activate generates derived views before kickoff bullets reference them."
      - "AC-3: tests/unit/work/test_work_autowire.py adds `InitialSyncAutowireTests` covering the four contract cases above (fresh harness fires, already-synced no-ops, fail-open, missing files no-op). Existing tests in this module remain unmodified and continue to pass."
      - "AC-4: All comments and docstrings added in this cycle are in English (matches the F-049 → F-053 native-English consolidation thread already in flight)."
      - "AC-5: F-075 mirrored on both spec.yaml copies (docs/samples/harness-boot-self + .harness). bash scripts/self_check.sh 5/5 PASS."
      - "AC-6: F-075 completed via the work.py 4-verb cycle (activate → run-gate gate_0/1/2/3/5 → declared evidence → complete) — Phase 2 dogfood."

  - id: "F-076"
    name: "Upstream sync wiring — init.md + spec-conversion finalize call try_initial_sync"
    type: "feature"
    description: |
      Follow-up to F-075. F-075 closed the inner Python guard in
      `scripts/work.py:activate()` so the first feature cycle would always
      catch the missing-sync state, but the upstream entry points still
      had no idea about sync. This feature wires the two upstream surfaces
      (`commands/init.md` and `skills/spec-conversion/SKILL.md`) so the
      derived views are materialized as soon as a populated `spec.yaml`
      exists — eliminating the stutter where the very first work cycle
      had to fire sync before kickoff bullets could reference
      `domain.md`.

      Mechanism: a new public helper `scripts/sync.try_initial_sync(harness_dir)`
      wraps `sync.run()` with fail-open semantics — never raises, returns
      a `{"ok": bool, "reason": str, "skipped": bool}` status dict. The
      existing `_autowire_initial_sync` in `scripts/work.py` is refactored
      to delegate to this helper (single source of truth). A new
      `--soft` CLI flag (`python3 scripts/sync.py --harness-dir DIR --soft`)
      exits 0 regardless of validation failure and prints the status,
      so markdown bash blocks can call it without `|| true` workarounds.

      Init.md adds a §5.5 "Initial sync (best-effort)" stage between the
      `harness_initialized` event write and the final user-facing report.
      Stub specs from menu options 1 / 2 will fail schema validation
      and the `--soft` mode will print "skip — schema not ready"; that
      is fine because F-075's autowire still catches them on first work
      cycle. Option 3 (brownfield / free-text) and `spec-conversion`
      output rich specs that succeed, so most users see derived views
      immediately after install.

      `skills/spec-conversion/SKILL.md` adds Stage 5 "Sync derived views"
      after Stage 4 (검증). Stage 5 calls `try_initial_sync` and lists
      `domain.md` + `architecture.yaml` in the §7 산출물 enumeration.
      The contributor convention from F-049 → F-053 is respected: the
      Stage 5 prose is in Korean to match the rest of the SKILL while
      docstrings / comments / commit copy stay English.
    modules:
      - "scripts/sync.py"
      - "scripts/work.py"
      - "commands/init.md"
      - "skills/spec-conversion/SKILL.md"
      - "tests/unit/test_sync.py"
      - "tests/unit/work/test_work_autowire.py"
    test_strategy: "tdd"
    tdd_focus:
      - "sync.try_initial_sync exists, returns dict {ok,reason,skipped}, never raises"
      - "try_initial_sync skips when harness.yaml.spec_hash already populated (skipped=True, ok=True)"
      - "try_initial_sync soft-fails on schema-invalid spec.yaml (ok=False, reason carries class name) without raising"
      - "sync.py --soft CLI flag prints status line + always exits 0"
      - "_autowire_initial_sync delegates to try_initial_sync and preserves the stderr `[warn]` contract from F-075"
      - "commands/init.md contains a `python3 .* sync.py .* --soft` invocation between §5 and §6"
      - "skills/spec-conversion/SKILL.md contains the same invocation in its post-Stage-4 finalize block"
    acceptance_criteria:
      - "AC-1: scripts/sync.py exposes `try_initial_sync(harness_dir: Path) -> dict`. Reads harness.yaml.spec_hash; returns `{ok: True, skipped: True, reason: 'already synced'}` when populated. Otherwise calls `run(harness_dir)`. Catches all exceptions and returns `{ok: False, reason: '<ClassName>: <msg>'}` instead of raising. spec.yaml absent → `{ok: False, reason: 'spec.yaml missing', skipped: True}` (no run attempt)."
      - "AC-2: scripts/sync.py CLI gains `--soft` flag. Flow: argparse → try_initial_sync → print one human-readable line `sync (initial): <ok|skip|fail> — <reason>` → exit 0 unconditionally. Existing flags (`--dry-run`, `--force`, `--json`) continue to operate against `run()`."
      - "AC-3: scripts/work.py:_autowire_initial_sync rewritten to delegate to `sync.try_initial_sync`. The `[warn] initial sync auto-wire failed: ...` stderr contract from F-075 is preserved (existing 5 InitialSyncAutowireTests pass without modification)."
      - "AC-4: commands/init.md adds §5.5 (between §5 Initial event log and §6 Final report) titled 'Initial sync (best-effort)'. Body explains the call invokes `python3 \"$PLUGIN_ROOT/scripts/sync.py\" --harness-dir \"$(pwd)/.harness\" --soft` and that stub specs are expected to skip silently."
      - "AC-5: skills/spec-conversion/SKILL.md adds Stage 5 'Sync derived views' after Stage 4 (검증) with the same `--soft` invocation. §7 산출물 enumerates `domain.md` + `architecture.yaml` as derived outputs (소산출 — Stage 5 가 만들어내는 결과)."
      - "AC-6: tests/unit/test_sync.py adds `TryInitialSyncTests` covering: (a) skipped=True when spec_hash present, (b) ok=True after first run when spec is valid, (c) ok=False without raise when spec is schema-invalid, (d) ok=False reason='spec.yaml missing' when spec absent. Plus `SoftCliTests` checking sync.main(['--soft', '--harness-dir', tmp]) returns 0 even on schema failure."
      - "AC-7: tests/unit/work/test_work_autowire.py contains a contract test `InitMdSyncWiredTest` and `SkillMdSyncWiredTest` that read commands/init.md / skills/spec-conversion/SKILL.md as text and assert the `--soft` invocation appears at least once."
      - "AC-8: F-076 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS · regression 0 across full unit suite."
      - "AC-9: F-076 completed via the work.py 4-verb cycle (activate → run-gate gate_0 + gate_5 → declared evidence → complete) — Phase 2 dogfood."
      - "AC-10: All new docstrings, comments, and CHANGELOG entry text added in this cycle are in English (continues the F-049 → F-053 native-English consolidation thread; SKILL.md Korean prose is the documented exception)."

  - id: "F-077"
    name: "AC quantitative claim lint — surface description vs AC numeric mismatch at activate"
    type: "feature"
    description: |
      Field-discovered structural gap: Iron Law passes when gate_5 = pass
      and declared evidence count meets the mode threshold, but the rule
      is purely procedural — it does not verify that the evidence content
      actually matches the spec's quantitative targets. A downstream
      project illustrated the failure mode: features whose description
      promised "13 ChainTemplate", "74 propagation rule", or "35 Heuristic
      tools" reached `done` with implementations covering 38%, 13%, and
      3% of those targets respectively. The carry-forward bullets that
      noted the gap were buried in retro Deferred sections; nothing
      surfaced the mismatch at the activation boundary where the developer
      could course-correct cheaply.

      F-077 ships the smallest leverage point: a static lint that runs
      at activate time, parses numeric claims from the feature
      description and from the AC text, and prints a stderr hint when
      description-side numbers exceed AC-side numbers. No blocking; the
      hint is informational. Subsequent features (F-078 Coverage drift,
      F-079 dashboard gauge) build on the same fingerprint.

      Persist the parse result as `_workspace/coverage/F-N.yaml` so
      downstream features can read the same data without re-parsing
      prose. The fingerprint is a YAML record with two lists:
      `description_claims` and `ac_claims`, each `{metric, value, span}`.

      Pattern catalog (regex-based, conservative):
        * `(\d+)\s*(개|rule|rules|template|templates|tool|tools|item|items|hop|hops|step|steps|category|categories|agent|agents)`
        * `≥\s*(\d+)` / `>=\s*(\d+)` / `>=\s*(\d+)`
        * `(\d+)\s*[/／]\s*(\d+)` (numerator vs denominator — both captured)

      The lint never raises and never blocks activate; it is fail-open
      like the existing autowires. Output goes to stderr only.
    modules:
      - "scripts/spec/quant_claims.py"
      - "scripts/work.py"
      - "tests/unit/test_quant_claims.py"
      - "tests/unit/work/test_work_autowire.py"
    test_strategy: "tdd"
    tdd_focus:
      - "extract_numeric_claims(text) returns list[{metric, value, span}] for canonical patterns"
      - "diff_claims(description, ac) returns list of mismatches where description value > AC value for the same metric"
      - "scripts/work.py:_autowire_quant_lint() writes _workspace/coverage/F-N.yaml fingerprint at activate and prints stderr hint for each mismatch"
      - "lint is fail-open — exception inside extractor never raises out of activate"
      - "no mismatch (description matches or absent numbers) emits no stderr"
    acceptance_criteria:
      - "AC-1: scripts/spec/quant_claims.py exposes `extract_numeric_claims(text: str) -> list[Claim]` and `diff_claims(description: str, ac_texts: list[str]) -> list[Mismatch]`. Claim is a NamedTuple of `(metric: str, value: int, span: tuple[int,int])`. Mismatch is `(metric: str, description_value: int, ac_value: int)`."
      - "AC-2: extract_numeric_claims handles the three canonical pattern families (count + counter noun · ≥/>= prefix · X/Y fraction) and returns claims with normalized lowercased metric tokens."
      - "AC-3: diff_claims returns one entry per metric where description_value > ac_value. Metrics absent from either side are silently skipped (no false-positive 'AC missing'). Diff is order-stable by metric token."
      - "AC-4: scripts/work.py adds `_autowire_quant_lint(harness_dir, fid)` that loads spec, finds the feature, calls diff_claims on description vs AC list, writes `_workspace/coverage/F-N.yaml` (fingerprint), and prints `[hint] description claims X <metric> but AC accepts Y — explicit carry-forward to retro recommended` for each mismatch. The function is fail-open (try/except swallows; emits one stderr warning under the `[warn]` prefix on failure)."
      - "AC-5: activate() calls `_autowire_quant_lint` after `_autowire_initial_sync` and before `_autowire_fog_clear` / `_autowire_kickoff`. Existing autowire ordering is otherwise unchanged."
      - "AC-6: tests/unit/test_quant_claims.py covers: (a) extract_numeric_claims — 6 cases (counter noun · ≥ prefix · fraction · multiple metrics in one sentence · empty text · garbage text), (b) diff_claims — 4 cases (mismatch surfaced · matching values silent · AC-only metric silent · description-only metric silent). tests/unit/work/test_work_autowire.py adds `QuantLintAutowireTests` (3 cases: hint emitted for mismatch · silent for matching · fail-open under monkeypatch)."
      - "AC-7: F-077 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS · regression 0 (1120+ unit tests still pass)."
      - "AC-8: F-077 completed via the work.py 4-verb cycle (activate → run-gate gate_0 + gate_5 → declared evidence → complete) — Phase 2 dogfood."

  - id: "F-078"
    name: "13th drift kind — Coverage detector turns quant lint into a complete() blocker"
    type: "feature"
    description: |
      Second step in the F-077 → F-078 → F-079 thread. F-077 surfaced
      the description-vs-AC quantitative mismatch as an informational
      stderr hint at activate time, but the user could still ignore it
      and proceed to complete() — the Iron Law would happily transition
      the feature to done. F-078 closes that loop: Coverage becomes the
      13th drift kind, joins `_BLOCKING_DRIFT_KINDS`, and complete()
      rejects transitions where the description over-promises by more
      than the configurable threshold.

      `scripts/check.py:check_spec_coverage(harness_dir, spec_yaml)`
      reads the F-077 fingerprints under
      `_workspace/coverage/F-N.yaml` and, for each recorded mismatch,
      computes `ratio = ac_value / description_value`. When `ratio <
      threshold` (default 0.80, override via
      `harness.yaml.coverage.threshold`), emits a `severity=error`
      finding under `kind=Coverage`. When the fingerprint or the
      coverage directory is absent the detector is silently empty —
      F-077 must run first to populate the data.

      `_BLOCKING_DRIFT_KINDS` in `scripts/work.py` adds `Coverage`. The
      F-072 fast path (`run_blocking_check`) extends to call
      `check_spec_coverage` so `complete()` does not pay for the eight
      cheap-but-discarded detectors. F-048's existing escape hatch
      (`--hotfix-reason`) bypasses Coverage as well — intentional
      carry-forward stays expressible without disabling the detector
      globally.

      Why a separate detector instead of folding into Iron Law: keeping
      the gate procedural (gate_5 + N evidence) and pushing substantive
      checks into drift mirrors the rest of the architecture (F-048
      already gates wire-integrity drift on `complete()`). The drift
      surface is the right place for "does the implementation match
      the spec" questions.
    modules:
      - "scripts/check.py"
      - "scripts/work.py"
      - "tests/unit/test_check.py"
      - "tests/unit/work/test_drift_iron_law_gate.py"
    test_strategy: "tdd"
    tdd_focus:
      - "check_spec_coverage emits Coverage findings with severity='error' for mismatches whose ratio < threshold (default 0.80)"
      - "threshold honored from harness.yaml.coverage.threshold override (test with 0.50 → previous error becomes clean)"
      - "missing _workspace/coverage directory → empty findings (no exception)"
      - "fingerprint with empty mismatches list → no findings"
      - "run_check appends 'Coverage' to checked list and includes detector findings"
      - "run_blocking_check (F-072 fast path) also appends 'Coverage' to checked + invokes check_spec_coverage"
      - "_BLOCKING_DRIFT_KINDS in scripts/work.py contains 'Coverage' (preserves F-048's gate semantics)"
      - "complete() rejects when Coverage finding present (severity error) and accepts when --hotfix-reason supplied"
    acceptance_criteria:
      - "AC-1: scripts/check.py adds `check_spec_coverage(harness_dir: Path, spec_yaml: dict | None) -> list[DriftFinding]`. Reads each `_workspace/coverage/F-*.yaml` fingerprint, iterates `mismatches[]`, emits one finding per mismatch where `ac_value / description_value < threshold`. Threshold defaults to 0.80; reads `harness.yaml.coverage.threshold` for project override. Missing fingerprint dir or unparseable file → empty list, no exception."
      - "AC-2: run_check appends `check_spec_coverage` after `check_protocol` and adds `'Coverage'` to `report.checked`. Behaviour preserved when fingerprints absent."
      - "AC-3: run_blocking_check (F-072) extends to call `check_spec_coverage` and adds `'Coverage'` to `checked`. Mocked detector functions in `tests/unit/test_check.py::StrictRunBlockingCheckTests` are updated to include the new entry."
      - "AC-4: scripts/work.py:_BLOCKING_DRIFT_KINDS gains `'Coverage'`. F-048's gate semantics are unchanged — only the kind set widens."
      - "AC-5: tests/unit/test_check.py adds `CheckSpecCoverageTests` (4 cases): mismatch + low ratio → error finding · matching values → silent · threshold override 0.50 → finding suppressed · missing fingerprint dir → empty findings."
      - "AC-6: tests/unit/work/test_drift_iron_law_gate.py adds `CoverageBlocksCompleteTest` and `HotfixReasonBypassesCoverageTest` (2 cases). F-048's existing 7 cases retargeted to the new mock site if needed and continue to pass."
      - "AC-7: F-078 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS · regression 0 across the existing 1134 unit tests."
      - "AC-8: F-078 completed via the work.py 4-verb cycle (activate → run-gate gate_0 + gate_5 → declared evidence → complete) — Phase 2 dogfood."

  - id: "F-079"
    name: "Dashboard coverage gauge — surface F-077 fingerprint percentages without invoking check.py"
    type: "feature"
    description: |
      Third and final step in the F-077 → F-078 → F-079 thread. F-077
      surfaced description-vs-AC quantitative mismatches as stderr hints
      at activate time; F-078 promoted the mismatch into a blocking drift
      kind so complete() rejects under-covered transitions. F-079 closes
      the loop on visibility: the no-args dashboard now reads the same
      fingerprint files and shows the coverage percentage per feature
      so the gauge is always one keystroke away.

      `scripts/ui/dashboard.render()` gains an optional `harness_dir`
      kwarg. When provided, the active-block renderer reads
      `_workspace/coverage/F-N.yaml` and appends one line:

          coverage: 38% (5/13 chaintemplate, 14/74 rule)

      Coverage is computed as the arithmetic mean of `ac_value /
      description_value` across recorded mismatches. A feature without
      any mismatches (or without a fingerprint file) shows no coverage
      line — the assumption is that no quantitative claims means no
      coverage gauge to compute.

      A new dashboard section "Coverage debt" surfaces aggregate stats:
      the count of features with at least one mismatch and the count
      whose coverage percentage falls below the configured threshold
      (default 0.80, same as F-078). When the under-threshold count
      exceeds 5 a red alert line is rendered above the section so the
      user sees backpressure even when looking at a different active
      feature.

      `scripts/ui/intent_planner.suggest()` gains a coverage-aware
      recommendation. When the active feature's coverage falls below
      the threshold, the intent_planner surfaces "review carry-forward
      debt before completing" as the top suggestion — pre-empting the
      complete() rejection from F-078 by giving the user a chance to
      either increase coverage or document explicit carry-forward in
      the retro.

      `scripts/work.py` propagates harness_dir to dashboard.render so
      the existing call site picks up the new kwarg without further
      wiring.
    modules:
      - "scripts/ui/dashboard.py"
      - "scripts/ui/intent_planner.py"
      - "scripts/work.py"
      - "tests/unit/test_dashboard.py"
      - "tests/unit/test_intent_planner.py"
    test_strategy: "tdd"
    tdd_focus:
      - "_load_coverage(harness_dir, fid) returns float in [0,1] when fingerprint has mismatches; returns None when fingerprint missing or empty"
      - "_render_active_block emits a coverage line when harness_dir provided and coverage < 1.0"
      - "_render_coverage_debt section counts features with at least one mismatch and features below threshold"
      - "alert line rendered when below-threshold count > 5"
      - "intent_planner suggests 'review carry-forward debt' when active feature coverage < threshold"
      - "render() backward compat — harness_dir omitted produces identical output to the v0.11.x baseline"
    acceptance_criteria:
      - "AC-1: scripts/ui/dashboard.py adds `_load_coverage(harness_dir: Path | None, fid: str) -> float | None`. Reads the F-077 fingerprint at `_workspace/coverage/{fid}.yaml`, computes the mean of `ac_value / description_value` across mismatches. Empty mismatches list → returns 1.0 (no over-promise). Missing file or harness_dir=None → returns None. Unparseable YAML → returns None (no exception)."
      - "AC-2: `render()` gains `harness_dir: Path | None = None` kwarg. When provided, `_render_active_block` appends a `coverage: NN% (...)` line below the progress line for any feature whose coverage is < 1.0. Format includes per-mismatch detail in parentheses (`5/13 chaintemplate, 14/74 rule`)."
      - "AC-3: New dashboard section `_render_coverage_debt(harness_dir, threshold, lang)` is appended after the pending-block. It lists `Coverage debt: N features with mismatches (M below threshold X.XX)`. When `M > 5`, an alert line `⚠ Coverage debt high — review carry-forward before next feature` precedes the count."
      - "AC-4: scripts/ui/intent_planner.py — `_suggestions_for_active(f, spec, *, coverage=None)` accepts a coverage float kwarg. When `coverage is not None and coverage < threshold` (threshold reused from F-078 default 0.80), prepends a Suggestion with action 'review-carry-forward' and rationale 'feature coverage NN% < threshold X.XX — explicit carry-forward to retro recommended'."
