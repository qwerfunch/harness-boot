# yaml-language-server: $schema=https://raw.githubusercontent.com/qwerfunch/harness-boot/main/docs/schemas/spec.schema.json
# .harness/spec.yaml — harness-boot (self-bootstrap / meta)
#
# ==========================================================================
# Stage 0 Header (skill spec-conversion v0.4 · re-conversion round 2)
# --------------------------------------------------------------------------
# source       : design/harness-boot-design-2.3.7.md (3493줄, 13장 + 부록 A/B/C/D)
# maturity     : architecture    # VAPT 와 동급. §13 열린 질문 11개는 planning 잔재
# domain       : meta / dev-tool / cli-plugin   (self-bootstrap 서브타입 — §3.1 of adapter)
# author_emphasis (5 축) :
#   1. "사고의 글 vs 실행의 글" 의 엄격 분리 (§2.1 / §5.1)
#   2. Walking Skeleton / Gate 5 (§2.3 / §7.3.3 / §9)
#   3. Transparency-by-Preamble (3줄 출력 계약, §2.3 / §7.6)
#   4. Canonical Hashing + Include 전개 재현성 (§2.3 / 부록 D)
#   5. SSoT 로서의 spec.yaml (§2.2 / §5.1 / §10)
# conversion_round    : 6 (회귀 샘플 순서)
# re_conversion_round : 2 (2026-04-22 1회차 v0.3 적용 → 2회차 v0.4 적용)
# sample_purpose (v2) : meta 어댑터 v0.2 공식 적용 + v2.3.7 metadata.extensions 네임스페이스
#                       활용으로 NEW-28~36 전 갭 구조화 → backlink-matrix ★★★+ 90%+ 달성.
# --------------------------------------------------------------------------
# 중요: 이 스펙은 harness-boot 플러그인 **자체** 를 한 제품으로 가정하고
#       변환한 산출물이다. 따라서 여기서 사용하는 스키마(v2.3.7) 는 곧
#       이 문서가 설명하는 그 스키마이며, 일종의 bootstrap 자기참조를 이룬다.
# --------------------------------------------------------------------------
# v1 → v2 주요 변화 (자세한 건 conversion-notes-v2.md §3 참고) :
#   · metadata.extensions.* 네임스페이스 신설 — 기존 NEW-28~34 갭 및 NEW-35/36 수용
#     (command_map / ambient_files / host_binding / agent_permissions / gate_chain /
#      drift_catalog / versioning_axes / preamble_contract / contribution_points)
#   · top-level open_questions[] 신설 — §13 의 11 항목을 구조화 (OQ-1~OQ-11)
#   · metadata.changelog[] 신설 — P-24 MAY 준수, 부록 C 를 구조화
#   · adapter_version_used : none → 0.2
# ==========================================================================
version: "2.3.8"

project:
  name: "harness-boot"
  mode: "prototype"                          # v0.9.6 — Phase 2 self-hosting (2026-04-27): lighter Iron Law D
  summary: "Claude Code 용 하네스 플러그인 — spec.yaml 을 SSoT 로 Walking Skeleton 부터 진화까지 자동화"
  description: |
    Anthropic Claude Code 의 플러그인으로 동작하는 "하네스(harness)" 도구.
    하나의 spec.yaml 만 주어지면 (1) 빌드 가능한 Walking Skeleton 을 만들어
    런타임 스모크(Gate 5)까지 통과시키고, (2) 이후 피처 추가·리팩터·
    스펙 갱신 사이클(진화)을 자동화한다. 핵심은 "사고의 글(한국어 설계서)"
    과 "실행의 글(YAML 계약 + 코드)" 을 스키마 수준에서 분리해, LLM 이
    복사가 아닌 변환 을 하도록 강제하는 것.
  vision: |
    사용자가 spec.yaml 을 매번 수정하는 대신, /harness:init → /harness:spec →
    /harness:sync → /harness:work 네 명령만으로 아이디어에서 배포 가능 코드까지
    한 방향 흐름으로 끌고 간다. 플러그인이 업그레이드되어도 사용자 프로젝트는
    CLAUDE.md shim 만 갱신하면 되며, 모든 결정은 영속 로그(events.log) 와
    상태 파일(state.yaml) 로 감사 가능해야 한다. 최종적으로 "Claude Code +
    harness-boot 조합이 개별 개발자 1인을 팀 수준 생산성으로 끌어올린다"
    를 목표로 한다.
  stakeholders:
    - role: "project_initiator"          # 이 문서의 현재 유일 사용자(jungsoo.kim)
      concerns:
        - "설계 의도가 명령 한 줄로 재현 가능 (/harness:check 로 검증)"
        - "의사결정 이력이 events.log 에 남아 나중에도 '왜' 를 추적"
        - "플러그인 업그레이드가 기존 프로젝트를 깨지 않음(CLAUDE.md shim 모델)"
    - role: "ai_implementer"             # Claude 자신(Sonnet/Opus)
      concerns:
        - "명령어 부트 시 3줄 preamble 을 빠짐없이 출력(투명성 계약)"
        - "에이전트별 Tool 권한 매트릭스를 지켜 scope 밖 파일 수정 금지"
        - "Gate 0~5 를 순서대로 통과; runtime smoke 실패 시 작업 중단"
    - role: "future_user"                # harness-boot 를 깔아서 쓰게 될 외부 개발자
      concerns:
        - "명령 4개(init/spec/sync/work) + 진단 4개(status/check/events/metrics) 로 학습 부담 최소화"
        - "spec.yaml 편집 시 IDE 스키마(v2.3.7) 가 자동 완성/검증 지원"
        - "$include 로 긴 서사를 별도 md 로 분리해 YAML 이 비대해지지 않음"
    - role: "plugin_developer"           # harness-boot 자체를 fork/contribute 하는 개발자
      concerns:
        - "commands/ 와 docs/ 관계가 §11.2 에 명시되어 바뀌지 않음"
        - "템플릿 변경이 사용자 프로젝트에 즉시 반영되는 범위가 명확(§11.3)"
        - "부록 D canonical hashing 구현이 언어별 테스트 벡터를 통과"
    - role: "downstream_tooling"         # SARIF/CI 등 harness-boot 산출물을 소비하는 측 (v2 이후)
      concerns:
        - "state.yaml 스키마가 semver 를 지켜 외부 파서가 깨지지 않음"
        - "events.log 가 append-only JSONL 로 스트리밍 파이프에 직결"
        - "architecture.yaml 의 layer/component 모델이 아키텍처 린트 도구와 호환"

domain:
  overview: |
    핵심 엔티티는 Harness(하네스 인스턴스 단위) 아래에 Spec(제품 명세, SSoT),
    Domain·Architecture(Spec 으로부터 파생된 뷰), HarnessConfig(실행 환경
    계약), State(피처·모드 상태), Event(영속 로그), Feature(개발 단위),
    Hook(검증 스크립트), Protocol(에이전트 간 규약), Agent(Claude sub-agent),
    Skill(절차 번들), Command(/harness:xxx), Include(외부 md 참조),
    Drift(8종 불일치), Gate(0~5 품질 관문), Preamble(3줄 출력 계약). 각
    엔티티는 파일 시스템 상에서 `.harness/` 또는 `.claude/` 디렉터리에 실체를
    갖고, 이 디렉터리 자체가 `/harness:init` 에 의해 생성된다. spec.yaml 만이
    사용자가 "사고의 글" 로 수정하고, 다른 파일은 대부분 파생이거나 기계가
    유지한다 (edit-wins 예외 2곳: domain.md, architecture.yaml).
  entities:
    - name: "Harness"
      description: "한 사용자 프로젝트에 설치된 harness-boot 인스턴스. `.harness/` + `.claude/` 2 디렉터리의 합."
      invariants:
        - "동일 레포에 2개 이상 존재 금지(단일 루트 가정)"
        - "harness.yaml 이 존재해야 하며, harness.version 은 2.3.x semver 준수"
        - "install_mode ∈ {user_scope, project_scope}; user_scope 에서는 사용자 repo 에 커밋되지 않음"
      sensitive: false
    - name: "Spec"
      description: "spec.yaml 본체. 사용자가 사고의 글로 작성·편집하는 SSoT."
      invariants:
        - "schema version 은 2.3.7 고정(이 문서 기준)"
        - "structured 필드(🔒) 는 spec.yaml 본문에만, free-text 필드(🗒) 는 $include 경유 허용"
        - "project.name · features[].id · business_rules[].id 는 하네스 내 유일"
        - "prototype_mode=true 인 경우 Gate 3(coverage) 이 완화됨(`src/examples/`, `src/scripts/` 제외)"
      sensitive: false
    - name: "ExpandedSpec"
      description: "$include 를 전부 풀어 얻는 단일 YAML. 해시·검증·AI 입력은 이것을 사용."
      invariants:
        - "$include 노드는 expand 후 상위 키에 완전 치환"
        - "expand 는 include 깊이 1 만 허용(§13.11, MUST)"
        - "expand 실패 시 Fail-Fast — 파생 파일 생성 중단"
      sensitive: false
    - name: "Domain"
      description: "domain.md — spec.yaml 의 domain 블록을 렌더한 가독성 뷰. 사람이 읽기 좋다."
      invariants:
        - "자동 재생성 가능하나, 사용자가 직접 수정한 경우 edit-wins 로 보존(§10.4)"
        - "renderer 는 spec.yaml.domain 만 원천으로 허용(추가 정보 주입 금지)"
      sensitive: false
    - name: "Architecture"
      description: "architecture.yaml — 파생 아키텍처 선언(layer/component/edge 모델)."
      invariants:
        - "Spec.features[].modules 를 layer/component 로 정규화"
        - "edit-wins 대상(domain.md 와 동일)"
        - "architecture-linter 같은 외부 도구가 이 파일만 보고 동작"
      sensitive: false
    - name: "HarnessConfig"
      description: "harness.yaml — 하네스 구성 계약. 런타임·언어·검증 정책·include_sources 트래킹."
      invariants:
        - "tech_stack.language 가 비었으면 /harness:sync 차단"
        - "include_sources[] 는 마지막 expand 시점의 include 노드를 mirror(§5.4)"
        - "version 은 반드시 Spec.version 과 같은 major.minor 라인"
      sensitive: false
    - name: "State"
      description: "state.yaml — 피처·모드·현재 인보케이션 상태. 기계 유지."
      invariants:
        - "features[].status ∈ {planned, in_progress, blocked, done, archived}"
        - "active_feature_id 는 항상 features[] 중 하나를 가리키거나 null"
        - "gates[name].last_result ∈ {pass, fail, skipped}"
      sensitive: false
    - name: "Event"
      description: "events.log 의 한 레코드. append-only JSONL."
      invariants:
        - "ts 는 RFC3339 UTC, actor ∈ {user, command, agent, hook}"
        - "kind 는 소문자 snake_case, payload 는 JSON object"
        - "기존 레코드 수정·삭제 금지(감사성), 회전은 events.log.YYYYMM 로 분할"
      sensitive: true
      sensitive_reason: "프로젝트 파일 경로·사용자 코멘트가 섞여 저장 대상 고려 필요"
    - name: "Feature"
      description: "Spec.features[] 의 한 항목. 개발 단위이자 Gate 묶음 대상."
      invariants:
        - "id 는 F-XXX 형식, type ∈ {skeleton, feature, refactor, research}"
        - "type='skeleton' 은 features[0] 에만 허용(Walking Skeleton 유일성)"
        - "test_strategy ∈ {tdd, contract, property, smoke} 중 하나 이상"
      sensitive: false
    - name: "Command"
      description: "/harness:xxx 명령. commands/ 디렉터리의 md + claude code slash command 엔트리."
      invariants:
        - "핵심 4개(init/spec/sync/work) + 진단 4개(status/check/events/metrics) 가 고정 표면"
        - "모든 명령은 실행 직후 3줄 preamble 을 stdout 에 출력(§7.6)"
        - "destructive 명령은 --yes 플래그 없이 실행 금지(init 예외)"
      sensitive: false
    - name: "Mode"
      description: "/harness:spec 실행 모드. A(addition)·B(baseline)·R(refine)·E(explain) 4종."
      invariants:
        - "spec.yaml 부재 시 자동 B"
        - "부재 아닌 상태에서 /harness:spec 은 입력 성격에 따라 A/R/E 자동 분기"
        - "E 는 읽기 전용이며 파일 수정 금지"
      sensitive: false
    - name: "Agent"
      description: "`.claude/agents/` 의 한 에이전트 정의(md + frontmatter). sub-agent 의 scope/tool 을 선언."
      invariants:
        - "모든 에이전트는 Tool 권한 매트릭스(§6.3.1) 에 키로 존재"
        - "에이전트 정의 frontmatter 의 tools 는 매트릭스 상한 이하"
        - "Context/Process/Forbidden 3 블록이 md 본문 필수"
      sensitive: false
    - name: "Skill"
      description: "`.claude/skills/` 의 절차 번들. SKILL.md + 보조 파일."
      invariants:
        - "SKILL.md frontmatter 의 description 이 trigger 정확도 메트릭 근거"
        - "skill 내부 script/ 는 실행 권한 명시(Tool 권한 매트릭스 우회 금지)"
      sensitive: false
    - name: "Hook"
      description: "`.harness/hooks/` 의 bash 스크립트. pre-commit·post-sync 등 훅 진입점."
      invariants:
        - "exit code 0 = 성공; 0 이 아니면 hook-fail 이벤트 적재"
        - "fail-open 원칙: 훅 자체 버그가 사용자 작업을 차단하지 않음"
        - "훅 내부에서 spec.yaml 수정 금지(SSoT 침범 방지)"
      sensitive: false
    - name: "Protocol"
      description: "`.harness/protocols/` 의 에이전트 간 규약 md. 페이로드 스키마·버전."
      invariants:
        - "protocol_id 는 파일명과 동일, version 은 semver"
        - "protocol breaking change 는 parallel-protocol 으로만 허용(drift 방지)"
      sensitive: false
    - name: "Include"
      description: "spec.yaml 의 $include 노드. 외부 md 를 해당 위치에 삽입."
      invariants:
        - "$include 는 🗒 free-text 필드에만 허용(MUST)"
        - "depth=1 제한(중첩 include 금지)"
        - "대상 파일은 .harness/chapters/ 하위 md 만"
      sensitive: false
    - name: "Drift"
      description: "SSoT 와 파생/구현 간 불일치. 8종 분류."
      invariants:
        - "kind ∈ {Spec, Code, Doc, Derived, Generated, Evidence, Anchor, Include}"
        - "/harness:check 는 8종 전부 탐지 & 리포트"
        - "Spec-drift 해결은 항상 사용자 개입 필요(자동 수정 금지)"
      sensitive: false
    - name: "Gate"
      description: "0~5 단계 품질 관문. 0=tests · 1=compile · 2=style · 3=coverage · 4=commit · 5=runtime smoke."
      invariants:
        - "순서대로 통과해야 함(skip 없음)"
        - "Gate 5 실패 시 feature status=blocked, events.log 적재"
        - "prototype_mode=true 에서만 Gate 3 완화(examples/scripts 제외)"
      sensitive: false
    - name: "Preamble"
      description: "명령 부팅 시 stdout 3줄 출력 계약(§7.6)."
      invariants:
        - "정확히 3줄, 각 행 80자 이내"
        - "1행=mode, 2행=scope, 3행=next — 고정 필드명"
        - "anti-rationalization 2행(v2.3.1) 은 preamble 직후 별도 출력"
      sensitive: false
    - name: "HashTree"
      description: "부록 D 해시 조합 결과. 전체/스코프/include 3층."
      invariants:
        - "Canonical YAML → Canonical JSON → SHA-256 순서 고정"
        - "include expanded vs. raw 두 해시를 함께 기록"
        - "테스트 벡터(§D.7) 는 구현 적합성 필수 통과"
      sensitive: false
  business_rules:
    - id: "BR-001"
      statement: "사고의 글과 실행의 글을 스키마 수준에서 분리한다(🔒 vs 🗒)."
      rationale: "LLM 이 자연어를 YAML 구조로 복사하지 않고 의도적으로 변환 하도록 강제."
    - id: "BR-002"
      statement: "spec.yaml 은 유일한 제품 명세 SSoT 이며, 다른 모든 파일은 파생/실행/로그다."
      rationale: "drift 탐지 로직이 단일 원천 가정 위에서만 동작; 이원화 금지."
    - id: "BR-003"
      statement: "features[0] 은 반드시 type='skeleton' 이고, Walking Skeleton 은 Gate 5(runtime smoke) 까지 통과해야 한다."
      rationale: "계획 페이퍼웨어 방지; 먼저 뭔가가 부팅되고 나서 확장."
    - id: "BR-004"
      statement: "모든 /harness:xxx 명령은 실행 직후 3줄 preamble 을 stdout 에 출력한다."
      rationale: "투명성 — 사용자가 컨텍스트·다음 단계를 한눈에 확인. v2.3.1 에서 도입."
    - id: "BR-005"
      statement: "domain.md 와 architecture.yaml 은 파생이지만 사용자 수정 시 edit-wins 로 보존한다."
      rationale: "렌더러가 사용자의 추가 통찰을 덮어쓰지 않도록; 단 SSoT 불일치는 drift 로 리포트."
    - id: "BR-006"
      statement: "hook 은 fail-open 이다. 훅 자체 버그가 사용자 작업을 차단하지 않는다."
      rationale: "훅 실패가 개발 흐름을 인질로 잡는 경험을 방지; 단 hook-fail 은 반드시 events.log 에 적재."
    - id: "BR-007"
      statement: "canonical hashing 은 Canonical YAML → Canonical JSON → SHA-256 순서로 산출하고, include expanded/raw 두 해시를 함께 기록한다."
      rationale: "언어 간 재현성(§D.7) + include 전개 변화를 별도 추적(§D.4)."
    - id: "BR-008"
      statement: "$include 는 🗒 free-text 필드에만, 깊이 1 까지만 허용한다."
      rationale: "중첩 include 는 해시 재현성·토큰 예측성·IDE 점프 난이도를 무너뜨림(§13.11)."
    - id: "BR-009"
      statement: "v1 호환은 CLAUDE.md shim 모델로만 제공하며, 기존 .harness/ 내용은 덮어쓰지 않는다."
      rationale: "사용자 저장물 보존; 업그레이드 트리거를 사용자 명시 동작으로 한정(§12)."
    - id: "BR-010"
      statement: "sensitive: true 엔티티가 있는 피처는 Gate 0 에 TDD 전략이 강제된다."
      rationale: "민감 데이터 경로의 회귀를 계약 수준에서 막기 위함."
    - id: "BR-011"
      statement: "에이전트는 Tool 권한 매트릭스(§6.3.1) 의 상한을 초과하는 tools 를 frontmatter 에 선언할 수 없다."
      rationale: "scope 밖 파일 수정·네트워크 호출이 조용히 섞이는 것을 차단."
    - id: "BR-012"
      statement: "명령은 CQS 원칙을 지킨다 — 진단 계열(status/check/events/metrics) 은 파일을 수정하지 않는다."
      rationale: "진단 중 의도치 않은 변이가 보고 내용을 무의미하게 만드는 것을 방지(§7.3.8 v2.3.3 보정)."
    - id: "BR-013"
      statement: "events.log 는 append-only JSONL 이며 기존 레코드 수정·삭제를 금지한다."
      rationale: "감사성 — 나중 '왜 이렇게 되었는가' 추적 가능성이 사라지면 하네스의 핵심 가치가 붕괴."
    - id: "BR-014"
      statement: "anti-rationalization 2행을 preamble 직후에 항상 출력한다(v2.3.1 신설)."
      rationale: "LLM 이 스스로의 건너뛰기를 그럴듯하게 합리화하지 못하도록 스텝 엔포스."
  vocabulary:
    - term: "Walking Skeleton"
      meaning: "첫 피처(F-001)는 기술 스택 전 경로를 가로지르는 최소 구현이어야 한다. Gate 5 까지 통과 필수."
    - term: "Transparency-by-Preamble"
      meaning: "모든 명령은 3줄 요약을 명시 출력한다(mode/scope/next). v2.3.1 의 투명성 우선 원칙."
    - term: "Edit-wins"
      meaning: "파생 파일이라도 사용자 수정이 있으면 재생성이 덮어쓰지 않는다(domain.md, architecture.yaml 에 한정)."
    - term: "Fail-open hook"
      meaning: "hook 실패가 사용자 작업을 막지 않는다. 실패는 로그에만 남는다."
    - term: "$include"
      meaning: "spec.yaml 의 🗒 필드에서 외부 md 파일을 불러오는 v2.3.7 신설 문법. 깊이 1 고정."
    - term: "Canonical hashing"
      meaning: "Canonical YAML → Canonical JSON → SHA-256 파이프라인(§부록 D)."
    - term: "Mode A/B/R/E"
      meaning: "/harness:spec 의 자동 분기 — Addition / Baseline / Refine / Explain."
    - term: "Gate 0~5"
      meaning: "tests → compile → style → coverage → commit → runtime smoke 순서 품질 관문."
    - term: "CQS"
      meaning: "Command-Query Separation. 상태 변경 명령과 조회 명령의 분리 원칙."
    - term: "SSoT"
      meaning: "Single Source of Truth. harness-boot 에서는 spec.yaml 하나."

features:
  - id: "F-001"
    name: "Skeleton — /harness:init 으로 Walking Skeleton 부팅"
    type: "skeleton"
    status: "done"             # v0.1.0 (2026-04-23 태그) · v0.1.1 에서 hardening 완료
    release_target: "v0.1"
    description: "사용자 프로젝트에 `.harness/` + `.claude/` 설치, spec.yaml stub, CLAUDE.md shim, 훅/에이전트/스킬 기본 세트를 깔고 첫 실행이 Gate 5 까지 성공하도록 만듦."
    modules:
      - "init_command"
      - "install_target_detector"       # repo root / subdir 판별
      - "scaffold_renderer"               # 템플릿 → 파일 시스템
      - "claude_md_shim"                  # v1 호환 shim 생성
      - "preamble_emitter"                # 3줄 출력
    test_strategy: "tdd"
    tdd_focus:
      - "빈 디렉터리에서 init 시 9개 파일이 정확히 생성됨"
      - "이미 .harness/ 존재 시 --yes 없이 중단"
    acceptance_criteria:
      - "init 완료 후 즉시 /harness:sync 가 Gate 5(runtime smoke) 까지 통과"
      - "생성된 CLAUDE.md 는 shim 형태(플러그인 루트 참조)"
      - "events.log 에 install 이벤트 1건 적재"
      - "preamble 3줄이 정확한 형식(mode/scope/next)"
    v0_1_smoke_notes:
      - "CC 2.1.x 에서 $CLAUDE_PLUGIN_ROOT 미설정 확정 — $PATH bin 역산으로 경로 해석 (NEW-37)"
      - ".claude/ 빈 디렉터리 · CLAUDE.md 의 phantom @import 모두 silently ignore"
      - "directory-type marketplace 의 installPath 가 실제로 생성되지 않음 (NEW-44)"

  - id: "F-002"
    name: "/harness:spec — Mode A/B/R/E 자동 분기"
    type: "feature"
    status: "partial"           # 2026-04-23: Mode classifier + Mode E 구현 완료.
                                # Modes A/R (diff 렌더) · B-2 (plan.md 변환) 는
                                # spec-conversion skill + LLM 대화 드리븐으로 남김.
    release_target: "v0.2"
    description: "입력 성격·파일 상태에 따라 4 모드로 자동 분기. spec.yaml 신규·추가·정제·설명 각 경로 처리."
    modules:
      - "spec_command"
      - "mode_classifier"
      - "baseline_generator"    # B
      - "addition_merger"        # A
      - "refine_editor"          # R
      - "explain_renderer"       # E (read-only)
    test_strategy: "tdd"
    tdd_focus:
      - "spec.yaml 부재 시 B, 존재 시 A/R/E 자동 선택"
      - "E 는 어떤 경우에도 파일을 수정하지 않음(CQS 검사)"
    acceptance_criteria:
      - "4 모드가 결정론적으로 분기(동일 입력 → 동일 모드)"
      - "A/R 은 git diff 로 사용자 리뷰 가능 + --dry-run 지원"
      - "모드 선택 결과가 preamble 의 mode 행에 표시"

  - id: "F-003"
    name: "/harness:sync — Phase 0(파생) + Phase 1(빌드) 2단계"
    type: "feature"
    status: "done"              # 2026-04-23: Phase 0 구현 완료 (scripts/sync.py + 14 tests).
                                # Phase 1 (Gate 실행) 은 F-004 /harness:work 에 분리.
    release_target: "v0.2"
    depends_on: ["F-009", "F-010"]   # include 엔진 + canonical hashing 선행
    description: "Phase 0 = spec.yaml 확장·해시·파생 파일(domain.md, architecture.yaml) 재생성. Phase 1 = 풀 빌드·테스트·Gate 5 실행. delta 모드는 영향받은 피처만."
    modules:
      - "sync_command"
      - "include_expander"      # $include 전개 (F-009 에서 제공)
      - "domain_renderer"
      - "architecture_renderer"
      - "gate_runner"           # Gate 0~5
      - "delta_selector"
      - "plugin_root_resolver"  # v0.1.1 NEW-37 패턴 — $PATH bin 역산 + installPath fallback
    test_strategy: "tdd"
    tdd_focus:
      - "edit-wins 보존(domain.md 사용자 수정이 덮이지 않음)"
      - "delta 빌드가 영향 피처만 선별"
      - "include expand 실패 시 즉시 중단"
      - "plugin_root_resolver 가 directory-type marketplace 에서도 source.path fallback 으로 정상 동작 (NEW-44 회귀)"
    acceptance_criteria:
      - "Phase 0 재실행 시 해시가 동일(canonical 재현성)"
      - "Gate 5 통과 이전에는 state.yaml.active_feature 가 done 으로 전환되지 않음"
      - "sync --delta 가 전체 빌드 대비 ≥ 60% 시간 단축(표준 케이스 측정)"
      - "첫 실행 시 생성된 domain.md · architecture.yaml 이 CLAUDE.md 의 @import 타겟과 매칭 (v0.1.x 의 phantom import 해소)"
      - "harness-boot-self 스펙을 입력으로 sync 실행 → self-describe round trip 성공 (dogfood 검증)"

  - id: "F-004"
