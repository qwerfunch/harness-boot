  - id: "F-081"
    name: "Graceful import degradation — dashboard works without tomli, sync --soft exits 0 without pyyaml"
    type: "feature"
    description: |
      External-dogfood feedback batch (2026-04-29). A new user reported
      two install-time bugs on macOS system Python 3.9 that block the
      first-run experience:

      1. `/harness-boot:work` (dashboard mode) crashes with
         `ModuleNotFoundError` when neither `tomllib` (Python 3.11+)
         nor `tomli` (backport) is installed. The two-step try/except
         in `scripts/scan/style_fingerprint.py:14-17` only catches the
         first ImportError; the second one (tomli also missing)
         propagates and aborts module load. work.py imports the scan
         package, so even the read-only dashboard becomes unreachable.
         Same crash shape exists in `scripts/scan/manifest.py:18-20`
         and `scripts/scan/seed_spec.py:23-25`.

      2. `scripts/sync.py --soft` exits 1 instead of 0 when pyyaml is
         missing. The module-level `import yaml` runs before argparse
         sees `--soft`, breaking F-076's "soft mode always exits 0"
         contract. `/harness-boot:init §5.5` invokes `sync.py --soft`,
         so a fresh init treats the missing optional dep as a hard
         failure.

      Both bugs share a common root: the plugin assumes pyyaml/tomli
      are installed (they are listed in requirements-dev.txt) but does
      not bundle or runtime-verify them. F-081 ships the inner
      defensive layer — graceful degradation so the plugin never
      crashes on a missing optional dep. F-082 ships the outer layer
      (init preflight + offer-to-install).

      Together they make the first-run experience smooth regardless of
      the user's Python environment.
    modules:
      - "scripts/sync.py"
      - "scripts/scan/style_fingerprint.py"
      - "scripts/scan/manifest.py"
      - "scripts/scan/seed_spec.py"
      - "tests/unit/test_sync.py"
      - "tests/unit/scan/test_style_fingerprint.py"
    test_strategy: "tdd"
    tdd_focus:
      - "scripts/sync.py wraps `import yaml` so module load survives a missing pyyaml"
      - "scripts/sync.py:main() returns 0 when --soft + yaml missing (F-076 contract preserved)"
      - "scripts/sync.py:main() returns 1 when strict + yaml missing (existing behavior)"
      - "scripts/scan/{style_fingerprint,manifest,seed_spec}.py wrap tomllib/tomli in nested try/except — sets `tomllib = None` when neither is present"
      - "_pyproject_has and other tomllib.loads sites guard with `if tomllib is None: return False` (or equivalent skip)"
      - "Existing dashboard / sync flows are unchanged when deps are present (regression 0)"
    acceptance_criteria:
      - "AC-1: scripts/sync.py top-of-module replaces the bare ImportError exit with a try/except that sets `_YAML_AVAILABLE = False` and `yaml = None`. main() checks `_YAML_AVAILABLE` first; when False and `--soft` is in argv, prints `sync (initial): fail — pyyaml not available (install via …)` and returns 0; otherwise prints to stderr and returns 1."
      - "AC-2: scripts/scan/style_fingerprint.py rewrites the import block to a nested try/except — outer catches `tomllib` ImportError, inner catches `tomli` ImportError, both branches set `tomllib = None`. `_pyproject_has` returns False when `tomllib is None` without raising."
      - "AC-3: scripts/scan/manifest.py applies the same nested try/except + guards each `tomllib.loads` site (pyproject.toml + Cargo.toml branches)."
      - "AC-4: scripts/scan/seed_spec.py applies the same nested try/except + guards the `tomllib.loads` site (Cargo.toml branch)."
      - "AC-5: tests/unit/test_sync.py adds `test_soft_cli_returns_zero_when_pyyaml_missing` and `test_strict_cli_returns_one_when_pyyaml_missing` (monkeypatch `_YAML_AVAILABLE = False`)."
      - "AC-6: tests/unit/scan/test_style_fingerprint.py (new file or extension) adds at least one case asserting `_pyproject_has` returns False when `tomllib is None` and does not raise."
      - "AC-7: F-081 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS · regression 0 across 1179+ unit + integration tests."
      - "AC-8: F-081 completed via the work.py 4-verb cycle (activate → run-gate gate_0 + gate_5 → declared evidence → complete) — Phase 2 dogfood."

  - id: "F-082"
    name: "Init dep preflight — ask user before pip install (F-082 paired with F-081)"
    type: "feature"
    description: |
      Outer companion to F-081. While F-081 ensures the plugin never
      crashes on a missing optional dep, the user still wants to know
      "your environment is missing X — install now? (yes/no/venv)"
      so the deps actually get installed and full functionality is
      restored. F-082 wires that prompt into `/harness-boot:init`.

      Decision tree (markdown contract — no auto-execution):

        1. §0.5 preflight runs `python3 -c "import yaml" && (import
           tomllib || import tomli)`.
        2. If all OK → continue normal init flow. Zero overhead.
        3. If missing → tell the user (single message in their
           language): which packages are missing, then ask
           `yes / no / venv`.
        4. Wait for user response. Never auto-install.
        5. Branch on answer:
           - `yes` → `python3 -m pip install --user pyyaml "tomli; python_version<'3.11'"`.
             If pip exits non-zero with PEP 668 / "externally-managed-environment",
             ask once more whether to use `--break-system-packages`.
           - `no` → print the install command for later use, continue
             init in degraded mode (F-081 backstop).
           - `venv` → print the `python3 -m venv .venv && …` command,
             continue init (user re-runs after activating venv).
        6. Always continue — never abort init on dep failure.
        7. Append a `deps_preflight` event to events.log so retro /
           metrics can observe first-visit user flow.

      Why ask permission instead of auto-install: the user's Python
      environment is their asset. PEP 668 markers are typically there
      because the user (or their distro) intentionally set them.
      Modifying that without consent is worse UX than asking once.

      F-082 is markdown-contract change — no Python helper unless we
      need a shared `events.log` writer (already exists via
      `scripts/core/event_log.py`).
    modules:
      - "commands/init.md"
      - "tests/unit/test_init_md_preflight_contract.py"
    test_strategy: "contract"
    tdd_focus:
      - "commands/init.md gains a §0.5 'Optional dependency preflight' section between §0 and §1"
      - "the section's bash block runs `python3 -c \"import yaml\"` and the `import tomllib || import tomli` chain"
      - "the section instructs Claude to ask the user (yes/no/venv) before any pip invocation"
      - "the `yes` branch references `python3 -m pip install --user`; the `no` branch references degraded mode + later-install command; the `venv` branch references `python3 -m venv .venv`"
      - "the PEP 668 fallback is documented (one extra round-trip ask before --break-system-packages)"
      - "init.md never aborts init on dep failure — F-081 backstop handles whatever the user chose"
    acceptance_criteria:
      - "AC-1: commands/init.md adds a new §0.5 'Optional dependency preflight' section between the existing §0 (Pre-flight — detect existing install) and §1 (Create directories)."
      - "AC-2: §0.5 includes a bash block that runs `python3 -c \"import yaml\"` and `python3 -c \"import tomllib\"` || `python3 -c \"import tomli\"` and prints `deps: ok` or `deps: missing`."
      - "AC-3: §0.5 instructs Claude to send a single message asking the user `yes / no / venv` when deps are missing, and to wait for the response before any pip invocation."
      - "AC-4: §0.5 documents the three response branches (yes / no / venv) including the PEP 668 fallback under `yes` (one additional ask before `--break-system-packages`)."
      - "AC-5: §0.5 explicitly states init must always continue — F-081 graceful degradation handles whatever the user chose."
      - "AC-6: §0.5 specifies a `deps_preflight` event must be appended to events.log with `status ∈ {ok, installed, skipped, failed}` and the missing list."
      - "AC-7: tests/unit/test_init_md_preflight_contract.py asserts the §0.5 anchor exists, the three branches are present, the PEP 668 fallback is mentioned, and the section ordering between §0 and §1 is correct."
      - "AC-8: F-082 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS."
      - "AC-9: F-082 completed via the work.py 4-verb cycle — Phase 2 dogfood."
      - "AC-10: F-081 + F-082 ship together as v0.12.2 patch release. Originally-queued F-082 (kickoff Quantitative completeness section) and F-083 (carry-forward debt) renumber to F-084 and F-085 respectively; CHANGELOG queue line updated to reflect the shift."

  - id: "F-084"
    name: "v1.0 TypeScript migration — foundation (project setup + canonical_hash port)"
    type: "feature"
    description: |
      Strategic pivot kickoff. The Python dependency is a long-term
      burden: fresh-install users on macOS / Windows / stripped Docker
      hit `command not found` before any helpful message reaches them
      (F-081 / F-082 mitigated but did not eliminate this); other AI
      CLIs (Cursor, Cline, Aider, Copilot CLI) are all Node-based;
      Claude Code itself runs on Node. v1.0 collapses the runtime to
      TypeScript / Node.

      Rewriting ~50 Python modules into TS is a multi-cycle thread
      (F-084 → F-110+). F-084 is the foundation cycle:

      1. Project bootstrap — package.json, tsconfig.json, vitest
         config, eslint + prettier, src/ + tests/ skeleton.
      2. Library choices locked: `yaml` (eemeli/yaml), `smol-toml`,
         `zod`, `commander`, `node:crypto`, `vitest`.
      3. Port the most critical module first —
         `scripts/core/canonical_hash.py` →
         `src/core/canonicalHash.ts`. Every drift detector and every
         spec_hash record depends on this byte-for-byte. If the TS
         port deviates by even one byte, the entire drift system
         breaks.
      4. Parity test framework — `tests/parity/` directory with
         Python-generated fixtures + TS reads same fixtures + asserts
         byte-equal SHA-256 output.

      Behaviour preservation is the prime directive (memory
      `feedback_typescript_migration`). Every subsequent module port
      (F-085+) follows the same pattern: parity test first, port
      second, byte-equal verification third. Python sources stay live
      during migration so the plugin keeps working — TS modules
      graduate to production use only after their parity tests are
      green and the Python equivalents are demoted to legacy/.

      Subsequent migration cycles (rough plan, 30+ features):
      F-085~F-087 core/state, eventLog, pluginRoot, projectMode,
      gates · F-088~F-090 spec/* · F-091 render/* · F-092~F-094
      scan/* · F-095~F-097 check/* (13 drift detectors) · F-098~F-100
      work/* + autowires · F-101~F-104 ceremonies/* · F-105~F-107
      ui/* · F-108 gate/runner · F-109 bin/harness + commands/*.md
      update · F-110+ slash command rewrite + Python deprecation +
      v1.0 release.
    modules:
      - "package.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".eslintrc.json"
      - ".prettierrc.json"
      - "src/core/canonicalHash.ts"
      - "tests/parity/canonicalHash.test.ts"
      - "tests/parity/fixtures/canonical_hash/"
    test_strategy: "tdd"
    tdd_focus:
      - "package.json declares yaml + smol-toml + zod + commander + vitest + typescript + eslint + prettier; scripts: build, test, lint, format, typecheck"
      - "tsconfig.json uses Google TS settings — strict mode, ES2022 target, NodeNext module, no implicit any"
      - "src/core/canonicalHash.ts exports `canonicalHash(data: unknown): string` matching scripts/core/canonical_hash.py:canonical_hash signature"
      - "JSDoc class/function-level comments mandatory and in English (memory `feedback_typescript_migration`)"
      - "tests/parity/canonicalHash.test.ts loads Python-generated fixtures and asserts byte-equal hash output"
      - "vitest runs cleanly (`npm test` exits 0); ESLint + Prettier pass on src/ and tests/"
      - "Existing Python tests (1204) still pass — TS port is additive, not replacing yet"
    acceptance_criteria:
      - "AC-1: package.json declares yaml, smol-toml, zod, commander as runtime deps; vitest, typescript, @types/node, eslint, @typescript-eslint/eslint-plugin, @typescript-eslint/parser, prettier as dev deps. Scripts: build (tsc), test (vitest), test:parity (vitest run tests/parity), lint, format, typecheck."
      - "AC-2: tsconfig.json — strict true, target ES2022, module NodeNext, moduleResolution NodeNext, esModuleInterop true, noImplicitAny true, declaration true, outDir dist, rootDir src, include [src/**/*, tests/**/*]."
      - "AC-3: vitest.config.ts wired so `npm test` runs unit tests under tests/, parity tests opt-in via test:parity script."
      - "AC-4: .eslintrc.json + .prettierrc.json reflect Google TS style — single quotes, 100-char lines, semicolons explicit, no any."
      - "AC-5: src/core/canonicalHash.ts ports scripts/core/canonical_hash.py byte-for-byte. Public API: `canonicalHash(data: unknown): string`. JSDoc references the Python source explicitly. Comments in English."
      - "AC-6: tests/parity/fixtures/canonical_hash/ contains at least 5 Python-generated fixture pairs (empty dict, simple feature, full subtree, null/nested arrays edge case, unicode strings). Each fixture is {input.json, expected.txt} with the Python-computed hash."
      - "AC-7: tests/parity/canonicalHash.test.ts loads each fixture pair, runs canonicalHash(input), asserts equality with expected.txt. All fixtures pass."
      - "AC-8: .gitignore adds node_modules/ and dist/. Existing Python scripts/ and tests/ are unchanged in this cycle."
      - "AC-9: bash scripts/self_check.sh 5/5 PASS (Python-side regression) · 1204+ Python tests still pass · `npm test` exits 0 (TS-side foundation)."
      - "AC-10: F-084 mirrored on both spec.yaml copies. Self-dogfood cycle (activate → gates → evidence → complete) on `feat/F-084-ts-migration-foundation` branch; PR opened to develop, awaiting user approval before any merge."

  - id: "F-085"
    name: "TS migration — port core/eventLog.ts (events.log rotation + unified read)"
    type: "feature"
    description: |
      Second cycle of the v1.0 migration thread (F-084 → F-110+, memory
      `feedback_migration_pr_strategy`). Ports
      `scripts/core/event_log.py` (events.log rotation + unified read
      across rotated buckets) to TypeScript with byte-equal output.

      Why this module first: events.log is the audit trail the entire
      harness lifecycle leans on (feature_activated, gate_run,
      evidence_added, feature_done, kickoff_started, retro_written,
      ...). Every emitter writes to it and every read consumer
      (status, metrics, dashboard) merges it across rotated siblings.
      A drift here corrupts retros + metrics + drift detection silently.

      Public API ported (1:1 names, camelCase per memory
      `feedback_typescript_migration`):

        - `readEvents(harnessDir)` — async iterator yielding events in
          timestamp-ascending order, merging events.log + every
          events.log.YYYYMM rotated bucket
        - `rotate(harnessDir, options)` — splits events older than the
          current UTC month into events.log.YYYYMM buckets; returns a
          `{yyyymm: count}` move map; `dryRun` and `nowYyyymm`
          (test-injection) options preserved
        - `parseYyyymmFromTs(ts)` exposed as helper for the parity test
          and downstream callers

      Behaviour preservation focus areas:

        - Sort order: ISO 8601 lexicographic; unparseable-ts events
          sort last but never drop
        - JSON line output: `JSON.stringify(ev) + '\n'` (Python uses
          `json.dumps(ev, ensure_ascii=False) + '\n'` — ensure_ascii
          False is the default in JS, but unicode escaping mode must
          match exactly)
        - Idempotency: rotate twice produces identical disk state
        - Bucket append: events.log.YYYYMM files are appended-to, not
          overwritten — preserves pre-existing history when re-rotating

      Parity test (`tests/parity/eventLog.test.ts`):

        - Python fixture generator writes 8 sample events.log inputs
          (single event, multi-month split, unparseable ts, empty
          file, rotated bucket already present, idempotent rotation,
          unicode summary text, large bucket)
        - For each input, Python computes the expected
          {events.log post-rotate, bucket file contents, move map}
        - TS reads the same inputs, runs `rotate()`, asserts byte-equal
          file contents + move map equality

      readEvents parity test:

        - For each fixture state, run Python `read_events` to get the
          ordered event list
        - TS `readEvents` yields the same sequence (deep-equal)

      Implementation notes:

        - File I/O: `node:fs/promises` for async reads, `node:fs` sync
          for write paths that match Python's blocking semantics
        - Path: `node:path` joins for cross-platform safety
        - JSON: native `JSON.stringify` / `JSON.parse`; canonical form
          not needed here since events.log is per-line JSON, not a
          single canonicalized blob
        - No external deps beyond what F-084 introduced
    modules:
      - "src/core/eventLog.ts"
      - "tests/parity/eventLog.test.ts"
      - "tests/parity/fixtures/event_log/"
    test_strategy: "tdd"
    tdd_focus:
      - "readEvents merges events.log + every events.log.YYYYMM, sorts ISO ts ascending, never drops unparseable-ts events"
      - "rotate splits older-than-current-month events into events.log.YYYYMM buckets, preserves current month + unparseable in events.log"
      - "rotate is idempotent — running twice produces identical disk state"
      - "rotate appends to existing rotated files, never overwrites pre-existing history"
      - "parseYyyymmFromTs returns null on unparseable input, never throws"
      - "JSDoc class/function-level English comments throughout"
    acceptance_criteria:
      - "AC-1: src/core/eventLog.ts exports readEvents, rotate, parseYyyymmFromTs with the same semantics as scripts/core/event_log.py. Public API uses camelCase TS conventions; behaviour matches byte-equal."
      - "AC-2: tests/parity/fixtures/event_log/ contains at least 8 fixture pairs (input events.log + expected post-state) generated by a Python helper script."
      - "AC-3: tests/parity/eventLog.test.ts loads each fixture, runs rotate / readEvents, asserts byte-equal output + identical move map."
      - "AC-4: Idempotency test — running rotate twice in a row on the same input produces identical files (Python + TS both verified)."
      - "AC-5: Unicode preservation — events with Korean / emoji summary text round-trip without escaping changes."
      - "AC-6: Empty file + missing file edge cases — both Python and TS return empty results without raising."
      - "AC-7: F-085 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS · 1192+ Python tests still pass · npm run test:parity green for both canonicalHash and eventLog."
      - "AC-8: F-085 completed via the work.py 4-verb cycle on the existing `feat/F-084-ts-migration-foundation` branch (memory `feedback_migration_pr_strategy` — single umbrella PR for the whole thread)."

  - id: "F-086"
    name: "TS migration — port core/state.ts (state.yaml read/write + Iron Law math)"
    type: "feature"
    description: |
      Third cycle of the v1.0 migration thread. Ports
      `scripts/core/state.py` (the State class plus Iron Law math
      helpers) to TypeScript with semantic-equivalence parity.

      Why this module: state.yaml is the canonical mutable state of a
      harness install. Every work.py verb (activate, recordGate,
      addEvidence, complete) reads and writes it. Iron Law's "declared
      evidence count" check is implemented here and is the gate
      complete() relies on. A drift in state mutations or in the Iron
      Law math silently corrupts feature progress tracking.

      Public API ported (camelCase TS, semantic 1:1 with Python):

        - `State` class with `load(harnessDir)` / `save()` /
          `featureIds()` / `getFeature(fid)` / `ensureFeature(fid)` /
          `setStatus(fid, status)` / `recordGateResult(fid, gate, result, opts)` /
          `addEvidence(fid, kind, summary, opts)` /
          `addSkippedAgent(fid, agent, reason, opts)` /
          `getSkippedAgents(fid)` / `setActive(fid)` /
          `removeFeature(fid)` / `featuresInProgress()` /
          `setLastCommand(command)` / `featureCounts()` / `snapshot()`
        - `isDeclaredEvidence(ev)` — kind-based discriminator for Iron
          Law (automatic kinds vs declared kinds)
        - `countDeclaredEvidence(feature, options)` — trailing-window
          count for Iron Law gate
        - Constants: `FEATURE_STATUSES`, `GATE_RESULTS`,
          `AUTOMATIC_EVIDENCE_KINDS`, `IRON_LAW_WINDOW_DAYS`
        - Types: `GateResult`, `FeatureStatus`, `Feature`, `Session`,
          `StateData`

      Behaviour preservation focus:

        - YAML output: Python PyYAML uses block style with
          `sort_keys=False` + `allow_unicode=True` +
          `default_flow_style=False`. The TS port targets
          **semantic-equivalence parity** rather than byte-equal
          output: round-trip (parse → mutate → dump → parse) yields
          the same logical data, and both runtimes parse each other's
          output without surprise.
        - Timestamps: ISO 8601 `YYYY-MM-DDTHH:MM:SSZ`, identical
          format to Python's `_now()`.
        - Iron Law math: trailing-window inclusion rule — entries with
          unparseable or missing `ts` are treated as recent
          (conservative; matches Python).
        - Validation enums: same FEATURE_STATUSES + GATE_RESULTS sets
          throw on invalid values.

      Why semantic-equivalence (not byte-equal) for YAML output:

        - PyYAML and `yaml` (eemeli/yaml) have different quoting rules
          for ambiguous strings, slightly different scalar styling,
          different empty-string representations.
        - state.yaml is a data file, not a wire-format contract.
          What matters is that the data round-trips; byte equality
          would force us to reimplement PyYAML in TS, which is
          out of scope.
        - Cross-runtime read/write compatibility is the production
          requirement: Python writes → TS reads → TS writes → Python
          reads must all preserve data.

      Parity test scope:

        - Round-trip: load Python-generated state.yaml in TS, verify
          data shape matches Python's `yaml.safe_load`. Mutate in TS,
          save, reload — verify new shape matches Python's mutation
          output.
        - Iron Law math: identical inputs produce identical counts
          across runtimes (this is byte-equal — pure logic).
        - Mutation API: every Python method has a TS twin with the
          same observable effect on data shape.
        - Validation: invalid statuses / gate results throw in both
          runtimes.
    modules:
      - "src/core/state.ts"
      - "tests/parity/state.test.ts"
      - "tests/parity/fixtures/state/"
    test_strategy: "tdd"
    tdd_focus:
      - "State.load reads existing state.yaml or returns default schema; round-trips Python-written file"
      - "ensureFeature / setStatus / recordGateResult / addEvidence / addSkippedAgent mutate identically to Python"
      - "setActive auto-creates feature entry; removeFeature returns boolean"
      - "isDeclaredEvidence treats automatic kinds as non-counted, declared kinds as counted"
      - "countDeclaredEvidence honors trailing window, treats unparseable ts as recent"
      - "save produces YAML that Python's yaml.safe_load reads back identically"
      - "JSDoc class/function-level English comments throughout"
    acceptance_criteria:
      - "AC-1: src/core/state.ts exports the State class with all 17 methods from Python state.py, plus FEATURE_STATUSES / GATE_RESULTS / AUTOMATIC_EVIDENCE_KINDS / IRON_LAW_WINDOW_DAYS / isDeclaredEvidence / countDeclaredEvidence."
      - "AC-2: tests/parity/fixtures/state/ contains at least 6 fixture pairs covering empty state, active feature only, multi-feature with gates and evidence, Iron Law evidence counting (declared vs automatic mix), unicode summary, and skipped_agents trail."
      - "AC-3: tests/parity/state.test.ts verifies State.load → identical data shape (Python yaml.safe_load vs TS load.data)."
      - "AC-4: countDeclaredEvidence parity — identical counts across runtimes for the same fixture."
      - "AC-5: Mutation parity — for each public method, applying it on a fixture produces a state shape that Python recognizes as equivalent (parse + assertion)."
      - "AC-6: Save round-trip — TS writes state.yaml, Python yaml.safe_load reads it without error and produces the same logical data."
      - "AC-7: F-086 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS · 1192+ Python tests still pass · npm run test:parity green for canonicalHash + eventLog + state."
      - "AC-8: F-086 completed via the work.py 4-verb cycle on the existing `feat/F-084-ts-migration-foundation` branch."

  - id: "F-087"
    name: "TS migration — port core/pluginRoot.ts (4-strategy chain plugin root resolver)"
    type: "feature"
    description: |
      Fourth cycle of the v1.0 migration thread. Ports
      `scripts/core/plugin_root.py` (the 4-strategy plugin root chain
      from `commands/init.md §2`) to TypeScript with byte-equal
      strategy ordering and identical fallback semantics.

      Why this module: every TS-side script that has to find plugin
      assets (templates, agents, ceremonies, schemas) calls this
      resolver. A drift in strategy ordering or fallback decisions
      silently changes which plugin source the runtime picks, breaking
      live `/harness-boot:*` invocations across users.

      Public API ported (camelCase TS, semantic 1:1 with Python):

        - `resolve(pluginName?)` — runs the 4-strategy chain, returns a
          `Resolution` (root path · winning strategy · attempt log) or
          throws `PluginRootError`.
        - `PluginRootError` — class extending `Error`.
        - `Resolution` — `{ root, strategy, attempts[] }` interface.
        - Internal helpers exposed for parity tests:
          `_strategyPathBin`, `_strategyRegistry`, `_strategyMarketplaceSource`.

      Strategy chain (first hit wins):

        A. `$PATH` scan for `/plugins/<dir>/bin` segment + plugin.json
           name match.
        B. `~/.claude/plugins/installed_plugins.json` `installPath` (must
           exist on disk).
        C. `~/.claude/settings.json` `extraKnownMarketplaces.<mp>.source.path`
           combined with marketplace.json plugin source.
        D. (Failure) — throw `PluginRootError` with the attempt trace.

      Behaviour preservation focus:

        - Strategy ordering identical — A wins over B wins over C.
        - PATH parsing uses `path.delimiter` (matches Python's
          `os.pathsep`). Trailing slashes on PATH entries are
          tolerated; only entries that contain `/plugins/` and end in
          `/bin` count.
        - `~` expansion — `os.homedir()` is the TS equivalent of
          `os.path.expanduser`. Both expand only at the leading
          position; later-segment `~` is a literal directory name.
        - Failure mode — same error message format ("플러그인
          '<name>' 루트 해석 실패 — attempts: A path-bin: miss, B
          registry: miss, C mp-source: miss"). Korean preserved
          verbatim from the Python source so cross-runtime log
          tooling matches strings exactly.
        - Attempts trace — `attempts: ["A path-bin: hit|miss", ...]`
          identical wording.

      Parity test scope:

        - Per-strategy hit / miss / name-mismatch coverage with
          temporary HOME directories.
        - Chain ordering — A wins when both A and B are populated.
        - Attempt trace — when A and B miss but C hits, attempts has
          three entries with the right strings.
        - PluginRootError fires the exact message format on full miss.
        - PATH separator handling on POSIX (the only target platform
          for now; Windows path-delimiter semantics are deferred to a
          later cycle when slash-command Windows support is in scope).

    acceptance_criteria:
      - "AC-1: src/core/pluginRoot.ts exports `resolve`, `PluginRootError`, `Resolution`, plus `_strategyPathBin` / `_strategyRegistry` / `_strategyMarketplaceSource` for tests."
      - "AC-2: Strategy chain order matches Python: A:path-bin → B:registry → C:marketplace-source."
      - "AC-3: Each strategy's hit / miss / name-mismatch behaviour matches the Python helper byte-for-byte."
      - "AC-4: Resolution.attempts trace uses identical wording (`A path-bin: hit|miss`, `B registry: hit|miss`, `C mp-source: hit|miss`)."
      - "AC-5: PluginRootError message matches Python verbatim — `플러그인 '<name>' 루트 해석 실패 — attempts: ...` (Korean preserved as-is)."
      - "AC-6: tests/parity/pluginRoot.test.ts covers all three strategies + chain ordering + error message; uses fresh tmp HOME dirs to avoid host pollution."
      - "AC-7: F-087 mirrored on both spec.yaml copies. bash scripts/self_check.sh 5/5 PASS · 1192+ Python tests still pass · npm run test:parity green for canonicalHash + eventLog + state + pluginRoot."
      - "AC-8: F-087 completed via the work.py 4-verb cycle on the existing `feat/F-084-ts-migration-foundation` branch (umbrella PR #46 strategy)."

