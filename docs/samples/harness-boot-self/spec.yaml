      cold would think the harness is unfinished. This feature replaces
      the v0.3 tense with present-tense descriptions, removes the
      historical version markers from gate descriptions (CHANGELOG and
      git tags remain the source of truth for when each gate auto-runner
      landed), and keeps everything else in the file untouched.

