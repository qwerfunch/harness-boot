      - "dashboard agent chain 줄 동일 그룹 표기"
    acceptance_criteria:
      - "AC-1: kickoff.PARALLEL_GROUPS['sensitive_or_auth'] == [('security-engineer', 'reviewer')]."
      - "AC-2: kickoff.PARALLEL_GROUPS['ui_surface.present'] 가 has_audio=true 시 ('visual-designer', 'audio-designer') 포함, has_audio=false 시 그 그룹 drop."
      - "AC-3: WorkResult.parallel_groups (default_factory=list) — activate() 가 채움. 비-activate 액션은 빈 list."
      - "AC-4: format_human(activate result) 의 routed agents 라인이 그룹 표기. 그룹 없는 chain 은 기존 ', ' 회귀 0."
      - "AC-5: _result_to_dict() 에 parallel_groups: list[list[str]] 키."
      - "AC-6: dashboard._render_active_block 의 agent chain: 줄도 동일 그룹 표기."
      - "AC-7: commands/work.md Orchestration Routing 표의 ui_surface.present 행에 visual-designer ∥ audio-designer 명시 + Parallel dispatch 단락 신설."
      - "AC-8: agents/orchestrator.md Parallel Invocation Pattern 섹션 — single message multi tool use 패턴 + 안전 규칙 + 현재 그룹 2 종 인용."
      - "AC-9: 신규 unit ≥ 11 (parallel_groups 4 + work 4 + dashboard 3). F-038 회귀 0. self_check 5/5."
      - "AC-10: F-039 양쪽 spec.yaml mirror (diff -q PASS) + work.py 4-verb cycle 완주."

  - id: "F-040"
    name: "user-friendly output — i18n + glossary + visual signature"
    type: "feature"
    description: "사용자 실 사용 피드백 — '플러그인 출력의 용어가 어렵고, 한국어/영어 혼재되고, harness-boot 가 작업하는 게 구분 안 보임'. 4 가지 갭 메우기: (a) 사용자 언어 매칭 — env HARNESS_LANG / spec.project.language / LC_ALL 으로 영어/한국어 결정, default en. (b) 용어 표준화 — Walking Skeleton/Iron Law/drift/kickoff/retro/preamble/sigil/fog-clear/autowire 같은 jargon 의 사용자 친화 표현. messages catalog 가 영어/한국어 둘 다. (c) 시각 구분 — 모든 사용자 노출 출력에 일관 prefix (🛠 work · 🧰 init · 📊 dashboard) + 단계 진행 표시. (d) 친절한 설명 — work.md/init.md 에 Glossary 섹션 신설. 백엔드 결정론은 그대로 (수학공식), 사용자 표면만 부드럽게."
    modules:
      - "scripts/ui/lang.py"
      - "scripts/ui/messages.py"
      - "scripts/work.py"
      - "scripts/ui/dashboard.py"
      - "docs/schemas/spec.schema.json"
      - "commands/work.md"
      - "commands/init.md"
    test_strategy: "tdd"
    tdd_focus:
      - "lang.resolve_lang(): env HARNESS_LANG > spec.project.language > LC_ALL/LANG zh/ko/en 감지 > 'en' fallback"
      - "messages.t(key, lang): 미존재 키는 KeyError, 미존재 lang 은 'en' fallback"
      - "format_human() 의 라벨이 lang=ko 일 때 한국어, lang=en 일 때 영어"
      - "dashboard.render() 의 라벨도 동일 규칙"
      - "spec.schema 의 project.language enum ['en', 'ko', 'auto'] additive — 11 sample 회귀 0"
      - "기본값 (lang 미지정) 영어 — 외부 dev 진입 보호"
    acceptance_criteria:
      - "AC-1: scripts/ui/lang.py::resolve_lang(spec=None) — env HARNESS_LANG ('ko' 또는 'en') 1순위, spec.project.language 2순위, LC_ALL/LANG 안의 'ko'/'KR' 패턴 3순위, 'en' fallback. lang 'auto' 는 env+LC_ALL 만 본다."
      - "AC-2: scripts/ui/messages.py::t(key, lang='en') — catalog 에서 (lang, key) lookup. 미존재 키는 KeyError, 미존재 lang 은 'en' fallback."
      - "AC-3: catalog 가 최소 다음 키 보유: status, passed, failed, evidence, routed_agents, agent_chain, walking_skeleton, gate_pass, gate_fail, iron_law_block, in_progress, done, planned, blocked. en/ko 양쪽."
      - "AC-4: format_human() 가 lang 결정 후 messages.t() 호출. lang=ko 시 'status:' → '상태:', 'passed:' → '통과:', 'evidence: N entries' → '근거: N 개', 'routed agents:' → '라우팅된 팀:'."
      - "AC-5: dashboard.render() 가 동일 catalog 사용 — lang=ko 시 '진행:'/'근거:'/'agent chain:' → '에이전트 체인:'. work.py 와 일관."
      - "AC-6: docs/schemas/spec.schema.json::project.language 추가 (enum: ['en', 'ko', 'auto'], 기본 미설정). 11 sample 회귀 0."
      - "AC-7: commands/work.md + commands/init.md 끝에 'Glossary / 용어집' 섹션 — Walking Skeleton/Iron Law D/drift/kickoff/retro/preamble/sigil/fog-clear/autowire/gate 의 사용자 친화 풀이 (영어/한국어 한 줄씩)."
      - "AC-8: 신규 unit ≥ 12 (lang 4 + messages 4 + work 2 + dashboard 2). 누적 1029 + 12 ≈ 1041. self_check 5/5."
      - "AC-9: F-040 양쪽 spec.yaml mirror (diff -q PASS) + work.py 4-verb cycle 완주."

  - id: "F-041"
    name: "commands/ + agents/ rewrite at native-English level"
    type: "feature"
    description: "User feedback — '영어 번역이 아니라 영어 모국어 수준으로 작성해줘야함'. F-040 localized runtime output; F-041 closes the gap on the system prompts Claude Code loads (commands/ slash-command definitions + agents/ sub-agent fixtures), the loudest-Korean surface a non-Korean adopter encounters. 17 files, ~2400 body lines, 10–22% Korean density, rewritten as native English (not translation). Korean source frozen at docs/i18n/ko/ as a reference snapshot. New docs/glossary/BRAND_TERMS.md collapses jargon (Walking Skeleton / Iron Law D / drift / sigil / fog-clear / etc.) into a single bilingual reference each rewritten file backlinks to. Preamble + NO skip / NO shortcut prefixes preserved (self_check step 5 invariant)."
    modules:
      - "commands/init.md"
      - "commands/work.md"
      - "agents/orchestrator.md"
      - "agents/software-engineer.md"
      - "agents/reviewer.md"
      - "agents/backend-engineer.md"
      - "agents/frontend-engineer.md"
      - "agents/security-engineer.md"
      - "agents/a11y-auditor.md"
      - "agents/qa-engineer.md"
      - "agents/integrator.md"
      - "agents/tech-writer.md"
      - "agents/performance-engineer.md"
      - "agents/audio-designer.md"
      - "agents/visual-designer.md"
      - "agents/ux-architect.md"
      - "agents/researcher.md"
      - "agents/product-planner.md"
      - "agents/README.md"
      - "docs/glossary/BRAND_TERMS.md"
      - "docs/i18n/README.md"
    test_strategy: "contract"
    tdd_focus:
      - "no Korean script (gana/hangul block U+AC00..U+D7AF) anywhere in commands/*.md or agents/*.md"
      - "Preamble line + NO skip / NO shortcut prefixes survive every rewrite (self_check step 5)"
      - "frontmatter (name / description / tools) preserved on every agent; description field also English"
      - "agents header style # <name> — <one-liner>"
      - "docs/i18n/ko/ snapshot byte-matches the pre-rewrite git source"
      - "11/11 sample specs continue to validate; 1062 unit + 6 integration tests unchanged"
    acceptance_criteria:
      - "AC-1: grep for Korean script (U+AC00..U+D7AF) on commands/*.md + agents/*.md returns zero matches."
      - "AC-2: docs/i18n/ko/commands/{init,work}.md and docs/i18n/ko/agents/*.md exist and byte-match the pre-F-041 git source for those paths."
      - "AC-3: docs/glossary/BRAND_TERMS.md exists with at least 20 brand terms, each with EN gloss + KO gloss + primary file reference."
      - "AC-4: docs/i18n/README.md exists and states English-master / KO-frozen policy in one paragraph."
      - "AC-5: bash scripts/self_check.sh 5/5 PASS — Preamble validation across rewritten commands/*.md continues to succeed."
      - "AC-6: python3 scripts/spec/validate.py passes for both spec.yaml mirrors; 11/11 sample specs validate unchanged."
      - "AC-7: 1062 unit + 6 integration tests PASS unchanged; HARNESS_LANG=ko still produces Korean runtime labels (F-040 catalog untouched)."
      - "AC-8: every rewritten agents/*.md keeps its frontmatter (name / description / tools); description field is also English."
      - "AC-9: F-041 mirrored in both spec.yaml files (diff -q PASS) + work.py 4-verb cycle (activate → gate_0 → gate_5 → evidence → complete) completes."
      - "AC-10: spot-check — a native English-speaking dev can read commands/init.md end-to-end without hitting Korean script or unglossed jargon."

constraints:
  tech_stack:
    language: "typescript"            # §3 시스템 경계에 언급 없음 — 메타적 공백(NEW 갭 후보)
    runtime: "node-20+"
    cli_framework: "claude-code-plugin"   # Anthropic Claude Code plugin API
    yaml_lib: "js-yaml or yaml"
    hash: "sha-256 via node:crypto"
    test_runner: "vitest"                  # 추측 — 원본에 미명시
  architectural:
    - "SSoT = spec.yaml (BR-002)"
    - "사고의 글 vs 실행의 글 스키마 분리(BR-001)"
    - "Walking Skeleton 필수 + Gate 5 까지 통과(BR-003)"
    - "Transparency-by-Preamble: 모든 명령이 3줄 출력(BR-004)"
    - "CQS: 진단 명령은 read-only(BR-012)"
    - "Fail-open hooks(BR-006)"
    - "Canonical Hashing 3층 Merkle(BR-007)"
    - "$include 깊이 1 고정(BR-008)"
  compliance: []                           # library/worker 와 달리 외부 컴플라이언스 대상 없음 — 메타 도메인 특성
  prototype_mode: false                    # P-9: 이미 성숙한 아키텍처 문서. prototype-level 아님

deliverable:
  type: "cli-plugin"                       # ⚠ v2.3.7 스키마에 이 type 이 존재하는지 불확실 — NEW 갭 후보
                                           # 현재 스펙 스키마는 {web-service, library, worker, game} 중심
                                           # harness-boot 은 "Claude Code 용 플러그인" 이라는 고유 배포 형태
