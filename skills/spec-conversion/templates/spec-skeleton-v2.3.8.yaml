# ============================================================================
# spec.yaml 스켈레톤 — harness-boot v2.3.8 네이티브
# ============================================================================
# 사용법:
#   1) 이 파일을 `.harness/spec.yaml` 로 복사.
#   2) 주석 (# ← 으로 시작하는 설명) 을 읽고 해당 위치에 값 채움.
#   3) 비는 블록은 제거 (선택적 블록은 `null` 대신 삭제).
#
# v2.3.8 핵심:
#   - 9 블록이 `metadata.*` 에 **직접** 놓임 (v2.3.7 의 `metadata.extensions.*` 경유 금지).
#     command_map / ambient_files / host_binding / drift_catalog / versioning_axes /
#     contribution_points / preamble_contract / changelog / gate_chain
#   - `agent_permissions` 만 v2.4.0 대기 → `metadata.extensions.agent_permissions` 유지.
#   - 레거시 v2.3.7 입력은 `scripts/upgrade_to_2_3_8.py` 로 자동 승격 후 진행.
# ============================================================================

version: "2.3"   # 🔒 스키마 버전 (MINOR additive — v2.3.x 유지)

project:
  name: "<project-name>"                   # 🔒
  description:                             # 🗒 자유 텍스트 (5줄↑ 이면 $include 고려)
    $include: docs/spec/vision.md          # 또는 inline string
  stakeholders:                            # 🔒 end-user 제외
    - id: SH-1
      role: "<role>"
      concerns: ["<concern>"]
  invariants:                              # 🔒 구조적 안전 불변식 (P-15)
    - "<statement that must never be violated>"

domain:
  entities:                                # 🔒 3~7 권장. sensitive=true 자동 감지
    - id: E-1
      name: "<Entity>"
      attributes: ["<field>"]
      sensitive: false                     # auth/payment/token/... 매칭 시 true 제안
  business_rules:                          # 🔒 statement + rationale 분리 (H-2)
    - id: BR-1
      statement: "<MUST-style rule>"
      rationale: "<저자 강조 축 반영, P-21>"
      features_covered: ["F-1"]

constraints:
  tech_stack:                              # 🔒 결정값만 (이유는 ADR)
    runtime: "<node|python|...>"
  non_functional:                          # 🗒 G-01 — 현재 최상위 unrepresentable 이나 여기서 실험 가능
    - "p95 < 100ms"

deliverable:                               # 🔒 v2.3 필수
  type: "<cli|web-service|game|worker|library|static-site>"
  entry_points:
    - kind: "<command|http|cron|...>"
      command: "<binary / endpoint>"
      health_check: "<curl / --version ...>"
  smoke_scenarios:                         # 🔒 최소 1개
    - id: S-1
      given: "<precondition>"
      when: "<action>"
      then: "<expected>"

features:                                  # 🔒 최소 1개, features[0].type == skeleton
  - id: F-0
    type: skeleton                         # 🔒 Walking Skeleton 강제
    title: "<minimum round-trip>"
    priority: P0
    test_strategy: lean-tdd
    acceptance_criteria:
      - "<1 bullet = 1 AC (H-3)>"
    modules: []
  # ... type: feature 의 나머지

metadata:
  source:
    origin: "<idea|planning_doc|architecture_doc>"   # 🔒 reverse_engineered 금지 (v2.3.5+)
    maturity: "<planning|architecture|implementation>"  # P-16
    source_lines:                          # 최소 엔티티·피처 1건씩
      entities: [1]
      features: [1]
    revision: "v0.1"

  # --------------------------------------------------------------------------
  # ▼ v2.3.8 승격 블록 9종 — metadata.* 에 직접 배치 (extensions 경유 금지)
  # --------------------------------------------------------------------------

  # 1) command_map — CLI/slash/subcommand 지도 (meta 도메인 P0)
  command_map:
    - id: cmd-1
      name: "<binary subcommand>"
      kind: "<slash|cli|script>"           # optional
      mode: "<CQS: command|query>"
      preamble_required: false
      gate: null
      requires_state: null

  # 2) ambient_files — 사용자 레포의 생성물 계약 (SSoT / 파생 / edit-wins / append-only)
  ambient_files:
    - path: ".harness/spec.yaml"
      authorship: "user"                   # user|derived|tool-managed|generated
      policy: "stable_contract"            # 자유 문자열 (권장: stable_contract / append_only_events_log / edit_wins)

  # 3) host_binding — host-plugin 서브타입 필수 (self 무관)
  host_binding:
    host:
      kind: "<build-tool|editor-extension|lsp-server|test-runner>"
      id: "<vite|vscode|...>"
      version_range: "<semver range>"
    contract: "<peer_contract|publisher_contract>"
    hook_participation: ["<hook>"]

  # 4) drift_catalog — 불일치 분류
  drift_catalog:
    - id: drift-1
      severity: "<info|warn|critical>"
      source: "<trigger condition>"
      action: "<what to do>"

  # 5) versioning_axes — 다축 버전
  versioning_axes:
    - axis: "<plugin|spec|protocol|agent>"
      current: "<version>"
      policy: "<semver|rolling|pinned>"

  # 6) contribution_points — editor-extension 서브타입 전용 (VSCode/JetBrains/Chrome ext)
  contribution_points:
    - kind: "<command|keybinding|view|configuration|menus|statusbar|activationEvents>"
      id: "<name>"
      command: "<command_map[].id cross-ref>"

  # 7) preamble_contract — stdout 고정 포맷 (주로 self-bootstrap)
  preamble_contract:
    required: "<MUST|SHOULD|MAY>"
    format: "<3-line|banner|...>"
    sample: |
      <literal output>

  # 8) changelog — 재변환 라운드 기록 (MAY, P-24)
  changelog:
    - version: "v0.1"
      date: "<YYYY-MM-DD>"
      summary: "<what changed>"

  # 9) gate_chain — 순차 관문 (anyOf: on_fail/blocks 스타일 OR prerequisite/blocking 스타일)
  gate_chain:
    - id: gate-0
      name: "<pre-commit>"
      on_fail: "<block|warn>"
      blocks: ["gate-1"]
      # 또는
      # prerequisite: ["gate-0"]
      # blocking: true

  # --------------------------------------------------------------------------
  # ▼ extensions 네임스페이스 — v2.4.0 대기 잔여분만 (v2.3.8 에서는 agent_permissions 뿐)
  # --------------------------------------------------------------------------
  extensions:
    agent_permissions:                     # v2.4.0 에서 metadata.agent_permissions 로 승격 예정
      - agent: "<agent-id>"
        tools: ["<Read|Grep|Bash ...>"]
        forbidden: ["<tool|glob>"]
