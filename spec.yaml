# yaml-language-server: $schema=./schemas/spec.schema.json
# ============================================================================
# harness-boot — spec.yaml (v0.2.0 · 재작성 1 차 SSoT)
# ----------------------------------------------------------------------------
# 이 파일의 성격
#   - harness-boot 의 **단일 진실의 원천(SSoT)**. 사용자 편집은 오로지 이 한
#     파일에서만 발생한다 (BR-001 덮어쓰기 금지의 기준점).
#   - 파일 맨 위 `version:` 스키마 (v2.3.6) 를 그대로 준수한다.
#   - harness-boot 이 "자기 자신의 spec.yaml" 로 기술되는 **도그푸딩(dogfooding)**
#     예시이자, 사용자 프로젝트에도 같은 형태를 권장하는 레퍼런스.
#
# 버전 규약
#   - 파일 맨 위 `version:`  = spec.yaml **스키마** 버전 (설계 문서 §5 버전과 일치)
#   - `project.version`      = harness-boot 프로젝트 **제품** 버전 (semver)
#
# 구조 거울 — 플러그인 저장소 ⊃ 사용자 저장소
#   모든 CC 프로젝트는 공통적으로 `.harness/**` + `.claude/**` + 제품 코드를
#   가진다. 플러그인 저장소(= harness-boot) 는 여기에 "플러그인 제공자 전용 층"
#   (`.claude-plugin/plugin.json` · 루트 `commands/agents/skills/hooks`) 을 더한
#   **상위집합** 이다. 즉 `src/` 가 사용자 제품 코드에 해당하며, harness-boot 의
#   "제품" 은 플러그인 구현 자체이다.
#
# 부트스트랩(닭-달걀) 3 단계
#   Stage 0 — 손 에이전트 3 개(orchestrator/implementer/reviewer) + CLAUDE.md
#            규약이 spec.yaml 을 TODO 보드로 소비. 일반 Claude Code 만으로 F-001
#            ~ F-006 · F-007 · F-011 을 구현.
#   Stage 1 — 위 6 개 피처 도달 후 `/harness:analyze` 가 자기 `.claude/**` 를
#            파생. 스펙 변경 → 재파생이 루프로 돈다.
#   Stage 2 — `/harness:work` 도달 후 "다음 피처 자동 pick → integrator wire-up
#            → Gate 5 통과 → PR" 로 완전 자기 호스팅.
#
# 해소 대상 5 대 구조적 충돌
#   C1  SKILL.md Progressive Disclosure (500 라인 상한) vs
#       Anti-Rationalization 3-섹션 의무    → BR-006 (references/rationalization.md 분리)
#   C2  spec-kit Anti-Abstraction vs
#       harness-boot 가 어댑터 계층인 사실  → BR-003 (Anti-Abstraction-Scoped)
#   C3  Simplicity(3-프로젝트) vs
#       6-phase+6-pattern+4-stage 복잡도    → Canonical 6-Step 으로 단일화
#   C4  워크플로 3 종 중첩(spec-kit/harness/BMAD) → BR-007 (단일 Canonical 6-Step)
#   C5  Hook 3 필드 vs 실제 필요 확장       → BR-005 (공식 필드 네이티브
#                                           + .harness/hooks/meta.json 확장)
#
# 외부 OSS 레퍼런스 — 본 스펙 · Constitution · BR 의 인용 대상
#   - spec-kit              https://github.com/github/spec-kit            (MIT)
#                           GitHub 공식 SDD.  9-조항 Constitution · 4-stage 의 원형.  C2·C3·C4 출처.
#   - superpowers           https://github.com/obra/superpowers           (MIT)
#                           Iron Law 의 출처 — BR-004 의 직접 근거.
#   - BMAD-METHOD           https://github.com/bmad-code-org/BMAD-METHOD  (MIT)
#                           1-analysis ~ 4-implementation 다중 에이전트 워크플로.  C4 세 번째 축.
#   - Anthropic skills      https://github.com/anthropics/skills          (Apache-2.0, 일부 source-available)
#                           공식 스킬 저장소.  SKILL.md + references/ 레이아웃 표준 (BR-006).
#   - everything-claude-code https://github.com/affaan-m/everything-claude-code (MIT)
#                           Claude Code 주변 도구 · 프롬프트 큐레이션.  23 건 통합 제안의 한 출처.
#   - harness               https://github.com/revfactory/harness         (Apache-2.0)
#                           Phase 0~6 · 6-pattern 워크플로.  C4 두 번째 축, 프로젝트명 뿌리.
#
# 정식 목록 · 인용 역할은 `metadata.external_references` 참조.
# ============================================================================

version: "2.3.6"

# ----------------------------------------------------------------------------
# project — 무엇을 · 누구를 위해 · 왜 만드는가
# ----------------------------------------------------------------------------
project:
  name: harness-boot
  version: "0.2.0"
  summary: >
    Claude Code 위에서 동작하는 스펙 주도 개발 플러그인.
    단 하나의 `spec.yaml` 로 `.claude/**` 어댑터 층과 `.harness/**` 파생 뷰를
    생성 · 동기화 · 검증하며, 플러그인 자신도 같은 구조로 자기 호스팅한다.
  description: |
    **무엇인가.**  harness-boot 은 Claude Code 사용자가 "아이디어 메모 → 스펙 →
    Walking Skeleton → TDD 피처 → Gate 통과 릴리즈" 까지 한 줄의 인터뷰형
    명령(`/harness:analyze → :spec → :plan → :work → :check → :evolve`) 으로
    도달하게 해 주는 Claude Code 플러그인이다.  사용자는 `.harness/spec.yaml`
    단 **한 파일** 만 편집하고, 그 외 `.harness/**` · `.claude/**` 은 도구가
    파생 · 관리한다(BR-001 · BR-002 edit-wins 안전망).

    **왜 0.2.0 인가.**  v0.1.0 은 `legacy/` 로 아카이브되었고, 23 건의
    OSS 통합 제안(spec-kit, Anthropic skills, everything-claude-code, harness,
    BMAD-METHOD 등) 을 검증한 결과 다음 **5 대 구조적 충돌** 이 증분 패치로는
    해소되지 않음이 드러났다.

      * C1  SKILL.md 의 Progressive Disclosure(≤ 500 라인) 와
            Anti-Rationalization 3-섹션 의무가 같은 지면을 다투어 두 원칙 모두
            훼손된다.
      * C2  spec-kit Constitution Article V "Anti-Abstraction" 을 문자 그대로
            적용하면 harness-boot 자체가 Claude Code 위의 어댑터 계층이라는
            사실과 모순된다.
      * C3  Constitution Article IV "Simplicity(3-프로젝트)" 와 6-phase +
            6-pattern + 4-stage 가 모두 수용된 집합체의 복잡도가 어긋난다.
      * C4  워크플로 3 종(spec-kit SPECIFY→PLAN→TASKS→IMPLEMENT, harness
            Phase 0~6, BMAD 1-analysis~4-implementation) 이 중첩되어 사용자가
            "지금 어느 단계에 있는가" 를 판단하지 못한다.
      * C5  Hook 이 3 필드(matcher/command/timeout) 로 정의되어 async · env
            주입 · 서술적 에러 같은 핵심 기능을 막는다.  또한 설계 초안의
            8-field 주장이 공식 `hooks/hooks.json` 스키마와 부분 불일치한다
            (공식: type/command/async/asyncRewake/shell/timeout/statusMessage/
            once + 상위 matcher. 비공식: id/description/env).

    v0.2.0 은 증분 패치가 아닌 **원칙 수준의 재설계** 로 이 5 충돌을 푼다.
    구체적으로 (1) Constitution 을 9 → 7 Article 로 재구성하며 Article V 를
    "Anti-Abstraction-Scoped" 로 명시, (2) 워크플로를 Canonical 6-Step 으로
    단일화, (3) SKILL.md 500-라인 상한과 Anti-Rationalization 3-섹션을
    "core ≤ 500 + references/rationalization.md 분리" 로 화해, (4) Hook 을
    **공식 필드 네이티브** + `.harness/hooks/meta.json` 확장으로 분리 설계,
    (5) harness-boot 자체의 추상화 역할을 "Adapter Layer" 로 명시한다.

    **플러그인 저장소 ⊃ 사용자 저장소.**  모든 CC 프로젝트는 `.harness/**` +
    `.claude/**` + 제품 코드를 공유한다.  harness-boot 저장소는 여기에
    **플러그인 제공자 전용 층** (`.claude-plugin/plugin.json` · 루트
    `commands/agents/skills/hooks/`) 을 더한 상위집합이다.  이 대칭 덕분에
    harness-boot 는 자신도 사용자 프로젝트와 동일한 `.harness/**` · `.claude/**`
    를 두고(도그푸드), `src/` 가 사용자의 제품 코드 자리에 대응한다.

    **부트스트랩 3 단계.**
      * **Stage 0 (수동 부트스트랩)** — `.claude/agents/{orchestrator,
        implementer,reviewer}.md` 와 `.claude/commands/next-feature.md` 를
        손으로 쓰고, `CLAUDE.md` 에 "spec.yaml 에서 `status:planned` + 의존성
        충족 + 최저 `priority` 피처를 골라 구현" 규약을 박는다.  일반 Claude
        Code 가 `spec.yaml` 을 **TODO 보드** 처럼 소비하여 F-001~F-007·F-011
        을 구현한다.
      * **Stage 1 (부분 자기 호스팅)** — F-001·F-006·F-007·F-011 도달 후
        `harness-boot analyze` 가 자기 `.claude/**` 를 파생한다.  손 에이전트는
        유지하되 파생본과 병존하며, `harness.yaml.generated_from.root_hash` 가
        스펙 해시와 일치하기 시작한다.
      * **Stage 2 (완전 자기 호스팅)** — F-009·F-010·F-013 도달 후
        `/harness:work` 가 "다음 피처 pick → integrator wire-up → Gate 5 통과
        → PR" 을 자동으로 돈다.  손 에이전트는 `superseded_by: <파생>` 로
        표시 후 폐기한다(ADR 기록).

    **무엇이 달라지는가.**  사용자 관점에서는 `.harness/spec.yaml` 한 파일
    편집은 동일하되, validator 가 공식 스키마 준수를 보장하고 IDE
    autocompletion 이 작동한다.  플러그인 작성자 관점에서는 Hook 정의가 공식
    `hooks/hooks.json` + 별도 메타 파일로 분리되고, Skill 레이아웃이 `SKILL.md`
    + `references/` 로 표준화된다.  Claude Code 생태계 관점에서는 공식 스킬
    (docx · pptx · pdf · xlsx) 과 디렉토리 레이아웃이 호환된다.
  vision: |
    Claude Code 를 처음 만지는 개발자가 "아이디어 메모 → `spec.yaml` → 로컬
    PoC 기동 → 첫 TDD 피처 커밋" 까지 **하루 안에** 끝낼 수 있는 경로를
    기본값으로 만드는 것.  1 년 내 Claude Code 공식 플러그인 레지스트리 상위
    10 개 안에 자리 잡고, 2 년 내 기업 개발팀의 "PoC → 프로덕션" 표준 워크플로
    한 축으로 채택되는 것을 목표로 한다.
  stakeholders:
    - role: plugin_user
      concerns:
        - "한 번의 `/harness:analyze` 로 `.harness/` 골격이 설치되어야 한다"
        - "`spec.yaml` 한 파일만 편집하면 나머지는 도구가 알아서 유지해야 한다"
        - "TDD 흐름이 로컬 실행부터 CI 까지 자연스럽게 이어져야 한다"
        - "에러 메시지는 원인과 다음 행동을 함께 알려 줘야 한다"
        - "한국어 작성이 기본이되, 추후 영어 전환 시 변환 도구가 제공되어야 한다"
    - role: plugin_author
      concerns:
        - "새 extractor · verifier · rule 을 150 LOC 이하 엔트리로 붙일 수 있어야 한다"
        - "`spec.yaml` 스키마가 JSON Schema 로 공개되어 IDE autocompletion 이 된다"
        - "Breaking change 는 MAJOR bump 와 자동 마이그레이션으로만 허용된다"
        - "플러그인 계약(`@harness-boot/plugin-api`) 이 타입으로 정적 검증된다"
    - role: claude_code_ecosystem
      concerns:
        - "공식 Anthropic skills (docx · pptx · pdf · xlsx) 와 디렉토리 레이아웃이 호환된다"
        - "`hooks/hooks.json` 공식 포맷을 100% 준수하고 비공식 필드는 별도 메타 파일로 보관"
        - "`.claude-plugin/plugin.json` 매니페스트가 정확하게 존재한다"
        - "슬래시 명령 네임스페이스가 `/harness:*` 로 일관된다"
    - role: enterprise_adopter
      concerns:
        - "라이선스가 Apache-2.0 으로 기업 배포에 마찰이 없어야 한다"
        - "감사 로그(append-only · 90 일 보존) 가 기본 제공되어야 한다"
        - "설치 · 업그레이드 · 롤백이 결정적이고 재현 가능해야 한다"
        - "비밀·PII 가 훅 env · 이벤트 로그에 새지 않아야 한다"
    - role: maintainer
      concerns:
        - "`spec.yaml` SSoT 불변성을 훼손하는 PR 은 거부된다"
        - "v0 → v1 마이그레이션 자동 테스트셋이 CI 에서 실패 없이 돈다"
        - "Stage 0 → 2 전환 각 단계가 ADR 로 기록된다"
        - "도그푸드 실패(자기 `spec.yaml` 검증 실패) 는 CI 블로커다"

# ----------------------------------------------------------------------------
# domain — 제품이 사는 도메인의 언어 · 엔티티 · 규칙
# ----------------------------------------------------------------------------
domain:
  overview: |
    harness-boot 의 도메인은 "스펙 주도 개발(Spec-Driven Development) 의
    자동화된 파생 파이프라인" 이다.  중심은 `spec.yaml` 이라는 하나의 선언적
    계약이고, 그로부터 Claude Code 어댑터 계층(Agents · Commands · Hooks ·
    Skills) 과 파생 뷰(`domain.md` · `architecture.yaml`) 가 결정적으로 파생된다.

    이 도메인은 **네 가지 긴장** 을 동시에 다룬다.
      (a) **계약과 서사의 공존** — `spec.yaml` 은 구조적 필드(🔒 enum · 참조 ·
          정수) 와 자유 텍스트 필드(🗒 배경 · 의도 · 근거) 를 한 파일 안에 담는다.
          스키마가 경계를 만들고, 경계 안에서 서사가 산다.
      (b) **단일 진실 vs 파생물** — 사용자는 `spec.yaml` 만 편집한다.
          파생 파일은 도구가 유지하되 드문 수동 예외(AR-100+ 등) 를 edit-wins
          안전망으로 보존한다(BR-002).
      (c) **Adapter vs User Code** — harness-boot 자체는 Claude Code 위의
          **어댑터 계층** 이다.  따라서 Anti-Abstraction 원칙은 사용자 코드에만
          적용되며, harness-boot 자체의 구조는 Adapter 패턴을 명시적으로
          허용한다(BR-003).
      (d) **플러그인 ⊃ 사용자** — 플러그인 저장소는 사용자 저장소 구조의
          **상위집합** 이다.  플러그인 전용 층(`.claude-plugin/plugin.json` ·
          루트 `commands/agents/skills/hooks/`) 만 더해질 뿐, 공통 층
          (`.harness/**` · `.claude/**` · 제품 코드) 은 동일하다.

    Gate(진행 게이트) 와 Hook(실행 훅) 은 품질과 안전의 최종 관문이므로
    `sensitive: true` 로 분류된다.  이 두 엔티티를 조작하는 모든 피처는
    §5.1 검증 규칙 4 에 의해 `test_strategy: tdd` 가 강제된다.
  entities:
    - name: Spec
      description: |
        `.harness/spec.yaml` 또는 플러그인 저장소의 루트 `spec.yaml`.
        사용자가 편집하는 **유일한** 구조화 파일.  project / domain /
        constraints / deliverable / features / metadata 6 섹션을 가진다.
        모든 파생물의 해시 트리 입력이며, 스키마 위반 시 build 와 sync 가
        모두 거부된다.
      invariants:
        - "사용자 편집은 오로지 이 한 파일에서만 발생한다"
        - "features[0].type 은 skeleton 이다 (prototype_mode=true 제외)"
        - "depends_on 그래프는 비순환이며 위상 정렬 가능하다"
        - "schema 검증 실패 시 build 와 sync 는 모두 거부된다"
      sensitive: false
    - name: Harness
      description: |
        `spec.yaml` 에서 파생된 어댑터 계층의 총합.  `.harness/harness.yaml`
        이 메타데이터를 담는다.  `runtime.primary = claude-code` 를 선언하며,
        agents · gates · policies · generation · derived_from 을 포함한다.
      invariants:
        - "harness.yaml.generated_from.root_hash 는 spec 의 결정적 해시 트리 루트와 일치한다"
        - "architecture.pattern 선언과 harness.yaml.architecture 가 일치한다"
      sensitive: false
    - name: PluginManifest
      description: |
        `.claude-plugin/plugin.json`.  Claude Code 가 플러그인을 식별하고
        로드하는 데 사용하는 **공식 매니페스트**.  `name` 필드가 슬래시 명령
        네임스페이스가 되므로, 본 프로젝트는 `name: "harness"` 를 두어
        `/harness:*` 를 얻고 npm 패키지 이름 `harness-boot` 와 분리한다.
      invariants:
        - "파일 경로는 `.claude-plugin/plugin.json` 정확히 일치"
        - "name 은 소문자 · 숫자 · 하이픈만 (공식 규칙)"
        - "version 은 SemVer 이며 project.version 과 동기화된다"
      sensitive: false
    - name: Skill
      description: |
        Claude Code 스킬.  플러그인 저장소의 `skills/<skill>/SKILL.md` 가
        진입점(사용자 저장소에서는 `.claude/skills/<namespace>/<skill>/`).
        본문 ≤ 500 라인 + `references/` 분리가 표준(BR-006).
        Anti-Rationalization 3-섹션(Rationalization / Red Flags / Verification)
        은 `references/rationalization.md` 로 분리된다(C1 해소).
      invariants:
        - "SKILL.md 본문은 500 라인 이하"
        - "references/ 디렉토리는 조직적 문서 단위로 분할 가능"
        - "Anti-Rationalization 3-섹션은 references/rationalization.md 에만 존재"
      sensitive: false
    - name: Hook
      description: |
        Claude Code 훅.  공식 `hooks/hooks.json` 매니페스트에 정의되고
        `.harness/hooks/*.mjs` 스크립트를 참조한다(플러그인 저장소) 또는
        사용자 저장소에서 동일 구조로 파생된다.  공식 지원 필드는
        `type / command / async / asyncRewake / shell / timeout /
        statusMessage / once` + 상위 `matcher` 이며, 7 이벤트(PreToolUse /
        PostToolUse / PreCompact / SessionStart / Stop / SessionEnd + UserPromptSubmit)
        를 사용한다.  harness-boot 확장 3 필드(id · description · env) 는
        `.harness/hooks/meta.json` 에 별도 보관한다(C5 해소, BR-005).
      invariants:
        - "공식 필드는 `hooks/hooks.json` 에만, 확장 필드는 `.harness/hooks/meta.json` 에만 존재"
        - "hook id 는 전역 유일하며 meta.json 으로만 선언"
        - "timeout 은 양의 정수(초). 기본 10"
        - "event 는 CC 공식 허용 enum 중 하나"
      sensitive: true
      sensitive_reason: |
        Hook 은 사용자 저장소에 임의의 쉘 / Node 코드를 실행할 권한을 가진다.
        악의 · 오류 구현이 파일 덮어쓰기 · 비밀 유출 · 게이트 우회를 만들 수
        있으므로 BR-001(덮어쓰기 금지) · BR-004(Iron Law) · BR-008(감사 로그)
        의 주된 보호 대상이며, 관련 피처는 §5.1 검증 규칙 4 에 의해
        `test_strategy: tdd` 가 강제된다.
    - name: Agent
      description: |
        Claude Code 서브에이전트.  플러그인 저장소의 `agents/*.md` 로 배포되며
        orchestrator / implementer / reviewer / qa / integrator 5 역할을 기본
        제공한다.  조건부 로드 기준은 6 개 enum (always / has_tdd /
        has_lean_tdd / has_state_verification / has_integration /
        has_sensitive_entity) 만 허용한다(mini-DSL 금지).
        integrator 는 v0.2 신설으로 Gate 4 통과 직후 Gate 5 직전에 wire-up
        과 smoke 책임을 진다.
      invariants:
        - "agent 의 condition 은 사전 정의된 6 enum 중 하나다"
        - "integrator 는 Gate 5 smoke 통과를 반드시 주도한다"
      sensitive: false
    - name: Command
      description: |
        `/harness:*` 슬래시 명령.  Canonical 6-Step 과 1:1 대응한다
        (`/harness:analyze` · `:spec` · `:plan` · `:work` · `:check` · `:evolve`).
        플러그인 저장소의 `commands/*.md` 로 배포되며, 사용자 저장소에서는
        `.claude/commands/**` 파생(있을 수 있음) 과 병존한다.
      invariants:
        - "슬래시 명령 네임스페이스는 plugin.json 의 name 필드에서 결정된다 (`harness`)"
        - "명령 간에는 단계 의미의 상위 집합 관계가 없다 (중첩 금지)"
      sensitive: false
    - name: Gate
      description: |
        0~5 번의 품질 게이트.  각 번호는 test_evidence / compile / style /
        coverage / commit / runtime_smoke 에 고정된다.  Walking Skeleton
        feature 는 Gate 5(runtime_smoke) 통과를 암묵적으로 포함한다.
      invariants:
        - "gate id 는 0~5 의 연속 정수"
        - "gate 5 는 smoke_scenarios 최소 1 건 통과 + build 성공 + health_check 통과를 요구한다"
        - "게이트 간 선행 관계: gate 0 실패 시 1~5 는 skip 으로 보고"
      sensitive: true
      sensitive_reason: |
        Gate 는 제품 릴리즈의 최종 관문이다.  게이트 우회는 제품 신뢰의 단일
        실패점이 되므로 관련 피처는 `test_strategy: tdd` 가 강제된다.  특히
        Gate 5 강제 통과의 우회 경로는 치명적이다.
    - name: Artifact
      description: |
        `_workspace/{phase}_{agent}_{artifact}.{ext}` 네이밍의 작업 중간 산출물.
        Phase 0 existing-state audit 의 3 분기를 따른다 — missing → fresh /
        exists+partial → partial rerun / exists+new input →
        `_workspace_{YYYYMMDD_HHMMSS}/` 백업.
      invariants:
        - "artifact 경로는 phase + agent + artifact + ext 모두를 포함한다"
        - "백업 폴더명은 `_workspace_` 접두 + ISO 압축 타임스탬프"
      sensitive: false
    - name: ADR
      description: |
        Architecture Decision Record.  Nygard 4-섹션(Status / Context /
        Decision / Consequences) 을 따르며 `docs/adr/YYYY-MM-DD-<topic>.md`
        에 저장한다.  5 대 충돌 해소는 각각의 ADR 에 1:1 대응 기록한다.
      invariants:
        - "상태는 Proposed | Accepted | Deprecated | Superseded 중 하나"
        - "superseded 된 ADR 도 파일은 보존되며 대체 ADR 링크를 포함한다"
      sensitive: false
    - name: EventLog
      description: |
        `.harness/events.log`.  append-only 이벤트 스트림.  Gate 전이 · Hook
        실행 · Artifact 생성/이동 등 모든 상태 변경이 기록되며 최소 90 일
        보존한다(BR-008).  각 엔트리는 sha256 체인 해시로 변조를 감지한다.
      invariants:
        - "쓰기 API 는 append 만 허용 (수정 · 삭제 API 없음)"
        - "10 MB 또는 90 일 중 먼저 도달 시 로테이션"
        - "엔트리 간 sha256 체인 해시 불일치 시 검증 실패"
      sensitive: true
      sensitive_reason: |
        감사 증거의 저장소이자 Iron Law(BR-004) 의 증거 원장이다.  임의 수정
        · 삭제는 감사 가능성을 파괴하므로 관련 피처는 tdd 가 강제된다.
  business_rules:
    - id: BR-001
      statement: |
        harness-boot 은 사용자 파일을 자동으로 덮어쓰지 않는다.  수정은 언제나
        별도 patch 파일 또는 PR 로만 표현한다.
      rationale: |
        사용자 저장소는 신뢰 경계의 반대편이다.  자동 덮어쓰기는 단 한 번의
        오판으로 복구 불가능한 손실을 만들 수 있고, "도구가 조용히 코드를
        바꾼다" 는 인식은 플러그인 채택의 최대 저해 요소다.  patch · PR 은
        사람이 확인 · 승인하는 지점을 명시적으로 보장한다.
      compliance: []
    - id: BR-002
      statement: |
        파생 파일(`domain.md` · `architecture.yaml` · `.claude/**`) 은
        edit-wins 안전망 아래 보존된다.  해시 불일치가 감지되면 spec 재파생은
        경고와 함께 중단된다.
      rationale: |
        드문 예외(예: architecture.yaml 의 AR-100+ 수동 규칙) 를 위한 안전망
        이 없으면 사용자는 파생 파일을 편집할 수 없고, 존재하더라도 파이프
        라인이 조용히 덮어쓰면 안 된다.  edit-wins 는 드리프트를 투명하게
        드러내고 수정 경로를 사람에게 넘긴다.
      compliance: []
    - id: BR-003
      statement: |
        Anti-Abstraction 원칙은 **사용자 코드** 에만 적용된다.  harness-boot
        자체는 정의상 Claude Code 위의 Adapter Layer 이며, 이 계층의 추상화는
        명시적으로 허용된다.
      rationale: |
        v2.3.x 의 자기모순(C2) 해소.  spec-kit Constitution Article V 를 문자
        그대로 harness-boot 에 적용하면 harness-boot 의 존재 자체가 위반이
        된다.  "Anti-Abstraction-Scoped" 로 명시하여 어댑터가 어댑터로서 역할
        을 다하도록 허락한다.  단, 어댑터가 **부가 책임** 을 짊어져 비대해지는
        것은 여전히 금지된다(single responsibility).
      compliance: []
    - id: BR-004
      statement: |
        완료(done) 주장은 언제나 **신선한 검증 증거** 를 동반해야 한다
        (Iron Law, superpowers OSS 인용).
      rationale: |
        "작동합니다" 는 관찰 가능한 증거(테스트 결과 · 빌드 로그 · 스모크
        스크린샷) 없이는 의미가 없다.  Gate 5(runtime_smoke) 통과 증거를
        `state.yaml` 에 기록하고, 이 기록 없이는 `feature.status` 가 done 으로
        전이되지 않는다.
      compliance: []
    - id: BR-005
      statement: |
        Hook 은 공식 `hooks/hooks.json` 스키마(type · command · async ·
        asyncRewake · shell · timeout · statusMessage · once + 상위 matcher)
        를 day-1 네이티브로 준수한다.  harness-boot 확장 메타(id ·
        description · env) 는 `.harness/hooks/meta.json` 에 **별도 보관** 한다.
      rationale: |
        C5 해소.  기존 3 필드 스키마는 표현력 부족으로 async · 환경 제어 ·
        서술적 에러 메시지 같은 핵심 기능을 막아 왔다.  Claude Code 공식
        `hooks.json` 이 사실상 표준을 확정했으므로 이를 1 차 준수하고, 플러그
        인이 필요로 하는 확장은 sidecar 메타 파일로 분리한다.  이로써 공식
        호환성 100% 와 플러그인 편의성을 모두 확보한다.
      compliance: []
    - id: BR-006
      statement: |
        SKILL.md 본문은 500 라인 이하이며, Anti-Rationalization 3-섹션은
        `references/rationalization.md` 로 분리한다.
      rationale: |
        C1 해소.  Progressive Disclosure 가 권장하는 500 라인 상한과
        Anti-Rationalization 3-섹션 의무가 같은 지면을 두고 경쟁하면 두 원칙
        모두 훼손된다.  분리는 "스킬 본문은 빠른 길잡이, 깊은 논증은
        references/" 라는 새 규범을 만든다.
      compliance: []
    - id: BR-007
      statement: |
        워크플로는 단일 Canonical 6-Step(Analyze → Specify → Plan →
        Implement → Verify → Evolve) 을 따른다.  spec-kit 4-stage · harness
        6-phase · BMAD 4-stage 는 이 단일 플로우로 흡수되며, 별도의 병렬
        워크플로를 노출하지 않는다.
      rationale: |
        C4 해소.  3 종 중첩은 사용자가 "지금 어느 단계인가" 를 판단하지 못하게
        한다.  6 스텝은 세 계보를 모두 포용하면서도 중복 없이 선형이다.
        각 스텝은 하나의 `/harness:*` 명령과 1:1 대응한다.
      compliance: []
    - id: BR-008
      statement: |
        모든 상태 변경(Gate 전이 · Hook 실행 · Artifact 생성/이동) 은
        append-only 이벤트 로그에 기록되며 최소 90 일 보존한다.
      rationale: |
        BR-004 의 신선한 증거를 가능하게 하고, BR-001 의 "덮어쓰기 금지" 와
        결합하여 감사 가능성을 제공한다.  90 일은 대부분의 내부 감사 및 보안
        사고 조사 주기를 커버한다.
      compliance: ["SOC2-CC7.2"]
    - id: BR-009
      statement: |
        플러그인 저장소는 사용자 저장소 구조의 **상위집합** 이다.  공통 층
        (`.harness/**` · `.claude/**` · 제품 코드) 은 동일하고, 플러그인 전용
        층(`.claude-plugin/plugin.json` · 루트 `commands/agents/skills/hooks`)
        만 추가된다.
      rationale: |
        도그푸드의 기반 규범.  플러그인 저장소가 사용자 저장소 구조를 깨면
        도그푸드의 의미가 사라지고, 플러그인이 자신을 먼저 증명할 길이 막힌다.
        이 대칭은 부트스트랩 Stage 1 의 기술적 전제이기도 하다.
      compliance: []
    - id: BR-010
      statement: |
        개발 언어는 프로젝트 품질이 안정될 때까지 한국어를 1 차 언어로 하고,
        안정 후 영어 전환을 일괄 수행한다.  커밋 메시지 · PR 제목은 항상 영어.
      rationale: |
        초기 스펙 저작 · 설계 논의의 뉘앙스는 모어(한국어) 로 다듬는 편이 빠르고
        정확하다.  단 커밋 · PR 은 OSS 커뮤니티 표준인 영어로 남겨 기여자 베이스
        확장과 검색 가능성을 확보한다.  전환 시점에는 `docs/i18n-migration.md`
        로 일괄 변환한다.
      compliance: []
  vocabulary:
    - term: Spec
      definition: |
        `.harness/spec.yaml` 또는 플러그인 저장소 루트 `spec.yaml`.  사용자가
        편집하는 단일 구조화 입력.  6 섹션(project · domain · constraints ·
        deliverable · features · metadata).
    - term: Harness
      definition: |
        spec 에서 파생되어 Claude Code 에 얹히는 어댑터 계층의 총합.
        `.harness/harness.yaml` 이 메타데이터.
    - term: Canonical 6-Step
      definition: |
        v0.2 의 유일한 워크플로 — Analyze → Specify → Plan → Implement →
        Verify → Evolve.  각 스텝은 `/harness:<step>` 명령과 1:1 매핑.
    - term: Walking Skeleton
      definition: |
        `features[0].type = skeleton` 의 별칭.  빌드 성공 · entry_points 기동 ·
        최소 1 개 smoke_scenario 통과를 acceptance 에 암묵적으로 포함한다.
    - term: Gate
      definition: |
        0~5 번의 품질 관문 — test_evidence / compile / style / coverage /
        commit / runtime_smoke.  모든 MINOR 릴리즈는 Gate 5 통과를 요구한다.
    - term: Progressive Disclosure
      definition: |
        Skill 작성 원칙.  metadata ≈ 100 words → SKILL.md ≤ 500 lines →
        references/** 무한.  독자는 필요한 깊이를 스스로 선택한다.
    - term: Edit-wins
      definition: |
        파생 파일의 사용자 편집을 기본 보존하는 규칙.  파이프라인이 조용히
        덮어쓰지 않고 드리프트를 경고한다(BR-002).
    - term: Iron Law
      definition: |
        "NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE"
        (superpowers OSS 인용).  BR-004 의 직접 근거.
    - term: Adapter Layer
      definition: |
        harness-boot 이 차지하는 위치.  BR-003 의 근거로 Anti-Abstraction
        원칙의 예외를 명시적으로 받는다.
    - term: Structural Mirror
      definition: |
        "플러그인 저장소 ⊃ 사용자 저장소" 규약(BR-009).  공통 층(`.harness/**`
        · `.claude/**` · 제품 코드) + 플러그인 전용 층.
    - term: Bootstrap Stage 0/1/2
      definition: |
        자기 호스팅 전환 단계.  Stage 0(수동 에이전트) → Stage 1(부분 자기
        호스팅 — analyze/check 자동) → Stage 2(완전 자기 호스팅 — work 루프).
    - term: PluginManifest
      definition: |
        `.claude-plugin/plugin.json`.  CC 공식 매니페스트.  `name` 필드가
        슬래시 명령 네임스페이스(`harness`) 를 결정하므로 npm 이름
        (`harness-boot`) 과 분리된다.

# ----------------------------------------------------------------------------
# constraints — 기술 · 아키텍처 · 품질의 비협상 경계
# ----------------------------------------------------------------------------
constraints:
  tech_stack:
    language: "TypeScript 5"
    runtime: "Node.js 20+ (ESM)"
    framework: "Claude Code Plugin API v1 + @anthropic-ai/claude-agent-sdk ^1"
    testing: "Vitest 2 + fast-check (프로퍼티 기반) + @anthropic-ai/claude-agent-sdk 테스트 유틸"
  architecture:
    pattern: layered
    reference: ".harness/architecture.yaml"
  quality:
    coverage_threshold: 85
    required_gates: [0, 1, 2, 3, 4, 5]
    prototype_mode: false

# ----------------------------------------------------------------------------
# deliverable — 산출물 형태와 가동 (Walking Skeleton 검증 대상)
# ----------------------------------------------------------------------------
deliverable:
  type: library
  entry_points:
    - name: cli_version
      command: "node bin/harness-boot version"
      build_command: "npm run build"
      health_check:
        type: exit-code-zero
        timeout_seconds: 10
        expected: { exit_code: 0 }
    - name: cli_analyze
      command: "node bin/harness-boot analyze --dry-run"
      build_command: "npm run build"
      health_check:
        type: exit-code-zero
        timeout_seconds: 30
        expected: { exit_code: 0 }
    - name: plugin_api
      command: "node -e \"import('./dist/index.mjs').then(m => process.exit(m.version ? 0 : 1))\""
      build_command: "npm run build"
      health_check:
        type: exit-code-zero
        timeout_seconds: 10
        expected: { exit_code: 0 }
    - name: plugin_manifest_load
      command: "node -e \"const m=require('./.claude-plugin/plugin.json'); process.exit(m.name==='harness'?0:1)\""
      build_command: "npm run build"
      health_check:
        type: exit-code-zero
        timeout_seconds: 5
        expected: { exit_code: 0 }
  smoke_scenarios:
    - id: SS-001
      description: |
        빈 저장소에서 `/harness:analyze` 가 `.harness/` 스켈레톤을 생성하고
        `/harness:check` 가 Gate 0 · 1 · 2 를 통과한다.  코드/커버리지/스모크
        미달이므로 Gate 3~5 는 fail 로 보고되되 종료 코드는 분명히 구분된다.
      steps:
        - "git init test-repo && cd test-repo"
        - "npx harness-boot analyze"
        - "test -f .harness/spec.yaml"
        - "npx harness-boot check --gates 0,1,2"
      success_criteria: |
        - `.harness/spec.yaml` 이 존재한다
        - check 종료 코드가 Gate 0~2 통과 시 0, Gate 3~5 미충족은 WARN-only 경로에서 0
        - stdout 에 "Walking Skeleton 권장" 힌트가 포함된다
    - id: SS-002
      description: |
        `spec.yaml` 에 skeleton feature 1 개가 기입된 상태에서 `/harness:spec`
        Mode R 이 자유 텍스트 필드 보완을 제안하고, 사용자 확인 후 spec 이
        갱신된다.  이어서 `/harness:plan` 이 `.claude/agents/**` 파생을 시도한다.
      steps:
        - "npx harness-boot analyze"
        - "npx harness-boot spec --mode=R --non-interactive --fixture=fixtures/minimal-spec.yaml"
        - "npx harness-boot plan"
      success_criteria: |
        - `.claude/agents/orchestrator.md` 가 생성된다
        - `.harness/harness.yaml.generated_from.root_hash` 가 spec 해시와 일치한다
    - id: SS-003
      description: |
        공식 `hooks/hooks.json` 네이티브 실행 + `.harness/hooks/meta.json` 확장
        필드 조회 — PreToolUse 훅이 매치 조건에서 정확히 한 번 실행되고,
        확장 필드(id · description · env) 가 로그에 투영된다.  C5 해소의 핵심 스모크.
      steps:
        - "npx harness-boot analyze"
        - "cp fixtures/hooks/native.hooks.json hooks/hooks.json"
        - "cp fixtures/hooks/native.meta.json .harness/hooks/meta.json"
        - "FOO=bar npx harness-boot check --run-hooks"
      success_criteria: |
        - meta.json 의 hook id 가 append-only 이벤트 로그에 한 줄 기록된다
        - description 이 에러 메시지에 포함된다
        - env.FOO=bar 가 훅 스크립트에 주입된다(allowedEnvVars 정책과 호환)
    - id: SS-004
      description: |
        도그푸드 자기 설치 — harness-boot 저장소 자체에서 `claude plugins
        install .` 이 성공하고, Claude Code 가 `/harness:analyze` 를 슬래시
        명령으로 인식한다.  플러그인 ⊃ 사용자 구조 거울(BR-009) 의 증명.
      steps:
        - "claude plugins install ."
        - "claude 세션에서 '/harness:analyze' 자동완성 확인"
        - "/harness:analyze 실행 후 .harness/spec.yaml 변경 없음 확인(도그푸드 idempotent)"
      success_criteria: |
        - plugin.json 파싱 오류가 없다
        - 슬래시 명령 목록에 `/harness:analyze` 가 나타난다
        - 재실행 시 edit-wins 안전망으로 인해 spec 이 변경되지 않는다
    - id: SS-005
      description: |
        부트스트랩 Stage 0 검증 — `.claude/agents/{orchestrator,implementer,
        reviewer}.md` 와 `.claude/commands/next-feature.md` 가 존재하는 상태에서
        일반 Claude Code 세션이 `spec.yaml` 을 TODO 보드로 읽어 다음 피처를
        pick 한다.
      steps:
        - "claude '/next-feature' 실행"
        - "세션이 `status: planned` 피처 중 최저 priority 선택하는지 검증"
        - ".harness/events.log 에 선택 이벤트 1 건 기록"
      success_criteria: |
        - 선택된 피처 ID 가 stdout 에 출력된다
        - 이벤트 로그에 `feature_pick` 타입 엔트리가 기록된다
        - 선택 규칙(depends_on 충족 + 최저 priority) 을 위반한 피처는 선택되지 않는다

# ----------------------------------------------------------------------------
# features — 구현 단위 (features[0].type=skeleton 강제)
# ----------------------------------------------------------------------------
features:

  # ==========================================================================
  # F-001 — Walking Skeleton (Bootstrap Stage 0 포함)
  # ==========================================================================
  - id: F-001
    type: skeleton
    title: "Walking Skeleton — Bootstrap Stage 0 + 최소 CLI 기동"
    priority: 1
    status: in_progress
    test_strategy: integration
    test_strategy_reason: |
      플러그인 로딩 · 손 에이전트 규약 · CLI 기동 · `.harness/` 스켈레톤
      생성까지의 엔드-투-엔드 경로를 실제 Claude Code 런타임 근사치
      (subprocess + 모조 CLI) 위에서 검증해야 한다.  단위 테스트가 아닌
      통합 시나리오가 적합하다.
    acceptance_criteria:
      - "`package.json` + `bin/harness-boot` 로 `node bin/harness-boot version` 이 exit 0"
      - "`.claude-plugin/plugin.json` 이 공식 스키마에 valid"
      - "`.claude/agents/{orchestrator,implementer,reviewer}.md` 가 손수 작성되어 존재"
      - "`.claude/commands/next-feature.md` 가 존재하며 `spec.yaml` 을 참조한다"
      - "`CLAUDE.md` 에 Stage 0 부트스트랩 규약이 기록되어 있다"
      - "SS-001 smoke 시나리오 통과"
      - "SS-005 smoke 시나리오 통과"
    depends_on: []
    modules: ["cli", "core", "spec", "fs", "reporter", "bootstrap"]
    doc_sync:
      - target: "docs/getting-started.md"
        sections: ["#install", "#first-run", "#bootstrap-stage0"]
        watch: ["src/cli.ts", "package.json", ".claude-plugin/plugin.json"]
        severity: error

  # ==========================================================================
  # F-002 — Constitution v0.2 (7 Articles 재구성, C2 · C3 핵심)
  # ==========================================================================
  - id: F-002
    type: feature
    title: "Constitution v0.2 — 7 Articles (Anti-Abstraction-Scoped 포함)"
    priority: 2
    status: in_progress
    test_strategy: state-verification
    test_strategy_reason: |
      Constitution 은 문서 아티팩트 + 검증 규칙의 조합이다.  렌더링 결과와
      `/harness:check` 의 위반 탐지 결과를 스냅샷/골든 파일로 비교하는 상태
      검증이 적합하다.  결정 로직은 순수 함수로 테스트된다.
    acceptance_criteria:
      - "9 → 7 Article 매핑 문서가 `docs/constitution.md` 로 생성된다"
      - "Article V 'Anti-Abstraction-Scoped' 가 사용자 코드에만 적용됨을 명시"
      - "`/harness:check` 가 Constitution 위반을 Article ID 로 리포트"
      - "각 Article 에는 관련 BR-xxx 역참조가 포함된다"
    depends_on: ["F-001"]
    modules: ["core", "constitution", "reporter"]
    doc_sync:
      - target: "docs/constitution.md"
        watch: ["src/core/constitution/articles/**/*.ts"]
        severity: error

  # ==========================================================================
  # F-003 — Canonical 6-Step Workflow (C4 해소)
  # ==========================================================================
  - id: F-003
    type: feature
    title: "Canonical 6-Step Workflow + `/harness:<step>` 명령 세트"
    priority: 2
    status: planned
    test_strategy: integration
    test_strategy_reason: |
      6 개 명령(`analyze` · `spec` · `plan` · `work` · `check` · `evolve`)
      은 서로 상태를 전달하며 엔드-투-엔드 흐름을 형성한다.  각 명령의 순수
      로직은 단위로 분리 가능하지만, "플로우가 의도대로 연결되는가" 는 통합
      시나리오에서만 드러난다.
    acceptance_criteria:
      - "6 개 명령이 CLI(`node bin/harness-boot <step>`) 양쪽에서 실행 가능"
      - "`/harness:<step>` 슬래시 명령이 plugin.json 의 `name: harness` 에서 파생된다"
      - "`.harness/state.yaml` 에 `current_step` 이 정확히 갱신된다"
      - "단계 역행(예: work → plan) 은 명시적 플래그(`--rewind`) 없이는 거부된다"
    depends_on: ["F-001", "F-002"]
    modules: ["cli", "core", "steps", "state"]
    doc_sync:
      - target: "docs/workflow.md"
        watch: ["src/steps/**/*.ts", "commands/**/*.md"]
        severity: error

  # ==========================================================================
  # F-004 — Hook Runtime (공식 필드 네이티브 + 확장 메타, C5 해소)
  # ==========================================================================
  - id: F-004
    type: feature
    title: "Hook Runtime — 공식 hooks.json 네이티브 + 확장 meta.json"
    priority: 3
    status: in_progress
    test_strategy: tdd                          # sensitive Hook 참조 → §5.1 규칙 4 강제
    test_strategy_reason: |
      Hook 은 sensitive 엔티티이며 BR-005 의 직접 대상.  공식 필드 × 7 이벤트
      매트릭스의 회귀 방지를 위해 리듬 단위로 테스트를 먼저 박는다.
      `.harness/hooks/meta.json` 확장 필드의 조인 로직도 TDD 로 고정한다.
    acceptance_criteria:
      - "공식 스키마(type/command/async/asyncRewake/shell/timeout/statusMessage/once) 전부 매트릭스 단위 테스트 통과"
      - "7 이벤트 각각에 대해 라우팅 정확성 테스트 통과"
      - "`.harness/hooks/meta.json` 의 id/description/env 가 런타임에서 올바르게 투영된다"
      - "timeout 초과 시 공식 에러 처리 경로 + 이벤트 로그 기록"
      - "SS-003 smoke 통과"
    tdd_focus:
      - "7 이벤트 라우팅 정확성"
      - "timeout · once · async 의 결합 경계"
      - "meta.json 과 hooks.json 의 id 매칭 불일치 탐지"
      - "env 주입 시 allowedEnvVars 정책 준수 · 비밀 마스킹"
      - "hook 실패 시 이벤트 로그 엔트리 무결성"
    depends_on: ["F-001"]
    modules: ["core", "hooks", "audit"]
    doc_sync:
      - target: "docs/hooks.md"
        watch: ["src/core/hooks/**/*.ts", "hooks/hooks.json"]
        severity: error

  # ==========================================================================
  # F-005 — Skill Layout 표준화 (C1 해소)
  # ==========================================================================
  - id: F-005
    type: feature
    title: "Skill Layout — SKILL.md ≤500L + references/rationalization.md"
    priority: 3
    status: in_progress
    test_strategy: state-verification
    test_strategy_reason: |
      Skill 의 파일 트리 · 라인 수 · 섹션 존재는 정적 구조 검증의 대상이다.
      린터 형태로 구현되며, 골든 파일과의 비교로 회귀를 막는다.
    acceptance_criteria:
      - "린터가 SKILL.md > 500 라인을 error 로 보고"
      - "Rationalization / Red Flags / Verification 3-섹션이 `references/rationalization.md` 에만 존재하는지 검사"
      - "Anthropic 공식 스킬 10 개 이상(docx · pptx · pdf · xlsx 등) 에 대해 호환 검사 통과"
      - "플러그인 저장소의 `skills/**` 가 사용자 저장소의 `.claude/skills/**` 로 1:1 파생"
    depends_on: ["F-002"]
    modules: ["core", "linter", "skill"]
    doc_sync:
      - target: "docs/skill-layout.md"
        watch: ["src/core/skill/**/*.ts", "skills/**/SKILL.md"]
        severity: error

  # ==========================================================================
  # F-006 — spec.yaml Schema v0.2 + JSON Schema 공개
  # ==========================================================================
  - id: F-006
    type: feature
    title: "spec.yaml Schema v0.2 + JSON Schema 공개 + 검증 규칙 6 개"
    priority: 3
    status: in_progress
    test_strategy: tdd
    test_strategy_reason: |
      스키마는 전체 도메인의 형식 계약이다.  한 번 잘못 고정되면 모든 파생이
      흔들린다.  각 필드 · 규칙 · 기본값에 대해 빨강 → 초록 리듬으로 입·출력
      불변식을 박는다.
    acceptance_criteria:
      - "`schemas/spec.schema.json` 이 Draft 2020-12 에 대해 valid"
      - "§5.1 검증 규칙 6 개(depends_on 비순환, Walking Skeleton, deliverable 완전성, sensitive 강제, 전략별 필수 필드, framework 필수) 전부 구현"
      - "module 유사도 검증(Levenshtein ≤ 2 + 편집 비율 ≤ 0.34) warning 발생"
      - "IDE(VS Code) 에서 `# yaml-language-server` 주석으로 autocompletion 동작"
      - "본 `spec.yaml` 자체가 스키마 대해 valid (도그푸드 CI)"
    tdd_focus:
      - "필수 필드 누락 시 에러 메시지 인간 가독성"
      - "deliverable.type 별 entry_points / smoke_scenarios 요구 분기"
      - "sensitive 자동 추론 정규식 `/^(auth|payment|pii|hook|gate|audit)/i` + override 경로"
      - "Walking Skeleton 규칙(`features[0].type=skeleton` · prototype_mode 예외)"
      - "순환 의존성 탐지와 에러 리포팅"
    depends_on: ["F-002"]
    modules: ["core", "spec", "schema"]
    doc_sync:
      - target: "docs/spec-schema.md"
        watch: ["src/core/spec/**/*.ts", "schemas/spec.schema.json"]
        severity: error

  # ==========================================================================
  # F-007 — /harness:analyze (Step 1)
  # ==========================================================================
  - id: F-007
    type: feature
    title: "/harness:analyze — 초기 분석 · `.harness/` 스켈레톤 · 3-way 분기"
    priority: 4
    status: planned
    test_strategy: integration
    test_strategy_reason: |
      파일 시스템 감지 · 기존 상태 3 분기(missing / partial / new input)
      판정 · 백업 폴더 생성이 결합된 루틴이다.  실제 파일 시스템 픽스처 위에
      통합 검증이 가장 신뢰성 있다.
    acceptance_criteria:
      - "missing → 빈 `.harness/` 스켈레톤 생성"
      - "exists+partial → 누락분만 채움(기존 파일 보존)"
      - "exists+new input → `_workspace_{YYYYMMDD_HHMMSS}/` 백업 후 재생성"
      - "spec.yaml 이 이미 있으면 `harness-boot analyze` 는 idempotent"
    depends_on: ["F-003", "F-006"]
    modules: ["core", "steps", "fs"]
    doc_sync:
      - target: "docs/commands/analyze.md"
        watch: ["src/steps/analyze/**/*.ts", "commands/analyze.md"]
        severity: error

  # ==========================================================================
  # F-008 — /harness:spec (Step 2, Mode A/B/R/E)
  # ==========================================================================
  - id: F-008
    type: feature
    title: "/harness:spec — 대화형 `spec.yaml` 채우기 (Mode A/B/R/E)"
    priority: 4
    status: planned
    test_strategy: lean-tdd
    test_strategy_reason: |
      대화형 질문 → `spec.yaml` 업데이트는 입출력이 명확한 결정 로직이다.
      Given/When/Then 형식의 acceptance 가 회귀 방지에 충분하며, Mode 분기
      자체는 순수 함수로 분리된다.
    acceptance_criteria:
      - "Given 빈 `spec.yaml` When Mode A(Auto) Then project/domain/constraints 기본 채움"
      - "Given 부분 채워진 spec When Mode R(Refine) Then 비어 있는 자유 텍스트 필드에만 제안"
      - "Mode B(Blank) 는 기존 값을 보존하면서 빈 필드만 질문"
      - "Mode E(Expert) 는 기존 값을 절대 임의 수정하지 않는다(BR-001)"
      - "한 번에 한 질문만 묻는다(설계 원칙: One Question at a Time)"
    depends_on: ["F-006", "F-007"]
    modules: ["core", "steps", "spec"]
    doc_sync:
      - target: "docs/commands/spec.md"
        watch: ["src/steps/spec/**/*.ts", "commands/spec.md"]
        severity: warn

  # ==========================================================================
  # F-009 — /harness:plan (Step 3, 어댑터 파생)
  # ==========================================================================
  - id: F-009
    type: feature
    title: "/harness:plan — `.claude/**` 어댑터 파생 + 해시 트리 갱신"
    priority: 5
    status: planned
    test_strategy: integration
    test_strategy_reason: |
      파생 결과가 여러 파일(agents · commands · hooks · skills) 에 걸치고
      해시 트리가 정확해야 다음 단계(`/harness:work`) 가 정상 진행된다.
      통합 수준에서만 드러나는 결합 버그가 많다.
    acceptance_criteria:
      - "orchestrator + implementer + reviewer + qa + integrator 5 에이전트 생성"
      - "`.harness/harness.yaml.generated_from` 해시 트리가 spec 해시와 일치"
      - "edit-wins 안전망 동작 — 사용자 편집 파일은 `_workspace_<ts>/` 에 백업 후 보존"
      - "플러그인 저장소에서는 루트 `commands/agents/skills/hooks` 로, 사용자 저장소에서는 `.claude/**` 로 파생(BR-009 거울)"
    depends_on: ["F-002", "F-004", "F-005", "F-008"]
