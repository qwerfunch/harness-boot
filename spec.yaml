    priority: 6
    status: planned
    test_strategy: tdd                          # sensitive Gate 참조 → §5.1 규칙 4 강제
    test_strategy_reason: |
      Gate 는 sensitive 엔티티.  우회 · 완화 · 조건부 통과의 경계를 TDD 로
      먼저 고정해야 한다.  회귀 1 건이 제품 전체 신뢰를 흔들 수 있다.
    acceptance_criteria:
      - "Gate 0~5 의 통과/실패 판정이 결정적(입력 같으면 출력 같다)"
      - "BR-004(Iron Law) 증거 파일 누락 시 Gate 5 실패"
