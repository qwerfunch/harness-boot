# 전역 invariants — 회귀 시 즉시 실패해야 하는 경계
global_invariants:
  - "각 샘플의 features[0].type 은 반드시 'skeleton'"
  - "모든 샘플에서 entities 수 ≥ 3"
  - "G-01/02/05/07/08/09/10 은 도메인 불변 필수 갭 — 8 샘플 모두 재현 (**8/8** 확증)"
  - "G-04/G-11/G-14/G-15/G-16 은 library · meta 도메인에서 비해당이 정당 — 어댑터가 선언 (단 G-04 는 vscode-cc 에서 부분 재현 발생)"
  - "회귀 시 사용자 수정 없이 goldens 덮어쓰기 금지"
  - "domain_adapter 가 지정된 샘플은 adapter_version_used 를 metadata 에 기록 (none 포함)"
  - "self_reference=true 샘플은 자기 BR 을 스스로 지키는지 conversion-notes 에서 self-consistency 체크 필수. self_reference=false 샘플은 P-22 N/A"
  - "누적 갭 카탈로그는 G-01~16 + NEW-17~36 = **36 종** (vscode-cc 변환 기준)"
  - "meta 도메인 불변 필수 NEW-* 갭: NEW-28(command_map) · NEW-33(ambient_files) — self + vite-bb + vscode-cc **3/3 HIT**"
  - "NEW-35(host_binding) 는 meta 도메인 전체 불변 (self-bootstrap 포함) — self + vite-bb + vscode-cc **3/3 HIT** (self v2 재변환으로 확증)"
  - "에디터·IDE·브라우저 확장 형 meta 샘플은 NEW-36(contribution_points) 를 반드시 기록 — vscode-cc v2 에서 7 kind(command/keybinding/view/configuration/menus/statusbar/activationEvents) 전수 실현, self v2 부분 해소 (3 kind), vite-bb v2 3 kind(pluginHook/cliSubcommand/configSchema). **서브타입별 kind 매트릭스 확정** (editor-extension=7, build-tool=3, self-bootstrap=3)"
  - "host-plugin 형 BR/features 비율 ≈ 1.0, self-bootstrap 형 ≈ 0.67 (서브타입 선택 보조 지표)"
  - "재변환(re_conversion_round≥2) 샘플은 v1 산출물을 보존하고 v2/ 하위에 별도 저장. edit-wins 에 따라 v1 필드는 불변, v2 는 추가만 (P-18 immutability + P-14 안전한 덮어쓰기)"
  - "self v2 는 `metadata.extensions.*` 하위 9 블록 구조화로 ★★★+ 17-기준 65%→94% 달성 — v2.3.8-rfc 의 승격 후보 4건(command_map/gate_chain/drift_catalog/preamble_contract) 식별"
