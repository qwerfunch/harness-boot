      backlink_quality_star3_plus_v2: "94%" # v2, 17 리드 기준 (rated 100%, 37 sub 91%) — 사용자 지시 ≥90% 달성
      deliverable_type: "cli-plugin"     # v2.3.7 스키마 수용 여부 불확실 → NEW-28 과 연동 (v2 에서 metadata.extensions 구조화로 부분 해소)
      prototype_mode: false
    v2_artifacts:                        # v2 재변환 산출물 (v1 은 같은 디렉터리 루트)
      spec: "design/samples/harness-boot-self/v2/spec.yaml"
