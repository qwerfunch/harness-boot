# yaml-language-server: $schema=https://raw.githubusercontent.com/qwerfunch/harness-boot/v2.3.7/docs/schemas/spec.schema.json
# .harness/spec.yaml — tzcalc (library 도메인 샘플, skill v0.3 적용)
version: "2.3.7"

# =====================================================================
# 🔎 변환 메모 (Stage 0)
#   - 성숙도: planning
#   - 도메인: library (pure)
#   - 저자 강조 3축: (1) Timezone 1-class  (2) 0-dep + <8kB gz tree-shakable
#                   (3) DST 정확성(ambiguous/non-existent 정책화)
#   - library 어댑터 v0.0 draft 를 실전 검증하는 샘플
# =====================================================================

project:
  name: "tzcalc"
  summary: "0-dep · tree-shakable · 타임존/DST 1-class TypeScript 시간 연산 라이브러리"
  description: |
    사내외 일정·예약·캘린더 기능에서 DST 전이 시점 중복/누락 버그가 반복
    발생해, 기존 대안(date-fns-tz · dayjs · Luxon · Temporal polyfill)의
    공백을 메우는 자체 라이브러리를 만든다. Node 18+ · Deno 1.40+ · Bun 1.x ·
    evergreen 브라우저에서 동작하고, 0 런타임 의존성에 전체 API 사용 시 gz
    8 kB 이하의 번들 크기를 유지하는 것이 설계 목표.
  vision: |
    Timezone 과 DST 가 "덤으로 지원되는 기능"이 아니라 타입 시스템과 API
    설계에 스며든 1-class 관심사여야 한다. ambiguous·non-existent local time
    같은 DST 전이 엣지 케이스는 암묵 처리되지 말고 호출자가 정책을 선택하게
    한다. 번들 크기는 기능 성장과 함께 천천히 커져야 하며, 한 두 함수만
    쓰는 사용자는 2 kB 이하만 지불해야 한다.
  stakeholders:
    - role: "internal_dev_team"
      concerns:
        - "일정/예약/캘린더 기능의 DST 버그가 가장 큰 고객 컴플레인 — 품질 민감"
        - "TypeScript strict 모드에서 엣지 케이스가 타입으로 드러나야 함"
    - role: "devex_team"
      concerns:
        - "빌드 산출물 dual ESM/CJS + subpath exports 의 개발자 경험"
        - "번들 크기 회귀 방지 (size-limit)"
        - "문서·예제의 품질과 갱신 주기"
    - role: "security_infra"
      concerns:
        - "0-dep 원칙 유지 (공급망 공격 면적 최소)"
        - "npm provenance 서명 활성화"
    - role: "oss_community"
      concerns:
        - "MIT 라이선스, 이슈·PR 응답성"
        - "릴리즈 노트 품질 + SemVer 규율"

domain:
  overview: |
    핵심 추상은 Instant(UTC epoch 기반 시점), Zone(IANA tz id 래퍼),
    CalendarDate(타임존 없는 달력 날짜) 세 타입의 구조적 분리. 연산은
    Instant ↔ ZonedDateTime 을 명시적 변환으로 오가며, DST 전이의 ambiguous
    / non-existent 로컬 시간은 호출자가 정책(earlier/later/reject)으로
    선택한다. Interval 은 반개구간 [start, end) 모델이고 v1 은 Allen's
    interval algebra 의 overlaps/contains/meets 3 관계만 제공.
  entities:
    - name: "Instant"
      description: "UTC 기준 시점. epoch ms + nano 로 표현, 불변."
      invariants:
        - "epoch_ms 는 정수, nano 는 0..999_999 범위"
        - "모든 연산의 1차 표현 — Zone 이 없으면 존재할 수 없는 개념은 아님"
        - "동치성은 구조적 비교로 결정"
      sensitive: false
    - name: "Zone"
      description: "IANA tz id 를 감싼 타입 안전 래퍼. 팩토리 `zone(id)` 로만 생성."
      invariants:
        - "잘못된 IANA id 는 팩토리에서 throw, 런타임 ZoneRules 조회 가능해야 함"
        - "런타임 tzdata 는 Intl 에 의존 — 라이브러리는 tzdata 를 번들하지 않는다"
      sensitive: false
    - name: "CalendarDate"
      description: "타임존 정보가 없는 달력 날짜. DB 저장·사용자 입력 수용용."
      invariants:
        - "(year, month, day, hour, minute, second, nano) 유효 범위 강제"
        - "ZonedDateTime 으로 변환하려면 반드시 Zone + ambiguous 정책 필요"
      sensitive: false
    - name: "Interval"
      description: "두 Instant 로 구성된 반개구간 [start, end)."
      invariants:
        - "start < end 불변"
        - "v1 은 overlaps/contains/meets 3 관계만 제공 — 나머지 10 관계는 open_question"
      sensitive: false
    - name: "DstTransition"
      description: "DST 전이 정보 (gap/overlap 여부와 오프셋 변화)."
      invariants:
        - "type ∈ {gap, overlap}"
        - "이전/이후 오프셋은 항상 분(minute) 단위로 반환"
      sensitive: false
  business_rules:
    - id: "BR-001"
      statement: "모든 시간 연산 API 는 Zone 을 명시적으로 받는다. 암묵적 로컬 변환 금지."
      rationale: "저자 강조 축 1 (Timezone 1-class) — 로컬 변환 암묵화가 DST 버그의 주 원인"
    - id: "BR-002"
      statement: "런타임 dependencies 는 0개이어야 한다. peerDependencies.optional 만 허용."
      rationale: "저자 강조 축 2 (0-dep) — 공급망 보안 + 번들 크기"
    - id: "BR-003"
      statement: "번들 크기 회귀는 CI 에서 블록한다. gz 8 kB(전체 API) / 2 kB(단일 함수) 상한."
      rationale: "저자 강조 축 2 (tree-shakable) — size-limit 로 자동 검증"
    - id: "BR-004"
      statement: "공개 API 는 named export 만 사용한다. default export 금지."
      rationale: "tree-shaking 정확성 + import 명칭 일관성"
    - id: "BR-005"
      statement: "underscore(`_`) prefix 이름은 공개 API 가 아니며 외부에서 import 경로로 접근 불가."
      rationale: "내부 유틸과 공개 API 의 명확한 분리"
    - id: "BR-006"
      statement: "API 제거는 최소 한 번의 minor 릴리즈에서 @deprecated + dev console.warn 경유 후 major 에서만 삭제."
      rationale: "저자 강조 축 3 간접 (SemVer 규율) — 파괴적 변경 예측 가능성"
    - id: "BR-007"
      statement: "1.x 릴리즈는 최소 24개월 LTS — 심각 보안·정확성 버그만 수정."
      rationale: "라이브러리의 장기 안정성 약속"
    - id: "BR-008"
      statement: "라이브러리는 IANA tzdata 를 번들하지 않는다. 런타임 제공분(Intl)에 위임."
      rationale: "번들 크기 유지 + tzdata 갱신 책임 분리. 사용자에게 계약으로 드러내야 함"
  vocabulary:
    - term: "Instant"
      meaning: "UTC 기준 epoch + nano 로 표현되는 절대 시점."
    - term: "Zone"
      meaning: "IANA tz id 래퍼. Asia/Seoul, America/New_York 등."
    - term: "CalendarDate"
      meaning: "타임존 없는 달력 날짜. DB/입력 경계에서만 사용."
    - term: "Ambiguous local time"
      meaning: "DST 종료 시 같은 로컬 시각이 두 번 존재하는 구간(overlap)."
    - term: "Non-existent local time"
      meaning: "DST 시작 시 로컬 시각이 건너뛰는 구간(gap)."
    - term: "Interval"
      meaning: "[start, end) 반개구간. Allen's interval algebra 용어 차용."

features:
  - id: "F-001"
    name: "Skeleton — 패키지 초기화 + 최소 왕복"
    type: "skeleton"
    description: "npm 패키지 골격 + 타입 export + 단일 함수(zone) 퍼블리시까지의 최소 루프."
    modules:
      - "package_json"
      - "tsup_build"
      - "vitest_setup"
      - "zone_factory"
    test_strategy: "tdd"
    tdd_focus:
      - "zone('Asia/Seoul') 은 Zone 리턴, 잘못된 id 는 throw"
      - "tsup build 가 ESM + CJS + .d.ts 3종 산출"
    acceptance_criteria:
      - "`pnpm build` 가 dist/ 에 ESM, CJS, .d.ts 를 동시 생성"
      - "`import { zone } from 'tzcalc'` 가 ESM 소비자에서 동작"
      - "`const { zone } = require('tzcalc')` 가 CJS 소비자에서 동작"
      - "`tzcalc@0.0.1-pre` 가 dry-run publish 통과"

  - id: "F-002"
    name: "Instant / Zone / CalendarDate 타입과 변환"
    type: "feature"
    description: "3개 핵심 타입 정의 + toZone · fromZoned 양방향 변환."
    modules:
      - "instant_type"
      - "zone_type"
      - "calendar_date_type"
      - "to_zone"
      - "from_zoned"
    test_strategy: "tdd"
    tdd_focus:
      - "toZone(instant, zone) 는 Instant 를 변조하지 않는다(불변)"
      - "fromZoned 의 opts.ambiguous 가 ['earlier', 'later', 'reject'] 각각에 대해 정의된 동작"
    acceptance_criteria:
      - "CalendarDate 의 필드 유효 범위 위반 시 factory 에서 throw"
      - "`fromZoned(2025, 3, 9, 2, 30, 0, zone('America/New_York'), {ambiguous: 'reject'})` 는 throw"
      - "toZone/fromZoned 왕복이 non-DST 영역에서 epoch_ms 동치"

  - id: "F-003"
    name: "시간 산술 — add / diff / compare"
    type: "feature"
    description: "duration 가산, Instant 간 차이 계산, 순서 비교."
    modules:
      - "add_duration"
      - "diff_units"
      - "compare"
    test_strategy: "tdd"
    tdd_focus:
      - "add 는 Zone 의 DST 전이 경계에서 정의된 규칙(캘린더 기반 vs 초 단위)으로 동작"
      - "diff 단위는 초/분/시/일/주/월 6종 초기 지원"
    acceptance_criteria:
      - "`add(instant, {hours: 24})` 와 `add(instant, {days: 1})` 가 DST 경계에서 다른 결과"
      - "diff(a, b, 'hours') 는 정수 floor 기본, opts.sign 으로 부호 포함 가능"
      - "compare 는 -1 / 0 / 1 만 리턴"

  - id: "F-004"
    name: "ISO 8601 파싱 / 직렬화"
    type: "feature"
    description: "parse + formatISO. 관대한 파서 vs 엄격한 파서의 두 모드."
    modules:
      - "parse_iso"
      - "format_iso"
    test_strategy: "property"
    acceptance_criteria:
      - "formatISO(parse(s)) 는 정규 형태로 idempotent"
      - "잘못된 ISO 문자열은 엄격 모드에서 throw"
      - "타임존 오프셋 없는 문자열 + zone 인자 조합이 가능"

  - id: "F-005"
    name: "Interval (반개구간) + 3 관계"
    type: "feature"
    description: "Interval 클래스. overlaps / contains / meets 3 관계 제공."
    modules:
      - "interval_class"
      - "allen_relations_v1"
    test_strategy: "property"
    tdd_focus:
      - "Allen's 13 관계 중 3개 (overlaps/contains/meets) 는 정의에 완전 일치"
      - "나머지 10 관계는 v1 에서 AbortWithMessage 로 guard"
    acceptance_criteria:
      - "start ≥ end 로 Interval 생성 시 throw"
      - "overlaps 는 symmetric, contains 는 asymmetric 이 단위 테스트로 검증"

  - id: "F-006"
    name: "DST 정책 API"
    type: "feature"
    description: "ambiguous / non-existent local time 처리 정책을 노출."
    modules:
      - "dst_ambiguous_policy"
      - "dst_gap_policy"
      - "dst_transition_query"
    test_strategy: "tdd"
    tdd_focus:
      - "America/New_York, Asia/Seoul(1988), Pacific/Chatham, Australia/Lord_Howe 전이 매트릭스 테스트"
      - "기본값(reject) 이 변경되면 major 승격 (BR-001, BR-006)"
    acceptance_criteria:
      - "fromZoned 의 ambiguous 옵션 3종 모두 테스트 존재"
      - "DstTransition 은 gap/overlap 타입 + 이전/이후 offset 분"

  - id: "F-007"
    name: "빌드 / 번들 / 배포 파이프라인"
    type: "feature"
    description: "tsup 듀얼 패키지 + subpath exports + size-limit + provenance publish."
    modules:
      - "tsup_config"
      - "subpath_exports_map"
      - "size_limit_ci"
      - "npm_provenance_publish"
    test_strategy: "contract"
    acceptance_criteria:
      - "exports map 에 `tzcalc`, `tzcalc/zone`, `tzcalc/interval` 3경로"
      - "`sideEffects: false` 가 package.json 에 명시"
      - "gz 크기 8 kB 초과 시 CI FAIL"
      - "npm publish --provenance 로 서명"

  - id: "F-008"
    name: "CI 매트릭스 (Node/Deno/Bun/브라우저)"
    type: "feature"
    description: "4개 런타임에서 동일 테스트 suite 통과."
    modules:
      - "ci_node_matrix"
      - "ci_deno"
      - "ci_bun"
      - "ci_playwright_browsers"
    test_strategy: "contract"
    acceptance_criteria:
      - "Node 18/20/22 LTS 매트릭스 통과"
      - "Deno 1.40+ 로 동일 테스트 통과 (import map 경유)"
      - "Bun 1.x best-effort — 실패 시 warn 레벨"
      - "Playwright 로 Chrome/Firefox/Safari 단위 테스트 최소 3종"

  - id: "F-009"
    name: "문서 사이트 + 예제"
    type: "feature"
    description: "Docusaurus 기반 문서, examples/ 하위 실행 가능한 예제."
    modules:
      - "docs_site_docusaurus"
      - "examples_runnable"
      - "api_reference_generator"
    test_strategy: "contract"
    acceptance_criteria:
      - "모든 공개 API 가 문서 한 페이지 이상에서 언급"
      - "examples/ 의 각 예제는 CI 에서 실제 실행·검증"

constraints:
  tech_stack:
    language: "typescript"
    ts_version: "5.0+"
    module_format: ["esm", "cjs"]
    package_manager: "pnpm"
    bundler: "tsup"
    test_runner: "vitest"
    browser_runner: "playwright"
    size_guard: "size-limit"
  compat:
    node: "18 LTS | 20 LTS | 22"
    deno: "1.40+"
    bun: "1.0+ (best-effort)"
    browsers: "Chrome 110+ / Firefox 115+ / Safari 16+"
  architectural:
    - "공개 API 는 named export only (BR-004)"
    - "default export 금지"
    - "sideEffects: false 로 tree-shaking 보장"
    - "runtime dependencies = 0 (BR-002)"
    - "IANA tzdata 는 번들하지 않음 (BR-008) — 런타임 Intl 위임"
  quality:
    coverage_threshold: 80
    size_limit_gz_kb_full: 8
    size_limit_gz_kb_single: 2
  prototype_mode: false      # P-9: 기간 ≈ 8주, 정식 라이브러리라 false

deliverable:
  type: "library"              # v2.3.7 에 이 타입이 있는가? — unrepresentable.md NEW 검증
  platform: "multi-runtime"    # node + deno + bun + browser
  artifacts:
    - name: "tzcalc"
      kind: "npm-package"
      registry: "npm"
      provenance: true
      subpath_exports:
        - "tzcalc"
        - "tzcalc/zone"
        - "tzcalc/interval"
      formats: ["esm", "cjs"]

metadata:
  source:
    origin: "planning_doc"
    format: "markdown"
    path: "design/samples/tzcalc/plan.md"
    maturity: "planning"         # P-16
    source_lines:
      entities:
        Instant: "§5 핵심 엔티티"
        Zone: "§4 공개 API + §5 엔티티"
        CalendarDate: "§5 엔티티"
        Interval: "§5 + §4 API"
        DstTransition: "§4 API 표"
      features:
        F-002_types: "§4 API + §5 엔티티"
        F-005_interval: "§4 Interval + §12 미결정 10관계"
        F-006_dst_policy: "§2 목표 3번째 축 + §12"
        F-007_build: "§7 번들 + §8 버전 정책"
        F-008_ci: "§6 호환성 매트릭스 + §9 M1/M3"
      business_rules:
        BR-001_zone_explicit: "§2 목표 1 + §4 API 설계 원칙"
        BR-002_zero_dep: "§2 목표 + §11 의존성"
        BR-006_deprecation: "§8 버전 정책"
        BR-008_no_tzdata: "§6 호환성 + §15 비포함"
  conversion:
    skill: "spec-conversion"
    skill_version: "0.3"
    sample_index: 5
    domain_adapter: "library"
    adapter_version_used: "0.0"    # draft — 이 변환으로 0.1 로 승격 예정
    converted_at: "2026-04-22"
    notes_file: "design/samples/tzcalc/conversion-notes.md"
    gaps_file: "design/samples/tzcalc/unrepresentable.md"
