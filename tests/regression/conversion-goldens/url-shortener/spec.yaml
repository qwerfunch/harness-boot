# 아래 plan.md 섹션들은 현재 스키마에 자리가 없어 이 파일에서 누락됨:
#   - §4 NFR (p95 50ms, 99.9%, 10M links) — 정량 목표의 정식 필드 없음
#   - §7 데이터 모델 필드 목록 — entities[]에 field/attribute 배열 없음
#   - §8 API surface 전체 — features 와 deliverable 사이에 API 레벨 없음
#   - §9 UI 화면 목록 — screens/routes 등의 상위 필드 없음
#   - §10 엣지 케이스 — edge_cases/exceptions 상위 필드 없음
#   - §11 외부 의존성 — external_dependencies 상위 필드 없음
#   - §12 성공 지표 — metrics/kpi 필드 없음
#   - §13 마일스톤 — milestones/release_plan 필드 없음
#   - §14 위험/가정 — risks/assumptions 필드 없음
#   - §15 오픈 이슈 — open_questions 필드 없음
# =====================================================================
