open_questions:
  - id: "OQ-1"
    topic: "dev 서버 경고 debounce 기본값"
    detail: "500ms 가 적절한가? 대규모 앱에서 HMR 빈도가 높으면 1s 도 고려. 벤치 필요."
    discovered_in: "§12 리스크"
  - id: "OQ-2"
    topic: "classifier 우선순위 필드 추가 여부"
    detail: "v1 은 선언 순서 우선(BR-007). v2 에 priority: number 필드를 추가하면 충돌 방지. 당장은 YAGNI."
    discovered_in: "§12 리스크 + §10"
  - id: "OQ-3"
    topic: "ambiguous resolution of '같은 chunk 가 여러 category 로 분류' 가능성"
    detail: "현 모델은 카테고리 1개. 다중 카테고리(예: vendor + large-dep 동시) 는 v2 검토."
    discovered_in: "§5 Chunk invariant"
  - id: "OQ-4"
    topic: "self-hosting(이 플러그인 자체 빌드에도 이 플러그인 적용)"
    detail: "순환 의존 위험. v1 은 size-limit 유지, v2 검토."
    discovered_in: "§12 리스크"
  - id: "OQ-5"
    topic: "lib 모드(build.lib) 전용 프리셋"
    detail: "앱 모드 가정의 기본 예산이 라이브러리에서는 의미 없음. lib 프리셋 별도 필요?"
    discovered_in: "§12 리스크"
  - id: "OQ-6"
    topic: "Vite 7 CLI 확장 API 호환"
    detail: "현 5/6 과 호환 유지 불확실. 최악의 경우 CLI 를 별도 바이너리로 분리 필요."
    discovered_in: "§12 리스크"
