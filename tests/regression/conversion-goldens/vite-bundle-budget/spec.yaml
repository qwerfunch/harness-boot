# yaml-language-server: $schema=https://raw.githubusercontent.com/qwerfunch/harness-boot/v2.3.7/docs/schemas/spec.schema.json
# .harness/spec.yaml — vite-plugin-bundle-budget (meta 도메인 2번째 샘플, skill v0.4 적용)
version: "2.3.7"

# =====================================================================
# 🔎 변환 메모 (Stage 0)
#   - 성숙도: planning
#   - 도메인: meta (Vite 플러그인 — "다른 도구를 확장" 전형)
#   - 저자 강조 3축:
#       (1) 설정 파일 1개 + 플러그인 1줄 (최소 도입 비용)
#       (2) exit code 가 계약 (CI 통합 1급 시민)
#       (3) 경고/실패 경계는 사용자 결정 (강제하지 않음)
#   - meta 어댑터 v0.0 가설 검증 대상:
#       * F-9 "빌드 도구는 Config 엔티티 분리 필요" → HIT (BudgetConfig/BudgetRule/Classifier 3분)
#       * OQ-5 "자기참조 아닌 meta 도구" → HIT (이 플러그인은 자기 자신을 평가하지 않음)
#   - NEW-28/29/30/33/34 의 유효성을 library · self 외 샘플에서 재검증
# =====================================================================

project:
  name: "vite-plugin-bundle-budget"
  summary: "Vite 빌드 산출물의 chunk 별 크기 예산을 선언하고 초과 시 빌드 실패로 강제하는 플러그인"
  description: |
    웹 앱의 번들 크기는 시간이 지남에 따라 조용히 증가한다. 팀마다 "entry 는
    150kB, route chunk 는 80kB" 같은 내부 정책이 있지만 문서로만 관리되어
    신규 팀원이 규칙을 모른 채 큰 의존성을 추가하는 일이 반복된다. 기존 도구
    (size-limit · bundlesize · analyzer) 는 각각 CLI 중심 / 유지보수 부재 /
    분석 전용 이라 "예산 강제 + Vite 네이티브 + CLI + dev 경고" 를 한 묶음으로
    제공하는 곳이 없다. 이 플러그인은 정책 파일 1개 + `vite.config.ts` 에
    1줄 추가 → 빌드 시 fail/warn/ok 3티어 판정 → CLI 서브커맨드 3개로 리포트와
    재검사를 지원한다.
  vision: |
    번들 크기 회귀는 런타임 성능보다 먼저, 더 빈번하게 발생하는 무성의 사고
    다. 팀의 "크기 계약" 을 코드 레포 안에 TS 타입 검증되는 1파일로 두어
    코드 리뷰의 1급 시민으로 끌어올리는 것이 이 플러그인의 목표. dev 에서
    본 경고가 CI 에서 실패로 이어지는 '놀라움 최소화' 원칙은 타협하지 않는다.
  stakeholders:
    - role: "frontend_developer"
      concerns:
        - "예산 초과 시 실패 메시지에서 즉시 원인 chunk · 규칙 · 초과량 파악 가능"
        - "로컬 dev 서버에서 미리 경고 → PR 올리기 전에 수정"
    - role: "devex_build_team"
      concerns:
        - "CI 통합 — JSON 리포트 포맷 안정성, exit code 계약, 로그 시그니처"
        - "플러그인이 빌드 시간 증가시키지 않음 (buildEnd 훅 1회만)"
    - role: "platform_team"
      concerns:
        - "Vite 5/6/7 버전 매트릭스 호환 관리 (peer)"
        - "플러그인 자체 번들 크기 (dogfooding 은 v1 에선 비목표)"
    - role: "product_design"
      concerns:
        - "특정 라우트가 느린 이유를 '큰 번들' 로 설명할 수 있는 리포트 링크"
        - "PR 코멘트용 텍스트 리포트 가독성"
    - role: "oss_community"
      concerns:
        - "MIT · 외부 classifier 기여 수용"
        - "Vite 이외 bundler(webpack 등) 지원 요청의 명시적 비목표 선언"

domain:
  overview: |
    제품 표면은 (a) Vite 플러그인 팩토리 한 함수, (b) 사용자 레포에 두는
    설정 파일 `bundle-budget.config.ts`, (c) `vite` CLI 에 추가되는 3개
    서브커맨드(init/report/check) 세 축이다. 핵심 데이터 흐름은 BudgetConfig
    (불변 로드) → Rollup chunk 수집 → classifier 로 카테고리 부착 → rule 매칭
    → Verdict(ok/warn/fail) → Report 집계. 마지막 빌드 Report 는
    `.vite-budget/last-report.json` 으로 캐시되어 PR diff 에 쓰인다.
  entities:
    - name: "Plugin"
      description: "Vite 플러그인 인스턴스. configResolved · generateBundle · buildEnd 훅에 후킹."
      invariants:
        - "하나의 Vite config 에 이 플러그인은 1회만 등록 가능 (중복 등록 시 warn)"
        - "peer vite 가 미설치면 플러그인 로드 시 명시적 에러 (BR-005)"
      sensitive: false
    - name: "BudgetConfig"
      description: "`bundle-budget.config.ts` 에서 로드한 불변 설정. defaults · rules · classifiers 3필드."
      invariants:
        - "zod 스키마로 런타임 검증 — 실패 시 플러그인 로드 중단"
        - "로드된 객체는 deep-freeze — 런타임 mutation 금지"
        - "configFile 경로 미지정 시 프로젝트 루트에서 자동 탐색"
      sensitive: false
    - name: "BudgetRule"
      description: "단일 규칙: match(glob) · max · warnAt? · compression? · onFail?."
      invariants:
        - "max 단위는 kB/MB/B 문자열 리터럴 또는 bytes 숫자"
        - "warnAt 미지정 시 max × 0.9 로 도출 (BR-003)"
        - "compression/onFail 미지정 시 defaults 상속"
      sensitive: false
    - name: "Classifier"
      description: "(chunk) => category | null 함수. 복수 선언 시 순서대로 호출, 첫 non-null 채택."
      invariants:
        - "선언 순서 우선 — v1 우선순위 필드 없음 (BR-007)"
        - "순수 함수이어야 함 — side-effect 금지"
      sensitive: false
    - name: "Chunk"
      description: "Rollup 이 방출한 청크의 측정 모델."
      invariants:
        - "fileName · size(raw) · gzipSize · brotliSize? · category 필드"
        - "category 는 classifier 체인의 결과 또는 기본 분류(entry/routes/vendor/asset)"
      sensitive: false
    - name: "Verdict"
      description: "chunk × rule 평가 결과."
      invariants:
        - "level ∈ {ok, warn, fail}"
        - "observed ≤ warnAt → ok; warnAt < observed ≤ max → warn; max < observed → fail"
        - "observed 는 defaults.compression 에 해당하는 측정값"
      sensitive: false
    - name: "Report"
      description: "Verdict 집합 + 요약(pass/warn/fail 개수 + 총 gz 크기)."
      invariants:
        - "JSON 직렬화 포맷은 patch 레벨에서 변경 금지 (BR-010)"
        - "CLI `--format=text` 와 `--format=json` 은 동일 Verdict 집합에서 파생"
      sensitive: false
    - name: "Lockfile"
      description: "`.vite-budget/last-report.json` — 직전 빌드 Report 캐시. diff 용."
      invariants:
        - "gitignore 권장, 레포에 커밋해도 작동 (팀 선택)"
        - "append-only 아님 — 매 빌드 덮어쓰기"
        - "버전 필드(schemaVersion) 포함 — 구버전 lockfile 감지 시 경고 후 재생성"
      sensitive: false
  business_rules:
    - id: "BR-001"
      statement: "플러그인은 `vite.config.ts` 의 plugins 배열에 1줄 추가로 작동한다. 추가 import 없이 config 로드."
      rationale: "저자 강조 축 1 (최소 도입 비용) — 경쟁 도구(size-limit 등) 대비 차별화 포인트"
    - id: "BR-002"
      statement: "빌드 시 fail 판정이 1건이라도 있으면 vite build 의 exit code 는 0이 아니어야 한다."
      rationale: "저자 강조 축 2 (exit code 계약) — CI 1급 시민"
    - id: "BR-003"
      statement: "BudgetRule 의 warnAt 미지정 시 max × 0.9 로 도출한다."
      rationale: "사용자가 명시하지 않아도 warn 경계가 존재해야 함 — UX"
    - id: "BR-004"
      statement: "하나의 chunk 가 복수 rule 에 매치되면 가장 엄격한 max 를 채택한다."
      rationale: "중첩 정책의 예측 가능성 — 사용자는 '더 작은 쪽이 이긴다' 만 기억하면 됨"
    - id: "BR-005"
      statement: "peerDependencies: vite@>=5 를 강제한다. 미설치 환경에서는 명시적 에러."
      rationale: "Rollup 4 API 가 필요 — 구버전 지원은 호환성 매트릭스 폭발"
    - id: "BR-006"
      statement: "압축 측정 기본값은 gzip 이다. raw / brotli 는 옵션 토글로만 활성."
      rationale: "저자 강조 축 3 (사용자 결정) 의 변형 — 기본값은 가장 흔한 CI 기준"
    - id: "BR-007"
      statement: "classifiers 는 선언 순서대로 호출되며 첫 non-null 결과를 채택한다. v1 우선순위 필드 없음."
      rationale: "단순성 — 사용자가 예측 가능한 멘탈 모델"
    - id: "BR-008"
      statement: "dev 서버 인라인 경고에서 'warn' 으로 표기된 chunk 는 CI 빌드에서도 동일 classifier · rule 로 'warn' 이상이어야 한다."
      rationale: "저자 강조 축 3의 실행 — 놀라움 최소화 (dev 에서 본 것 = CI 에서 보는 것)"
    - id: "BR-009"
      statement: "측정 대상은 Vite 의 최종 빌드 산출물(`writeBundle` 시점)이다. HMR 산출물·sourcemap·metadata 파일은 제외."
      rationale: "번들 크기 정의의 일관성 — 사용자가 배포하는 바이트만 계측"
    - id: "BR-010"
      statement: "JSON 리포트 포맷은 안정 계약이며, major 버전 승격 없이 필드 삭제·rename 금지."
      rationale: "CI 파이프라인·github action 이 파싱에 의존 — patch/minor 안정성 필요"
  vocabulary:
    - term: "Budget"
      meaning: "chunk 류에 대한 최대 허용 크기(+경고 경계). rules[] 에 선언."
    - term: "Verdict"
      meaning: "chunk × rule 평가 결과의 3티어 판정(ok/warn/fail)."
    - term: "Classifier"
      meaning: "chunk 파일명 → 카테고리 매핑 함수. 사용자 커스텀 가능."
    - term: "Lockfile"
      meaning: "`.vite-budget/last-report.json` — 직전 빌드 Report 의 캐시."
    - term: "Budget config"
      meaning: "`bundle-budget.config.ts` — 플러그인의 SSoT 설정 파일."

features:
  - id: "F-001"
    name: "Skeleton — 플러그인 뼈대 + config 로드 + 최소 빌드 훅"
    type: "skeleton"
    description: "npm 패키지 골격, Vite 플러그인 팩토리, BudgetConfig 로드, generateBundle 훅에서 chunk 수집까지 전 기술 스택을 1개 feature 로 관통."
    modules:
      - "package_skeleton"
      - "plugin_factory"
      - "config_loader"
      - "chunk_collector"
    test_strategy: "tdd"
    tdd_focus:
      - "BudgetConfig 로드 성공/실패 2케이스"
      - "generateBundle 훅이 chunk 개수만큼 Chunk 를 수집"
    acceptance_criteria:
      - "`npm i vite-plugin-bundle-budget && vite build` 로 샘플 앱이 빌드되고 빈 Report 가 콘솔 출력"
      - "`bundle-budget.config.ts` 부재 시 defaults 만으로 동작하고 경고 메시지 출력"

  - id: "F-002"
    name: "BudgetConfig 파서 + zod 검증"
    type: "feature"
    description: "`defineBudgets()` 헬퍼와 zod 스키마 기반 런타임 검증."
    modules:
      - "define_budgets_helper"
      - "zod_schema"
      - "config_normalizer"
    test_strategy: "tdd"
    tdd_focus:
      - "잘못된 max 리터럴('1Gz') 입력 시 zod 에러"
      - "rules[].match glob 컴파일 실패 시 명확한 에러 위치 표시"
    acceptance_criteria:
      - "compression 미지정 → 'gzip' 로 채워짐"
      - "warnAt 미지정 → max × 0.9 로 채워짐 (BR-003)"
      - "deep-freeze 된 객체 리턴"

  - id: "F-003"
    name: "Verdict 평가 엔진"
    type: "feature"
    description: "Chunk × BudgetRule 평가 → Verdict 생성. 복수 rule 매칭 시 가장 엄격한 max 채택(BR-004)."
    modules:
      - "rule_matcher"
      - "verdict_evaluator"
      - "strictest_rule_selector"
    test_strategy: "property"
    tdd_focus:
      - "중첩 glob 매칭의 결정성 (property: 규칙 순서와 무관하게 같은 Verdict)"
      - "observed == max 경계에서 fail 이 아닌 warn 으로 처리"
    acceptance_criteria:
      - "ok/warn/fail 3티어가 observed 와 warnAt/max 경계에서 정확히 구분"
      - "Verdict 는 chunk + rule + observed + limit + level 5필드 필수"

  - id: "F-004"
    name: "빌드 종료 hook — exit code 계약"
    type: "feature"
    description: "buildEnd 훅에서 Report 집계 → fail 1건 이상이면 non-zero exit."
    modules:
      - "report_aggregator"
      - "build_end_hook"
      - "exit_code_enforcer"
    test_strategy: "contract"
    acceptance_criteria:
      - "fail verdict 있음 + onFail='error' → process.exit(1)"
      - "onFail='warn' 으로 오버라이드 시 exit 0 유지, stderr 에 경고"
      - "Report 가 stdout 에 고정 포맷으로 출력되어 파싱 가능 (BR-002, BR-010)"

  - id: "F-005"
    name: "Dev 서버 인라인 경고"
    type: "feature"
    description: "vite dev 중 dependency/chunk 변동 시 debounce 된 예상 크기 재계산 → 초과 chunk 를 콘솔 경고."
    modules:
      - "dev_server_integration"
      - "hmr_debouncer"
      - "dev_warning_formatter"
    test_strategy: "e2e"
    tdd_focus:
      - "같은 세션 내 중복 경고 억제 (identical verdict 는 1회만)"
      - "debounce 간격 기본 500ms (open_question OQ-1)"
    acceptance_criteria:
      - "BR-008 성립: dev 에서 warn 이상으로 본 chunk 는 CI 에서도 warn 이상"
      - "dev 종료 시 마지막 경고 집계 요약 1줄 출력"

  - id: "F-006"
    name: "CLI 서브커맨드 — init"
    type: "feature"
    description: "`vite bundle-budget init` — 프로젝트 루트에 `bundle-budget.config.ts` 템플릿 생성."
    modules:
      - "cli_subcommand_init"
      - "config_template_generator"
    test_strategy: "tdd"
    acceptance_criteria:
      - "이미 존재하면 덮어쓰지 않고 --force 필요"
      - "생성된 파일은 TS strict 통과 + defineBudgets 호출 포함"

  - id: "F-007"
    name: "CLI 서브커맨드 — report"
    type: "feature"
    description: "`vite bundle-budget report [--format=text|json]` — 최근 빌드 Report 출력. 빌드 재수행 없음."
    modules:
      - "cli_subcommand_report"
      - "lockfile_reader"
      - "text_formatter"
      - "json_formatter"
    test_strategy: "contract"
    acceptance_criteria:
      - "Lockfile 부재 시 명시적 에러 + `check` 실행 안내"
      - "--format=json 은 JSON schema 부합, github action 에서 파싱 가능"

  - id: "F-008"
    name: "CLI 서브커맨드 — check"
    type: "feature"
    description: "`vite bundle-budget check` — vite build 수행 후 Report 생성 + 예산 강제 + Lockfile 갱신."
    modules:
      - "cli_subcommand_check"
      - "programmatic_build_invoker"
      - "lockfile_writer"
    test_strategy: "e2e"
    acceptance_criteria:
      - "build 실패 시 exit code 전파 (BR-002)"
      - "Lockfile schemaVersion mismatch 시 warn 후 재생성"

  - id: "F-009"
    name: "Lockfile diff 및 PR 코멘트용 포맷"
    type: "feature"
    description: "직전 Lockfile 과 현재 Report 의 Verdict 수준별 diff 출력. PR 코멘트 bot 이 소비하기 쉬운 형태."
    modules:
      - "lockfile_differ"
      - "pr_comment_formatter"
    test_strategy: "property"
    tdd_focus:
      - "같은 Report 2회 입력 → diff = empty (idempotent)"
      - "chunk 이름 변경 + 크기 동일 → 'renamed' 로 표시"
    acceptance_criteria:
      - "diff 는 added/removed/worsened/improved 4 버킷으로 분류"
      - "PR 코멘트 텍스트 3000자 이하 (대규모 변경 시 'truncated' 표시)"

  - id: "F-010"
    name: "Classifier 확장 API"
    type: "feature"
    description: "사용자 정의 classifier 를 BudgetConfig.classifiers[] 에 등록. 선언 순서 우선(BR-007)."
    modules:
      - "classifier_runner"
      - "classifier_contract_tests"
    test_strategy: "tdd"
    acceptance_criteria:
      - "순수 함수 아닌 classifier(예: 비동기) 는 타입 레벨에서 거부"
      - "모든 classifier 가 null 이면 기본 분류(entry/routes/vendor/asset) 사용"

constraints:
  tech_stack:
    language: "typescript"
    ts_version: "5.0+"
    module_format: ["esm", "cjs"]
    package_manager: "pnpm"
    bundler: "tsup"
    test_runner: "vitest"
    e2e_runner: "playwright"
    schema_validator: "zod"
  compat:
    node: "18 LTS | 20 LTS | 22"
    vite: ">=5 <7"   # 7 은 릴리즈 시 추가 예정
    rollup: "4.x"
    typescript: ">=5.0"
  architectural:
    - "Vite config 는 건드리지 않고, plugin 옵션과 별도 config 파일로 분리 (BR-001)"
    - "peer vite>=5 (BR-005)"
    - "sideEffects: false 로 tree-shakable 배포"
    - "runtime deps: zod · picomatch · picocolors · pretty-bytes 4종"
    - "CLI 서브커맨드는 Vite 의 CLI 확장 API 에 의존 — Vite 7 에서 API 변경 시 재평가"
  quality:
    coverage_threshold: 75
    e2e_scenarios_min: 4    # plugin load · budget fail · dev warn · cli check
  prototype_mode: false     # P-9: 기간 ≈ 4.5주 + 버퍼, 정식 플러그인이라 false

deliverable:
  type: "cli-plugin"          # v2.3.7 에 'vite-plugin' 하위타입이 없어 'cli-plugin' 로 근사. unrepresentable.md NEW-35 후보
  platform: "vite-5-6"        # 호스트 도구 식별 — 현 스키마에 platform 이 문자열 1개라 "vite-7 추가 예정" 서술 불가
  artifacts:
    - name: "vite-plugin-bundle-budget"
      kind: "npm-package"
      registry: "npm"
      provenance: true
      subpath_exports:
        - "vite-plugin-bundle-budget"
        - "vite-plugin-bundle-budget/config"
        - "vite-plugin-bundle-budget/cli"
      formats: ["esm", "cjs"]
  entry_points:
    # NEW-28 command_map[] 부재로 인한 우회: slash-command 대신 vite-subcommand 로 kind 표기
    # 현 스키마 지원 범위 밖이지만 기록 남김. unrepresentable NEW-28 재강조 대상
    - kind: "vite-subcommand"
      name: "vite bundle-budget init"
    - kind: "vite-subcommand"
      name: "vite bundle-budget report"
    - kind: "vite-subcommand"
      name: "vite bundle-budget check"
    - kind: "plugin-factory"
      name: "default export (bundleBudget())"

