open_questions:
  - id: "OQ-1"
    topic: "Cursor/VSCodium API 호환성 실측"
    detail: "SCM inputBox 후킹이 두 포크에서 정확히 같은 이벤트 시그니처인지 확실하지 않음. 1.0 전 베타에서 시험 필요."
    discovered_in: "§12 리스크"
  - id: "OQ-2"
    topic: "Template schema 완화 시점"
    detail: "v1 엄격 → v2 완화. 어느 필드부터 optional 로 풀지 사용자 피드백 대기."
    discovered_in: "§12 리스크"
  - id: "OQ-3"
    topic: "대형 레포 HistoryIndex 최적화"
    detail: "50만 커밋 레포에서 N=100 페이징도 cold start 를 느리게 만들 가능성. workerThread 분리 검토."
    discovered_in: "§12 리스크"
  - id: "OQ-4"
    topic: "VSCode 1.90+ SCM API 변경"
    detail: "VSCode 1.90 에서 SCM contribution 일부 시그니처 변경 예고. 호환 레이어 필요 여부 확정 필요."
    discovered_in: "§12 리스크"
  - id: "OQ-5"
    topic: "LLM 평문 키 저장 감지의 강도"
    detail: "settings.json 에 키가 있으면 경고 배너는 확정이나 자동 삭제까지 할지 여부 미정."
    discovered_in: "§12 리스크 + BR-004"
