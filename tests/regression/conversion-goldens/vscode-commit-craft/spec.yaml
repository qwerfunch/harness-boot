# yaml-language-server: $schema=https://raw.githubusercontent.com/qwerfunch/harness-boot/v2.3.7/docs/schemas/spec.schema.json
# .harness/spec.yaml — vscode-commit-craft (meta 도메인 3번째 샘플, skill v0.4 적용)
version: "2.3.7"

# =====================================================================
# 🔎 변환 메모 (Stage 0)
#   - 성숙도: planning
#   - 도메인: meta (host-plugin 형, host=VSCode)
#   - 저자 강조 3축:
#       (1) SCM 입력 박스가 1급 표면 (사이드바는 부차)
#       (2) 로컬 우선 (HistoryIndex·Draft 모두 워크스페이스 하위, LLM 만 opt-in)
#       (3) 팀 템플릿은 레포 일부 (.commit-craft/template.yaml)
#   - F-8 가설 검증 대상:
#       * "VSCode 확장은 command 외에 surface_map 필요" → 7종 contribution 공존 확증
#       * 결과: NEW-36 contribution_points[] 신규 공식화
#   - self + vite-bb + vscode-cc 3샘플 평균 커버리지 측정
# =====================================================================

project:
  name: "vscode-commit-craft"
  summary: "VSCode 에서 커밋 메시지 작성 단계를 집중 지원하는 확장 — 템플릿·자동완성·린트·(선택) LLM 초안"
  description: |
    commitizen/commitlint 은 터미널, GitLens 는 탐색, VSCode 내장 SCM 은 자유
    입력 박스만 제공. 이 확장은 "IDE 안에서 커밋 메시지를 쓸 때" 에만 집중하여
    스테이징 diff + 팀 템플릿(`.commit-craft/template.yaml`) + 최근 커밋 학습
    (로컬 100건) 을 컨텍스트로 자동완성·린트 경고를 입력 박스에 인라인으로
    제공한다. LLM 초안 생성은 기본 off, 사용자가 엔드포인트+API키 설정 후만
    활성화.
  vision: |
    커밋 메시지는 팀 문화의 1급 시민. 터미널이나 PR 리뷰가 아닌 **작성하는
    순간** 에 피드백을 돌려주어야 한다. SCM 입력 박스를 확장의 주 표면으로
    삼고, 사이드바·명령 팔레트·상태바는 그 주변 부차 표면. 로컬 학습을
    원칙으로 두고 네트워크 I/O 는 LLM 옵션에서만 허용 — 팀 메시지가 레포
    바깥으로 새지 않는다는 계약을 보안의 기본값으로.
  stakeholders:
    - role: "individual_developer"
      concerns:
        - "키보드 동선 3개(Cmd+K M/L/T)로 주요 흐름 완결"
        - "입력 중 실시간 힌트의 낮은 레이턴시 (< 50ms)"
        - "LLM 미사용 시 네트워크 호출 0건 보장"
    - role: "team_lead_devex"
      concerns:
        - "팀 템플릿이 레포에 커밋되어 PR 리뷰 가능"
        - "lint.onCommit 강도를 팀 단위로 선언 (warn→error 전환)"
    - role: "platform_team"
      concerns:
        - "VSCode 1.80~1.90 API 변경 모니터링"
        - "Cursor/VSCodium best-effort 호환 범위"
    - role: "security_infra"
      concerns:
        - "LLM API 키는 반드시 OS keychain 경유 (평문 저장 warn)"
        - "최근 커밋 학습 데이터가 레포 외부로 유출되지 않음 감사"
    - role: "oss_community"
      concerns:
        - "MIT 라이선스, OpenVSX 병행 배포"
        - "공개 템플릿 프리셋 기여 수용"

domain:
  overview: |
    확장은 VSCode 의 SCM 입력 박스를 주 진입점으로, 사이드바 트리뷰·활동
    표시줄 아이콘·상태바 아이템·컨텍스트 메뉴·키바인딩을 보조 표면으로 두는
    복수 contribution point 구조. 제품 데이터는 (a) 로컬 SSoT `.commit-craft/
    template.yaml`, (b) 워크스페이스 `.vscode/commit-craft-history.json`(파생,
    overwrite-per-learn), (c) 실행 중인 Draft(메모리 only), (d) 선택적 LLM
    어댑터 4 축으로 나뉜다. 린트 파이프라인은 LintRule × Draft → LintVerdict 를
    상태바에 실시간 표시하고 커밋 시도 시 정책(warn/error/off) 에 따라 게이팅.
  entities:
    - name: "Extension"
      description: "VSCode 확장 런타임 인스턴스. activate/deactivate lifecycle 1회씩."
      invariants:
        - "확장 1회 activate — engines.vscode >=1.80 가 호스트에서 충족되어야 함"
        - "activationEvents 는 필요한 최소만 선언 (cold start 성능)"
      sensitive: false
    - name: "Template"
      description: "`.commit-craft/template.yaml` 로부터 로드된 팀 컨벤션 객체."
      invariants:
        - "schemaVersion 필드 필수 — 확장 major 와 독립적"
        - "types[]·scopes[]·format(title/body/footer) 3필드 필수"
        - "yaml+zod 로 런타임 검증, 실패 시 확장 활성화는 유지하되 UI 에 경고 배너"
      sensitive: false
    - name: "Draft"
      description: "작성 중인 커밋 메시지 상태 + 연관 diff hash + 시작 시각."
      invariants:
        - "메모리 only — 사용자가 draft.save 호출 시 `.commit-craft/drafts/*.md` 로만 저장"
        - "diff hash 가 현재 스테이징과 불일치하면 stale 경고"
      sensitive: true   # 사용자 작성 중 메시지 포함
    - name: "LintRule"
      description: "단일 검증 규칙 (id, applies_to, check fn, severity)."
      invariants:
        - "severity ∈ {hint, warning, error}"
        - "applies_to ∈ {title, body, footer, whole}"
        - "빌트인 규칙 + Template 에서 선언된 팀 규칙 병합"
      sensitive: false
    - name: "LintVerdict"
      description: "LintRule × Draft 평가 결과."
      invariants:
        - "level 은 rule.severity 를 그대로 계승 (escalation 없음)"
        - "message 는 사용자 언어 설정(ko/en) 에 따라 현지화"
      sensitive: false
    - name: "HistoryIndex"
      description: "최근 N 커밋 학습 캐시 — type/scope 빈도 테이블."
      invariants:
        - "워크스페이스 내 `.vscode/commit-craft-history.json` 만 읽고 쓰기 (BR-003)"
        - "retainDays 경과 시 재학습 트리거, overwrite-per-learn"
        - "N = commitCraft.history.learnCount (기본 100)"
      sensitive: false
    - name: "LLMAdapter"
      description: "엔드포인트 호출 어댑터. 기본 비활성, 사용자 설정 2개 필요."
      invariants:
        - "commitCraft.llm.enabled=false 면 존재조차 하지 않음 (undefined)"
        - "API 키는 반드시 OS keychain (apiKeyRef 로 조회) — 평문 설정은 warn"
        - "네트워크 호출 실패 시 graceful degradation (LLM 없이도 확장 동작)"
      sensitive: true
    - name: "StatusBarItem"
      description: "상태바 우측 priority=100 위치의 lint 상태 표시자."
      invariants:
        - "alignment=right 고정, priority=100"
        - "text 는 아이콘 prefix 포함 (`$(check)` / `$(warning)` / `$(error)`)"
        - "클릭 시 commitCraft.lint.runNow 호출"
      sensitive: false
  business_rules:
    - id: "BR-001"
      statement: "SCM 입력 박스는 확장의 주 표면이다. 다른 모든 UI (사이드바·상태바·메뉴) 는 보조 표면."
      rationale: "저자 강조 축 1 — 제품 정체성. 트리뷰는 대안이 아니라 조력자"
    - id: "BR-002"
      statement: "기본값에서 네트워크 I/O 는 0 이어야 한다. commitCraft.llm.enabled=true 설정 시에만 네트워크 호출 허용."
      rationale: "저자 강조 축 2 (로컬 우선) + 보안. Security/Infra stakeholder 의 최우선 요구"
    - id: "BR-003"
      statement: "HistoryIndex·Draft·Template 은 전부 워크스페이스 디렉터리 하위에만 저장한다. 글로벌 설정·홈 디렉터리 저장 금지."
      rationale: "저자 강조 축 3 (팀 템플릿 = 레포 일부) — 개인 환경 의존 제거"
    - id: "BR-004"
      statement: "API 키는 OS keychain(`apiKeyRef`) 경유로만 읽는다. settings.json 평문 저장 감지 시 경고 배너."
      rationale: "Security/Infra concerns — 실수로 평문 저장된 키가 레포에 커밋되는 사고 차단"
    - id: "BR-005"
      statement: "engines.vscode 는 >=1.80 으로 고정. 그 이하 버전에서는 확장 activate 실패 + 명시적 에러."
      rationale: "API 매트릭스 축소 — Cursor/VSCodium best-effort 는 1.80 이상에서만"
    - id: "BR-006"
      statement: "activationEvents 는 `onView:` · `onCommand:` · `workspaceContains:.git` 3개로 제한. 범용 `*` 활성화 금지."
      rationale: "cold start 성능 — VSCode 마켓플레이스 지침"
    - id: "BR-007"
      statement: "Template schemaVersion 불일치 시 경고 배너 + 1 버전 마이그레이션 지원 후 삭제."
      rationale: "팀 템플릿의 점진적 진화 — 확장 SemVer 와 독립적 schema 축"
    - id: "BR-008"
      statement: "lint.onCommit 정책이 `error` 일 때, 최소 1개 error 레벨 LintVerdict 존재 시 커밋 시도를 blocking 한다."
      rationale: "팀 규율 강제 경로 — 개인은 warn, 팀은 error 전환이 디폴트 흐름"
    - id: "BR-009"
      statement: "LLM 호출 실패 시 확장은 normal 경로(템플릿 + 히스토리) 로 degrade 한다. 확장 전체 크래시 금지."
      rationale: "graceful degradation — 네트워크 불가 환경에서 작동 유지"
    - id: "BR-010"
      statement: "확장 번들 크기는 gz 150 kB 이하를 유지한다. CI 에서 size-limit 으로 검증."
      rationale: "cold start + Marketplace 평점 — 과대 번들은 부정적 인식"
  vocabulary:
    - term: "Draft"
      meaning: "아직 커밋되지 않은 메시지 편집 상태 + 연관 diff hash."
    - term: "Template"
      meaning: "팀 컨벤션 정의 파일 `.commit-craft/template.yaml`."
    - term: "Contribution point"
      meaning: "VSCode 확장이 호스트에 기여하는 UI 지점 — commands, views, keybindings, configuration, menus, statusbar 등."
    - term: "Activation event"
      meaning: "확장이 activate 되는 트리거. 최소화가 cold start 성능의 핵심."

features:
  - id: "F-001"
    name: "Skeleton — 확장 뼈대 + activate + SCM 입력박스 후킹 + draft.new 1명령"
    type: "skeleton"
    description: "package.json 스캐폴드, activationEvents 3개, SCM inputBox 이벤트 리스너, commitCraft.draft.new 명령 1개를 전 기술 스택 관통으로 구현."
    modules:
      - "extension_entry_point"
      - "package_json_contributes"
      - "scm_inputbox_hook"
      - "command_draft_new"
    test_strategy: "tdd"
    tdd_focus:
      - "activate 1회 · deactivate 1회 호출 검증"
      - "`.git` 없는 워크스페이스에서는 확장 activate 하지 않음"
    acceptance_criteria:
      - "F5 (Extension Development Host) 로 SCM 탭에서 Cmd+K M 이 동작"
      - "vsce package 가 성공하고 OpenVSX 로도 publish 가능"
      - "활성화 후 VSCode 의 'Extensions: Show Running Extensions' 에 표시됨"

  - id: "F-002"
    name: "Template 로더 + zod 스키마 검증"
    type: "feature"
    description: "`.commit-craft/template.yaml` 로드·파싱·검증. 실패 시 확장은 계속 동작하되 UI 배너 표시."
    modules:
      - "template_loader"
      - "zod_schema_template"
      - "schema_version_migrator"
    test_strategy: "tdd"
    acceptance_criteria:
      - "schemaVersion 필드 필수"
      - "types/scopes/format 3필드 모두 존재해야 유효"
      - "schemaVersion 불일치 시 마이그레이션 1버전 지원(BR-007)"

  - id: "F-003"
    name: "자동완성 — 타입·스코프 드롭다운"
    type: "feature"
    description: "SCM 입력 박스에서 type/scope 입력 중 드롭다운 제공. Template + HistoryIndex 두 소스 병합."
    modules:
      - "completion_provider"
      - "template_source_adapter"
      - "history_source_adapter"
      - "source_merger"
    test_strategy: "property"
    tdd_focus:
      - "동일 scope 가 양 소스에 있으면 History 빈도 우선"
      - "Template 에 없는 scope 도 History 에 있으면 후보 표시"
    acceptance_criteria:
      - "50ms 이내 드롭다운 표시 (로컬 캐시만)"
      - "빈 Template 에서는 History 만으로 후보 생성"

  - id: "F-004"
    name: "HistoryIndex — 최근 커밋 학습"
    type: "feature"
    description: "simple-git 으로 최근 N 커밋의 title 파싱 → type/scope 빈도 테이블 생성. 캐시는 `.vscode/commit-craft-history.json`."
    modules:
      - "git_log_streamer"
      - "title_parser_cc"
      - "frequency_aggregator"
      - "history_cache_writer"
    test_strategy: "tdd"
    acceptance_criteria:
      - "N=100 기본. 재학습 명령 `commitCraft.history.learn` 으로 강제 가능"
      - "retainDays 경과 캐시는 자동 재학습"
      - "대형 레포(>50만 커밋)에서 N=100 만 페이징으로 요청, 중단 가능"

  - id: "F-005"
    name: "린트 엔진 + LintVerdict 상태바"
    type: "feature"
    description: "Draft 를 LintRule 배열로 평가 → LintVerdict 집계 → 상태바 실시간 갱신."
    modules:
      - "lint_rule_registry"
      - "lint_evaluator"
      - "status_bar_updater"
      - "i18n_bundle"
    test_strategy: "e2e"
    tdd_focus:
      - "title 길이 초과 시 warning 발생"
      - "scope whitelist 외 입력 시 error (또는 Template 지시에 따른 severity)"
      - "ko/en 메시지 스위치"
    acceptance_criteria:
      - "300ms 내 debounce 로 상태바 갱신"
      - "상태바 클릭 → commitCraft.lint.runNow 호출"

  - id: "F-006"
    name: "사이드바 트리뷰 (Drafts / Templates / Recent commits)"
    type: "feature"
    description: "activity bar 컨테이너 + 트리뷰 2 루트 노드(drafts + templates + recent commits 3섹션)."
    modules:
      - "tree_view_provider"
      - "tree_item_drafts"
      - "tree_item_templates"
      - "tree_item_recent_commits"
    test_strategy: "contract"
    acceptance_criteria:
      - "3 루트 노드가 초기 렌더에 보임"
      - "draft 클릭 → 입력 박스에 해당 본문 삽입"
      - "recent commit 더블클릭 → 학습 대상 재확인 prompt"

  - id: "F-007"
    name: "키바인딩 + 컨텍스트 메뉴 통합"
    type: "feature"
    description: "3 키바인딩 + 4 메뉴 위치 연결. 모두 기존 명령 ID 에 바인딩, 별도 로직 없음."
    modules:
      - "keybindings_declaration"
      - "menu_contributions"
    test_strategy: "contract"
    acceptance_criteria:
      - "scmFocused 컨텍스트에서만 Cmd+K M/L 작동"
      - "SCM input box 마우스 오른쪽 → 2개 명령 표시"

  - id: "F-008"
    name: "lint.onCommit 게이팅"
    type: "feature"
    description: "사용자가 커밋 버튼 클릭 시 LintVerdict 집계가 error 면 blocking, warn 이면 remind."
    modules:
      - "pre_commit_hook_intercept"
      - "policy_enforcer"
    test_strategy: "e2e"
    acceptance_criteria:
      - "`error` 정책 + error 1건 이상 → commit 취소 + 모달"
      - "`warn` 정책 + error 있어도 커밋 허용 + 상단 배너"
      - "`off` 정책은 게이팅 없음"

  - id: "F-009"
    name: "LLM 어댑터 (선택)"
    type: "feature"
    description: "사용자 엔드포인트 + keychain API 키로 스테이징 diff 를 LLM 에 전달하여 메시지 초안 생성."
    modules:
      - "llm_adapter_http"
      - "keychain_accessor"
      - "prompt_template_diff_to_commit"
      - "graceful_degradation"
    test_strategy: "contract"
    acceptance_criteria:
      - "enabled=false 기본 — 어댑터 인스턴스 생성 안 함"
      - "평문 API 키 저장 감지 시 UI 배너 + 비활성화"
      - "호출 실패 시 기본 경로(Template + History) 로 degrade"

  - id: "F-010"
    name: "배포 파이프라인 (VS Marketplace + OpenVSX)"
    type: "feature"
    description: "vsce package + ovsx publish 두 곳 동시 배포. VSIX + aux assets."
    modules:
      - "vsce_publish_ci"
      - "ovsx_publish_ci"
      - "size_limit_check"
    test_strategy: "contract"
    acceptance_criteria:
      - "gz 150 kB 상한 (BR-010)"
      - "engines.vscode=1.80 미만 환경에서 인스톨 거부"
      - "두 마켓플레이스에 동일 버전 동시 게시"

constraints:
  tech_stack:
    language: "typescript"
    ts_version: "5.0+"
    module_format: ["esm"]
    bundler: "tsup"
    test_runner: "vitest"
    packager: "vsce"
    publisher: ["vsce", "ovsx"]
    schema_validator: "zod"
  compat:
    vscode: ">=1.80"
    node: "18 (VSCode 내장)"
    git: ">=2.30"
    cursor: "0.35+ (best-effort)"
    vscodium: "1.80+"
  architectural:
    - "activationEvents 는 최소 3개 (BR-006)"
    - "engines.vscode 는 1.80 고정 (BR-005)"
    - "runtime deps: zod · yaml · simple-git 3종"
    - "LLM SDK 번들 금지 (사용자 엔드포인트만) (BR-002)"
  quality:
    coverage_threshold: 75
    e2e_scenarios_min: 6      # skeleton · template · autocomplete · lint · tree · llm-off
    bundle_size_gz_kb: 150
  prototype_mode: false

deliverable:
  type: "cli-plugin"          # vscode-extension 하위타입 부재 — cli-plugin 근사. NEW-35 host_binding 재확증
  platform: "vscode-1.80+"    # 호스트 1개 식별 — 단일 host_binding 케이스
  artifacts:
    - name: "commit-craft"
      kind: "vsix"
      registry: "vs-marketplace"
      provenance: false        # VSCode 는 provenance 시스템 별도
      publisher: "qwerfunch"
      formats: ["vsix"]
    - name: "commit-craft"
      kind: "vsix"
      registry: "open-vsx"
      provenance: false
      publisher: "qwerfunch"
      formats: ["vsix"]
  entry_points:
    # NEW-28 command_map[] 부재로 8 commands + 3 keybindings + 4 menus 모두 여기에 우회
    # + NEW-36 contribution_points[] 부재로 2 views + 1 statusbar + 3 activationEvents 도 별도 unrepresentable 기록
    - kind: "vscode-command"
      name: "commitCraft.draft.new"
    - kind: "vscode-command"
      name: "commitCraft.draft.fromTemplate"
    - kind: "vscode-command"
      name: "commitCraft.draft.fromDiff"
    - kind: "vscode-command"
      name: "commitCraft.draft.save"
    - kind: "vscode-command"
      name: "commitCraft.draft.clear"
    - kind: "vscode-command"
      name: "commitCraft.template.edit"
    - kind: "vscode-command"
      name: "commitCraft.lint.runNow"
    - kind: "vscode-command"
      name: "commitCraft.history.learn"
    - kind: "vscode-view-container"
      name: "commitCraft.view.container"
    - kind: "vscode-tree-view"
      name: "commitCraft.view.drafts"
    - kind: "vscode-statusbar"
      name: "commitCraft.statusBar.lintResult"

